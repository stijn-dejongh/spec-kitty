# =============================================================================
# Runtime Schema for Plan Mission (v1.0.0)
# =============================================================================
#
# Runtime template for the plan mission, enabling plan selection in spec-kitty next.
# Defines 4-step linear workflow: specify -> research -> plan -> review
#
# WP04/T024 (FR-021): the runtime YAML must validate against the runtime
# schema in `src/runtime/next/_internal_runtime/schema.py`. The
# canonical schema reads steps at the TOP LEVEL and identity from the
# `mission` block. We also keep a `mission.steps` mirror so legacy readers
# (existing dashboard tests, prompt builder smoke checks) continue to work.

mission:
  key: plan
  name: Planning Mission
  title: Planning Mission
  version: "1.0.0"
  description: Plan and design software features through structured phases

  # Mirror of top-level steps for legacy readers. Authoritative shape lives
  # at the document root for the runtime schema.
  steps:
    - id: specify
      name: Specify
      description: Prepare and specify the feature definition
      order: 1
      depends_on: []

    - id: research
      name: Research
      description: Gather research inputs and technical context
      order: 2
      depends_on: [specify]

    - id: plan
      name: Plan
      description: Design and create planning artifacts
      order: 3
      depends_on: [research]

    - id: review
      name: Review
      description: Review and validate planning artifacts
      order: 4
      depends_on: [plan]

  runtime:
    loop_type: sequential
    step_transition: manual
    prompt_template_dir: command-templates
    terminal_step: review

# Authoritative steps for the runtime schema (`MissionTemplate`).
steps:
  - id: specify
    title: Specify
    description: Prepare and specify the feature definition
    depends_on: []

  - id: research
    title: Research
    description: Gather research inputs and technical context
    depends_on: [specify]

  - id: plan
    title: Plan
    description: Design and create planning artifacts
    depends_on: [research]

  - id: review
    title: Review
    description: Review and validate planning artifacts
    depends_on: [plan]
