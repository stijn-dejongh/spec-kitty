#      tool names are the *subject*, not an accidental bias).
#   2. Provide a clear `reason` so future reviewers can audit the decision.
#   3. Verify the path resolves to an existing file (stale entries fail the lint).
#   4. Run `pytest tests/charter/test_neutrality_lint.py` to confirm lint passes.
