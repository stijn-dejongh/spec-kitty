  rationale: >
    QAAD 037 defines bounded-context discipline and ubiquitous-language enforcement
    as a mandatory design practice. The core principle—design decisions must respect
    context boundaries—maps directly to a spec-kitty directive.
adaptation:
  summary: >
    Translate QAAD 037 into a directive that requires agents to identify the bounded
    context of any design decision, validate linguistic consistency, and explicitly
    translate at context boundaries (ACL pattern).
  notes:
    - "Scope to architecture and code-review contexts."
    - "Simplify role-specific checklists into universal procedures."
    - "Reference DIRECTIVE_001 (Architectural Integrity Standard)."
