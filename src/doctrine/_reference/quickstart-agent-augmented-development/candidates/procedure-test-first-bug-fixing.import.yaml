classification:
  target_concepts:
    - "procedure"
  rationale: >
    Disciplined 7-step bug-fixing procedure: understand, choose test level,
    write failing test, verify it fails for the right reason, fix production code,
    run full suite, commit test and fix together. Transforms bug fixing from
    trial-and-error into a verifiable procedure.
adaptation:
  summary: >
    Converted from markdown approach to spec-kitty procedure YAML schema with
    entry/exit conditions and actor-per-step structure. Added anti_patterns
    section from the source's pitfalls. Cross-referenced to TDD and
    test-boundaries tactics.
  notes:
    - "Source is authored by Stijn Dejongh with linked articles on test-first bug fixing."
    - "Golden rule: 'Before you change production code, write a test that fails because of the bug.'"
    - "Verify-the-test step (temporarily expect wrong behavior) is the key differentiator."
