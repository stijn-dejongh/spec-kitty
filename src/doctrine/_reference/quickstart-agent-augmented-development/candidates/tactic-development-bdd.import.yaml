classification:
  target_concepts:
    - "tactic"
  rationale: >
    BDD as an architectural design practice — defining behavioral contracts at
    system boundaries before implementation. Placed under architecture/ because
    behavioral contracts shape system boundaries.
adaptation:
  summary: >
    Reframed from "how to do BDD" to "how to use BDD thinking during architectural
    design". Steps focus on identifying observable behaviors and establishing
    contracts, not on writing Gherkin scenarios. Distinguishes clearly from the
    existing behavior-driven-development tactic.
  notes:
    - "Source references patterns.sddevelopment.be — preserved as attribution in notes field."
    - "Failure modes added to prevent conflation with test-writing."
