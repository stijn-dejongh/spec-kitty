  rationale: >
    Structured review discipline: read intent first, scan diff, read files without
    commenting, summarize intent, identify risks by category (correctness, architecture,
    maintainability, side effects), formulate feedback as observations not instructions.
    Complements review-intent-and-risk-first with the incremental execution discipline.
