    flow. Added timing_guidance section. Cross-referenced to directive 024 (locality)
    and existing review-intent-and-risk-first tactic.
  notes:
    - "Key discipline: observations and questions, not prescriptive commands."
    - "Timing guidance: 5-15 min for <200 lines, 15-30 min for 200-500 lines, decompose >500 lines."
