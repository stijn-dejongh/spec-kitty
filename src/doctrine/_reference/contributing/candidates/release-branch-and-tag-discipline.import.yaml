  rationale: "Captures branch strategy and tagging constraints required for reliable releases."
adaptation:
  summary: "Standardize release flow around `main`, annotated tags, and merge-commit strategy for release PRs."
  notes:
    - "Treat `main` as release branch; cherry-pick from `2.x` into `main` before release."
    - "Use merge-commit strategy for release PRs (not squash)."
    - "Create annotated tags from `main` only."
    - "If tag is wrong, delete and recreate from the correct commit/branch."
