  rationale: "Captures high-impact merge safety checks and strategy trade-offs that should be reusable across missions."
adaptation:
  summary: "Standardize merge pre-flight, branch-location safety, and strategy semantics for predictable branch integration."
  notes:
    - "Require merge invocation from feature worktree context unless explicit `--feature` flow from main is used."
    - "Block merge when working tree is dirty."
    - "Perform target-branch update via fast-forward-only pull before merge."
    - "Keep strategy trade-offs explicit: merge preserves history, squash simplifies history, rebase rewrites history."
    - "Treat worktree/branch cleanup as configurable post-merge operations."
