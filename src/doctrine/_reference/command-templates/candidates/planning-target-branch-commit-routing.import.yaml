id: "imp-command-templates-target-branch-routing-001"
source:
  title: "Planning-phase target-branch commit routing"
  type: "command-template"
  publisher: "spec-kitty doctrine"
  url: "src/doctrine/templates/command-templates/"
  accessed_on: "2026-02-18"
classification:
  target_concepts:
    - "directive"
    - "tactic"
  rationale: "Defines where planning artifacts are generated and committed, preventing branch/worktree drift."
adaptation:
  summary: "Enforce planning commands to run in planning repo and commit artifacts to the feature target branch."
  notes:
    - "Specify/plan/tasks run in planning repository, not in mission worktrees."
    - "Generated planning artifacts are committed to `meta.json -> target_branch`."
    - "Location checks must guard against running planning commands from mission branches/worktrees."
    - "Finalize tasks must run to parse dependencies and commit task artifacts to target branch."
