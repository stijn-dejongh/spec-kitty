# Shipped step contract for the documentation/validate action (#502).
# Mirrors the research-scoping shape (mission spec C-009 forbids new top-level fields
# and forbids expected_artifacts on contracts or steps).
schema_version: "1.0"
id: documentation-validate
action: validate
mission: documentation
steps:
  - id: bootstrap
    description: Load charter context for this action
    command: "spec-kitty charter context --action validate --role validate --json"
    inputs:
      - flag: --profile
        source: wp.agent_profile
        optional: true
      - flag: --tool
        source: env.agent_tool
        optional: true

  - id: quality_gates
    description: Apply quality gates to the documentation deliverable
    delegates_to:
      kind: directive
      candidates:
        - 010-specification-fidelity-requirement

  - id: risk_review
    description: Surface documentation risks via a pre-mortem review
    delegates_to:
      kind: tactic
      candidates:
        - premortem-risk-identification

  - id: validate_against_spec
    description: Validate the documentation deliverable against the original spec
    delegates_to:
      kind: tactic
      candidates:
        - requirements-validation-workflow

  - id: write_audit_report
    description: Write audit-report.md to kitty-specs/{mission_slug}/
    command: "Write audit-report.md in kitty-specs/{mission_slug}/"

  - id: commit_audit_report
    description: Commit the documentation audit report to main branch
    delegates_to:
      kind: directive
      candidates:
        - 029-agent-commit-signing-policy
        - 033-targeted-staging-policy
