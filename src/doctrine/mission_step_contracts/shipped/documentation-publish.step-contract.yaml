# Shipped step contract for the documentation/publish action (#502).
# Mirrors the research-scoping shape (mission spec C-009 forbids new top-level fields
# and forbids expected_artifacts on contracts or steps).
schema_version: "1.0"
id: documentation-publish
action: publish
mission: documentation
steps:
  - id: bootstrap
    description: Load charter context for this action
    command: "spec-kitty charter context --action publish --role publish --json"
    inputs:
      - flag: --profile
        source: wp.agent_profile
        optional: true
      - flag: --tool
        source: env.agent_tool
        optional: true

  - id: living_doc_sync
    description: Synchronise the published documentation with the living documentation surfaces
    delegates_to:
      kind: directive
      candidates:
        - 037-living-documentation-sync

  - id: specification_fidelity
    description: Confirm published documentation honours specification fidelity requirements
    delegates_to:
      kind: directive
      candidates:
        - 010-specification-fidelity-requirement

  - id: final_validation
    description: Final validation pass against the documentation spec prior to release
    delegates_to:
      kind: tactic
      candidates:
        - requirements-validation-workflow

  - id: write_release
    description: Write release.md to kitty-specs/{mission_slug}/
    command: "Write release.md in kitty-specs/{mission_slug}/"

  - id: commit_release
    description: Commit the documentation release notes to main branch
    delegates_to:
      kind: directive
      candidates:
        - 029-agent-commit-signing-policy
        - 033-targeted-staging-policy
