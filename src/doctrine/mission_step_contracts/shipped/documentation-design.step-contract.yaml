# Shipped step contract for the documentation/design action (#502).
# Mirrors the research-scoping shape (mission spec C-009 forbids new top-level fields
# and forbids expected_artifacts on contracts or steps).
schema_version: "1.0"
id: documentation-design
action: design
mission: documentation
steps:
  - id: bootstrap
    description: Load charter context for this action
    command: "spec-kitty charter context --action design --role design --json"
    inputs:
      - flag: --profile
        source: wp.agent_profile
        optional: true
      - flag: --tool
        source: env.agent_tool
        optional: true

  - id: plan_divio_types
    description: Plan Divio documentation types (tutorial, how-to, reference, explanation) for the deliverable
    delegates_to:
      kind: directive
      candidates:
        - 001-architectural-integrity-standard

  - id: architecture_decision
    description: Capture architecture decisions for documentation structure and tooling
    delegates_to:
      kind: tactic
      candidates:
        - adr-drafting-workflow

  - id: validate_design
    description: Validate the documentation plan against spec requirements and audit findings
    delegates_to:
      kind: tactic
      candidates:
        - requirements-validation-workflow

  - id: write_plan
    description: Write plan.md to kitty-specs/{mission_slug}/
    command: "Write plan.md in kitty-specs/{mission_slug}/"

  - id: commit_plan
    description: Commit the documentation plan to main branch
    delegates_to:
      kind: directive
      candidates:
        - 029-agent-commit-signing-policy
        - 033-targeted-staging-policy
