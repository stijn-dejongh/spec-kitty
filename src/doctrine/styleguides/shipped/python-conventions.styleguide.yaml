schema_version: "1.0"
id: python-conventions
title: Python Conventions Styleguide
scope: code

principles:
  - "Guard clauses over nesting: validate inputs early and fail fast rather than wrapping logic in conditional branches."
  - "Type hints on all public APIs: function signatures, return types, and complex variables must be annotated."
  - "Modern Python: use built-in generic types (dict, list, tuple), union syntax (str | None), and pathlib for all path operations."
  - "f-strings only: no %-formatting, no .format(), no string concatenation for interpolation."
  - "Quad-A test structure: every test follows Arrange, Assumption-check, Act, Assert."
  - "Fixtures over setup/teardown: use pytest fixtures for test isolation and automatic cleanup."
  - "One assertion focus per test: each test validates a single behavior. Use parametrize for variations."
  - "Docstrings on public APIs: Google-style docstrings on modules, classes, and public functions."

patterns:
  - name: Guard Clauses
    description: "Check invalid conditions at function entry and raise immediately, keeping the happy path unindented."
    bad_example: |
      def read_config(path: Path) -> dict:
          if path.exists():
              if path.is_file():
                  with open(path) as f:
                      return yaml.safe_load(f)
              else:
                  raise ValueError("Not a file")
          else:
              raise FileNotFoundError(f"Not found: {path}")
    good_example: |
      def read_config(path: Path) -> dict:
          if not path.exists():
              raise FileNotFoundError(f"Not found: {path}")
          if not path.is_file():
              raise ValueError(f"Not a file: {path}")
          with open(path) as f:
              return yaml.safe_load(f)

  - name: Quad-A Test Structure
    description: "Tests follow Arrange, Assumption-check, Act, Assert. The assumption check validates that setup created the intended scenario."
    bad_example: |
      def test_read_missing(tmp_path):
          result = read_task(tmp_path / "missing.yaml")
          assert result is None
    good_example: |
      def test_read_missing(tmp_path):
          # Arrange
          task_file = tmp_path / "missing.yaml"
          # Assumption check
          assert not task_file.exists(), "precondition: file should not exist"
          # Act & Assert
          with pytest.raises(FileNotFoundError):
              read_task(task_file)

  - name: Modern Type Hints
    description: "Use built-in generics and union syntax. Add from __future__ import annotations for forward references."
    bad_example: |
      from typing import Dict, List, Optional, Union
      def process(data: Dict[str, Any]) -> Optional[List[str]]:
          pass
    good_example: |
      from __future__ import annotations
      def process(data: dict[str, Any]) -> list[str] | None:
          pass

  - name: Path Operations
    description: "Use pathlib.Path for all filesystem work. Never join paths with string concatenation."
    bad_example: |
      config_path = os.path.join(base_dir, "config", "settings.yaml")
      os.makedirs(os.path.dirname(output), exist_ok=True)
    good_example: |
      config_path = base_dir / "config" / "settings.yaml"
      output.parent.mkdir(parents=True, exist_ok=True)

  - name: YAML I/O
    description: "Use safe_load for reading, preserve key order on write, handle empty files."
    good_example: |
      with open(path, "r", encoding="utf-8") as f:
          data = yaml.safe_load(f) or {}
      with open(path, "w", encoding="utf-8") as f:
          yaml.dump(data, f, default_flow_style=False, sort_keys=False)

anti_patterns:
  - name: Nested Conditional Logic
    description: "Deep if/else nesting instead of early-return guard clauses. Increases cognitive load and hides the happy path."
    bad_example: |
      def process(path: Path) -> dict:
          if path.exists():
              if path.is_file():
                  with open(path) as f:
                      return yaml.safe_load(f)
              else:
                  raise ValueError("Not a file")
          else:
              raise FileNotFoundError(str(path))
    good_example: |
      def process(path: Path) -> dict:
          if not path.exists():
              raise FileNotFoundError(str(path))
          if not path.is_file():
              raise ValueError(f"Not a file: {path}")
          with open(path) as f:
              return yaml.safe_load(f)

  - name: Untyped Public Functions
    description: "Missing type annotations on public function signatures. Prevents static analysis from catching interface drift."
    bad_example: |
      def load_tasks(directory, lane=None):
          results = []
          for f in directory.iterdir():
              results.append(parse(f))
          return results
    good_example: |
      def load_tasks(directory: Path, lane: str | None = None) -> list[dict[str, Any]]:
          results: list[dict[str, Any]] = []
          for f in directory.iterdir():
              results.append(parse(f))
          return results

  - name: String Path Manipulation
    description: "Using os.path.join or string concatenation for paths instead of pathlib. Fragile across platforms and harder to read."
    bad_example: |
      config = os.path.join(base_dir, "config", "settings.yaml")
      os.makedirs(os.path.dirname(output), exist_ok=True)
    good_example: |
      config = base_dir / "config" / "settings.yaml"
      output.parent.mkdir(parents=True, exist_ok=True)

  - name: Test Without Assumption Check
    description: "Skipping the precondition assertion. When test setup silently fails, the test passes for the wrong reason."
    bad_example: |
      def test_read_missing(tmp_path):
          result = read_task(tmp_path / "missing.yaml")
          assert result is None
    good_example: |
      def test_read_missing(tmp_path):
          task_file = tmp_path / "missing.yaml"
          assert not task_file.exists(), "precondition: file should not exist"
          with pytest.raises(FileNotFoundError):
              read_task(task_file)

  - name: Cleanup In Test Body
    description: "Manual teardown at end of test instead of using pytest fixtures with yield or tmp_path. Cleanup is skipped on failure."
    bad_example: |
      def test_write_output():
          out = Path("/tmp/test_output.yaml")
          write_output(out, {"key": "value"})
          assert out.exists()
          out.unlink()  # skipped if assertion fails
    good_example: |
      def test_write_output(tmp_path):
          out = tmp_path / "test_output.yaml"
          write_output(out, {"key": "value"})
          assert out.exists()
          # tmp_path fixture handles cleanup automatically

tooling:
  formatter: "ruff format (or black)"
  linter: "ruff check"
  type_checker: "mypy --strict (or pyright)"
  test_runner: "pytest with pytest-cov"
  import_order: "ruff (isort rules)"

quality_test: "Can a new contributor read one test and understand what behavior it validates, what preconditions it requires, and what a failure means — without reading the production code?"

references:
  - "src/doctrine/agent_profiles/_proposed/python-implementer.agent.yaml"
  - "src/doctrine/tactics/shipped/tdd-red-green-refactor.tactic.yaml"
  - "src/doctrine/directives/shipped/030-test-and-typecheck-quality-gate.directive.yaml"
