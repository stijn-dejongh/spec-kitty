schema_version: "1.0"
id: aggregate-design-rules
title: Aggregate Design Rules
scope: architecture

principles:
  - "Reference other aggregates by identity only: an aggregate must not hold a direct object reference to another aggregate. Use the other aggregate's ID instead to prevent transaction scope from spanning multiple aggregates."
  - "Keep aggregates small: prefer small aggregates with few entities. Large aggregates create contention, slow load times, and complex transaction logic. Split if parts change independently and do not share invariants."
  - "Design for eventual consistency between aggregates: when a business process spans multiple aggregates, use domain events to coordinate. The first aggregate commits and publishes an event; other aggregates react asynchronously."

patterns:
  - name: Identity Reference
    description: "Store a foreign aggregate's ID rather than an object reference. This keeps each aggregate independently loadable, cacheable, and free from transactional coupling."
    bad_example: |
      class OrderLine:
          product: Product  # direct object reference to another aggregate
    good_example: |
      class OrderLine:
          product_id: UUID  # identity reference only

  - name: Small Aggregate Boundary
    description: "Split aggregates when parts change independently. If two clusters of objects do not share invariants, they belong in separate aggregates even if they are conceptually related."
    bad_example: |
      class Customer:
          orders: list[Order]      # Customer + all Orders in one aggregate
          addresses: list[Address]  # massive contention, slow loads
    good_example: |
      class Customer:
          name: str
          default_address_id: UUID  # reference, not containment

      class Order:
          customer_id: UUID  # separate aggregate, linked by identity

  - name: Domain Event Coordination
    description: "Use domain events for cross-aggregate workflows. The originating aggregate commits and publishes; downstream aggregates react in their own transactions."
    bad_example: |
      def place_order(order, inventory):
          # single transaction spanning two aggregates
          order.confirm()
          inventory.reserve(order.items)
          db.commit()  # if inventory fails, order rolls back too
    good_example: |
      def place_order(order):
          order.confirm()
          order.publish(OrderPlaced(order.id, order.items))
          db.commit()
          # Inventory reacts to OrderPlaced event in its own transaction

anti_patterns:
  - name: Direct Object References
    description: "Holding in-memory references to other aggregates, creating hidden transactional coupling that violates aggregate independence."
    bad_example: |
      class Order:
          customer: Customer  # loads and locks Customer aggregate
    good_example: |
      class Order:
          customer_id: UUID  # independent loading

  - name: Transaction Spanning
    description: "Using database transactions across multiple aggregates instead of domain events. Creates contention and couples aggregate lifecycles."
    bad_example: |
      with db.transaction():
          order.confirm()
          billing.create_invoice(order)
          shipping.schedule(order)
    good_example: |
      with db.transaction():
          order.confirm()
          order.publish(OrderConfirmed(...))
      # Billing and Shipping react via event handlers

quality_test: "Can each aggregate be loaded, modified, and persisted in a single transaction without touching any other aggregate's state?"

references:
  - "src/doctrine/tactics/shipped/aggregate-boundary-design.tactic.yaml"
  - "src/doctrine/tactics/shipped/domain-event-capture.tactic.yaml"
  - "src/doctrine/paradigms/shipped/domain-driven-design.paradigm.yaml"
