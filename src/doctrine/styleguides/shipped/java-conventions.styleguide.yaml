schema_version: "1.0"
id: java-conventions
title: Java Conventions Styleguide
scope: code
applies_to_languages:
  - java

principles:
  - "Naming conventions: classes and interfaces in PascalCase; methods, fields, and local variables in camelCase; constants in UPPER_SNAKE_CASE; packages in lowercase dot-separated segments."
  - "Null safety: never return null from public methods — use Optional<T> for absent values. Fail fast with Objects.requireNonNull on constructor and method parameters."
  - "Try-with-resources: always use try-with-resources for Closeable/AutoCloseable resources. Never rely on manual close() calls in finally blocks."
  - "Explicit encoding: always specify StandardCharsets.UTF_8 (or an explicit Charset) when constructing readers, writers, or String conversions. Never rely on platform default encoding."
  - "Specific exception types: catch and declare the most specific exception type applicable. Never catch Exception or Throwable unless at a top-level boundary."
  - "Quad-A test structure: every test method follows Arrange, Assumption-check (assertThat preconditions), Act, Assert."
  - "Test Data Builder pattern: use static factory methods or builder classes to create test objects. Never scatter new SomeEntity(...) constructor calls across test methods."
  - "AssertJ for assertions: use AssertJ (assertThat(...).isEqualTo(...)) rather than JUnit assertEquals. Prefer chained fluent assertions for readability."
  - "One assertion focus per test: each test validates a single behavior. Use @ParameterizedTest for variations."

patterns:
  - name: Optional for Absent Values
    description: "Return Optional<T> from methods that may produce no result instead of returning null."
    bad_example: |
      public User findById(long id) {
          return repository.get(id); // may return null
      }
    good_example: |
      public Optional<User> findById(long id) {
          return Optional.ofNullable(repository.get(id));
      }

  - name: Try-with-resources
    description: "Wrap any Closeable resource in try-with-resources so it is closed even when an exception is thrown."
    bad_example: |
      BufferedReader reader = new BufferedReader(new FileReader(file));
      try {
          return reader.readLine();
      } finally {
          reader.close();
      }
    good_example: |
      try (BufferedReader reader = new BufferedReader(
              new InputStreamReader(new FileInputStream(file), StandardCharsets.UTF_8))) {
          return reader.readLine();
      }

  - name: Explicit Encoding
    description: "Always pass an explicit Charset when reading or writing text. UTF-8 is the project standard unless the context requires otherwise."
    bad_example: |
      new FileReader(file)              // platform default — breaks on non-UTF-8 systems
      new String(bytes)                 // platform default
      Files.newBufferedWriter(path)     // platform default
    good_example: |
      new InputStreamReader(new FileInputStream(file), StandardCharsets.UTF_8)
      new String(bytes, StandardCharsets.UTF_8)
      Files.newBufferedWriter(path, StandardCharsets.UTF_8)

  - name: Test Data Builder
    description: "Centralise test object construction in a dedicated builder/fixture class. Keeps test methods readable and makes structural changes easy to propagate."
    bad_example: |
      @Test
      void shouldCalculateTotalPrice() {
          Order order = new Order("ORD-001", OrderType.STANDARD,
                  LocalDate.now(), List.of(new LineItem("SKU-A", 3, BigDecimal.valueOf(10))));
          assertThat(pricer.calculate(order)).isEqualByComparingTo("30.00");
      }
    good_example: |
      @Test
      void shouldCalculateTotalPrice() {
          Order order = OrderFixtures.standardOrder().withLineItem("SKU-A", 3, 10).build();
          assertThat(pricer.calculate(order)).isEqualByComparingTo("30.00");
      }

  - name: Quad-A Test Structure
    description: "Tests follow Arrange, Assumption-check, Act, Assert. The assumption check verifies that setup produced the intended precondition."
    bad_example: |
      @Test
      void shouldRejectInvalidEmail() {
          User user = new User("bad-email");
          assertThatThrownBy(() -> validator.validate(user))
                  .isInstanceOf(ValidationException.class);
      }
    good_example: |
      @Test
      void shouldRejectInvalidEmail() {
          // Arrange
          User user = UserFixtures.withEmail("bad-email").build();
          // Assumption check
          assertThat(user.getEmail()).doesNotContain("@");
          // Act + Assert
          assertThatThrownBy(() -> validator.validate(user))
                  .isInstanceOf(ValidationException.class)
                  .hasMessageContaining("email");
      }

anti_patterns:
  - name: Returning Null
    description: "Returning null from public methods forces all callers to add null checks, spreading defensive code across the codebase."
    bad_example: |
      public Config load(Path path) {
          if (!path.toFile().exists()) return null;
          // ...
      }
    good_example: |
      public Optional<Config> load(Path path) {
          if (!Files.exists(path)) return Optional.empty();
          // ...
      }

  - name: Catching Broad Exception Types
    description: "Catching Exception or RuntimeException swallows unrelated failures and makes debugging much harder."
    bad_example: |
      try {
          process(input);
      } catch (Exception e) {
          log.error("Something went wrong", e);
      }
    good_example: |
      try {
          process(input);
      } catch (ParseException e) {
          throw new InvalidInputException("Malformed input: " + input, e);
      }

  - name: Platform-Dependent Encoding
    description: "Omitting an explicit Charset makes the application non-portable and produces silent data corruption on non-UTF-8 platforms."
    bad_example: |
      Files.writeString(outputPath, content); // uses platform default
    good_example: |
      Files.writeString(outputPath, content, StandardCharsets.UTF_8);

  - name: Constructor Sprawl in Tests
    description: "Calling new SomeEntity(a, b, c, ...) in every test binds tests to the constructor signature. Any structural change requires updating every test."
    bad_example: |
      Order o1 = new Order("ORD-001", STANDARD, start, customerId, 50000L);
      Order o2 = new Order("ORD-002", EXPRESS, start, customerId, 10000L);
    good_example: |
      Order o1 = OrderFixtures.standardOrder().withAmount(50000L).build();
      Order o2 = OrderFixtures.expressOrder().withAmount(10000L).build();

tooling:
  build: "Maven (mvn)"
  test_runner: "JUnit 5 (via mvn test)"
  assertions: "AssertJ"
  style_checker: "Checkstyle"
  static_analysis: "SpotBugs"
  coverage: "JaCoCo"
  architecture_tests: "ArchUnit"
  mutation_testing: "PIT (pitest)"
  dependency_audit: "OWASP Dependency-Check"

quality_test: "Can a new contributor read one test method and understand what behavior it validates, what preconditions it requires, and what a failure means — without reading the production code?"

references:
  - "src/doctrine/agent_profiles/shipped/java-implementer.agent.yaml"
  - "src/doctrine/toolguides/shipped/maven-review-checks.toolguide.yaml"
  - "src/doctrine/tactics/shipped/tdd-red-green-refactor.tactic.yaml"
