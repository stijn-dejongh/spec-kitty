# DEPRECATED (since #503 / phase 6 wp6.2): this template is no longer the
# authoritative source for action dispatch on the built-in software-dev
# mission. The live runtime path is now driven by mission step contracts
# under src/doctrine/missions/built_in_step_contracts/ via
# StepContractExecutor + ProfileInvocationExecutor composition. This file
# is retained as a transitional reference and may be removed in a future
# slice. Do not extend it.
#
# =============================================================================
# Runtime Planning Template (v2.2.0)
# =============================================================================
#
# Transitional planning template alongside the v1 state-machine mission.yaml.
# Used by spec-kitty next for run-state planning only. The CLI-internal
# runtime owns DAG planning; the retired spec-kitty-runtime PyPI package is
# no longer involved. The live action dispatch for
# specify/plan/tasks/implement/review is handled by StepContractExecutor
# composition in specify_cli.next.runtime_bridge.
#
# The runtime engine uses DAG-based step planning instead of action execution.
# WP-level iteration within "implement" and "review" steps is managed by the
# CLI bridge layer, not the runtime.
#
# v2.2.0: Collapse the public tasks action back to a single "tasks" planning
# step. The outline/packages/finalize substructure now lives inside
# src/doctrine/missions/built_in_step_contracts/tasks.step-contract.yaml.

mission:
  key: software-dev
  name: Software Dev Kitty
  version: "2.2.0"

steps:
  - id: discovery
    title: Discovery & Research
    agent-profile: researcher
    prompt_template: research.md
    description: Research technologies and best practices

  - id: specify
    title: Specification
    depends_on: [discovery]
    prompt_template: specify.md
    description: Define user scenarios and acceptance criteria

  - id: plan
    title: Implementation Planning
    depends_on: [specify]
    agent-profile: architect
    prompt_template: plan.md
    description: Design technical architecture

  - id: tasks
    title: Tasks
    depends_on: [plan]
    agent-profile: planner
    prompt_template: tasks.md
    description: Create task breakdown, work package prompts, and finalized dependencies

  - id: implement
    title: Implementation
    depends_on: [tasks]
    agent-profile: implementer
    prompt_template: implement.md
    description: Execute implementation

  - id: review
    title: Code Review
    depends_on: [implement]
    agent-profile: reviewer
    prompt_template: review.md
    description: Review and validate

  - id: accept
    title: Acceptance
    depends_on: [review]
    prompt_template: accept.md
    description: Validate mission completeness
