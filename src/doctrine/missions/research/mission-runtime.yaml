# =============================================================================
# Runtime Planning Template (v2.0.0) — research mission
# =============================================================================
#
# Sidecar planning template alongside the legacy state-machine mission.yaml.
# Used by spec-kitty next for run-state planning. The CLI-internal runtime
# owns DAG planning. Live action dispatch for scoping/methodology/gathering/
# synthesis/output is handled by StepContractExecutor composition in
# specify_cli.next.runtime_bridge after this rewrite lands. Composition uses
# the contract-synthesis path (no contract_ref set on these PromptSteps), so
# the built-in step contracts under
# src/doctrine/missions/built_in_step_contracts/research-*.step-contract.yaml
# remain authoritative for action execution.

mission:
  key: research
  name: Deep Research Kitty
  version: "2.0.0"

steps:
  - id: scoping
    title: Research Scoping
    agent-profile: researcher-robbie
    prompt_template: scoping.md
    description: Define the research question, scope boundaries, and stakeholder context.

  - id: methodology
    title: Methodology Design
    depends_on: [scoping]
    agent-profile: researcher-robbie
    prompt_template: methodology.md
    description: Document the research methodology, frameworks, and reproducibility plan.

  - id: gathering
    title: Source Gathering
    depends_on: [methodology]
    agent-profile: researcher-robbie
    prompt_template: gathering.md
    description: Register sources with citations and emit source_documented events.

  - id: synthesis
    title: Findings Synthesis
    depends_on: [gathering]
    agent-profile: researcher-robbie
    prompt_template: synthesis.md
    description: Synthesize evidence into findings, tracing each conclusion to documented sources.

  - id: output
    title: Publication Output
    depends_on: [synthesis]
    agent-profile: reviewer-renata
    prompt_template: output.md
    description: Prepare findings for publication; verify citation completeness and methodology clarity.

  - id: accept
    title: Acceptance
    depends_on: [output]
    prompt_template: accept.md
    description: Validate research completeness and readiness for publication.
