schema_version: "1.0"
id: research-output
action: output
mission: research
steps:
  - id: bootstrap
    description: Load charter context for this action
    command: "spec-kitty charter context --action output --role output --json"
    inputs:
      - flag: --profile
        source: wp.agent_profile
        optional: true
      - flag: --tool
        source: env.agent_tool
        optional: true

  - id: verify_findings_fidelity
    description: Verify the publication candidate matches findings.md and cited sources
    delegates_to:
      kind: directive
      candidates:
        - 010-specification-fidelity-requirement
        - 037-living-documentation-sync

  - id: verify_citation_completeness
    description: Confirm every claim in the publication traces to a source-register.csv row and that all sources are cited
    delegates_to:
      kind: tactic
      candidates:
        - usage-examples-sync

  - id: assess_publication_readiness
    description: Evaluate clarity, methodology disclosure, and risk of misinterpretation for peer review
    delegates_to:
      kind: tactic
      candidates:
        - review-intent-and-risk-first

  - id: write_report
    description: Write report.md to kitty-specs/{mission_slug}/
    command: "Write report.md in kitty-specs/{mission_slug}/"

  - id: gate_publication_approved
    description: Record the publication_approved gate event so mission.yaml's transition to done unblocks
    delegates_to:
      kind: tactic
      candidates:
        - quality-gate-verification
        - stopping-conditions
    guidance: >
      The `publication_approved` gate is emitted by the run engine, not by this
      contract; this step exists so reviewers know which gate must pass for the
      output -> done transition declared in mission.yaml.

  - id: commit_report
    description: Commit the published report with co-author attribution
    delegates_to:
      kind: directive
      candidates:
        - 029-agent-commit-signing-policy
        - 033-targeted-staging-policy
