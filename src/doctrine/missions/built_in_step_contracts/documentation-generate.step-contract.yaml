# Shipped step contract for the documentation/generate action (#502).
# Mirrors the research-scoping shape (mission spec C-009 forbids new top-level fields
# and forbids expected_artifacts on contracts or steps).
schema_version: "1.0"
id: documentation-generate
action: generate
mission: documentation
steps:
  - id: bootstrap
    description: Load charter context for this action
    command: "spec-kitty charter context --action generate --role generate --json"
    inputs:
      - flag: --profile
        source: wp.agent_profile
        optional: true
      - flag: --tool
        source: env.agent_tool
        optional: true

  - id: produce_artifacts
    description: Produce documentation artifacts according to the plan and spec
    delegates_to:
      kind: directive
      candidates:
        - 010-specification-fidelity-requirement

  - id: living_doc_sync
    description: Synchronise newly produced documentation with the living documentation surfaces
    delegates_to:
      kind: directive
      candidates:
        - 037-living-documentation-sync

  - id: validate_output
    description: Validate generated documentation against the plan and spec
    delegates_to:
      kind: tactic
      candidates:
        - requirements-validation-workflow

  - id: write_docs
    description: Write generated docs/**/*.md under kitty-specs/{mission_slug}/
    command: "Write docs/**/*.md under kitty-specs/{mission_slug}/"

  - id: commit_docs
    description: Commit the generated documentation artifacts to main branch
    delegates_to:
      kind: directive
      candidates:
        - 029-agent-commit-signing-policy
        - 033-targeted-staging-policy
