# T001 audit findings (mirrored from software-dev contracts):
# Required top-level fields: schema_version, id, action, mission, steps[]
# Each step: id, description; optional command, delegates_to{kind, candidates[]},
# guidance, inputs[]. No expected_artifacts field, no doctrine-reference field.
# Artifact gates live in mission.yaml transitions (artifact_exists("spec.md")),
# not in the step contract.
schema_version: "1.0"
id: research-scoping
action: scoping
mission: research
steps:
  - id: bootstrap
    description: Load charter context for this action
    command: "spec-kitty charter context --action scoping --role scoping --json"
    inputs:
      - flag: --profile
        source: wp.agent_profile
        optional: true
      - flag: --tool
        source: env.agent_tool
        optional: true

  - id: capture_question
    description: Capture the research question, scope boundaries, and stakeholder context
    delegates_to:
      kind: directive
      candidates:
        - 010-specification-fidelity-requirement
        - 037-living-documentation-sync

  - id: validate_scope
    description: Validate scope boundaries against research mission inputs and feasibility
    delegates_to:
      kind: tactic
      candidates:
        - requirements-validation-workflow

  - id: document_decisions
    description: Record any scoping decisions made during specification
    delegates_to:
      kind: directive
      candidates:
        - 003-decision-documentation-requirement

  - id: write_spec
    description: Write spec.md to kitty-specs/{mission_slug}/
    command: "Write spec.md in kitty-specs/{mission_slug}/"

  - id: commit_spec
    description: Commit the research spec to main branch
    delegates_to:
      kind: directive
      candidates:
        - 029-agent-commit-signing-policy
        - 033-targeted-staging-policy
