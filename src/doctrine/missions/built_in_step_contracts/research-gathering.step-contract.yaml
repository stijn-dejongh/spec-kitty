schema_version: "1.0"
id: research-gathering
action: gathering
mission: research
steps:
  - id: bootstrap
    description: Load charter context for this action
    command: "spec-kitty charter context --action gathering --role gathering --json"
    inputs:
      - flag: --profile
        source: wp.agent_profile
        optional: true
      - flag: --tool
        source: env.agent_tool
        optional: true

  - id: read_methodology
    description: Read the methodology plan to align gathering against the documented approach
    delegates_to:
      kind: directive
      candidates:
        - 010-specification-fidelity-requirement

  - id: collect_sources
    description: Collect, register, and cite research sources; emit source_documented events for the run engine
    delegates_to:
      kind: tactic
      candidates:
        - requirements-validation-workflow
    guidance: >
      Each accepted source must be appended to source-register.csv and the run
      engine must observe a `source_documented` event for it. The minimum-source
      threshold is enforced by mission.yaml's `event_count("source_documented", 3)`
      guard, not by this contract.

  - id: validate_sources
    description: Verify each row in source-register.csv has citation, retrieval evidence, and trust grading
    delegates_to:
      kind: directive
      candidates:
        - 010-specification-fidelity-requirement

  - id: commit_register
    description: Commit source-register.csv updates with co-author attribution
    delegates_to:
      kind: directive
      candidates:
        - 029-agent-commit-signing-policy
        - 033-targeted-staging-policy
