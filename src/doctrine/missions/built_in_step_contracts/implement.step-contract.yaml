schema_version: "1.0"
id: implement
action: implement
mission: software-dev
steps:
  - id: bootstrap
    description: Load charter context for this action
    command: "spec-kitty charter context --action implement --role implement --json"
    inputs:
      - flag: --profile
        source: wp.agent_profile
        optional: true
      - flag: --tool
        source: env.agent_tool
        optional: true

  - id: workspace
    description: Create or enter the work package workspace
    delegates_to:
      kind: paradigm
      candidates:
        - execution-lanes
        - shared-branch-ci
        - git-flow
        - trunk-based
    guidance: >
      Execution lanes are the default and only supported git worktree paradigm.
      If no branching paradigm is selected in the charter, use execution-lane worktrees.

  - id: execute
    description: Implement the work package according to the prompt file
    delegates_to:
      kind: tactic
      candidates:
        - tdd-red-green-refactor
        - acceptance-test-first
        - change-apply-smallest-viable-diff

  - id: quality_gate
    description: Run tests and type checks
    delegates_to:
      kind: directive
      candidates:
        - 030-test-and-typecheck-quality-gate

  - id: commit
    description: Commit changes with co-author attribution
    delegates_to:
      kind: directive
      candidates:
        - 029-agent-commit-signing-policy
        - 033-targeted-staging-policy
    guidance: >
      Use conventional commit format. Include WP ID in commit scope.

  - id: status_transition
    description: Move WP to for_review
    command: "spec-kitty agent tasks move-task {wp_id} --to for_review"
