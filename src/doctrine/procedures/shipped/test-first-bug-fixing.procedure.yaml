schema_version: "1.0"
id: test-first-bug-fixing
name: Test-First Bug Fixing
purpose: >
  Resolve software defects by writing a failing test that reproduces the issue
  before modifying any production code. Transforms bug fixing from trial-and-error
  into a systematic, verifiable procedure with built-in regression prevention.
entry_condition: >
  A bug has been reported or discovered with clear reproduction steps or
  observable incorrect behavior. The defect can be expressed as a difference
  between expected and actual behavior in an automated test.
exit_condition: >
  A failing test existed that reproduced the bug, production code was changed
  to make it pass, all other tests still pass, and the test and fix are
  committed together.
steps:
  - title: Understand the bug
    description: >
      Read the bug report. Identify expected vs actual behavior, reproduction
      steps, and triggering data or context. Formulate a hypothesis about what
      is wrong and where the problem is likely located.
    actor: agent
  - title: Choose the right test level
    description: >
      Unit test for isolated component issues, integration test for component
      interaction issues, acceptance test for end-to-end behavior issues.
    actor: agent
  - title: Write a failing test that reproduces the bug
    description: >
      Create a test that exercises the buggy code path with the triggering
      input and asserts the CORRECT expected behavior. The test must fail.
      If it passes immediately, the test does not reproduce the bug — revise.
    actor: agent
  - title: Verify the test fails for the right reason
    description: >
      Temporarily change the assertion to expect the WRONG (current buggy)
      behavior. If the test now passes, the reproduction is correct. Revert the
      assertion back to expect the correct behavior.
    actor: agent
  - title: Fix the production code
    description: >
      Make the minimal change needed to make the failing test pass. Resist the
      urge to refactor — that comes later. Focus on correctness.
    actor: agent
  - title: Run the full test suite
    description: >
      Verify all existing tests still pass. If something else breaks, the fix
      has unintended side effects — reconsider the approach.
    actor: agent
  - title: Commit test and fix together
    description: >
      Stage the test file and the production fix in a single commit. The test
      documents the bug; the fix resolves it. They are inseparable.
    actor: agent
anti_patterns:
  - name: Fix First, Test Later
    description: "Modifying production code before having a failing test. No proof the bug existed or that the fix addresses it."
  - name: Side-Script Investigation
    description: "Building ad-hoc scripts to reproduce the bug instead of writing a proper test. Scripts rot; tests live."
  - name: Full Application Restart
    description: "Deploying the whole application to verify a fix. Slow, noisy, and not isolated."
  - name: Test Passes Immediately
    description: "The reproduction test passes on first run. The test does not capture the bug — revise setup or assertions."
notes: >
  External reference: "Example of test-first bug-fixing (Stijn Dejongh, 2022)"
  https://www.linkedin.com/pulse/example-test-first-bug-fixing-javascript-stijn-dejongh/
references:
  - type: tactic
    id: tdd-red-green-refactor
    reason: Bug fixing follows the same red-green cycle; the failing test is the red phase.
  - type: tactic
    id: test-boundaries-by-responsibility
    reason: Determines what to mock vs test real when writing the reproduction test.
  - type: directive
    id: DIRECTIVE_030
    reason: Quality gate requires tests pass before handoff — the reproduction test is part of that gate.
