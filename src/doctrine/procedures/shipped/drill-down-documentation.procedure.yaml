schema_version: "1.0"
id: drill-down-documentation
name: Drill-Down Documentation
purpose: >
  Ensure that decisions, documentation, and architecture descriptions are
  captured at a consistent level of abstraction and scope. Each layer of the
  documentation hierarchy addresses a distinct audience and concern set —
  from organisational impact through architecture and design to code-level
  detail. The drill-down approach prevents reasoning from hopscotching between
  levels, avoids convoluting strategic rationale with implementation minutiae,
  and makes it easy to locate the right level of detail for any question.
entry_condition: >
  A decision, design, or knowledge artifact is being created or revised and
  the author needs to determine the appropriate level of abstraction, or a
  reviewer has identified that an artifact mixes concerns from multiple levels.
exit_condition: >
  The artifact is positioned at a single, clearly identified abstraction level.
  It references its parent level for motivation and its child level for detail.
  No single artifact mixes strategic, architectural, design, and code-level
  reasoning without clear section boundaries. Upward and downward traceability
  links are present and resolvable. A reviewer can identify the artifact's
  level and audience within the first paragraph.
steps:
  - title: Identify the abstraction level
    description: >
      Determine which level of the documentation hierarchy the artifact belongs
      to. The canonical levels, from broadest to narrowest scope, are:

      1. **Organisational / Strategic** — business goals, initiative charters,
         stakeholder impact, budget and timeline constraints.
      2. **Architecture** — system boundaries, component responsibilities,
         integration patterns, quality attribute trade-offs, ADRs.
      3. **Design** — module structure, API contracts, data models, interaction
         sequences, design patterns applied.
      4. **Code / Implementation** — function signatures, algorithms, test
         strategies, configuration, deployment scripts.

      An artifact should primarily operate at one level. If it needs to
      reference another level, do so by linking rather than inlining.
    actor: agent
  - title: Separate mixed-level content
    description: >
      If the artifact currently mixes reasoning from multiple levels (e.g.
      an ADR that jumps from business justification to code snippets), extract
      each concern into its own section or artifact at the appropriate level.
      Replace the inlined content with a traceable reference (link, ID, or
      cross-reference tag).
    actor: agent
    on_failure: >
      If separation is impractical (e.g. a lightweight prestudy that legitimately
      spans architecture and design), use clearly labelled sections with explicit
      scope statements so the reader knows which level they are reading.
  - title: Establish upward and downward traceability
    description: >
      Each artifact must link upward to the constraint, goal, or decision that
      motivated it, and downward to the artifacts that implement or refine it.
      Traceability ensures that changes at one level can be assessed for impact
      at adjacent levels without re-reading the entire documentation tree.
    actor: agent
  - title: Verify consistency of scope
    description: >
      Review the artifact to confirm that the rationale, constraints, and
      conclusions all operate at the same abstraction level. Flag any passage
      where the reasoning shifts level without an explicit transition or
      reference. A well-scoped artifact answers questions at its level and
      delegates questions at other levels to the appropriate linked artifact.
    actor: agent
notes: >
  An artifact that mixes organisational justification with code-level detail
  without clear section boundaries or cross-references is considered poorly
  scoped and must be revised. Traceability links must be bidirectional — a
  parent artifact should list its children, and each child should reference
  its parent. When the abstraction level of a decision changes (e.g. a design
  decision is elevated to an architectural decision), the artifact must be
  relocated or re-tagged to the correct level.
references:
  - type: directive
    id: DIRECTIVE_035
  - type: directive
    id: DIRECTIVE_003
  - type: directive
    id: DIRECTIVE_001
