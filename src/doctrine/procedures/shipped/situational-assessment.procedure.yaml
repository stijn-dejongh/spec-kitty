schema_version: "1.0"
id: situational-assessment
name: Situational Assessment
purpose: >
  Establish a shared, documented understanding of the context, stakeholders,
  constraints, and problem structure before any solution is designed or selected.
  A situational assessment ensures that architectural decisions are grounded in
  operational reality rather than technology preference, and that the trade-off
  assessments that follow address the right problem.
entry_condition: >
  A significant decision, initiative, or architectural change is contemplated
  and the team has not yet reached consensus on what the problem is, who it
  affects, or what constraints apply. Entry is also triggered when a prestudy
  or ADR cannot be written because the context is insufficiently understood.
exit_condition: >
  A completed System Context Canvas has been reviewed and accepted by at least
  one representative from each critical stakeholder group. Key uncertainties
  have assigned owners and validation approaches. A completed Lightweight
  Prestudy documents the problem decomposition, considered approaches, accepted
  trade-offs, and recommended path forward. The output is ready to feed into
  a trade-off assessment (DIRECTIVE_007) or full architecture design process.
steps:
  - title: Draft the System Context Canvas
    description: >
      Complete the System Context Canvas template: problem statement,
      organisational context, stakeholder map, current system state,
      system boundaries, external forces, constraints, and key uncertainties.
      This is the primary input to all subsequent steps. Do not begin design
      work until the canvas is at least in draft form.
    actor: agent
    tactic_refs:
      - stakeholder-alignment
    on_failure: >
      If critical context is unavailable (e.g., stakeholders unreachable,
      system boundaries unclear), record the gap as a named uncertainty in
      the canvas and flag it for human resolution before proceeding.
  - title: Validate the canvas with stakeholders
    description: >
      Share the canvas with at least one representative from each critical
      stakeholder group identified in the canvas. Capture corrections and
      additions. Resolve named tensions where possible; escalate unresolvable
      tensions to the decision authority before proceeding.
    actor: human
    on_failure: >
      If stakeholder review is not possible within the available time window,
      document the validation gap in the canvas and accept the associated
      uncertainty as a live risk.
  - title: Decompose the problem
    description: >
      Apply the Problem Decomposition tactic to break the core problem into
      independently tractable sub-problems. Assign each a priority (must-solve,
      should-solve, nice-to-have) and a tentative owner. The decomposition
      feeds directly into the prestudy's "approaches considered" section
      and into subsequent work-package planning.
    actor: agent
    tactic_refs:
      - problem-decomposition
      - eisenhower-prioritisation
  - title: Identify and run pre-design experiments
    description: >
      For each high-risk assumption flagged in the canvas, determine whether
      a safe-to-fail experiment can validate or invalidate it before design
      choices are locked in. Timebox experiments to avoid blocking the
      overall assessment. Record outcomes in the canvas uncertainty table.
    actor: agent
    tactic_refs:
      - safe-to-fail-experiment
      - premortem-risk-identification
  - title: Draft the Lightweight Prestudy
    description: >
      Using the validated canvas and problem decomposition as inputs, draft
      the Lightweight Prestudy: enumerate candidate approaches, compare them
      against the constraints and sub-problems, and identify the accepted
      trade-offs for the recommended approach. Use the quality attribute
      assessment and AMMERSE analysis templates for high-stakes decisions.
    actor: agent
    tactic_refs:
      - ammerse-impact-analysis
      - premortem-risk-identification
    on_failure: >
      If the prestudy reveals that the problem is significantly larger or more
      ambiguous than the canvas suggested, return to step 1 rather than
      proceeding with an incomplete picture.
  - title: Review and accept the prestudy
    description: >
      Present the prestudy to the decision authority and affected stakeholders.
      Capture feedback, revise as necessary, and record the acceptance decision.
      A prestudy that is not accepted by its decision authority is not a basis
      for architectural choices.
    actor: human
    on_success: >
      The situational assessment is complete. The accepted prestudy and canvas
      are linked from any subsequent ADRs, design documents, or work packages.
references:
  - type: directive
    id: DIRECTIVE_007
  - type: directive
    id: DIRECTIVE_003
  - type: directive
    id: DIRECTIVE_001
  - type: template
    id: system-context-canvas-template
  - type: template
    id: lightweight-prestudy-template
  - type: template
    id: quality-attribute-assessment-template
  - type: template
    id: ammerse-analysis-template
  - type: tactic
    id: stakeholder-alignment
  - type: tactic
    id: problem-decomposition
  - type: tactic
    id: safe-to-fail-experiment
  - type: tactic
