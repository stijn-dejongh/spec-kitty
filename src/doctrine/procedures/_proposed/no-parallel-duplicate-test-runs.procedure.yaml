schema_version: "1.0"
id: no-parallel-duplicate-test-runs
name: No Parallel Duplicate Test Runs
purpose: >
  Prevent agents from launching multiple concurrent runs of the same test suite.
  Doing so wastes resources, makes output ambiguous, and degrades the developer
  experience. A single authoritative run must be started, and the agent must
  wait for its result before deciding on next steps.
entry_condition: >
  An agent is about to invoke a test suite (pytest, jest, cargo test, etc.)
  during an implementation or verification phase.
exit_condition: >
  The test run has completed and its output has been read. The agent has a
  clear pass/fail result before deciding whether to proceed, fix, or escalate.
steps:
  - title: Verify no existing test run is active
    description: >
      Before launching a test command, check whether a previous run of the
      same suite is still running. If stale processes are alive from a
      previous session, kill them before starting a fresh run.
    actor: agent
    on_failure: >
      If the process cannot be killed (e.g. permissions), log the issue and
      escalate to the human operator rather than launching a competing run.
  - title: Start exactly one test run
    description: >
      Start exactly one test run per layer of the testing pyramid. Do not
      retry by launching a second process while the first is still running.
    actor: agent
  - title: Wait for results
    description: >
      If the test command was sent to the background (run_in_background),
      poll its output file rather than launching a new test run. Do not
      launch the same command again while the background task is active.
    actor: agent
  - title: Read and act on output
    description: >
      Read the test output and determine whether to proceed, fix, or
      escalate. The agent must have a clear pass/fail result before taking
      the next action.
    actor: agent
notes: >
  An agent that has more than one concurrent test process running for the
  same suite has violated this procedure. Retrying a test run before the
  previous one finishes is prohibited, regardless of whether the previous
  run appears stale. At any point in time, at most one test process should
  be running per suite per repository.
