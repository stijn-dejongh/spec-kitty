schema_version: "1.0"
id: documentation-gap-prioritization
name: Documentation Gap Prioritization
purpose: >
  Triage identified documentation gaps by user impact and fill them in priority
  order. Not all gaps are equal — a missing tutorial for a core workflow blocks
  more users than a missing explanation for an edge-case design decision.
  Prioritisation ensures that limited capacity is directed toward the gaps that
  most impede the target audience.
entry_condition: >
  A documentation audit, gap analysis, or user feedback has revealed missing or
  inadequate documentation. Applies to all documentation types: tutorials,
  how-to guides, reference material, and explanations.
exit_condition: >
  Every identified gap has a priority rating and rationale. High-priority gaps
  have assigned owners and target completion dates. The gap backlog is ready
  for inclusion in sprint or release planning. Gaps must not be closed by stub
  content — a stub counts as a gap until it is substantively complete and
  reviewed. The gap backlog must be reviewed at least once per release cycle.
steps:
  - title: Enumerate documentation gaps
    description: >
      List identified gaps with a description, affected audience, and the
      documentation type (tutorial, how-to, reference, explanation) that is
      missing or inadequate.
    actor: agent
  - title: Rate each gap by impact and likelihood
    description: >
      For each gap, rate user impact (how many users are blocked or confused?)
      and discovery likelihood (how often do users encounter this gap?). Use a
      simple H/M/L scale for both dimensions.
    actor: agent
  - title: Assign priority and owners
    description: >
      Assign priority based on combined impact and likelihood — high impact and
      high likelihood gaps are worked first. Deprioritise low-impact or rarely
      encountered gaps. Assign each high-priority gap to a work item or
      documentation task with an owner and a target completion date.
    actor: human
    on_failure: >
      If owners cannot be assigned immediately, record the gap in the backlog
      with its priority rating so it is not lost.
  - title: Reassess the gap backlog
    description: >
      Revisit the gap backlog whenever a major feature ships or significant
      user feedback is received. Priority ratings must be updated when the
      target audience or product scope changes materially.
    actor: human
notes: >
  Priority ratings must be revisited when the target audience or product scope
  changes materially. Gaps must not be closed by stub content — a stub counts
  as a gap until it is substantively complete and reviewed.
