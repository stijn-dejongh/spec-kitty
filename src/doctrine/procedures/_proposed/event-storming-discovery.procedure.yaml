schema_version: "1.0"
id: event-storming-discovery
name: Event Storming Discovery
purpose: >
  Discover domain events, commands, aggregates, policies, read models, and
  bounded context boundaries through a structured analysis of business flows.
  The procedure produces a shared domain model grounded in real business
  behaviour rather than technical assumptions. Based on Alberto Brandolini's
  Event Storming technique, adapted for agent-assisted discovery with
  human-in-charge validation at key decision points.
entry_condition: >
  A domain or subdomain needs modelling. Stakeholder access or existing
  documentation (user stories, process descriptions, interviews, legacy
  code) is available to inform event discovery. At least one domain expert
  or stakeholder is reachable for validation.
exit_condition: >
  Domain events, commands, aggregates, policies, and bounded context
  candidates are identified, validated by a domain expert, and captured in
  a structured format ready for downstream design work (context mapping,
  aggregate boundary design, message flow mapping).
steps:
  - title: Gather domain source material
    description: >
      Collect available source material: user stories, process documentation,
      interview transcripts, legacy code, API specifications, and any prior
      domain models. Identify the subdomain scope — focus on one bounded area
      rather than the entire enterprise.
    actor: agent
  - title: Discover domain events (chaotic exploration)
    description: >
      Extract domain events from the source material — things that happen in
      the business, phrased in past tense (e.g. OrderPlaced, PaymentReceived,
      ShipmentDispatched). Prioritise volume over precision. Arrange events
      in rough chronological order. Mark gaps or uncertainties.
    actor: agent
  - title: Validate event completeness with domain expert
    description: >
      Present the discovered events to a domain expert or stakeholder.
      Confirm that the event timeline covers the core business flows, resolve
      synonyms (different names for the same event), and identify missing
      events. This step requires human judgement — the agent cannot determine
      business completeness alone.
    actor: human
    on_failure: >
      If no domain expert is available, mark the event list as unvalidated
      and note specific uncertainties. Do not proceed to aggregate design
      with an unvalidated event set.
  - title: Identify commands and actors
    description: >
      For each event, determine what caused it — the command that triggered
      it and the actor who issued it (user role, external system, scheduled
      job, or policy). Map command-event pairs to establish causality chains.
    actor: agent
  - title: Cluster into aggregates
    description: >
      Group related commands and events around the entity that processes
      them. Each aggregate receives commands, enforces invariants, and emits
      events. Name each aggregate after the domain concept it represents.
    actor: agent
  - title: Discover policies and read models
    description: >
      Identify automated reactions: "When event X occurs, command Y is issued
      automatically" — these are policies or process managers. Identify where
      actors need information to make decisions — these are read models.
    actor: agent
  - title: Propose bounded context boundaries
    description: >
      Identify clusters of aggregates that share a consistent language and
      change together. Propose boundaries around these clusters as bounded
      context candidates. Apply the language test: do the terms inside each
      boundary have a single, unambiguous meaning?
    actor: agent
  - title: Review and confirm boundaries
    description: >
      Present the proposed bounded contexts, their aggregates, and the
      rationale for each boundary to the human-in-charge. Confirm or adjust
      boundaries based on organisational, team, or deployment considerations
      that are not visible in the source material alone.
    actor: human
    on_failure: >
      If boundaries are contested, document the alternatives and the
      trade-offs. Do not force a premature boundary decision — record the
      ambiguity for resolution during downstream design.
  - title: Capture structured output
    description: >
      Record all discovered elements (events, commands, aggregates, policies,
      read models, bounded contexts) in a structured format. Link unresolved
      questions to follow-up tasks. The output feeds directly into bounded
      context identification, context mapping, and aggregate boundary design.
    actor: agent
failure_modes:
  - name: No domain expert validation
    description: >
      Completing the entire discovery without human validation, producing a
      model that reflects technical assumptions rather than business reality.
  - name: Premature structure
    description: >
      Jumping to aggregate design before completing event discovery, missing
      events that reveal important domain behaviour.
  - name: Scope creep
    description: >
      Attempting to model the entire enterprise in one pass instead of
      focusing on a specific subdomain.
  - name: Solution mode
    description: >
      Discussing technical implementation during discovery instead of
      focusing on domain behaviour and business flows.
references:
  - type: tactic
    id: bounded-context-identification
    reason: >
      Event Storming discovery reveals bounded context boundaries through
      language clustering.
  - type: tactic
    id: aggregate-boundary-design
    reason: >
      Aggregates discovered during this procedure feed into formal aggregate
      boundary design.
  - type: tactic
    id: domain-event-capture
    reason: >
      Events discovered during this procedure become the basis for domain
      event modelling.
  - type: tactic
    id: domain-message-flow-mapping
    reason: >
      Discovery outputs feed directly into message flow mapping for specific
      scenarios.
