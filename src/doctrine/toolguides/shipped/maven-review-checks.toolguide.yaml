schema_version: "1.0"
id: maven-review-checks
tool: maven-quality-stack
title: Maven Review Checks
guide_path: src/doctrine/toolguides/shipped/MAVEN_REVIEW_CHECKS.md
applies_to_languages:
  - java
summary: >
  Catalog of automated checks a reviewer should run or verify have been run
  before approving Java code. Organized by category: compilation, tests,
  coverage, style, static analysis, architecture, security, and mutation testing.
commands:
  - mvn compile
  - mvn test
  - mvn verify
  - mvn checkstyle:check
  - mvn spotbugs:check
  - mvn jacoco:report
  - mvn dependency-check:check
  - mvn org.pitest:pitest-maven:mutationCoverage
