schema_version: "1.0"
id: TEST_FIRST
title: Test-First Development
intent: Require test-first behavior across acceptance and implementation layers, selecting tactics based on scope and risk.
tactic_refs:
  - acceptance-test-first
  - tdd-red-green-refactor
  - zombies-tdd
enforcement: required
scope: >
  Applies to behavior changes in planning and implementation where expected
  outcomes can be represented as executable checks.
procedures:
  - Start with acceptance or behavior tests that define expected outcomes.
  - Implement in red-green-refactor loops until targeted behavior stabilizes.
  - Keep tests close to user-facing intent to reduce specification drift.
integrity_rules:
  - Behavior changes require accompanying tests before completion.
validation_criteria:
  - Test suites demonstrate failing-to-passing progression for new behavior.
