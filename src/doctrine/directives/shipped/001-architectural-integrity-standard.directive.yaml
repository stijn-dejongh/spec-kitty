schema_version: "1.0"
id: DIRECTIVE_001
title: Architectural Integrity Standard
intent: >
  System designs must maintain clear separation of concerns and well-defined
  component boundaries so that each part of the system is independently
  understandable, testable, and replaceable without cascading changes.
tactic_refs:
  - adr-drafting-workflow
  - premortem-risk-identification
  - connascence-analysis
  - easy-to-change
  - language-driven-design
enforcement: required
scope: >
  Applies to all design proposals, implementation plans, and architectural
  decision records that introduce or modify component boundaries, module
  interfaces, or cross-cutting concerns.
procedures:
  - Define explicit component boundaries before implementation begins; document
    inputs, outputs, and dependencies for each component.
  - Separate concerns at every layer (data, logic, presentation, infrastructure)
    so that changes to one concern do not propagate into others.
  - Review proposed designs against existing boundaries to identify coupling
    violations before code is written.
  - Record boundary decisions and the rationale for chosen separation in an ADR
    whenever the design deviates from established patterns.
integrity_rules:
  - Components must not share mutable state across boundaries without an
    explicit, documented protocol.
  - Circular dependencies between components are not permitted unless the cycle
    is intentional, bounded, and justified in an ADR.
  - Boundary violations discovered during review must be resolved before merge,
    not deferred to a follow-up task.
validation_criteria:
  - Each component has a single clearly stated responsibility.
  - Reviewers can verify that no new circular dependencies have been introduced.
  - Cross-boundary interactions are mediated by explicit interfaces or contracts,
    not by direct access to internals.
