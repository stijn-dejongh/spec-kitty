schema_version: "1.0"
id: DIRECTIVE_018
title: Doctrine Versioning Requirement
intent: >
  Doctrine artifacts must be versioned with traceable change rationale so
  downstream consumers can understand compatibility and migration impact.
tactic_refs:
- adr-drafting-workflow
enforcement: required
scope: >
  Applies to directives, tactics, toolguides, styleguides, and schemas that
  define governance behavior for agent execution.
procedures:
- Record version-impacting changes with migration notes when required.
- Keep artifact schema version fields consistent with supported contract.
- Validate repository-wide compatibility after doctrine updates.
integrity_rules:
- Breaking doctrine changes require explicit upgrade guidance.
- Artifact version metadata must not drift from actual schema expectations.
validation_criteria:
- Version-affecting doctrine changes include compatibility notes.
- Validation checks pass across shipped doctrine artifacts after updates.
