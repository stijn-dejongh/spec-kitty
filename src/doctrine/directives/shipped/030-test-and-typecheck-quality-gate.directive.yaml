schema_version: "1.0"
id: DIRECTIVE_030
title: Test and Typecheck Quality Gate
intent: >
  Code changes must pass the relevant automated tests and static validation
  gates before handoff so regressions and interface drift are caught early.
tactic_refs:
  - quality-gate-verification
  - test-pyramid-progression
  - testing-select-appropriate-level
enforcement: required
scope: >
  Applies to source code, tests, and command workflows that change executable
  behavior or typed interfaces.
procedures:
  - Run unit tests for changed core logic and integration tests for changed workflow boundaries.
  - Meet the repository coverage expectation for new code, or document the delta when pre-existing scope makes that impractical.
  - Run the repository's applicable static analysis, typing, lint, or equivalent validation gates for the affected scope.
  - Run configured or enabled CVE, dependency, or license-compliance checks when the repository treats them as part of the validation gate.
  - Record any remaining pre-existing failures separately from newly introduced failures before handoff.
integrity_rules:
  - New behavior is not ready for review while relevant tests or applicable static validation gates are red.
  - Configured supply-chain or compliance gates must not be skipped silently when they are part of the repository's expected validation flow.
  - Pre-existing validation debt must not be hidden inside new work.
validation_criteria:
  - Relevant test suites pass for the changed scope before review handoff.
  - New code meets the repository coverage target or any accepted shortfall is called out explicitly.
  - Applicable static validation gates pass for the affected scope, or any pre-existing unrelated failures are identified explicitly.
  - Applicable CVE, dependency, and license checks pass when those gates are configured for the affected scope, or any pre-existing unrelated failures are identified explicitly.
