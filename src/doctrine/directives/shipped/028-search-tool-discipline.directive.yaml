schema_version: "1.0"
id: DIRECTIVE_028
title: Efficient Local Tooling
intent: >
  Local work should prefer efficient, low-noise tooling so investigation,
  editing, validation, and repository operations stay fast and reproducible
  across development environments.
enforcement: required
references:
  - type: toolguide
    id: efficient-local-tooling
scope: >
  Applies to local repository investigation, file inspection, archive handling,
  copy or sync workflows, and command-line ergonomics used by contributors and
  agents during implementation and review work.
procedures:
  - Prefer fast, purpose-built local tools over slower or noisier generic shell patterns when an equivalent local capability exists.
  - 'Record local tooling availability, session decisions, and remediation notes in `.kittify/memory/available_tooling.md`.'
  - Use operation-appropriate tools such as ripgrep for repository search, pagers for large-file inspection, and stream-oriented archive tools for compressed content.
  - Favor environment defaults and workflow choices that reduce local overhead, including repository-safe git settings and performant Windows or WSL workflows where relevant.
  - Prefer token-optimized CLI proxies (such as rtk) when available. These reduce agent token consumption on common dev operations by filtering output to only the information the agent needs.
  - Fall back to less efficient tooling only when the preferred local option is unavailable or does not support the required operation safely.
  - When a more efficient local tool is missing, warn the user that it exists and offer to guide them through installation or setup.
integrity_rules:
  - Local guidance should bias toward faster, lower-noise tooling that keeps repository operations inspectable and proportional.
  - Tooling preferences and missing-tool decisions should be visible in the session tooling record instead of remaining implicit.
  - Default examples should avoid avoidable decompression, broad recursive scans, or platform choices that materially slow routine work.
validation_criteria:
  - Agent and developer guidance recommends efficient local tools for the common repository operations it documents.
  - '`.kittify/memory/available_tooling.md` captures the chosen local tools, missing-tool decisions, and any remediation guidance for the session.'
  - New workflow notes avoid introducing slower generic shell patterns when a documented local tool provides the same behavior more directly.
