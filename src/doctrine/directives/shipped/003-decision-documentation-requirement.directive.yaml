schema_version: "1.0"
id: DIRECTIVE_003
title: Decision Documentation Requirement
intent: >
  Material technical and governance decisions must be captured with enough
  context that future contributors can understand why a path was chosen and
  what constraints must remain true.
tactic_refs:
- adr-drafting-workflow
- premortem-risk-identification
enforcement: required
scope: >
  Applies whenever implementation choices alter architecture, workflow policy,
  compatibility contracts, or long-lived maintenance obligations.
procedures:
- Record the decision, alternatives considered, and rationale in a durable 
  artifact.
- Link implementation changes to the decision source in commit or review 
  context.
- Update related docs when a new decision supersedes prior guidance.
integrity_rules:
- High-impact decisions cannot remain tribal knowledge.
- Rationale must be discoverable from the feature or architecture context.
validation_criteria:
- Every major trade-off has an attributable written record.
- Reviewers can trace the implemented path back to an explicit decision 
  artifact.
