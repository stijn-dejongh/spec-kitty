schema_version: "1.0"
id: DIRECTIVE_032
title: Conceptual Alignment
intent: >
  Agents must never assume that shared vocabulary implies shared meaning. Before
  acting on any task that contains domain-specific, ambiguous, or overloaded
  terminology, the agent must explicitly state its interpretation of each key term
  and confirm that interpretation with the requester. Misaligned understanding
  discovered after implementation is far more costly than a brief clarification
  exchange before it begins.
enforcement: required
scope: >
  Applies to every task that contains domain terms, bounded-context identifiers,
  architecture pattern names, or ambiguous pronouns referring to system components.
  Critical for cross-team integration tasks, first contact with a new domain or
  context, and high-stakes changes to production systems.
procedures:
  - Scan the task description for domain-specific terms, terms with multiple valid
    interpretations, and ambiguous references ("the service", "the model", "that
    component").
  - For each identified term, state the interpretation being used, including which
    bounded context it applies to and any assumptions made.
  - Where a term has multiple plausible meanings, surface the alternatives and ask
    the requester to choose before proceeding.
  - Record the confirmed interpretation in the task artefact or ADR so that future
    agents inheriting the work share the same understanding.
integrity_rules:
  - An agent may not proceed to implementation while unresolved ambiguities exist
    in the task's key terms.
  - Confirmed interpretations must not be silently revised mid-task. If new
    information changes the understanding of a term, surface the change explicitly.
  - Generic confirmation ("understood") is not sufficient. The agent must restate
    the interpretation in its own words and wait for explicit confirmation.
validation_criteria:
  - The agent's response identifies at least the most domain-specific term in the
    task and states an interpretation.
  - Ambiguous terms are escalated with alternatives rather than resolved by
    assumption.
  - Confirmed interpretations are traceable in the task artefact or conversation.
references:
  - type: directive
    id: DIRECTIVE_031
  - type: tactic
    id: glossary-curation-interview
  - type: tactic
    id: language-driven-design
  - type: styleguide
