schema_version: "1.0"
id: DIRECTIVE_029
title: Agent Commit Signing Policy
intent: >
  Agent-authored commits must avoid GPG or SSH signing in unattended workflows
  so automation does not fail on missing key material or unverifiable signatures.
enforcement: required
references:
  - type: toolguide
    id: git-agent-commit-signing
scope: >
  Applies to LLM or automation-authored git commits created during
  implementation, review remediation, or release preparation.
procedures:
  - Use `git commit --no-gpg-sign` or `git -c commit.gpgsign=false commit` for agent-authored commits.
  - Do not assume signing keys are available in CI, worktrees, or ephemeral development environments.
  - Document any exception that requires human-authored signed commits outside the agent workflow.
integrity_rules:
  - Automated commit flows must not depend on interactive key configuration.
  - Agent-produced history should remain portable across environments with no signing setup.
validation_criteria:
  - Agent guidance explicitly states that commit signing is disabled for automated commits.
  - Automation-ready commit examples use unsigned commit forms.
