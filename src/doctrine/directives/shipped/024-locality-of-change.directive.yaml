schema_version: "1.0"
id: DIRECTIVE_024
title: Locality of Change
intent: >
  Changes should stay close to the problem being solved to reduce blast radius,
  simplify review, and lower regression risk.
tactic_refs:
- change-apply-smallest-viable-diff
enforcement: lenient-adherence
scope: >
  Applies to code, tests, and documentation modifications made while executing a
  defined work package or bug fix.
procedures:
- Limit edits to files and modules directly related to the target behavior.
- Separate opportunistic cleanup from functional work unless it is required for 
  correctness.
- Review diffs for scope creep before committing.
integrity_rules:
- Unrelated refactors must not be mixed into scoped implementation tasks.
- Cross-cutting changes require explicit rationale and approval context.
validation_criteria:
- Reviewers can map each changed file to the stated task objective.
- Diffs avoid unrelated churn that increases review complexity.
explicit_allowances:
- Preparatory cleanup may extend beyond the immediate target diff when it
  removes failing-test noise or existing local breakage that would otherwise
  obscure the implementation work.
- The allowance applies only when the extra cleanup is proportional, directly
  connected to the target behavior, and documented in task or review context.
opposed_by:
  - type: directive
    id: DIRECTIVE_025
    reason: >
      The Boy Scout Rule endorses opportunistic improvement of touched areas,
      which can justify expanding a change beyond the strict locality boundary
      this directive enforces.
