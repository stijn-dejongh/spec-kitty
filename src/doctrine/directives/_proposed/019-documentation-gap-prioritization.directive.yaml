schema_version: "1.0"
id: DIRECTIVE_019
title: Documentation Gap Prioritization
intent: >
  Identified documentation gaps must be triaged by user impact and filled in
  priority order. Not all gaps are equal — a missing tutorial for a core workflow
  blocks more users than a missing explanation for an edge-case design decision.
  Prioritisation ensures that limited capacity is directed toward the gaps that
  most impede the target audience.
enforcement: required
scope: >
  Applies whenever a documentation audit, gap analysis, or user feedback reveals
  missing or inadequate documentation. Applies to all documentation types:
  tutorials, how-to guides, reference material, and explanations.
procedures:
  - Enumerate identified gaps with a description, affected audience, and the
    documentation type (tutorial, how-to, reference, explanation) that is missing.
  - Rate each gap by user impact (how many users are blocked or confused?) and
    discovery likelihood (how often do users encounter this gap?). Use a simple
    H/M/L scale.
  - Assign priority based on combined impact and likelihood — high impact and
    high likelihood gaps are worked first. Deprioritise low-impact or rarely
    encountered gaps.
  - Assign each high-priority gap to a work item or documentation task with
    an owner and a target completion date.
  - Reassess the gap backlog whenever a major feature ships or significant user
    feedback is received.
integrity_rules:
  - Gaps must not be closed by stub content. A stub counts as a gap until it
    is substantively complete and reviewed.
  - Priority ratings must be revisited when the target audience or product scope
    changes materially.
validation_criteria:
  - Every identified gap has a priority rating and a rationale.
  - High-priority gaps have assigned owners and target completion dates.
  - The gap backlog is reviewed at least once per release cycle.
