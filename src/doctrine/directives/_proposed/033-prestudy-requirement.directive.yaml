schema_version: "1.0"
id: DIRECTIVE_033
title: Prestudy Requirement
intent: >
  Significant architectural decisions and initiatives must be preceded by a
  documented situational assessment — a System Context Canvas and Lightweight
  Prestudy — before solution design begins. This ensures that design work is
  grounded in operational reality, that stakeholder concerns are surfaced before
  trade-offs are locked in, and that the problem is understood before a solution
  is chosen. Starting design without a situational assessment is the primary cause
  of technically correct but contextually wrong solutions.
tactic_refs:
  - stakeholder-alignment
  - problem-decomposition
  - safe-to-fail-experiment
enforcement: required
scope: >
  Applies to any initiative or architectural decision that meets at least one
  of the following conditions: it affects more than one team or system boundary;
  it introduces or retires a significant integration point; it is expected to
  require more than two weeks of implementation effort; or it has been identified
  as high-risk by a premortem or trade-off assessment.
  Does not apply to routine bug fixes, minor configuration changes, or decisions
  already covered by an accepted prestudy from the same initiative.
procedures:
  - Before beginning design work, confirm whether an accepted System Context
    Canvas exists for this initiative. If not, initiate the Situational Assessment
    procedure.
  - The canvas must be validated by at least one representative from each critical
    stakeholder group before the prestudy is drafted.
  - The prestudy must enumerate at least two candidate approaches, document the
    accepted trade-offs for the chosen approach, and be accepted by the decision
    authority before implementation begins.
  - Link the accepted prestudy from all subsequent ADRs and design documents
    produced for the same initiative.
  - Reassess the prestudy whenever a significant constraint changes or the
    initiative's scope materially expands.
integrity_rules:
  - A decision whose prestudy has not been accepted by the decision authority
    cannot proceed to implementation.
  - Design choices that contradict the accepted prestudy's constraints or
    recommended approach require a prestudy revision, not a silent override.
  - Stating "we don't have time for a prestudy" is not a valid exception.
    The appropriate response is to reduce scope until the assessment is feasible,
    or to explicitly accept the risk in a documented decision.
validation_criteria:
  - A System Context Canvas exists and is linked from the initiative's primary
    artifact (spec, ADR, or design document).
  - The prestudy names at least two candidate approaches and documents the
    accepted trade-offs for the chosen approach.
  - The prestudy has an explicit acceptance record (date, authority, status field).
  - Subsequent ADRs reference the prestudy.
explicit_allowances:
  - Initiatives with an explicit time-constrained exception, where the decision
    authority has accepted the risk in writing and the exception is recorded in
    the prestudy or an ADR, may proceed without a full Lightweight Prestudy.
    The System Context Canvas is still required in abbreviated form.
references:
  - type: directive
    id: DIRECTIVE_007
  - type: directive
    id: DIRECTIVE_003
  - type: procedure
    id: situational-assessment
  - type: template
    id: system-context-canvas-template
  - type: template
    id: lightweight-prestudy-template
