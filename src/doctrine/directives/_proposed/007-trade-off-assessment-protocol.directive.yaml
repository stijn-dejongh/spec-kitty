schema_version: "1.0"
id: DIRECTIVE_007
title: Trade-off Assessment Protocol
intent: >
  Before finalising any architectural decision with systemic consequences, agents
  must explicitly identify the quality attributes at stake, assess their impact on
  the proposed design, and document the accepted trade-offs. Assessments must
  resist over-engineering: attributes and trade-offs are enumerated to the degree
  the decision warrants, not to every conceivable degree. Skipping the assessment
  risks delivering a design that satisfies functional requirements while silently
  violating non-functional ones; over-elaborating it wastes capacity on gold-plating
  the analysis itself.
tactic_refs:
  - premortem-risk-identification
  - adr-drafting-workflow
  - ammerse-impact-analysis
  - avoid-gold-plating
  - easy-to-change
  - safe-to-fail-experiment
enforcement: required
scope: >
  Applies to architectural proposals, ADRs, design reviews, and any task that
  introduces or substantially modifies a component boundary, data model,
  integration pattern, or cross-cutting concern.
procedures:
  - Enumerate the quality attributes that are materially relevant to the decision
    at hand (e.g. scalability, maintainability, security, performance, feasibility,
    extensibility). Explicitly state which attributes are considered out of scope
    and why. Scope the enumeration to what the decision actually affects.
  - For each relevant attribute, assess whether the proposed design promotes,
    degrades, or is neutral to it. Document key success factors that make the
    attribute measurable in this context.
  - Identify at least one trade-off — a quality attribute that is sacrificed or
    de-prioritised to gain another. If no trade-off can be identified, state that
    explicitly and explain why the design avoids it. An assessment without a
    trade-off is considered incomplete.
  - Record project constraints (budget, timeline, team size, regulatory requirements)
    that influenced attribute prioritisation. Constraints that override attribute
    preferences must be stated, not assumed.
  - For high-stakes decisions, apply an AMMERSE impact analysis to surface
    first- and second-order effects across the seven AMMERSE values. For routine
    decisions, first-order reasoning is sufficient.
  - Capture the assessment and accepted trade-offs in the ADR or design document.
    Use the Quality Attribute Assessment template when a standalone record is
    warranted.
integrity_rules:
  - An assessment that lists only benefits without trade-offs is incomplete and
    must be revised before the decision is accepted.
  - Quality attributes must be evaluated against stated constraints. Constraints
    that change after acceptance trigger a reassessment.
  - Assessments must be revisited whenever a significant constraint changes or
    a new architectural decision is layered on top of an existing one.
  - The depth of analysis must match the risk profile of the decision. Do not
    apply full AMMERSE analysis to low-stakes or easily reversible choices.
validation_criteria:
  - The design document or ADR names at least two quality attributes relevant
    to the decision.
  - At least one trade-off is explicitly documented with a rationale.
  - Constraints that drove prioritisation are recorded alongside the trade-off.
  - The assessment is referenced from or embedded in the associated ADR.
references:
  - type: directive
    id: DIRECTIVE_001
  - type: directive
    id: DIRECTIVE_003
  - type: template
    id: quality-attribute-assessment-template
  - type: template
    id: ammerse-analysis-template
  - type: template
