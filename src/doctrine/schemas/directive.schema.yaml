$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://spec-kitty.dev/schemas/doctrine/directive.schema.yaml"
title: Directive
description: Minimal schema for governance directives.
type: object
additionalProperties: false
required:
  - schema_version
  - id
  - title
  - intent
  - fetch_policy
  - enforcement
properties:
  schema_version:
    type: string
    pattern: '^1\.0$'
  id:
    type: string
    pattern: '^[A-Z][A-Z0-9_-]*$'
  title:
    type: string
    minLength: 1
  intent:
    type: string
    minLength: 1
  tactic_refs:
    type: array
    minItems: 1
    items:
      type: string
      pattern: '^[a-z][a-z0-9-]*$'
  paradigm_refs:
    type: array
    minItems: 1
    items:
      type: string
      pattern: '^[a-z][a-z0-9-]*$'
  styleguide_refs:
    type: array
    minItems: 1
    items:
      type: string
      pattern: '^[a-z][a-z0-9-]*$'
  toolguide_refs:
    type: array
    minItems: 1
    items:
      type: string
      pattern: '^[a-z][a-z0-9-]*$'
  fetch_policy:
    type: object
    additionalProperties: false
    required:
      - strategy
      - token_discipline
      - fetch_order
    properties:
      strategy:
        type: string
        enum:
          - lazy_fetch
      token_discipline:
        type: string
        enum:
          - on_demand
      fetch_order:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          type: string
          enum:
            - paradigms
            - tactics
            - toolguides
            - styleguides
      note:
        type: string
        minLength: 1
  enforcement:
    type: string
    enum:
      - required
      - advisory
anyOf:
  - required:
      - tactic_refs
  - required:
      - paradigm_refs
  - required:
      - styleguide_refs
  - required:
      - toolguide_refs
