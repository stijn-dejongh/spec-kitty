$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://spec-kitty.dev/schemas/doctrine/directive.schema.yaml"
title: Directive
description: Schema for governance directives with optional enrichment fields.
type: object
required:
  - schema_version
  - id
  - title
  - intent
  - enforcement
properties:
  schema_version:
    type: string
    pattern: '^1\.0$'
  id:
    type: string
    pattern: '^[A-Z][A-Z0-9_-]*$'
  title:
    type: string
    minLength: 1
  intent:
    type: string
    minLength: 1
  tactic_refs:
    type: array
    items:
      type: string
      pattern: '^[a-z][a-z0-9-]*$'
  enforcement:
    type: string
    enum:
      - required
      - advisory
  scope:
    type: string
    minLength: 1
  procedures:
    type: array
    items:
      type: string
  integrity_rules:
    type: array
    items:
      type: string
  validation_criteria:
    type: array
    items:
      type: string
  opposed_by:
    type: array
    items:
      $ref: '#/definitions/contradiction'
definitions:
  contradiction:
    type: object
    additionalProperties: false
    required:
      - type
      - id
      - reason
    properties:
      type:
        type: string
        enum:
          - directive
          - tactic
          - paradigm
      id:
        type: string
        minLength: 1
      reason:
        type: string
        minLength: 1
