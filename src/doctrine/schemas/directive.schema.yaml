$schema: https://json-schema.org/draft/2020-12/schema
$id: https://spec-kitty.dev/schemas/doctrine/directive.schema.yaml
title: Directive
description: Schema for governance directives with optional enrichment fields.
type: object
additionalProperties: false
required:
- id
- schema_version
- title
- intent
- enforcement
definitions:
  contradiction:
    type: object
    additionalProperties: false
    required:
    - type
    - id
    - reason
    properties:
      type:
        type: string
        minLength: 1
        enum:
        - directive
        - tactic
        - paradigm
      id:
        type: string
        minLength: 1
      reason:
        type: string
        minLength: 1
  directive_reference:
    type: object
    additionalProperties: false
    required:
    - type
    - id
    properties:
      type:
        type: string
        minLength: 1
        enum:
        - directive
        - tactic
        - styleguide
        - toolguide
        - paradigm
        - procedure
        - agent_profile
        - mission_step_contract
        - template
      id:
        type: string
        minLength: 1
properties:
  id:
    type: string
    pattern: ^[A-Z][A-Z0-9_-]*$
  schema_version:
    type: string
    pattern: ^1\.0$
  title:
    type: string
    minLength: 1
  intent:
    type: string
    minLength: 1
  enforcement:
    type: string
    minLength: 1
    enum:
    - required
    - lenient-adherence
    - advisory
  scope:
    type: string
  procedures:
    type: array
    items:
      type: string
  integrity_rules:
    type: array
    items:
      type: string
  validation_criteria:
    type: array
    items:
      type: string
  explicit_allowances:
    type: array
    minItems: 1
    items:
      type: string
  references:
    type: array
    items:
      $ref: '#/definitions/directive_reference'
  opposed_by:
    type: array
    items:
      $ref: '#/definitions/contradiction'
  referenced_tests:
    description: |
      Architectural test file paths (repo-relative) that enforce this directive
      in CI. Forward references are permitted: the test file may not yet exist
      when the directive is introduced (the test lands in a later WP). The
      cross-link is the audit trail from rule to enforcement.
    type: array
    items:
      type: string
      minLength: 1
  forbidden_imports:
    description: |
      Module paths whose import is prohibited inside the directive's scope.
      Architectural tests use this list as machine-readable input.
    type: array
    items:
      type: string
      minLength: 1
  forbidden_patterns:
    description: |
      Human-readable AST or call-site patterns the directive prohibits. These
      complement ``forbidden_imports`` for cases that cannot be reduced to a
      single import path (e.g., filesystem walks inside route function bodies).
    type: array
    items:
      type: string
      minLength: 1
  introduced_by_mission:
    description: |
      Identifier of the mission that introduced the directive. Optional but
      recommended for any directive added after the doctrine baseline so the
      audit trail back to the spec is unambiguous.
    type: string
    minLength: 1
  introduced_at:
    description: ISO-8601 date (YYYY-MM-DD) when the directive was introduced.
    type: string
    pattern: ^\d{4}-\d{2}-\d{2}$
allOf:
- if:
    properties:
      enforcement:
        const: lenient-adherence
    required:
    - enforcement
  then:
    required:
    - explicit_allowances
