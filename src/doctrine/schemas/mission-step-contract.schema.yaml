$schema: https://json-schema.org/draft/2020-12/schema
$id: https://spec-kitty.dev/schemas/doctrine/mission-step-contract.schema.yaml
title: Mission Step Contract
description: Schema for mission step contracts — structural steps of a mission action.
type: object
required:
- id
- schema_version
- action
- mission
- steps
definitions:
  delegates_to:
    type: object
    required:
    - kind
    - candidates
    properties:
      kind:
        type: string
        minLength: 1
        enum:
        - directive
        - tactic
        - styleguide
        - toolguide
        - paradigm
        - procedure
        - agent_profile
        - mission_step_contract
        - template
        description: Doctrine artifact type being referenced.
      candidates:
        type: array
        minItems: 1
        items:
          type: string
  mission_step:
    type: object
    required:
    - id
    - description
    properties:
      id:
        type: string
        minLength: 1
      description:
        type: string
        minLength: 1
      command:
        type: string
      delegates_to:
        $ref: '#/definitions/delegates_to'
      guidance:
        type: string
properties:
  id:
    type: string
    minLength: 1
  schema_version:
    type: string
    minLength: 1
  action:
    type: string
    minLength: 1
  mission:
    type: string
    minLength: 1
  tags:
    type: array
    items:
      type: string
  steps:
    type: array
    minItems: 1
    items:
      $ref: '#/definitions/mission_step'
