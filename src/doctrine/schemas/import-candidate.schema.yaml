$schema: https://json-schema.org/draft/2020-12/schema
$id: https://spec-kitty.dev/schemas/doctrine/import-candidate.schema.yaml
title: Import Candidate
description: Compatibility schema for curated external practice candidates.
type: object
oneOf:
- title: Legacy import-candidate (WP01 baseline)
  type: object
  additionalProperties: false
  required:
  - schema_version
  - id
  - source
  - target
  - adaptation_notes
  - status
  properties:
    schema_version:
      type: string
      pattern: ^1\.0$
    id:
      type: string
      pattern: ^[A-Z]{2,}-[0-9]{3,}$
    source:
      type: object
      additionalProperties: false
      required:
      - title
      - reference
      properties:
        title:
          type: string
        reference:
          type: string
    target:
      type: object
      additionalProperties: false
      required:
      - paradigm
      - directive
      properties:
        paradigm:
          type: string
        directive:
          type: string
        tactic:
          type: string
    adaptation_notes:
      type: string
      minLength: 1
    status:
      type: string
      minLength: 1
      enum:
      - proposed
      - accepted
      - rejected
- title: Doctrine curation import-candidate (WP03 scaffold)
  type: object
  required:
  - id
  - source
  - classification
  - adaptation
  - status
  properties:
    id:
      type: string
      minLength: 1
    source:
      type: object
      properties:
        title:
          type: string
        type:
          type: string
        publisher:
          type: string
        url:
          type: string
        accessed_on:
          type: string
    classification:
      type: object
      required:
      - target_concepts
      properties:
        target_concepts:
          items:
            type: string
          minItems: 1
          type: array
        rationale:
          type: string
    adaptation:
      type: object
      properties:
        summary:
          type: string
        notes:
          items:
            type: string
          type: array
    status:
      type: string
      minLength: 1
      enum:
      - proposed
      - reviewing
      - adopted
      - rejected
    resulting_artifacts:
      type: array
      items:
        type: string
    source_references:
      type: array
      items:
        properties:
          kind:
            type: string
          path:
            type: string
          lines:
            type: string
          note:
            type: string
        type: object
    external_references:
      type: array
      items:
        properties:
          url:
            type: string
          attribution_reason:
            type: string
          extraction_action:
            type: string
        type: object
  allOf:
  - if:
      properties:
        status:
          const: adopted
    then:
      required:
      - resulting_artifacts
      properties:
        resulting_artifacts:
          minItems: 1
