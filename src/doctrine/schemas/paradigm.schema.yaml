$schema: https://json-schema.org/draft/2020-12/schema
$id: https://spec-kitty.dev/schemas/doctrine/paradigm.schema.yaml
title: Paradigm
description: Minimal schema for doctrine paradigms.
type: object
additionalProperties: false
required:
- schema_version
- id
- name
- summary
definitions:
  contradiction:
    type: object
    additionalProperties: false
    required:
    - type
    - id
    - reason
    properties:
      type:
        type: string
        minLength: 1
        enum:
        - directive
        - tactic
        - paradigm
      id:
        type: string
        minLength: 1
      reason:
        type: string
        minLength: 1
properties:
  schema_version:
    type: string
    pattern: ^1\.0$
  id:
    type: string
    pattern: ^[a-z][a-z0-9-]*$
  name:
    type: string
    minLength: 1
  summary:
    type: string
    minLength: 1
  directive_refs:
    type: array
    items:
      type: string
      pattern: ^DIRECTIVE_\d{3}$
  opposed_by:
    type: array
    items:
      $ref: '#/definitions/contradiction'
  description:
    description: |
      Long-form prose explaining the paradigm beyond the one-line ``summary``.
      Optional; ``summary`` remains required.
    type: string
    minLength: 1
  shape:
    description: |
      Concrete shape the paradigm imposes on artefacts (e.g., a marker base
      class plus a structured field). Used by paradigms that codify a small
      set of opinions on production code, not just a worldview.
    type: string
    minLength: 1
  example:
    description: Inline illustrative example (typically a sample payload).
    type: string
    minLength: 1
  referenced_tests:
    description: |
      Architectural test file paths (repo-relative) that enforce this paradigm
      in CI. Forward references are permitted.
    type: array
    items:
      type: string
      minLength: 1
  future_graduation_triggers:
    description: |
      Documented future conditions under which the paradigm should graduate to
      a richer specification (HAL, JSON:API, etc.). Each entry is a
      human-readable sentence describing the trigger.
    type: array
    items:
      type: string
      minLength: 1
  future_migration_shape:
    description: |
      Description of the additive migration path when a graduation trigger
      fires. Documents that the future evolution remains backward-compatible.
    type: string
    minLength: 1
  introduced_by_mission:
    description: |
      Identifier of the mission that introduced the paradigm.
    type: string
    minLength: 1
  introduced_at:
    description: ISO-8601 date (YYYY-MM-DD) when the paradigm was introduced.
    type: string
    pattern: ^\d{4}-\d{2}-\d{2}$
