$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://spec-kitty.dev/schemas/doctrine/paradigm.schema.yaml"
title: Paradigm
description: Minimal schema for doctrine paradigms.
type: object
additionalProperties: false
required:
  - schema_version
  - id
  - name
  - summary
properties:
  schema_version:
    type: string
    pattern: '^1\.0$'
  id:
    type: string
    pattern: '^[a-z][a-z0-9-]*$'
  name:
    type: string
    minLength: 1
  summary:
    type: string
    minLength: 1

