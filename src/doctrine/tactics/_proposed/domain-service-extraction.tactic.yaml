schema_version: "1.0"
id: domain-service-extraction
name: Domain Service Extraction
purpose: >
  Identify and extract stateless domain operations that do not naturally
  belong to any Entity or Value Object into explicit Domain Services. A
  Domain Service encapsulates domain logic that spans aggregate boundaries,
  coordinates multiple aggregates, or represents a domain concept that has
  no lifecycle or identity. Domain Services live in the domain layer — they
  are not application services, infrastructure services, or controllers.
  Based on Eric Evans's DDD tactical patterns.
steps:
  - title: Detect the extraction signal
    description: >
      Look for domain logic that is awkwardly placed: operations that
      require injecting one Entity into another, methods on an Entity that
      only use data from other aggregates, or utility functions in a
      "helpers" module that encode business rules. These are Domain Service
      candidates.
    examples:
      - "transfer_funds(source_account, target_account, amount) — neither Account naturally owns this operation."
      - "calculate_shipping_cost(order, warehouse_location) — Order should not know about warehouse geography."
  - title: Verify it is truly domain logic
    description: >
      Confirm that the operation encapsulates a business rule or domain
      concept, not a technical concern. Infrastructure operations (send
      email, write to database) belong in infrastructure services.
      Application orchestration (transaction management, authorization
      checks) belongs in application services. Only domain logic goes in
      a Domain Service.
    examples:
      - "Domain: FraudDetectionService.assess_risk(transaction) — business rule about risk thresholds."
      - "Not domain: EmailService.send(message) — infrastructure concern."
  - title: Name the service using ubiquitous language
    description: >
      The Domain Service name should come from the ubiquitous language of
      the bounded context. If domain experts do not have a name for the
      operation, it may not be a distinct domain concept — consider whether
      it belongs on an existing Entity or is actually an application concern.
    examples:
      - "PricingService (insurance context), FundsTransferService (banking context), RouteOptimizer (logistics context)."
  - title: Keep the service stateless
    description: >
      A Domain Service has no internal state between calls. All necessary
      state is passed in as parameters (entities, value objects, or
      identifiers) and results are returned. Statelessness makes Domain
      Services easy to test, parallelize, and reason about.
  - title: Define a clear interface
    description: >
      Express the Domain Service as an interface (protocol, abstract class)
      that the domain layer owns. Concrete implementations may depend on
      repositories or other services, but the interface depends only on
      domain types. This keeps the domain layer free of infrastructure
      imports.
    examples:
      - "class FundsTransferService(Protocol): def transfer(self, source: AccountId, target: AccountId, amount: Money) -> TransferResult: ..."
  - title: Test with domain-level assertions
    description: >
      Unit test the Domain Service by passing in domain objects directly,
      without database or network access. Assert on domain outcomes (state
      changes, returned value objects, raised domain events), not on
      infrastructure side effects.
failure_modes:
  - "Anemic service layer: extracting all logic from Entities into services, leaving Entities as data bags."
  - "Infrastructure leak: putting HTTP calls, database queries, or file I/O directly in a Domain Service."
  - "God service: creating one service that handles every operation in the context instead of focused, cohesive services."
  - "Missing abstraction: implementing the Domain Service as a concrete class with infrastructure dependencies and no interface."
  - "State accumulation: adding instance variables to the service, creating hidden coupling between calls."
  - "Technical naming: naming the service after implementation patterns (ProcessorService, ManagerService) instead of domain concepts."
references:
  - name: Aggregate Boundary Design
    type: tactic
    id: aggregate-boundary-design
    when: Domain Services often coordinate operations across multiple aggregates.
  - name: Entity vs Value Object Classification
    type: tactic
    id: entity-value-object-classification
    when: Determining whether logic belongs on an Entity/VO or should be extracted to a service.
  - name: Language-Driven Design
    type: tactic
    id: language-driven-design
    when: Naming Domain Services using the bounded context's ubiquitous language.
