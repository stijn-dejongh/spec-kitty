schema_version: "1.0"
id: repository-boundary-design
name: Repository Boundary Design
purpose: >
  Design domain-level Repository abstractions that provide collection-like
  access to aggregates while hiding persistence mechanics. A Repository
  sits at the boundary between the domain model and the data mapping layer,
  presenting a clean interface in ubiquitous language terms. The domain code
  depends on the Repository interface; the infrastructure layer provides the
  concrete implementation. Based on Eric Evans's DDD tactical patterns and
  the Ports & Adapters (hexagonal) architecture.
steps:
  - title: One Repository per aggregate root
    description: >
      Create a Repository only for aggregate roots — never for internal
      entities or value objects within an aggregate. The Repository is the
      sole mechanism for obtaining a fully reconstituted aggregate from
      storage. If you find yourself needing a Repository for a non-root
      object, the aggregate boundaries may be wrong.
    examples:
      - "OrderRepository: correct (Order is an aggregate root)."
      - "OrderLineRepository: wrong (OrderLine is internal to the Order aggregate)."
  - title: Design a collection-like interface
    description: >
      The Repository interface should feel like an in-memory collection.
      Provide methods to add, remove, and retrieve aggregates by identity
      or domain-meaningful criteria. Avoid exposing query language, SQL
      fragments, or ORM-specific constructs in the interface.
    examples:
      - "class OrderRepository(Protocol): def find_by_id(self, order_id: OrderId) -> Order | None; def save(self, order: Order) -> None; def find_pending_for_customer(self, customer_id: CustomerId) -> list[Order]"
  - title: Express queries in domain terms
    description: >
      Repository query methods should use ubiquitous language, not database
      column names or technical filter expressions. Each method represents
      a domain-meaningful retrieval scenario. Complex ad-hoc queries that
      do not correspond to domain concepts may belong in a separate read
      model or query service.
    examples:
      - "Domain: find_overdue_invoices(as_of: date) — not: filter(where='due_date < ?', params=[date])"
  - title: Define the interface in the domain layer
    description: >
      The Repository interface (protocol, abstract class) lives in the
      domain layer alongside the aggregate it serves. The concrete
      implementation (SQL, ORM, file-based) lives in the infrastructure
      layer. This ensures the domain layer has no dependency on storage
      technology.
  - title: Return fully reconstituted aggregates
    description: >
      The Repository must return complete aggregates with all internal
      entities and value objects populated. Partially loaded aggregates
      cannot enforce their invariants. If performance requires partial
      loading, use a separate read model or projection, not a half-loaded
      aggregate.
  - title: Handle identity assignment
    description: >
      Decide whether aggregate identity is assigned by the domain (UUID
      generated before persistence) or by the database (auto-increment,
      sequence). Domain-assigned identity is preferred in DDD because the
      aggregate is fully valid before it reaches the Repository.
    examples:
      - "Domain-assigned: order = Order(id=OrderId(uuid4()), ...); repo.save(order)"
      - "DB-assigned: less preferred — aggregate has no identity until persisted, complicating event publishing."
failure_modes:
  - "Repository for non-roots: creating Repositories for internal entities, bypassing aggregate invariants."
  - "Leaking persistence: exposing ORM session, query builders, or SQL in the Repository interface."
  - "Partial loading: returning aggregates with lazy-loaded collections that fail outside the persistence session."
  - "Generic Repository anti-pattern: a single Repository<T> that serves all aggregates, losing domain-specific query semantics."
  - "Business logic in Repository: placing domain rules in query implementations instead of in the aggregate."
  - "Missing interface: implementing the Repository as a concrete class in the infrastructure layer without a domain-owned abstraction."
references:
  - name: Aggregate Boundary Design
    type: tactic
    id: aggregate-boundary-design
    when: Repositories serve aggregate roots; define aggregates first.
  - name: Entity vs Value Object Classification
    type: tactic
    id: entity-value-object-classification
    when: Understanding which objects are roots (Entities) vs internal (VOs) determines Repository scope.
  - name: Anti-Corruption Layer
    type: tactic
    id: anti-corruption-layer
    when: Repository implementations may act as ACLs when persisting to legacy or external storage systems.
