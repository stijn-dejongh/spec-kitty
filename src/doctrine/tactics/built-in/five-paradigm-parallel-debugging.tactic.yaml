schema_version: "1.0"
id: five-paradigm-parallel-debugging
name: Five-Paradigm Parallel Debugging
purpose: >
  Investigate stubborn, recurring, or shape-shifting bugs by dispatching
  five sub-agents in parallel, each constrained to a different debugging
  epistemology. Independent investigations converge on a single
  structural fix while each surfaces findings the others structurally
  cannot. Produces one structural intervention, not five point-fixes.
steps:
  - title: Verify the bug warrants the budget
    description: >
      Five sub-agents × investigation time × tokens is expensive. Only
      dispatch when at least one of: the bug class has recurred three or
      more times under different symptoms; multiple reactive PRs have
      not stopped the chain; the bug crosses a contested system boundary;
      MTTR-of-class is shorter than MTTF-of-fix. Otherwise recommend the
      lighter /investigate skill and stop.
  - title: Frame the bug statement
    description: >
      Write one paragraph that all five sub-agents will investigate
      independently. Include: the observable failure, the system
      boundary crossed, the recurrence history, any prior reactive PRs,
      and the decidable property the Bisector and the Falsifier need.
      Do NOT include hypotheses — each paradigm must form its own.
  - title: Dispatch all five sub-agents in parallel
    description: >
      Sequential dispatch defeats the point — the swarm is only valid
      when independent. The five paradigms are: (1) The Falsifier
      (hypothesis-driven scientific method, Zeller); (2) The Five-Whys
      Cartographer (5 Whys + Ishikawa fishbone, Toyota TPS / SRE
      postmortems); (3) The Bisector (delta debugging and git bisect,
      Zeller and Hildebrandt); (4) The Matrix-Maker (differential /
      dual-system comparison); (5) The Stenographer (trace-based
      observability — rr, Pernosco, eBPF, logs, response bodies).
      Each gets a paradigm-specific prompt; none communicates with the
      others until synthesis.
    examples:
      - "The Falsifier returns: hypothesis tree with FALSIFIED / CONFIRMED / UNRESOLVED verdicts. The Cartographer returns: 5-Whys descent + fishbone categorisation + Pareto table linking historical incidents to root causes. The Bisector returns: introducing commit SHA, drift lifetime, upstream-vs-local verdict. The Matrix-Maker returns: full divergence matrix including dormant masks. The Stenographer returns: trace catalog plus any orthogonal bug discovered."
  - title: Compile convergence and surface divergence
    description: >
      Convergence — all five point at the same fix — is the deliverable.
      It is structurally stronger evidence than any one investigator's
      certainty because five independent epistemologies cannot share the
      same blind spot. Divergence is signal, not noise: a paradigm
      pointing elsewhere often discovered an orthogonal bug
      (Stenographer) or a deeper structural cause (Cartographer). Do
      not suppress divergence to force convergence.
  - title: Author the structural fix plan
    description: >
      One plan that closes the whole class — not five reactive PRs. The
      plan must reference the structural root cause (Cartographer), the
      introducing commit and drift lifetime (Bisector), the full
      divergence matrix including dormant masks (Matrix-Maker), the
      falsified-hypothesis catalog (Falsifier), and any orthogonal bug
      (Stenographer). The minimum diff closes currently-known masks
      AND pre-identified dormant ones.
  - title: Record so future recurrences start ahead
    description: >
      Persist the artefacts. File the structural fix as a parent issue.
      Attach the falsified-hypothesis catalog so they cannot be
      re-investigated without new evidence. Attach the divergence
      matrix with dormant-mask predictions. Cross-link every prior
      point-fix issue with a comment naming the structural cause.
failure_modes:
  - "Dispatching the five paradigms sequentially instead of in parallel — defeats the independence that makes convergence meaningful."
  - "Suppressing divergence to force convergence — discards exactly the signal the swarm exists to find."
  - "Shipping five point-fixes instead of one structural intervention — leaves the class open for the sixth mask."
  - "Skipping the falsified-hypothesis catalog — the next recurrence will re-litigate dead-end theories."
  - "Using the skill for a one-line bug — token cost dominates and the team learns to ignore the skill."
  - "Allowing a paradigm to communicate with the others before synthesis — collapses to a single epistemology."
references:
  - name: Recurring-Bug Structural-Intervention Discipline
    type: directive
    id: DIRECTIVE_040
    when: When a bug class has recurred and reactive PRs have not stopped the chain, this directive REQUIRES a structural intervention rather than another point fix
  - name: Incremental Code Review
    type: tactic
    id: code-review-incremental
    when: Apply during convergence synthesis to each sub-agent's output before authoring the fix plan
  - name: Review Intent and Risk First
    type: tactic
    id: review-intent-and-risk-first
    when: Evaluate the structural-fix plan for intent (does it close the class?) and risk (blast radius of structural change) before handoff
