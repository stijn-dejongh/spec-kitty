schema_version: "1.0"
id: common-docs-curation
name: Common Docs Curation
purpose: >
  How to place, author, and curate documentation under the Common Docs standard
  so the conventions are applied at point-of-edit and verified by live gates
  rather than remembered. Covers placing a page, authoring an ADR with era and
  frontmatter, and running the rulers before handoff.
steps:
  - title: Place the page in the single root
    description: >
      Choose the one section under the single Common Docs root that owns the
      concern (one of: context, architecture, adr, plans, api, configuration,
      integrations, security, guides, operations, migrations, changelog) and
      place the file there. Never create a second documentation root or a
      per-version shadow tree. In-flight investigations and traces belong in
      plans/ under the distil-then-retire lifecycle, not a permanent wiki home.
    examples:
      - "A new how-to for the dashboard goes in docs/guides/; the durable design decision it documents goes in docs/adr/3.x/, not duplicated in both."
      - "An in-flight consolidation trace goes in docs/plans/ with doc_status: draft, to be distilled into adr/ or architecture/ and then retired."
  - title: Author frontmatter as the source of truth
    description: >
      Write in-file YAML frontmatter as the per-page source of truth: title; the
      namespaced doc_status (draft | active | deprecated | superseded) — never a
      bare status key; updated: YYYY-MM-DD; a description of 50-180 characters for
      SEO; and a related: list of resolvable repo-relative .md paths for
      cross-references. Do not maintain a parallel sidecar metadata store; the
      page-inventory rollup is regenerated from frontmatter.
    examples:
      - "doc_status: active with updated: 2026-06-27 and a 120-character description; related: lists two existing .md paths."
      - "A deprecated trace flips doc_status: draft -> doc_status: deprecated once its finding is distilled into an ADR."
  - title: Author or migrate an ADR with era and frontmatter
    description: >
      File Architecture Decision Records under adr/<era>/ (adr/1.x, adr/2.x,
      adr/3.x) by era of decision, with YAML frontmatter so the docsite indexes
      them. Map decision lifecycle into doc_status: a not-yet-accepted decision is
      doc_status: draft (PROPOSED); a decision replaced by a later one is
      doc_status: superseded with a related: link to the superseding ADR. The
      living architectural design itself lives in the single unversioned
      architecture/ location, not under an era directory.
    examples:
      - "A PROPOSED ADR carries doc_status: draft until accepted, then doc_status: active."
      - "When ADR-B supersedes ADR-A, ADR-A flips to doc_status: superseded and gains related: [path/to/adr-b.md]."
  - title: Run the rulers before handoff
    description: >
      Verify the live gates rather than asserting compliance narratively. Run the
      DRG freshness gate so the doctrine graph stays in sync, then the documentation
      gates delivered by the consolidation mission: the related: path validator
      (WP03), the page-inventory lockfile freshness gate (WP04), and
      the common-docs-structural-lint doctrine asset (the structural lint
      shipped with this pack). Treat any red gate as a blocker.
    examples:
      - "spec-kitty doctrine regenerate-graph --check returns exit 0 (DRG fresh)."
      - "docs_structural_lint is green: index completeness for curated-complete sections, no shared non-nav content basename across sections, and DIRECTIVE_042 resolves to a loaded directive."
failure_modes:
  - "A page is added under a second documentation root or a per-version shadow tree, re-creating the split-brain."
  - "Frontmatter uses a bare status key, colliding with the work-package lane status model."
  - "A related: entry points at a path that does not resolve, so the cross-reference silently rots."
  - "Compliance is asserted in prose without running the related-path validator, the lockfile freshness gate, or docs_structural_lint."
references:
  - name: Common Docs Documentation Standard
    type: directive
    id: DIRECTIVE_042
    when: Consult throughout placement, frontmatter authoring, and ADR migration to apply the binding documentation rules.
  - name: Common Docs Styleguide
    type: styleguide
    id: common-docs
    when: Consult while authoring frontmatter, naming files, and writing cross-references to apply the rule-to-check conventions.
