schema_version: "1.0"
id: atomic-state-ownership
name: Atomic State Ownership
purpose: >
  Assign state ownership to the lowest atomic level that needs it, preventing
  premature lifting to global stores. Local state stays local; only state consumed
  by multiple organisms or pages qualifies for centralization.
steps:
  - title: Inventory component state
    description: >
      For each component, list every piece of state it reads or writes.
      Include UI state (hover, focus, open/close), coordination state
      (form validity, selection), and domain state (entities, auth, locale).
  - title: Classify by atomic level
    description: >
      Assign each state item to the lowest level that fully owns it:
      local (atom/molecule), coordinated (organism), or shared (page/cross-cutting).
      A state item is local if only one component reads and writes it.
      It is coordinated if sibling molecules within one organism share it.
      It is shared only if 2+ organisms on different pages consume it.
    examples:
      - "isHovered, isFocused, isOpen -> local (atom/molecule)"
      - "formFieldValidity across label+input+error -> coordinated (molecule)"
      - "productList for grid+filters+pagination -> coordinated (organism)"
      - "currentUser, locale, featureFlags -> shared (page/cross-cutting)"
  - title: Apply local mechanisms for local state
    description: >
      Use the framework's native local state primitive (useState, signal, @State,
      reactive ref) for atom and molecule state. Do not import global store
      selectors or subscribe to streams for state that never leaves the component.
  - title: Introduce reactive streams only for async coordination
    description: >
      At the organism level, use observables or reactive streams when the organism
      coordinates asynchronous data (API calls, WebSocket feeds, debounced search).
      Synchronous coordination between molecules does not require streams.
  - title: Centralize only truly shared state
    description: >
      Move state to a global store (Redux, NgRx, Zustand, Pinia) only when the
      2-organism-2-page threshold is met. Domain entities fetched from APIs may
      enter the store; UI state (which tab is active, sidebar open) does not.
failure_modes:
  - "Redux everything: dispatching actions for hover state, form field focus, or accordion open/close."
  - "Prop drilling anxiety: moving state to the global store just to avoid passing it through two levels. Use context or dependency injection instead."
  - "Premature lifting: putting organism-local state in the store because it feels complex, even though only one organism uses it."
references:
  - name: Cross-Cutting State via Store
    type: tactic
    id: cross-cutting-state-via-store
    when: Deciding whether state should be centralized (step 5).
