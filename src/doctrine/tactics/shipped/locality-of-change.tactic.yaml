schema_version: "1.0"
id: locality-of-change
name: Locality of Change Assessment
purpose: >
  Provide a systematic decision protocol for evaluating whether a proposed change
  adds necessary complexity or introduces premature abstraction. Complements Directive 024
  (Locality of Change) by giving implementers and reviewers a structured method for
  assessing scope before committing to a solution.

core_principle: >
  Do not add complexity to solve problems that do not demonstrably exist.
  Before introducing a new pattern, abstraction, or architectural enhancement,
  verify the problem exists in practice, measure its impact, and evaluate
  whether the current approach already handles it adequately.

steps:
  - title: Gather evidence that the problem exists in practice
    description: >
      Review actual task logs, work patterns, or system behavior to confirm the
      problem occurs. Count occurrences, measure frequency, and assess impact.
      Distinguish between observed pain points and hypothetical concerns.
    examples:
      - "Identify 3+ real instances where the current approach failed or caused friction."
      - "Log review: retry failures occurred 12 times in the last 30 deployments — this is evidence."
      - "No actual failures found, only theoretical risk — the 'do nothing' option must now be justified in the analysis."

  - title: Measure severity and quantify impact
    description: >
      Quantify how often the problem occurs, what the cost of the current workaround is,
      and what the risk is if left unaddressed. A problem that occurs occasionally with
      a trivial workaround may not justify a new abstraction.
    examples:
      - "Frequency: 3/20 handoffs (15%). Cost: 5 minutes manual correction per incident. Risk: silent data loss."
      - "Frequency: 1/200 deploys. Cost: 2 hours investigation. Risk: none — no data affected."

  - title: Always evaluate "do nothing" as a baseline
    description: >
      Include "keep current approach" in the trade-off analysis. State clearly what
      the cost of staying with the current approach is and under what conditions it
      becomes unacceptable. Organic emergence may solve the issue as the system matures.

  - title: Explore the simplest alternatives first
    description: >
      Can documentation or a convention address the problem? Can an existing pattern
      be adapted? Prefer solutions that require minimal new abstractions, leverage
      existing mechanisms, can be reversed if ineffective, and remain optional.
    examples:
      - "Can a docstring fix the confusion without a new abstraction?"
      - "Can an existing helper be extended rather than replaced?"

  - title: Cross-check against architectural principles
    description: >
      Before committing, verify the proposed change aligns with established ADRs
      and architectural patterns. A change that conflicts with an existing ADR must
      either propose to supersede it or be rejected. Complexity that drifts from
      core architectural values requires explicit justification.

  - title: Accept or reject with documented rationale
    description: >
      Record the decision: the problem evidence, the severity measurement, the
      alternatives considered, and why the chosen approach was selected. Include
      the "do nothing" baseline and why it was rejected (or accepted). This
      documentation is required for architectural decisions; it is optional but
      encouraged for lower-impact changes.

decision_checklist:
  - "Can I point to 3+ real instances where the current approach failed?"
  - "Have I quantified the impact (frequency, cost, risk)?"
  - "Have I evaluated 'do nothing' as an option?"
  - "Have I explored documentation or convention as a simpler alternative?"
  - "Does the proposed change preserve or enhance core architectural values?"
  - "Am I prescribing too early instead of letting a pattern emerge naturally?"
  - "Does the change achieve significant value at proportional cost?"

failure_modes:
  - name: Gold plating
    description: >
      Adding features "just in case" or "for completeness". Solving hypothetical
      future problems. Over-engineering for flexibility that will never be exercised.
      These are violations of the locality principle: the work is not local to
      a real, present problem.
  - name: Premature abstraction
    description: >
      Creating lookup tables or helper frameworks before the pattern has stabilised.
      Each instance of "this will be useful later" that is not grounded in current
      evidence is a premature abstraction.
  - name: Complexity creep
    description: >
      Each small addition seems reasonable in isolation, but the cumulative effect
      degrades simplicity over time. Apply this tactic for small changes too — ask
      whether the change is truly necessary before adding it.

references:
  - name: Locality of Change
    type: directive
    id: "024"
  - name: Architectural Integrity Standard
    type: directive
    id: "001"
  - name: Decision Documentation Requirement
    type: directive
    id: "003"
