schema_version: "1.0"
id: strategic-domain-classification
name: Strategic Domain Classification
purpose: >
  Classify each bounded context as Core Domain, Supporting Subdomain, or
  Generic Subdomain to guide investment, staffing, and build-vs-buy
  decisions. Core domains receive the deepest modelling effort because they
  are the source of competitive advantage. Supporting subdomains are
  necessary but not differentiating. Generic subdomains are commodity
  concerns best served by off-the-shelf solutions. Based on Eric Evans's
  strategic classification and the Bounded Context Canvas (section 3).
steps:
  - title: List all bounded contexts
    description: >
      Gather the full inventory of bounded contexts from the context map.
      Each context is a classification candidate. Include contexts that are
      currently outsourced or served by third-party products — they still
      have a classification.
  - title: Apply the differentiation test
    description: >
      For each context, ask: "Does excellence in this area create a
      competitive advantage that customers or stakeholders would notice?"
      If yes, it is a Core Domain candidate. If no, proceed to the next
      test.
    examples:
      - "Pricing engine for an insurance company: core — better pricing models win market share."
      - "User authentication: not core — customers expect it to work but do not choose the product because of it."
  - title: Apply the necessity test
    description: >
      For contexts that are not core, ask: "Is this context specific to
      our business rules or domain, even though it is not differentiating?"
      If yes, it is a Supporting Subdomain. If it is a general-purpose
      concern with well-known solutions, it is a Generic Subdomain.
    examples:
      - "Policy document generation (insurance): supporting — domain-specific templates and rules, but not the competitive edge."
      - "Email delivery: generic — commodity service, use a third-party provider."
  - title: Assign investment strategy
    description: >
      Core Domain: invest the best engineers, deepest modelling, highest
      test coverage, and continuous refinement. Supporting Subdomain:
      adequate engineering, pragmatic modelling, consider internal libraries
      or frameworks. Generic Subdomain: buy, adopt open-source, or outsource;
      minimise custom code.
    examples:
      - "Core (pricing engine): dedicated team, event-sourced model, comprehensive property-based tests."
      - "Generic (email delivery): SaaS provider with an ACL adapter, thin integration layer."
  - title: Record classification on the Bounded Context Canvas
    description: >
      For each context, fill in the Strategic Classification section of the
      Bounded Context Canvas with the classification (Core / Supporting /
      Generic), the rationale, and the investment strategy. This becomes the
      authoritative reference for planning discussions.
  - title: Revisit when strategy shifts
    description: >
      Classifications change as the business evolves. A supporting subdomain
      may become core if the company pivots. A core domain may become generic
      as the industry commoditises the capability. Review classifications
      after strategy changes, acquisitions, or major product pivots.
failure_modes:
  - "Everything is core: treating every context as core dilutes investment and overwhelms the team."
  - "Core by ego: classifying a context as core because the team enjoys working on it, not because it differentiates the business."
  - "Ignoring generic options: building custom solutions for commodity problems (authentication, logging, email)."
  - "Static classification: never revisiting classifications as business strategy evolves."
  - "Classification without consequence: labelling contexts but not adjusting staffing, investment, or build-vs-buy decisions accordingly."
references:
  - name: Bounded Context Identification
    type: tactic
    id: bounded-context-identification
    when: Contexts must be identified before they can be classified.
  - name: Bounded Context Canvas Fill
    type: related
    id: bounded-context-canvas-fill
    when: Recording the strategic classification on the full canvas template.
  - name: Context Mapping Classification
    type: tactic
    id: context-mapping-classification
    when: Understanding relationships between contexts informs classification decisions.
