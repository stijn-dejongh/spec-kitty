schema_version: "1.0"
id: refactoring-replace-magic-number-with-symbolic-constant
name: Refactoring Replace Magic Number With Symbolic Constant
purpose: Replace unexplained numeric literals with named constants that communicate domain intent.
steps:
  - title: Find target literals
    description: Locate opaque numeric values and group duplicates by the meaning they represent. Treat repeated values cautiously; the same number may encode different semantics in different contexts and should not be merged blindly.
  - title: Protect behavior tied to the value
    description: Add or verify tests for code paths whose behavior depends on the target literal.
  - title: Define semantic constants
    description: Introduce one named constant per distinct meaning in the correct class or module scope. Avoid abstracting trivial or self-evident literals when the constant name would reduce readability rather than improve it.
  - title: Replace usages incrementally
    description: Swap literals for the constant in small batches and rerun tests after each batch.
  - title: Consolidate duplicates and remove leftovers
    description: Merge duplicate constants with the same meaning and delete obsolete literal uses once the scope is clean.
