schema_version: "1.0"
id: refactoring-strangler-fig
name: Refactoring Strangler Fig
purpose: Replace existing functionality incrementally by running a new implementation alongside the old and rerouting behavior step by step.
steps:
  - title: Identify the behavior to replace
    description: Define the existing path being retired and the boundary where the new implementation can coexist safely.
  - title: Protect current behavior
    description: Add or verify tests that describe the behavior to preserve before introducing the new path.
  - title: Build the new implementation alongside the old
    description: Introduce the replacement without removing the legacy path yet.
  - title: Reroute incrementally
    description: Shift one caller, module, or traffic slice at a time from old to new behavior.
  - title: Verify after each reroute
    description: Run tests after every rerouting step and compare outcomes before proceeding.
  - title: Remove the legacy path
    description: Delete the old implementation only after all callers have moved and the comprehensive test suite remains green.
