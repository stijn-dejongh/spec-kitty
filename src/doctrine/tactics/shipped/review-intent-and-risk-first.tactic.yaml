schema_version: "1.0"
id: review-intent-and-risk-first
name: Review Intent and Risk First
purpose: Review work by first understanding intent and surfacing risks before suggesting changes or solutions.
steps:
  - title: Read the entire change without commenting
    description: Consume the full change set, document, or proposal in one pass before forming any opinion.
  - title: Summarise apparent intent
    description: Write one paragraph capturing what the author was trying to achieve. Confirm or correct this with the author before proceeding.
    examples:
      - "This change refactors the authentication layer to support OAuth2 alongside the existing session-based flow."
  - title: Identify potential risks and unknowns
    description: List concerns without proposing solutions yet. Categorise each risk by type – Correctness, Maintainability, Impact, or Misuse.
    examples:
      - "Correctness: token expiry is not validated on refresh. Impact: this endpoint is called on every page load."
  - title: Stop without proposing fixes unless asked
    description: |
      Deliver intent summary and risk list to the author.
      Propose solutions only if explicitly requested or if a critical correctness risk requires immediate discussion.
  - title: Escalate critical findings
    description: If correctness, security, or safety risks are found, prioritise them and flag for immediate discussion rather than deferring to the next review cycle.
