schema_version: "1.0"
id: bounded-context-identification
name: Bounded Context Identification
purpose: >
  Identify and draw boundaries around regions of a system where a single
  consistent domain model and ubiquitous language apply. Instead of forcing
  one unified model across an entire organization, accept that different
  contexts need different models and define explicit integration points
  between them. Based on Eric Evans's DDD strategic design and Martin
  Fowler's Bounded Context pattern.
steps:
  - title: Listen for language divergence
    description: >
      Map the terms used by different teams, modules, or documents.
      When the same word means different things in different places
      (polysemy), or different words describe the same concept
      (synonymy), you are at a boundary.
    examples:
      - "Utility company: 'meter' means grid connection (infrastructure), customer relationship (billing), or physical device (field ops) — three contexts."
      - "'User' in auth means credentials+sessions; 'User' in billing means payment profile+invoices."
  - title: Draw the boundary
    description: >
      Define which concepts, models, and vocabulary belong inside each
      context. A context is not a microservice or a module by default —
      it is a region where one ubiquitous language holds without
      contradiction. The boundary may align with team structure,
      organizational history, or domain expert groups.
  - title: Identify shared and unique concepts
    description: >
      Some concepts exist in only one context (support tickets in
      customer support). Others appear in multiple contexts with
      different shapes (Customer in billing vs Customer in shipping).
      Shared concepts require explicit translation at the boundary.
    examples:
      - "Unique: SupportTicket exists only in the support context."
      - "Shared: Product in catalog (full detail) vs Product in order (id + price snapshot)."
  - title: Define the integration mechanism
    description: >
      Choose how contexts communicate about shared concepts. Options
      include shared kernel (common subset both agree on), customer-
      supplier (upstream publishes, downstream consumes), anti-corruption
      layer (translator that protects one context from another's model),
      or published language (shared schema/API contract).
  - title: Enforce the boundary in code
    description: >
      Translate at the boundary — do not leak one context's model into
      another. Use separate modules, packages, or services with explicit
      mapping at integration points. The boundary should be visible in
      the project structure, not just in documentation.
    examples:
      - "billing/models.py defines BillingCustomer; shipping/models.py defines ShippingRecipient; an adapter maps between them."
  - title: Validate with the language test
    description: >
      Read code and documentation aloud with a domain expert from each
      context. If they correct your terminology or are confused by a
      term that makes sense in another context, the boundary is in the
      right place. If a single context has internal contradictions, it
      may need to split further.
failure_modes:
  - "Forced unification: building one model to rule them all, creating a bloated entity that satisfies no context well."
  - "Invisible boundaries: contexts exist in practice but are not reflected in code structure, causing model leakage."
  - "Boundary by technology: splitting contexts along technical layers (frontend/backend) instead of domain language."
  - "Over-splitting: creating a context per entity, adding integration overhead without language divergence to justify it."
  - "Ignoring sociotechnical factors: drawing boundaries purely from domain analysis without considering team structure and history."
references:
  - name: Language-Driven Design
    type: tactic
    id: language-driven-design
    when: Detecting linguistic conflicts that signal a bounded context boundary.
