schema_version: "1.0"
id: quality-gate-verification
name: Quality Gate Verification
purpose: Verify the relevant test and static validation gates for a change before review handoff and distinguish introduced failures from pre-existing debt.
steps:
  - title: Identify the affected validation scope
    description: Determine which unit tests, integration tests, static analysis checks, typing gates, lint checks, coverage expectations, and configured compliance gates are relevant to the files or workflows that changed.
  - title: Run focused behavioral tests first
    description: Execute the smallest test slice that proves the changed behavior works, then expand to broader regression checks where the risk justifies it.
  - title: Run static quality gates
    description: Execute the applicable static validation commands for the changed scope after the behavioral tests are green.
  - title: Run configured compliance checks
    description: Execute configured CVE, dependency, license, or equivalent supply-chain checks when the repository includes them in its expected validation flow.
  - title: Verify coverage expectations for new code
    description: Confirm the repository coverage target for new code is met, or record the accepted reason it is not yet met.
  - title: Separate introduced failures from inherited debt
    description: If a broader gate fails, determine whether the failure is caused by the current change or is unrelated pre-existing debt.
  - title: Record the validation result
    description: Capture which gates passed, which were not run, and which failures are pre-existing so review handoff is explicit.
