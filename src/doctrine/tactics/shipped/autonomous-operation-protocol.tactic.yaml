schema_version: "1.0"
id: autonomous-operation-protocol
name: Autonomous Operation Protocol
purpose: Enable agents to operate autonomously with clear decision boundaries, commit frequency expectations, and escalation protocols for critical choices.
steps:
  - title: Validate task scope and boundaries
    description: Confirm the task description is clear, acceptance criteria are measurable, and decision boundaries (autonomous vs. critical) are explicitly stated.
    examples:
      - "Document: 'Autonomous for implementation detail; pause for architectural changes or external API contract changes.'"
  - title: Verify reversibility
    description: Confirm that a rollback path exists (e.g. mission branch, git revert) before beginning autonomous execution. Block on irreversible operations.
    examples:
      - "Do not proceed with database schema migrations or production deployments without explicit human approval."
  - title: Execute in increments with commit checkpoints
    description: Break work into 5–15 minute increments. Commit after each verifiable step. Default commit frequency is every 15–30 minutes.
    references:
      - name: Define Stopping Conditions
        type: tactic
        id: stopping-conditions
        when: Progress stalls or an unexpected blocker is encountered during autonomous work.
  - title: Apply decision boundary protocol
    description: |
      Autonomous: implementation details, test additions, documentation updates, minor refactors within stated scope.
      Pause and escalate: architectural decisions, scope changes, security-sensitive operations, API contract changes, anything irreversible.
  - title: Escalate and document blockers
    description: When a critical decision point is reached, stop autonomous operation, document the blocker with full context, and await human input.
    examples:
      - "Leave a clearly labelled TODO comment and push current work before pausing."
