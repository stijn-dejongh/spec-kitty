schema_version: "1.0"
id: testing-select-appropriate-level
name: Select Appropriate Test Level
purpose: >
  Choose the right test level (unit, integration, system) for a change based on
  scope of impact, risk of failure, and feedback cost. Avoids both over-testing
  low-risk changes and under-testing high-risk ones. Grounded in the test pyramid
  model where ROI decreases as test scope widens.
notes: >
  Test Pyramid Reference Model:

  Unit (base, many tests) — <10ms per test, low maintenance, immediate
  feedback, high isolation (single function/class, externals stubbed).
  Proves individual components work correctly in isolation. Highest ROI:
  cheapest to write, fastest to run, easiest to maintain. A failing unit
  test pinpoints the exact broken component.

  Integration (middle, some tests) — 10ms-1s per test, moderate maintenance,
  fast feedback (seconds to low minutes), moderate isolation (real component
  interactions, external systems stubbed). Proves components collaborate
  correctly across boundaries. Moderate ROI: more expensive to set up but
  catches interaction bugs that unit tests miss.

  System / E2E / Acceptance (top, few tests) — seconds to minutes per test,
  high maintenance, slow feedback. Low isolation (full stack through public
  interfaces). Proves user-visible workflows work end to end. Lowest ROI per
  test but uniquely valuable: only this layer proves the system works as a
  whole. Keep the count low; each E2E test is expensive, slow, and brittle.

  Anti-pyramid ("Ice Cream Cone"): many E2E, few unit tests. Symptoms: slow
  CI, flaky tests, long feedback loops, tests breaking on unrelated changes,
  teams that stop trusting the suite. Fix by pushing coverage down.

  Cost of wrong level — over-testing: E2E for logic a unit test covers wastes
  CI time and increases flakiness. Under-testing: unit tests only misses
  integration failures (wrong interface assumptions, serialization bugs,
  missing migrations). Balanced investment: the pyramid is a cost signal;
  invest in the cheapest test that catches each bug category.
steps:
  - title: Identify the change
    description: State what is being introduced or modified in one sentence.
  - title: Assess scope of impact
    description: >
      Classify the change as local (single function or class), cross-module (multiple components or services),
      or system-wide (affects user-visible behavior or data flow).
  - title: Evaluate risk of failure
    description: >
      Rate as high (data loss, security, correctness of critical logic),
      medium (degraded UX, maintainability, performance),
      or low (cosmetic, easily reversible).
  - title: Map change to test levels
    description: >
      Unit tests for isolated logic and algorithms.
      Integration tests for interactions between components.
      System tests for end-to-end behavior and user scenarios.
    examples:
      - "Local scope + low risk = unit tests only."
      - "Cross-module + high risk = unit + integration tests."
      - "System-wide + high risk = all three levels."
  - title: Select the minimal sufficient set
    description: Choose the fewest test levels that provide confidence proportional to the risk. Do not default to a single level for all changes.
  - title: Document what is not tested and why
    description: Explicitly state any untested areas and the rationale for accepting that gap.
    examples:
      - "Performance under concurrent load is not tested; risk is low and manual profiling covers it."
failure_modes:
  - "Defaulting to one test level for all changes (always unit tests or always E2E)."
  - "Over-testing low-risk changes, wasting effort and slowing feedback."
  - "Relying solely on E2E tests: slow, brittle, hard to debug."
  - "Under-testing high-risk changes due to time pressure."
  - "Refactoring with no behavior change but writing new tests instead of relying on existing coverage."
references:
  - name: Test Boundaries by Responsibility
    type: tactic
    id: test-boundaries-by-responsibility
    when: Determining what to mock vs test real within the chosen test level
  - name: Test Pyramid Progression
    type: tactic
    id: test-pyramid-progression
    when: Executing tests in pyramid order after they are written
  - name: Acceptance Test First
    type: tactic
    id: acceptance-test-first
    when: Aligning system-level tests with acceptance criteria defined by ATDD
