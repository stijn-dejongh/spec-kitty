schema_version: "1.0"
id: requirements-validation-workflow
name: Requirements Validation Workflow
purpose: Validate requirements through evidence-based claim analysis, ensuring they are grounded in testable hypotheses rather than assumptions.
steps:
  - title: Extract and inventory claims
    description: |
      Gather all requirements and stakeholder assertions. For each, document:
      the claim text, its source (interview, literature, production data), evidence type (empirical / observational / theoretical / prescriptive), and testability (testable / untestable / proxy-testable).
    examples:
      - "Claim: 'Users abandon forms with more than 5 fields.' Source: Nielsen Norman Group (2019). Evidence type: empirical. Testable: yes."
  - title: Classify and prioritise claims
    description: Rank claims by impact (how wrong would hurt most) and uncertainty (how little evidence exists). Prioritise high-impact, high-uncertainty claims for validation first.
  - title: Design validation experiments
    description: For each prioritised claim, design a minimal experiment or test that would confirm or refute it. Define pass/fail criteria before running.
    examples:
      - "A/B test with 5-field vs. 8-field checkout form; success criterion: ≥10% reduction in abandonment rate."
  - title: Execute validation
    description: Run the experiments or collect the evidence. Document raw results without interpreting yet.
  - title: Analyse and update requirements
    description: |
      Compare results against pass/fail criteria.
      Confirmed claims become validated requirements.
      Refuted claims must be revised or dropped.
      Inconclusive results are marked for follow-up with a larger sample or different experiment design.
  - title: Document evidence trail
    description: Record the full validation chain – claim, experiment design, results, decision – so future contributors can understand why requirements exist.
    examples:
      - "Append a 'Validation Evidence' section to the spec.md for each confirmed requirement."
