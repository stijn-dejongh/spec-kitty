schema_version: "1.0"
id: atomic-design-review-checklist
name: Atomic Design Review Checklist
purpose: >
  Code review verification tactic for validating that state architecture
  respects atomic design level boundaries. Each step checks one atomic level
  against its state ownership contract.
steps:
  - title: Verify atom independence
    description: >
      Atom components have no external state dependencies. No store selectors,
      no injected services, no observable subscriptions. Atoms receive all data
      via props/inputs and emit events via callbacks/outputs.
    examples:
      - "Pass: ButtonAtom accepts label, disabled, onClick props."
      - "Fail: ButtonAtom injects ThemeService and subscribes to theme$."
  - title: Verify molecule data flow
    description: >
      Molecules accept data via inputs/props, not by subscribing to global state
      or injecting services. A molecule may coordinate its child atoms internally
      but does not reach outside its boundary for data.
    examples:
      - "Pass: SearchFormMolecule receives onSubmit callback, manages internal input state."
      - "Fail: SearchFormMolecule imports useSelector to read searchHistory from Redux store."
  - title: Verify organism as subscription floor
    description: >
      Organisms are the lowest level that may subscribe to reactive streams
      or select from the centralized store. Verify that no molecule or atom
      below the organism contains subscribe(), useSelector(), or equivalent.
    examples:
      - "Pass: ProductGridOrganism subscribes to products$ and passes Product[] down."
      - "Fail: ProductCardMolecule subscribes to cartItems$ to show 'in cart' badge."
  - title: Verify template purity
    description: >
      Templates define layout structure only. No business logic, no data fetching,
      no store access, no conditional rendering based on domain state. Templates
      arrange organisms in a spatial layout.
    examples:
      - "Pass: DashboardTemplate positions HeaderOrganism, SidebarOrganism, ContentOrganism in a grid."
      - "Fail: DashboardTemplate fetches user permissions to decide which organisms to render."
  - title: Verify page orchestration
    description: >
      Pages orchestrate data loading and pass resolved data down through organisms.
      Pages are where store selectors, route params, and API calls converge.
      Verify that pages do not leak raw observables or store references downward.
    examples:
      - "Pass: ProductPage combines route param + store selector, passes resolved product to ProductDetailOrganism."
      - "Fail: ProductPage passes Observable<Product> to ProductDetailOrganism."
  - title: Verify subscription cleanup
    description: >
      Every subscription has a corresponding cleanup path. Check for takeUntil
      patterns, async pipe usage, useEffect cleanup returns, or onUnmounted hooks.
      Flag any subscribe() call without a visible unsubscribe mechanism.
  - title: Flag observable boundary violations
    description: >
      Search for any raw Observable, Subject, or BehaviorSubject passed as a
      prop/input below the organism boundary. These should have been resolved
      to plain values by the organism before passing down.
failure_modes:
  - "Atom with injected services: atoms that depend on DI-provided state instead of pure props."
  - "Molecule with store selector: molecules reaching into global state, breaking composability and testability."
  - "Template with business logic: templates that conditionally render based on domain state instead of layout."
  - "Leaked observables: raw streams passed to molecules, forcing subscription management at the wrong level."
  - "Missing cleanup: subscriptions without unsubscribe paths, causing memory leaks on navigation."
references:
  - name: Atomic State Ownership
    type: tactic
    id: atomic-state-ownership
    when: Reviewing state ownership per atomic level (steps 1-3).
  - name: Compositional Stream Boundaries
    type: tactic
    id: compositional-stream-boundaries
    when: Reviewing subscription cleanup and observable boundary violations (steps 6-7).
  - name: Cross-Cutting State via Store
    type: tactic
    id: cross-cutting-state-via-store
    when: Verifying organism as subscription floor for store access (step 3).
