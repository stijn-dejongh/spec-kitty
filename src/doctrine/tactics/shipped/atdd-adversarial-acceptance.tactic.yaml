schema_version: "1.0"
id: atdd-adversarial-acceptance
name: Adversarial Acceptance Test Definition
purpose: Strengthen acceptance criteria by deliberately exploring how a feature could fail in real usage, then converting selected failure scenarios into adversarial acceptance tests that define reject, constrain, or degrade boundaries.
steps:
  - title: Establish the acceptance baseline
    description: Restate the story goal in one sentence. Confirm 1-3 baseline acceptance examples for the happy path. Identify the primary stakeholder and what "accepted" means.
  - title: Generate failure scenarios
    description: >
      Switch stance: assume the feature failed acceptance after release.
      Probe these angles: misuse (reasonable user does the wrong thing),
      ambiguity (inputs interpreted multiple ways), boundaries (empty, max, malformed),
      state (partial state, missing prerequisites, wrong ordering),
      concurrency (repeated actions, retries), integration (upstream sends unexpected data).
    examples:
      - "Trigger: user submits form twice rapidly. Manifestation: duplicate record created. Cause: no idempotency guard."
  - title: Triage failure scenarios
    description: >
      For each scenario, decide the contract outcome:
      prevent (block it), reject (explicit error), degrade (continue safely with warning), or tolerate (allowed, document why).
      Select candidates for adversarial tests using: high business risk, likely to occur, expensive to detect late, creates silent corruption.
  - title: Convert to acceptance scenarios
    description: >
      Write each selected scenario as Given/When/Then.
      Each test must assert at least one of: error message or code, state unchanged,
      rejected command not applied, audit signal exists, or user guidance provided.
    examples:
      - "Given a user with an expired session / When they submit a payment / Then the payment is rejected with 'Session expired' and no charge is created."
  - title: Review for fit and redundancy
    description: >
      Verify adversarial tests do not duplicate unit tests, remain stakeholder-meaningful,
      and define boundaries clearly (no vague "should handle" language).
failure_modes:
  - "Converting every edge case into ATDD: suite becomes brittle and slow."
  - "Writing adversarial tests in adversarial language instead of contract language."
  - "Creating tests that require internal implementation detail to pass."
  - "Mixing exploration (analysis) and enforcement (tests) without triage."
references:
  - name: Acceptance Test First
    type: tactic
    id: acceptance-test-first
    when: Baseline happy-path acceptance tests are the foundation this tactic extends
  - name: Test Boundaries by Responsibility
    type: tactic
    id: test-boundaries-by-responsibility
    when: Adversarial scenarios help clarify which boundaries need testing
  - name: Input Validation Fail-Fast
    type: tactic
    id: input-validation-fail-fast
    when: Many adversarial scenarios surface input validation requirements
