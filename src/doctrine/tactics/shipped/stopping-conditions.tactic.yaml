schema_version: "1.0"
id: stopping-conditions
name: Define Stopping Conditions
purpose: Establish clear, measurable thresholds that define when to stop pursuing a goal, protecting against over-investment and sunk-cost fallacy.
steps:
  - title: Define positive success criteria
    description: Write 3–5 concrete, observable indicators that confirm progress is on track.
    examples:
      - "Prototype validated by 10 users; all acceptance tests pass; P99 latency under target threshold."
  - title: Define warning signals
    description: List 3–5 specific, measurable red flags that indicate the approach is failing.
    examples:
      - "No progress after two full work sessions; test coverage is decreasing; blocked on dependency for more than 24 hours."
  - title: Set hard limits per resource category
    description: |
      Specify maximum acceptable investment across:
      Time – maximum duration before mandatory reassessment.
      Effort – maximum number of approaches or iterations.
      Scope – boundaries that must not be crossed without explicit approval.
  - title: Write trigger declarations
    description: Compose "When X happens, I will Y" statements that prime action when limits are breached.
    examples:
      - "When three consecutive approaches fail to make the test green, escalate to the human-in-charge immediately."
  - title: Communicate and schedule checkpoints
    description: Share stopping conditions with affected parties and schedule review checkpoints to evaluate progress against limits.
