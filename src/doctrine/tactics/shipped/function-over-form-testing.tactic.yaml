schema_version: "1.0"
id: function-over-form-testing
name: Function Over Form Testing
purpose: >
  Prioritize behavioral validation over structural verification in test suites.
  Tests should prove that the system does what it is supposed to do, not that
  it was assembled from the right parts. Construction details (constructors,
  builders, accessors) get tested indirectly through functional tests that
  exercise the objects they create.

core_principle: >
  Test behavior, not construction. When behavior is tested thoroughly, construction
  coverage follows naturally: a single functional test exercises object creation,
  configuration, business logic, and output in one path — without any of those
  phases being tested in isolation.

steps:
  - title: Write tests for observable outcomes
    description: >
      Each test expresses a behavioral requirement in Given/When/Then form:
      given a precondition, when an action is taken, then an observable result
      matches the expectation. The observable result is the thing a user or
      downstream system would actually see.
    examples:
      - |
        // Test behavior: the validation rule
        @Test void shouldRejectOrderBelowMinimumValue() {
            Order order = OrderFixtures.belowMinimum().build();
            assertThatThrownBy(() -> service.submit(order))
                .isInstanceOf(ValidationException.class)
                .hasMessageContaining("minimum order value");
        }

  - title: Test validation logic explicitly
    description: >
      Validation rules encode business logic and must be tested as first-class behaviors.
      Cover required fields, format constraints, range boundaries, and cross-field
      consistency as behavioral scenarios, not as schema assertions.
    examples:
      - |
        // Good: validation as business behavior
        @Test void shouldRejectMissingCustomerId() { ... }
        @Test void shouldRejectNegativeQuantity() { ... }

        // Poor: asserting schema structure (this is construction, not behavior)
        @Test void orderHasCustomerIdField() { assertThat(order).hasFieldOrProperty("customerId"); }

  - title: Let construction coverage come naturally
    description: >
      Do not write dedicated tests for constructors, builder patterns, factory methods,
      setters, getters, or record accessors. These are construction mechanisms.
      They will be exercised — and therefore covered — by every functional test that
      creates and uses the objects they produce.
    examples:
      - |
        // Anti-pattern: testing a getter
        @Test void getterReturnsSetValue() {
            Order order = new Order("C-123", 5);
            assertThat(order.getCustomerId()).isEqualTo("C-123");
        }
        // This test verifies Java syntax, not behavior. Delete it.

  - title: Avoid asserting implementation details
    description: >
      Do not assert on internal field values, method call counts, or intermediate
      states. These assertions break during refactoring even when observable behavior
      is unchanged. Assert on what the system produces, emits, or returns — not on
      how it achieved that result.

failure_modes:
  - name: Over-mocking
    description: >
      Mocking every collaborator turns integration tests into scripted interaction
      replays that pass even when the real integration is broken. Use real objects
      where feasible; mock only at true system boundaries (external HTTP, filesystem,
      clock, randomness).
  - name: Testing private methods
    description: >
      Private methods are implementation details. If a private method needs testing
      directly, it is a signal the method should be extracted to a collaborator with
      its own public interface.
  - name: Testing toString or equals in isolation
    description: >
      Format and identity methods should be tested through the integrations that depend
      on them: logging, collection membership, comparison operations. Test isolated
      toString behavior only when toString encodes business-visible output.

references:
  - name: Testing Principles Styleguide
    type: styleguide
    id: testing-principles
  - name: Acceptance Test Driven Development
    type: tactic
    id: acceptance-test-first
  - name: Behavior-Driven Development
    type: tactic
    id: behavior-driven-development
  - name: Test-First Development
    type: directive
    id: "034"
