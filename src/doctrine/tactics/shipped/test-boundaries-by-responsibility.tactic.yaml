schema_version: "1.0"
id: test-boundaries-by-responsibility
name: Test Boundaries by Functional Responsibility
purpose: Determine test scope by identifying which components are directly responsible for the behavior under test, rather than following structural layer boundaries. Reduces brittle tests while ensuring meaningful validation.
steps:
  - title: Identify the functionality to validate
    description: Write a one-sentence description of the feature or behavior being tested. This anchors all boundary decisions.
    examples:
      - "User registration validates email format and creates account record."
  - title: Map responsibility boundaries
    description: List all components involved in delivering the functionality. For each, ask whether it directly implements logic for this feature. Mark components as inside-boundary (real) or outside-boundary (stubbed).
    examples:
      - "Inside: UserRegistrationService, EmailValidator. Outside: UserRepository, EmailDeliveryService."
  - title: Classify dependencies
    description: >
      Inside boundary (do NOT mock): business logic, domain models, value objects, validation rules specific to the feature.
      Outside boundary (DO mock/stub): database access, external APIs, filesystem, network, time providers, services outside the current module.
  - title: Write the test scope statement
    description: Formulate a sentence stating what the test validates, what it exercises for real, and what it stubs.
    examples:
      - "This test validates user registration by exercising UserRegistrationService and EmailValidator while stubbing UserRepository and EmailDeliveryService."
  - title: Create the focused test
    description: Instantiate inside-boundary components with real implementations. Stub outside-boundary components. Assert on behavior of inside-boundary components, not on stub interactions.
  - title: Verify boundary correctness
    description: >
      Ask two questions:
      (1) If I refactor inside-boundary components without changing functionality, should this test still pass? (Yes.)
      (2) If outside-boundary implementations change, should this test be affected? (No, they are stubbed.)
failure_modes:
  - "Excessive mocking: stubbing components that are part of the functional slice, testing doubles instead of real logic."
  - "Insufficient isolation: not stubbing external dependencies, causing slow and fragile tests."
  - "Structural bias: defining boundaries by layer (always mock service layer) instead of by responsibility."
  - "Over-assertion: verifying internal implementation details instead of functional outcomes."
references:
  - name: Acceptance Test First
    type: tactic
    id: acceptance-test-first
    when: Acceptance tests define the outer behavioral boundary that this tactic refines at the inner unit level
  - name: TDD Red-Green-Refactor
    type: tactic
    id: tdd-red-green-refactor
    when: Driving implementation inside the boundaries defined by this tactic
