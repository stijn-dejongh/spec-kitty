schema_version: "1.0"
id: work-package-completion-validation
name: Work Package Completion Validation
purpose: >
  Validate that a work package meets all required quality gates before its status is
  advanced to for_review or done. Prevents premature transitions that accumulate
  technical debt in the review queue.

apply_when:
  - Before emitting a status transition to for_review or done
  - After a reviewer requests changes and the implementer believes those changes are complete
  - As a self-check before handing off any work package to another agent

steps:
  - title: Verify test suite and type checks pass
    description: >
      Run the project's full test suite and static analysis tools. All checks must be
      green before advancing status. A failing check is a hard stop — do not
      rationalise partial compliance.
    examples:
      - "cd src && pytest --tb=short -q"
      - "mypy src/"
      - "ruff check ."
      - "mvn verify"

  - title: Confirm acceptance criteria are addressed
    description: >
      Read the work package's acceptance criteria from the task file. For each criterion,
      confirm it is demonstrably met by the current state of the code. If a criterion
      cannot be verified mechanically, describe the manual evidence.
    examples:
      - "Criterion: 'should emit a status event on transition' → verified by test test_emit_transition_fires_event."
      - "Criterion: 'should reject invalid lane name' → verified by test test_invalid_lane_raises."

  - title: Confirm no unintended scope expansion
    description: >
      Review the diff against the work package description. Changes outside the stated
      scope are a flag — either the scope was too narrow (discuss with planner) or
      the change should be reverted to a separate work package.
    examples:
      - "The WP covers the status emitter only. If the diff includes changes to the CLI layer, split them out."

  - title: Confirm documentation and frontmatter are current
    description: >
      Update the work package frontmatter fields (profile, role, tool) and any
      inline documentation that the changes affect. Stale docs are a reviewer burden.
    examples:
      - "If a new CLI flag was added, update the relevant docs/ page."
      - "If the WP frontmatter still shows lane: in_progress, advance it now."

  - title: Emit the status transition
    description: >
      Only after all prior steps pass, emit the transition using the spec-kitty
      status pipeline. Never manually edit status.events.jsonl.
    examples:
      - "spec-kitty agent tasks transition WP01 for_review"

failure_modes:
  - name: Transitioning on green tests alone
    description: >
      Green tests are necessary but not sufficient. A WP can have all tests passing
      while acceptance criteria are unaddressed or the diff contains unintended scope.
  - name: Advancing status before fixing reviewer feedback
    description: >
      Re-advancing to for_review before every reviewer comment is addressed (or
      explicitly deferred with agreement) produces churn and erodes reviewer trust.

references:
  - name: Test and Typecheck Quality Gate
    type: directive
    id: "030"
  - name: Test-First Development
    type: directive
    id: "034"
  - name: Test Minimisation
    type: tactic
    id: test-minimisation
