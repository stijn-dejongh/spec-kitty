schema_version: "1.0"
id: secure-design-checklist
name: Secure Design Checklist
purpose: >
  Apply the nine foundational secure design principles (Saltzer & Schroeder) at the
  design phase of a new feature or component so that security properties are built in
  rather than retrofitted. Apply before implementation begins, not after.
  Principles: (1) Least Privilege — minimum access for minimum time.
  (2) Fail-Safe Defaults — deny by default, permit explicitly.
  (3) Economy of Mechanism — keep security paths simple and centralized.
  (4) Complete Mediation — check every access every time, no indefinite caching.
  (5) Open Design — security must hold even if the attacker knows the source code.
  (6) Separation of Privilege — no single condition sufficient to grant access.
  (7) Least Common Mechanism — do not share access mechanisms unnecessarily.
  (8) Psychological Acceptability — security must not significantly impede usability.
  (9) Defense in Depth — layer independent barriers; assume each layer can fail.
steps:
  - title: Apply each principle to the design under review
    description: >
      Work through all nine principles. For each, confirm it has been considered and
      document the decision. "N/A" is acceptable if genuinely not applicable — state why.
      A blank entry is never acceptable.
    examples:
      - "Least Privilege: API token scoped to read-only operations on the reporting namespace only."
      - "Economy of Mechanism: N/A — this component has no authentication logic."

  - title: Classify all data flows
    description: >
      Identify every data element the component handles. Classify each as Public,
      Internal, Restricted, or Confidential. Apply encryption requirements based on
      classification: Restricted and Confidential data must be encrypted in transit (TLS);
      Confidential data must be encrypted at rest.
    examples:
      - "User session tokens — Confidential. Encrypted in transit (TLS 1.3), encrypted at rest (AES-256-GCM)."
      - "Public API response schema — Public. No encryption requirement."

  - title: Document encryption decisions
    description: >
      Record cipher suite choices and justify alignment with current standards
      (e.g., AES-256-GCM for symmetric, RSA-2048+ or ECDSA P-256 for asymmetric).
      Prefer an agile crypto adapter pattern so cipher suites can be swapped without
      touching business logic.
    examples:
      - "Symmetric: AES-256-GCM via CryptoAdapter interface. Suite is configurable; default matches BSI TR-02102."

  - title: Determine if a formal threat assessment is warranted
    description: >
      Request a formal threat assessment when the component handles sensitive data
      (payments, PII, credentials), is internet-facing, exposes a public API,
      or implements authentication, authorization, or cryptography.
    examples:
      - "This component exposes a public webhook endpoint — formal threat assessment required before release."

  - title: Record sign-off before implementation begins
    description: >
      Confirm that all nine principles were considered, data classification is complete,
      encryption decisions are documented, and any required threat assessment has been
      requested. No implementation should begin until sign-off is recorded.

failure_modes:
  - "Security as a post-implementation concern — applying this checklist after code is written typically results in costly rework; it is a design-phase artifact, not a code-review artifact."
  - "Blanket N/A without justification — marking principles N/A without stating why produces an unverifiable record; each N/A must carry a brief justification a reviewer can confirm."
  - "Skipping the threat assessment trigger — components handling PII, payments, or public APIs frequently skip this step; a missed formal assessment is a hard gap in the security audit trail."

references:
  - name: Architectural Integrity Standard
    type: directive
    id: DIRECTIVE_001
    when: Security boundaries are architectural boundaries; enforce both during design review
  - name: Black-Box Integration Testing
    type: tactic
    id: black-box-integration-testing
    when: Verify security enforcement at integration boundaries, not only via unit tests
  - name: Code Review (Incremental)
    type: tactic
    id: code-review-incremental
    when: Use the nine-principle checklist as a secondary review lens during code review of security-relevant changes
