schema_version: "1.0"
id: input-validation-fail-fast
name: Input Validation with Fail-Fast Feedback
purpose: Validate input data comprehensively before processing to avoid wasting resources on invalid data. Provide clear, actionable feedback on errors while protecting system internals from exposure.
steps:
  - title: Define validation categories
    description: >
      Classify input checks into: presence (required fields exist), format (type and pattern),
      range (values within bounds), logical consistency (cross-field coherence),
      uniqueness, and referential integrity.
  - title: Prioritize by criticality
    description: >
      Critical: would cause crash, data corruption, or security breach.
      Important: would produce incorrect results or require manual intervention.
      Nice-to-have: improves experience but system handles gracefully.
  - title: Implement fail-fast validation sequence
    description: >
      Order checks from cheapest to most expensive: presence, then format/type,
      then range/constraint, then logical consistency, then uniqueness/referential checks.
      Halt at first failure within the critical tier.
    examples:
      - "Check required fields before parsing dates before querying database for uniqueness."
  - title: Design dual-level error feedback
    description: >
      User-facing: clear indication of what failed plus actionable guidance, no internal details.
      Internal log: exact validation rule, sanitized input value, timestamp, request context.
    examples:
      - "User sees 'Email format invalid — expected user@domain.com'. Log records rule, value, and caller."
  - title: Guard security-sensitive errors
    description: For authentication, authorization, or data access failures, use a generic message with a reference number. Log the detail internally.
    examples:
      - "User sees 'An error occurred. Reference: ABC123.' Log records the full validation failure."
failure_modes:
  - "Overly strict validation: rejecting valid data, frustrating callers."
  - "Exposing internals: detailed error messages reveal system architecture."
  - "Validation drift: rules become outdated as input specifications change."
  - "No batch mode: forcing callers to fix errors one at a time in large datasets."
  - "Silently ignoring errors: logging but never reviewing or acting on failures."
references:
  - name: Python Conventions
    type: styleguide
    id: python-conventions
    when: Implementing guard clause patterns at the code level
  - name: Quality Gate
    type: directive
    id: DIRECTIVE_030
    when: Ensuring validation passes before handoff at quality gates
