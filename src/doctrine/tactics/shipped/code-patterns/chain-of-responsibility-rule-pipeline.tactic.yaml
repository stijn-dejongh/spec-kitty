# Classification: core code patterns
# Topic: chain-of-responsibility / rule-based pipeline. A pipeline of small
# pure functions, each (1) checking applicability, (2) optionally executing
# its change, and (3) returning a result object that is threaded to the next
# function in the chain. Output type varies by flavor (findings list,
# transformed state with actions, weighted score); the per-step contract is
# uniform.
schema_version: "1.0"
id: chain-of-responsibility-rule-pipeline
name: Chain of Responsibility — Rule-Based Pipeline
purpose: >
  Express a complex multi-step rule application as a pipeline of small, pure,
  independently-testable functions instead of as one large branching function.
  Each rule decides on its own applicability, executes its narrow piece of
  work, and returns a result object that the runner threads to the next rule.
  The pattern keeps cognitive complexity per function low, makes the rule set
  readable as a sequence, and lets new rules slot in without re-reading the
  whole pipeline.

  This is the codebase's accepted way of dealing with stacks of related but
  independent rules — validators, classifiers, canonicalizers, scorers, audit
  detectors. The shape recurs in `src/specify_cli/audit/`,
  `src/specify_cli/charter_lint/checks/`, `src/specify_cli/migration/`, and
  `src/doctrine/agent_profiles/repository.py` (DDR-011 scoring). New code that
  composes 4+ independent decisions over the same input should reach for this
  pattern by default.

steps:
  - title: Identify the shared input and the per-rule contract
    description: >
      A rule pipeline applies when you have:

        1. A common input shape (e.g. a status event row, a frontmatter dict,
           a task context).
        2. Three or more decisions that are independent in implementation
           even if their order matters at runtime.
        3. A uniform output shape per decision (a list of findings, a new
           state plus an action log, a partial score).

      Define the per-rule contract before extracting any rule. The contract
      is what makes the pipeline composable. A rule must be a pure function:
      no I/O, no mutation of shared state outside its return value, no
      reaching into globals.
    examples:
      - "Validator contract: `(input, ctx) -> list[Finding]` — each rule returns zero or more findings."
      - "Transformer contract: `(state, ctx) -> StepResult(state', actions, error?)` — each rule returns the next state plus an action log entry, or short-circuits with an error."
      - "Scorer contract: `(candidate, ctx) -> float` weighted at the runner level — each rule contributes a normalized signal value."

  - title: Each rule checks its own applicability
    description: >
      Push the "should I run?" decision into the rule itself. The runner does
      not know which rules apply; it asks each one in order. A rule that
      decides it does not apply returns a no-op result (empty findings list,
      pass-through state, zero score). This keeps the pipeline declarative
      and makes adding/removing rules safe — no central branching to update.
    examples:
      - "An alias-rename rule returns `[]` when no aliased key is present in the row."
      - "A `require-to-lane` rule returns an error result only when `to_lane` is missing; otherwise pass-through."
      - "A framework-signal scorer returns 0.0 when neither the context nor the profile names a framework."

  - title: Each rule executes one narrow change
    description: >
      A rule has one reason to change. If a rule body branches on input shape
      to decide between two different actions, split it. Symptom: the rule's
      name needs an "and" to describe what it does.
    examples:
      - "`_rule_strip_legacy_keys` removes forbidden legacy keys and records `removed_key:<name>` actions. One concern."
      - "`_rule_normalize_lanes` resolves lane aliases and validates the result against `VALID_LANES`. One concern (normalization implies validation)."
      - "BAD: `_rule_strip_and_default_keys` — splits into two rules."

  - title: Each rule returns a result that the runner threads forward
    description: >
      The return type is the pipeline's protocol. The runner is responsible
      for composition: accumulating findings, threading transformed state,
      summing weighted scores. The runner does not contain rule logic, and
      rules do not know about other rules.
    examples:
      - "Validator runner: `findings = list(itertools.chain.from_iterable(rule(input, ctx) for rule in RULES))`"
      - |
        Transformer runner:
            for rule in RULES:
                result = rule(state, ctx)
                if result.error is not None:
                    return Halt(actions=accumulated_actions, error=result.error)
                state = result.state
                accumulated_actions.extend(result.actions)
            return Done(state=state, actions=accumulated_actions)
      - "Scorer runner: weighted sum, `sum(weight * rule(candidate, ctx) for rule, weight in RULES)`"

  - title: Order rules deliberately and document the contract
    description: >
      For validators the order is usually free (commutative under `.extend()`).
      For transformers the order is part of the contract — document it at the
      `_RULES` declaration. For scorers the order is irrelevant but the
      weights are part of the contract.

      Ordering rules:
        1. Early-exit / sanity rules first (e.g. "is this even a status
           event?"). They protect later rules from malformed input.
        2. Renames and normalizations next, so later rules see canonical keys.
        3. Defaults after normalization.
        4. Validation last, so it runs against the fully-canonicalized state.
    examples:
      - "_canonicalize_status_row order: reject-non-status-event → apply-aliases → strip-legacy → stamp-identity → mint-event-id → default-at → default-from-lane → require-to-lane → require-wp-id → normalize-lanes."

  - title: Test each rule in isolation, then the composition end-to-end
    description: >
      The pattern's main payoff is testability. Each rule gets a small
      parametrized test on `(input, expected_result)` pairs — these are
      value-transformer tests, not structure tests, so they comply with
      `function-over-form-testing`. The composition gets a smaller number of
      end-to-end fixture tests on realistic input that exercise rule
      interaction (does rule N see what rule N-1 produced?).

      Characterization tests of the pre-extraction monolith come first when
      refactoring existing code per `tdd-red-green-refactor` — capture today's
      behavior, then extract.
    examples:
      - "tests/migration/test_canonical_rules.py: one `parametrize` per rule, asserting input→output."
      - "tests/migration/test_canonical_pipeline.py: realistic legacy rows from `.kittify/migrations/mission-state/` fixtures, asserts the full canonicalized output and actions log."

failure_modes:
  - "Universal RuleEngine god-class. Resist building one Protocol that covers validators, transformers, and scorers — the three shapes have different return types and different composition semantics. Use the right per-shape typed Protocol where two consumers already exist; do not pre-build a framework for one caller."
  - "Hidden coupling between rules. Two rules that read each other's intermediate state via the input dict instead of the StepResult break the pure-function contract and reintroduce the original tangle. If rule B needs something rule A produced, that something must live on the threaded state."
  - "Order-of-declaration bugs in validator pipelines. Authors assume rules run in declaration order even when the runner uses a set or yields concurrently. Always use an ordered sequence (tuple, list) and assert order in tests if order matters."
  - "Refactor without characterization tests. Migration / sync / charter code runs on real user data. Lifting a function onto the rule pipeline without capturing today's behavior in fixture tests first risks silent regressions."
  - "Forcing the pattern. CLI multiplexers, renderers/formatters, and orchestrators are not rule pipelines — extract sub-methods instead. The pattern's marker is `3+ independent decisions over a common input`, not `function is long`."

applies_to_languages:
  - python
  - java
  - typescript
  - javascript

notes: >
  Three established flavors are in use today; each has the same per-rule
  contract (check applicability, optionally act, return result) but a
  different return type and composition mode. The flavor is determined by
  what the rule produces, not by what it does.

  ── Validator (accumulating) ──
  Per-rule contract: `(input, ctx) -> list[Finding]`. Findings are
  dataclasses carrying a code, severity, artifact path, and detail. Runner
  accumulates with `findings.extend(rule(...))`; order is usually free; no
  short-circuit on first failure (the goal is to surface every issue).
  Examples in tree: `src/specify_cli/audit/detectors.py`,
  `src/specify_cli/audit/classifiers/*`, `src/specify_cli/charter_lint/checks/*`.
  Reuse `MissionFinding` / `LintFinding`; do not introduce a third finding
  type unless it carries genuinely new fields.

  ── Transformer (chained) ──
  Per-rule contract:
  `(state, ctx) -> StepResult(state', actions: tuple[str, ...], error: str | None)`.
  Order matters; runner short-circuits on `error`. Actions log is part of
  the contract — callers consume it to render migration manifests, audit
  trails, or diffs. The motivating example is `_canonicalize_status_row` in
  `src/specify_cli/migration/mission_state.py`; the pattern lifts onto
  `src/specify_cli/migration/canonicalization.py::CanonicalRule` and is
  reused by `rebuild_state.py`. State type should be generic via TypeVar so
  the same Protocol covers status rows, frontmatter dicts, and future
  migration shapes.

  ── Scorer (weighted) ──
  Per-rule contract: `(candidate, ctx) -> float` in `[0.0, 1.0]`. Runner
  performs a weighted sum and applies global adjustments (workload penalty,
  complexity modifier) outside the rule set. The canonical implementation
  is DDR-011 profile matching in
  `src/doctrine/agent_profiles/repository.py::_score_profile`. Defer
  generalization until a second scorer arrives (e.g. mission template
  auto-selection).

  ── Choosing a flavor ──
  - If rules can emit zero, one, or many independent observations of the
    same input → Validator.
  - If rules transform a single state object and the transformation must
    happen in order → Transformer.
  - If rules contribute numeric evidence toward a ranking decision → Scorer.

  When in doubt, lean Validator — it's the lowest-cost shape and the
  easiest to grow into Transformer later if state-passing emerges as a
  need.

references:
  - name: Refactoring Extract First-Order Concept
    type: tactic
    id: refactoring-extract-first-order-concept
    when: Each rule is a first-order concept extracted from a monolithic function; name it explicitly and give it a single responsibility
  - name: Refactoring Guard Clauses Before Polymorphism
    type: tactic
    id: refactoring-guard-clauses-before-polymorphism
    when: Use guard clauses to flatten the source function before extracting per-rule helpers; the flattened form makes rule boundaries visible
  - name: Function Over Form Testing
    type: tactic
    id: function-over-form-testing
    when: Each rule is tested as a value transformer (input → expected output); the composition is tested end-to-end on realistic fixtures
  - name: Test-First Development
    type: directive
    id: DIRECTIVE_034
    when: Characterization tests of the monolith come first; rules are extracted with the tests already green
