schema_version: "1.0"
id: eisenhower-prioritisation
name: Eisenhower Prioritisation
purpose: >
  Assign each pending task an importance and urgency rating so that the most
  valuable work is tackled first and low-value work is explicitly eliminated or
  delegated. Prevents constant busyness from masking a lack of meaningful progress.
steps:
  - title: Collect all pending tasks into one list
    description: >
      Gather every task, request, and obligation currently competing for attention
      into a single view. Do not pre-filter at this stage — hidden tasks are the
      primary source of stress and missed priorities.
  - title: Rate importance
    description: >
      For each task, ask: "Does completing this move me meaningfully toward my
      current goals or commitments?" Answer important or unimportant. Do not
      adopt someone else's importance framing as your own — a task that is urgent
      to another person may not be important to your current goals.
  - title: Rate urgency
    description: >
      For each task, ask: "Is there a real, near-term consequence if this is not
      acted on soon?" Answer urgent or not urgent. Distinguish genuine urgency
      (external deadline, blocking dependency) from manufactured urgency (noise,
      low-stakes interruptions).
  - title: Assign to quadrant and act accordingly
    description: >
      Place each task into one of four quadrants and apply the matching response:
      Important + Urgent — do these now.
      Important + Not Urgent — schedule a specific date; protect these from being
      displaced by urgent-but-unimportant work.
      Not Important + Urgent — delegate or negotiate; do not absorb this work
      personally unless there is no alternative.
      Not Important + Not Urgent — eliminate or defer indefinitely.
    examples:
      - "Production incident blocking a release: Important + Urgent → act now."
      - "Architectural refactor that reduces long-term debt: Important + Not Urgent → block time in next sprint."
      - "Colleague's ad-hoc request for minor report formatting: Not Important + Urgent → delegate."
      - "Conference talk draft for an event two quarters away: Not Important + Not Urgent → park until nearer the deadline."
  - title: Review and re-prioritise regularly
    description: >
      Priorities shift as context evolves. Run the matrix at a regular cadence
      (weekly or per sprint boundary) to catch tasks that have changed quadrant.
      A task that was "not urgent" last month may now be approaching a deadline.
