schema_version: "1.0"
id: test-minimisation
name: Test Minimisation
purpose: Remove redundant tests while preserving full behavioral coverage, keeping the suite fast and easy to maintain.
steps:
  - title: Establish a coverage baseline
    description: >
      Record current line and branch coverage before removing anything. Any removal that
      drops coverage below the baseline must be reconsidered.
    examples:
      - "Run coverage report and save the summary. Never delete tests without a baseline snapshot."

  - title: Distinguish logical duplication from code duplication
    description: >
      Two tests are logically duplicate when they exercise the same decision branch with
      data that produces identical code paths. Two tests that look similar but exercise
      different branches are NOT duplicates — they are independent behavioral contracts.
    examples:
      - "A test for 'empty input' and a test for 'null input' may look similar but exercise
         different null-guard and empty-guard branches. Keep both."
      - "Three tests all feeding 'admin@example.com', 'user@example.com', 'info@example.com' to
         a format validator that only checks for '@' are logically duplicate. Collapse to one
         representative example."

  - title: Identify contract tests that replace spot-checks
    description: >
      When a contract test (equality, round-trip, hash alignment, or serialization property)
      already exhaustively covers a behavior class, individual spot-check tests for that class
      add no information. Disable before deleting.
    examples:
      - "After adding a round-trip symmetry test for a serializer, spot-checks verifying
         individual field survival are redundant. Mark them @Disabled / @Ignore with a comment
         before removing them permanently."

  - title: Disable before delete
    description: >
      Mark candidate tests with @Disabled (JUnit 5) / @Ignore (JUnit 4) / skip.unless /
      pytest.mark.skip (Python) before deleting them. Run CI once to confirm the suite
      remains green with the candidate disabled. Delete only then.
    examples:
      - "@Disabled(\"covered by round-trip contract test — remove after next green CI run\")"

  - title: Protect regression tests unconditionally
    description: >
      Never remove a test that was written to guard against a specific past defect, even if
      it appears logically covered by a contract test. Regression tests are documentation.
    examples:
      - "Add a comment: // regression: gh-#NNN — defect in edge case when X was Y."

  - title: Protect documentation tests
    description: >
      Tests that illustrate how to use an API or demonstrate a non-obvious design decision
      serve as executable documentation. Keep them even if they are logically covered elsewhere.
    examples:
      - "A test named shouldDemonstrateBuilderFluentApi is a usage example, not a coverage vehicle."

  - title: Verify coverage and commit
    description: >
      After removals, rerun the coverage report. Confirm coverage is at or above baseline.
      Commit with a message that names the replaced or collapsed tests.
    examples:
      - "\"test(minimise): collapse 3 redundant email-format spot-checks covered by contract test\""

failure_modes:
  - "Deleting without a baseline — removing tests before measuring coverage leads to silent regressions."
  - "Confusing overlap types — mistaking two tests that look similar but cover different branches for logical duplicates removes genuine behavioral coverage."
  - "Removing regression tests — regression tests prevent re-introduction of past defects; collapsing them into contract tests loses the explicit defect reference."

references:
  - name: Formalized Constraint Testing
    type: tactic
    id: formalized-constraint-testing
    when: Contract tests establish the coverage baseline that makes spot-check removal safe
  - name: Test-First Development
    type: directive
    id: DIRECTIVE_034
    when: Test minimisation applies after a test-first cycle has produced coverage — never use it to avoid writing tests
  - name: Test and Typecheck Quality Gate
    type: directive
    id: DIRECTIVE_030
    when: Coverage must meet the quality gate after removals
