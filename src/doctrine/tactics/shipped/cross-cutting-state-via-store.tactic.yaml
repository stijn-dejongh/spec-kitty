schema_version: "1.0"
id: cross-cutting-state-via-store
name: Cross-Cutting State via Store
purpose: >
  Use a centralized store (Redux, NgRx, Zustand, Pinia) exclusively for state
  that crosses atomic boundaries: auth, theme, locale, feature flags, and domain
  entities consumed by multiple organisms on different pages. Keeps the store
  lean and purposeful.
steps:
  - title: Apply the 2-organism-2-page threshold
    description: >
      State qualifies for the centralized store only if at least two organisms
      on two different pages need to read it. If only one organism uses it,
      it stays organism-local regardless of complexity. If two organisms on
      the same page share it, use page-level coordination instead of the store.
    examples:
      - "currentUser: consumed by HeaderOrganism (all pages) + ProfileOrganism (profile page) -> store."
      - "productFilters: consumed by FilterOrganism + GridOrganism on the same page -> page-level state, not store."
  - title: Separate domain state from UI state
    description: >
      Domain entities fetched from APIs (users, products, orders) may enter the
      store. UI state (which sidebar tab is active, modal open/close, scroll
      position) does not. UI state is inherently local or page-scoped.
  - title: Enforce read/write interfaces
    description: >
      Selectors are the only read interface to the store. Dispatch is the only
      write interface. No component directly accesses store internals. This
      maintains the unidirectional data flow contract and enables time-travel
      debugging.
    examples:
      - "Good: selectCurrentUser(state) returns User | null."
      - "Bad: component reads store.state.auth.currentUser directly."
  - title: Scope store slices to bounded contexts
    description: >
      Organize store slices by domain (auth, catalog, cart), not by UI structure
      (header, sidebar, modal). Domain-aligned slices survive UI redesigns.
      Each slice has its own reducer, actions, and selectors.
  - title: Resist prop-drilling-driven promotion
    description: >
      When tempted to move state to the store just to avoid passing it through
      two component levels, use context (React Context, Angular injection,
      Vue provide/inject) instead. Store promotion is a domain decision,
      not a wiring convenience.
failure_modes:
  - "Prop drilling anxiety: globalizing state to skip two levels of props. Use context or injection."
  - "Store bloat: putting every API response in the store regardless of how many consumers exist."
  - "UI state in store: dispatching actions for modal open/close, sidebar toggle, or scroll position."
  - "Leaky selectors: selectors that expose store structure instead of domain concepts."
