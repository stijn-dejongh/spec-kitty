schema_version: "1.0"
id: refactoring-move-field
name: Refactoring Move Field
purpose: Move a field to the class that actually owns and uses it most, reducing ownership drift and coupling.
references:
  - name: Refactoring Move Method
    type: tactic
    id: refactoring-move-method
    when: Use alongside this tactic when behavior and data ownership have drifted together.
steps:
  - title: Measure field usage and ownership
    description: Identify where the field is read and modified, and decide which class has the clearest ownership semantics.
  - title: Protect field-dependent behavior
    description: Add or verify tests for all behavior that depends on the field.
  - title: Introduce the field at the target owner
    description: Add the field to the target class while keeping temporary delegated access from the old location.
  - title: Migrate accesses incrementally
    description: Update methods and callers to use the target-owned field one step at a time.
  - title: Remove duplicate state
    description: Delete the source field and obsolete access paths once all usages have migrated and tests remain green.
