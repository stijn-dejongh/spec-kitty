schema_version: "1.0"
id: c4-zoom-in-architecture-documentation
name: C4 Zoom-In Architecture Documentation
purpose: >
  Progressively document a system's architecture by starting at the broadest
  abstraction (system context) and zooming in only where additional detail
  adds value. Each level targets a specific audience and answers a specific
  question, preventing the common failure of a single monolithic diagram that
  serves nobody well. Based on Simon Brown's C4 model (c4model.com).
steps:
  - title: Draw the System Context diagram (Level 1)
    description: >
      Show the software system as a single box at the centre. Around it,
      place the people (actors, roles, personas) who use it and the other
      software systems it depends on or that depend on it. Every element
      gets a short description of what it is and what it does. Every
      relationship gets a label describing the interaction, with an arrow
      showing direction. This diagram answers: "What is the system and who
      uses it?"
    examples:
      - "Actor: Human In Charge -- decision authority and workflow owner."
      - "External system: Tracker -- optional persistence/visibility target."
      - "Relationship: Agent Tooling -> Spec Kitty CLI Host [executes prompts and contributes output]."
    references:
      - name: C4 Context Mermaid Template
        type: template
        id: c4-context-mermaid-template
        when: Starting a new system context diagram from scratch.
  - title: Draw the Container diagram (Level 2)
    description: >
      Zoom into the software system box from Level 1. Show the high-level
      technology choices and how responsibilities are distributed across
      separately deployable or runnable units (applications, services,
      databases, file systems, message queues). Each container gets a name,
      technology label, and responsibility description. Relationships show
      protocols or mechanisms. This diagram answers: "What are the major
      technical building blocks and how do they communicate?"
    examples:
      - "Container: CLI Command Surface [Python/Click] -- user and agent entrypoint."
      - "Container: Runtime and Mission Resolver [Python] -- canonical next loop and mission resolution."
      - "Relationship: CLI Command Surface -> Runtime [function call]."
    references:
      - name: C4 Container Mermaid Template
        type: template
        id: c4-container-mermaid-template
        when: Documenting the internal structure of a software system at the deployment-unit level.
  - title: Draw Component diagrams (Level 3) only for key containers
    description: >
      Zoom into one container at a time. Show the logical components
      (modules, classes, or functional groupings) inside that container
      and how they interact. Only create this diagram for containers where
      the internal structure is non-obvious or where boundary decisions
      need explicit communication. This diagram answers: "How is this
      container organised internally?"
    examples:
      - "Component: Next Loop Coordinator -- canonical per-agent loop orchestration."
      - "Component: Constitution Compiler -- produces constitution bundle artifacts."
      - "Avoid creating Level 3 for a container that is a single CRUD adapter with no internal branching."
    references:
      - name: C4 Component Mermaid Template
        type: template
        id: c4-component-mermaid-template
        when: Documenting logical structure inside a container that has non-trivial internal boundaries.
  - title: Use Code-level diagrams (Level 4) only when generated
    description: >
      Level 4 shows UML class diagrams, entity-relationship diagrams, or
      similar code-level detail. These are expensive to maintain by hand
      and should only be produced if they can be generated automatically
      from the codebase (e.g., IDE tooling, Structurizr annotations, or
      documentation generators). If manual authoring is required, the
      maintenance cost almost certainly outweighs the communication value.
    examples:
      - "Auto-generated class diagram from Structurizr annotations in the Domain layer."
      - "Skip Level 4 entirely for a project where the codebase is the canonical source of truth at this granularity."
  - title: Add supporting diagrams where they earn their keep
    description: >
      Beyond the four core levels, C4 defines three supporting diagram
      types. A System Landscape diagram shows multiple systems and their
      interactions (useful for enterprise context). A Dynamic diagram shows
      how elements collaborate at runtime for a specific use case (sequence
      or collaboration style). A Deployment diagram shows how containers
      map to infrastructure nodes. Create these only when a specific
      communication need exists -- do not produce them speculatively.
    examples:
      - "Dynamic diagram: implement-WP flow showing CLI -> Runtime -> Mission Resolver -> Template Resolution -> Agent."
      - "Deployment diagram: production topology showing Fly.io regions, database replicas, and CDN edge nodes."
  - title: Validate every diagram with the notation checklist
    description: >
      Before sharing any C4 diagram, run it through the review checklist.
      Every diagram must have a title, a legend/key, element types and
      descriptions, technology labels (Level 2+), and labelled uni-
      directional relationships. Acronyms must be expanded or defined in
      the legend. The diagram should be understandable by its target
      audience without verbal explanation.
    references:
      - name: Architecture Diagram Review Checklist
        type: checklist
        id: architecture-diagram-review-checklist
        when: Reviewing any C4 diagram before sharing or committing.
failure_modes:
  - "Audience mismatch: showing container-level technology choices to business sponsors who need system context, or showing context-level abstractions to developers who need component boundaries."
  - "Level skip: jumping from Level 1 to Level 3 without establishing the container landscape, leaving reviewers unable to place components in context."
  - "Diagram hoarding: creating all four levels plus all three supporting diagrams up front, most of which go stale before anyone reads them."
  - "Missing notation: diagrams without titles, legends, element descriptions, or relationship labels that require verbal walkthroughs to understand."
  - "Bidirectional arrows: using double-headed arrows that obscure which element initiates communication and which responds."
  - "Technology worship: spending more diagram real estate on technology logos and version numbers than on responsibilities and boundaries."
references:
  - name: Architectural Integrity Standard
    type: directive
    id: DIRECTIVE_001
    when: Ensuring C4 diagrams reflect and enforce documented component boundaries.
  - name: ADR Drafting Workflow
    type: tactic
    id: adr-drafting-workflow
    when: Recording architectural decisions that change container or component boundaries shown in C4 diagrams.
notes: >
  The C4 model is notation-independent. Mermaid, PlantUML, Structurizr DSL,
  draw.io, or whiteboard photos are all valid renderings. The value is in the
  abstraction hierarchy and the discipline of labelling, not in the rendering
  tool. When working in a Spec Kitty project, prefer the Mermaid C4 templates
  in src/doctrine/templates/architecture/ for consistency with existing
  architecture documentation in architecture/2.x/.
