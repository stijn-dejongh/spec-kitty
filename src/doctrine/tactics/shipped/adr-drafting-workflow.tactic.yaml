schema_version: "1.0"
id: adr-drafting-workflow
name: ADR Drafting Workflow
purpose: Systematically draft Architectural Decision Records with trade-off analysis and risk assessment.
steps:
  - title: Validate uniqueness and assign number
    description: Search existing ADRs for overlapping decisions; assign the next sequential number.
    examples:
      - "Search docs/architecture/adrs/ for similar decision titles before creating a new file."
  - title: Decompose context
    description: Write a concise problem statement (1–2 sentences), list drivers forcing the decision now, and note constraints.
    examples:
      - "Context: current ORM causes N+1 queries in all list endpoints; deadline forces decision this sprint."
  - title: Analyse options with a trade-off matrix
    description: List all considered alternatives and score each against key impact areas (performance, maintainability, security, cost).
    examples:
      - "Columns: option name | performance | maintainability | cost | risk. Rows: keep ORM / raw SQL / query builder."
  - title: Draft ADR sections
    description: |
      Write the five canonical sections:
      Context – problem, drivers, constraints.
      Decision – chosen option in ≤120 words.
      Rationale – why this option wins.
      Consequences – positive and negative impacts.
      Alternatives – rejected options with one-sentence rejection rationale each.
  - title: Run premortem risk assessment
    description: Invoke the premortem-risk-identification tactic for high-impact decisions to surface failure modes before committing.
    examples:
      - "Tag decision as 'high-risk' when reversibility is low or blast-radius is broad."
    references:
      - name: Premortem Risk Identification
        type: tactic
        id: premortem-risk-identification
        when: Decision has high impact or limited reversibility.
  - title: Define success metrics
    description: Write measurable acceptance criteria and specify how the decision will be validated post-implementation.
    examples:
      - "P99 latency < 200 ms after migration; validated via load-test suite."
  - title: Cross-link and commit
    description: Add the ADR to the README index, link related ADRs, and reference from affected code or docs.
    examples:
      - "Update docs/architecture/adrs/README.md index table; add inline comment in affected module."
