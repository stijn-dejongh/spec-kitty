schema_version: "1.0"
id: architecture-diagram-review-checklist
name: Architecture Diagram Review Checklist
purpose: >
  Provide a structured quality gate for architecture diagrams before they are
  shared, committed, or included in documentation. Based on the C4 model
  notation guidelines and diagram review checklist (c4model.com), this tactic
  ensures every diagram communicates clearly to its intended audience without
  requiring verbal explanation.
steps:
  - title: Verify the diagram has a title
    description: >
      Every diagram must have a descriptive title that includes the diagram
      type and scope. The title alone should tell the reader what system,
      container, or component is being described and at which C4 level.
    examples:
      - "Good: 'System Context diagram for Spec Kitty CLI Host'"
      - "Bad: 'Architecture' or 'Overview' (too vague to identify scope or level)"
  - title: Check for a legend or key
    description: >
      If the diagram uses shapes, colours, line styles, or any visual
      encoding beyond labelled boxes and arrows, it must include a legend
      explaining the notation. Even with standard C4 shapes, a brief key
      helps readers unfamiliar with the notation.
    examples:
      - "Legend: blue boxes = internal containers, grey boxes = external systems, dashed lines = async messaging."
  - title: Verify every element has a type and description
    description: >
      Each box on the diagram must show what it is (person, software system,
      container, component) and a short description of its responsibility.
      At Level 2 and below, include the technology choice. An unlabelled
      box is a communication failure.
    examples:
      - "Good: 'Runtime and Mission Resolver [Python] -- canonical next loop and mission resolution'"
      - "Bad: 'Runtime' (no technology, no responsibility description)"
  - title: Verify every relationship is labelled and unidirectional
    description: >
      Each line connecting elements must have a label describing the
      interaction (what is sent, what protocol, what purpose). Arrows must
      be unidirectional -- showing who initiates. Bidirectional arrows
      obscure initiative and should be split into two separate labelled
      relationships if both directions are meaningful.
    examples:
      - "Good: 'CLI -> Runtime [dispatches next-step request]'"
      - "Bad: 'CLI <-> Runtime' (who initiates? what flows each way?)"
  - title: Expand or define all acronyms
    description: >
      Any acronym that is not universally understood by the diagram's
      target audience must be expanded on first use or defined in the
      legend. Domain-specific abbreviations that are obvious to the
      development team may still confuse operations, security reviewers,
      or business stakeholders.
    examples:
      - "ACL = Anti-Corruption Layer; OHS = Open Host Service; ADR = Architecture Decision Record."
  - title: Assess audience appropriateness
    description: >
      Confirm that the level of detail matches the intended audience. A
      context diagram for business sponsors should not contain technology
      labels. A component diagram for developers should not omit internal
      boundaries for the sake of simplicity. If the diagram tries to serve
      two audiences, it probably serves neither.
    examples:
      - "Level 1 for project sponsors: no technology labels, focus on actors and boundaries."
      - "Level 3 for developers: include module names, key interfaces, and coupling notes."
  - title: Check that the diagram is self-explanatory
    description: >
      Cover the diagram title and show the diagram to someone unfamiliar
      with the system. Ask them to describe what they see. If they cannot
      identify the system boundaries, major actors, or the primary data
      flow without additional explanation, the diagram needs revision.
    examples:
      - "Test: can a new team member identify the three external integrations from the context diagram alone?"
failure_modes:
  - "Decoration over communication: spending effort on visual polish (gradients, icons, colour schemes) while neglecting labels and descriptions."
  - "Orphan elements: boxes on the diagram with no relationships, suggesting either a missing connection or a redundant element."
  - "Stale diagrams: diagrams that were accurate at creation but have not been updated to reflect architectural changes, actively misleading readers."
  - "Implicit audience: no stated target audience, leading to diagrams that are too detailed for some readers and too abstract for others."
  - "Screenshot architecture: using screenshots of running systems instead of intentional diagrams, mixing UI detail with architectural abstraction."
references:
  - name: C4 Zoom-In Architecture Documentation
    type: tactic
    id: c4-zoom-in-architecture-documentation
    when: Producing the diagrams that this checklist reviews.
  - name: Architectural Integrity Standard
    type: directive
    id: DIRECTIVE_001
    when: Verifying that diagram boundaries align with documented architectural decisions.
  - name: Mermaid Diagramming Toolguide
    type: toolguide
    id: mermaid-diagramming
    when: Rendering reviewed diagrams in Mermaid syntax.
  - name: PlantUML Diagramming Toolguide
    type: toolguide
    id: plantuml-diagramming
    when: Rendering reviewed diagrams in PlantUML syntax.
notes: >
  This checklist applies to any architecture diagram, not only C4 diagrams.
  The principles -- titles, legends, labelled elements, labelled relationships,
  audience targeting -- are universal. For C4 specifically, apply the checklist
  at each level independently: a Context diagram and a Component diagram have
  different expectations for technology detail but the same expectations for
  labelling and clarity.
