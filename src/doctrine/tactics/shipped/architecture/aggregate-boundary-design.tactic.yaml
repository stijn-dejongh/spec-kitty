schema_version: "1.0"
id: aggregate-boundary-design
name: Aggregate Boundary Design
purpose: >
  Define transactional consistency boundaries within a bounded context by
  identifying aggregates and their roots. An aggregate is a cluster of
  domain objects that are treated as a single unit for data changes; the
  aggregate root is the sole entry point for all modifications. Correct
  aggregate boundaries enforce invariants without creating unnecessary
  coupling or oversized transaction scopes. Based on Eric Evans's tactical
  DDD patterns and Vaughn Vernon's aggregate design rules.
steps:
  - title: Identify the invariants
    description: >
      List the business rules that must hold true at all times within the
      bounded context. An invariant is a constraint that the system must
      never violate, even transiently, during a single operation.
      Invariants define what must be consistent within a single
      transaction.
    examples:
      - "Order invariant: total must equal sum of line item prices after discounts."
      - "Account invariant: balance must never go below zero for non-credit accounts."
  - title: Group objects by invariant scope
    description: >
      Cluster the domain objects (entities and value objects) that
      participate in enforcing each invariant. Objects that must be
      modified together to maintain an invariant belong in the same
      aggregate. Objects that can be eventually consistent belong in
      separate aggregates.
    examples:
      - "Order + OrderLines: same aggregate (total invariant spans both)."
      - "Order and ShippingLabel: separate aggregates (label can lag behind order changes)."
  - title: Choose the aggregate root
    description: >
      For each aggregate, select one entity as the root. The root is the
      only object that external code may hold a reference to. All access
      to internal objects passes through the root. The root enforces all
      invariants before committing state changes.
    examples:
      - "Order is the root; OrderLine is internal. External code calls order.add_line(), never modifies OrderLine directly."
failure_modes:
  - "God aggregate: putting everything in one aggregate to avoid eventual consistency, creating massive contention."
  - "Leaking internals: allowing external code to directly modify entities inside the aggregate, bypassing the root."
  - "Invariant blindness: splitting objects that share an invariant into separate aggregates, allowing inconsistent state."
  - "Identity confusion: using database surrogate keys as aggregate identity instead of meaningful domain identifiers."
references:
  - name: Entity vs Value Object Classification
    type: tactic
    id: entity-value-object-classification
    when: Classifying objects inside the aggregate as entities or value objects.
  - name: Domain Event Capture
    type: tactic
    id: domain-event-capture
    when: Coordinating eventual consistency between aggregates via domain events.
  - name: Bounded Context Identification
    type: tactic
    id: bounded-context-identification
    when: Aggregates exist within a bounded context; identify the context first.
  - name: Aggregate Design Rules
    type: styleguide
    id: aggregate-design-rules
    when: Applying ongoing design constraints to aggregate structure (identity references, size, eventual consistency).
notes: >
  Vaughn Vernon's four rules of aggregate design: (1) Protect business
  invariants inside aggregate boundaries. (2) Design small aggregates.
  (3) Reference other aggregates by identity only. (4) Update other
  aggregates using eventual consistency via domain events. These rules
  are the primary heuristic for boundary placement. Rules 2-4 are
  codified in the aggregate-design-rules styleguide.
