schema_version: "1.0"
id: anti-corruption-layer
name: Anti-Corruption Layer
purpose: >
  Isolate your domain model from external or legacy systems by placing a
  translation layer at the boundary. The ACL translates between the foreign
  system's semantics and your own ubiquitous language, preventing external
  models from leaking into and corrupting your domain design. Originally
  described by Eric Evans in Domain-Driven Design; also known as Gateway
  when the emphasis is on translation rather than defense.
steps:
  - title: Identify the corrupting boundary
    description: >
      Find where your code interacts with an external system whose model,
      naming, or data shapes do not match your domain. Signs include: field
      mappings scattered across multiple call sites, foreign naming conventions
      leaking into domain code, or adapter logic mixed into business methods.
    examples:
      - "Legacy billing API returns 'cust_acct_nbr' and 'amt_due' — domain uses customer_id and outstanding_balance."
      - "External shipping service uses a flat address string; domain models Address as a value object with street, city, postal_code."
  - title: Define your domain-side interface
    description: >
      Design the interface your domain code wants to call, using your own
      ubiquitous language and types. This is the contract your domain depends
      on — not the external system's API. Think of it as a port in hexagonal
      architecture terms.
    examples:
      - "class ShippingGateway(Protocol): def estimate_delivery(self, address: Address, weight: Weight) -> DeliveryEstimate: ..."
  - title: Implement the translation layer
    description: >
      Build the ACL as a concrete class that implements your domain interface
      and internally calls the external system. All field mapping, type
      conversion, error translation, and protocol handling lives here.
      Separate connection mechanics (HTTP, auth, retries) from semantic
      translation if the external system is remote.
    examples:
      - "class LegacyShippingACL(ShippingGateway): translates Address -> flat string, Weight -> grams integer, response -> DeliveryEstimate."
  - title: Route all traffic through the ACL
    description: >
      Replace every direct call to the external system with a call through
      the domain interface. No domain code should import external types or
      reference foreign field names. The ACL is the single chokepoint.
  - title: Test both sides of the boundary
    description: >
      Write unit tests against the domain interface using stubs (verifies
      domain logic). Write integration tests against the ACL with the real
      external system or a contract test (verifies translation correctness).
      When the external API changes, only the ACL and its integration tests
      need to change.
  - title: Plan for decommissioning or permanence
    description: >
      If the ACL exists for a migration (strangler fig), track when all
      callers have migrated and schedule removal. If the ACL protects
      against a permanently foreign system, treat it as a first-class
      architectural component with its own monitoring and ownership.
failure_modes:
  - "Logic creep: placing business rules in the ACL instead of limiting it to translation."
  - "Partial isolation: some call sites go through the ACL, others still call the external API directly."
  - "Over-translation: wrapping a well-understood external vocabulary that your team already speaks fluently."
  - "Permanent temporary: building the ACL as a migration aid but never decommissioning it after migration completes."
  - "Scaling bottleneck: the ACL becomes a single point of failure without resilience patterns (circuit breaker, retry)."
  - "Invisible layer: no monitoring or alerting on the ACL, making translation failures hard to diagnose."
references:
  - name: Bounded Context Identification
    type: tactic
    id: bounded-context-identification
    when: The ACL sits at the boundary between bounded contexts — identify the contexts first.
  - name: "Refactoring: Strangler Fig"
    type: tactic
    id: refactoring-strangler-fig
    when: Using ACL as part of an incremental migration strategy.
