schema_version: "1.0"
id: compositional-stream-boundaries
name: Compositional Stream Boundaries
purpose: >
  Define where reactive streams (RxJS, observables, signals) begin and end
  within the atomic hierarchy. Prevents stream leak across component boundaries
  and ensures subscription ownership is explicit.
steps:
  - title: Establish the stream origin floor
    description: >
      Streams originate at the organism level or higher. Atoms and molecules
      never create observables, subscribe to subjects, or import stream operators.
      If a molecule needs async data, its parent organism provides it as a
      resolved value via props or inputs.
    examples:
      - "SearchOrganism creates debounceTime+switchMap stream; SearchInputMolecule receives results as plain array prop."
  - title: Expose resolved data downward
    description: >
      Organisms expose data to their child molecules and atoms via plain
      properties, not raw observables. The organism subscribes internally and
      passes resolved snapshots. This keeps molecules testable without
      RxJS test utilities.
    examples:
      - "ProductGridOrganism subscribes to products$, passes Product[] to ProductCardMolecule via input binding."
      - "Anti-pattern: passing Observable<Product[]> to ProductCardMolecule and forcing it to use async pipe."
  - title: Compose at the page level
    description: >
      Page-level components combine organism-level data streams using
      composition operators (combineLatest, merge, forkJoin). Each organism
      may expose a public observable for inter-organism coordination, but
      only the page subscribes to the combined result.
    examples:
      - "CheckoutPage combines cart$, user$, shipping$ via combineLatest to render the full checkout view."
  - title: Enforce subscription ownership
    description: >
      Every subscription is owned by the component that created it. When that
      component unmounts (ngOnDestroy, useEffect cleanup, onUnmounted), it
      unsubscribes. No orphan subscriptions. Use takeUntil, async pipe, or
      framework-native cleanup mechanisms.
  - title: Audit stream crossing violations
    description: >
      During code review, flag any observable or Subject imported below the
      organism boundary. Flag any subscription created in a molecule or atom.
      Flag any component that subscribes but has no cleanup path.
failure_modes:
  - "Observable soup: passing raw observables down to atoms, forcing every leaf component to manage subscriptions."
  - "Orphan subscriptions: subscribing in a component without cleanup, causing memory leaks on unmount."
  - "Stream sprawl: every molecule creating its own debounce stream instead of letting the organism coordinate."
references:
  - name: Atomic State Ownership
    type: tactic
    id: atomic-state-ownership
    when: Determining which atomic level owns state before deciding stream scope.
