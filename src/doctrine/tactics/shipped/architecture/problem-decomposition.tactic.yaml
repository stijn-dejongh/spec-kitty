schema_version: "1.0"
id: problem-decomposition
name: Problem Decomposition
purpose: >
  Break a complex, ambiguous problem into a set of smaller, independently
  tractable sub-problems before selecting a solution approach. Decomposition
  prevents premature convergence on a solution that addresses only part of
  the problem, exposes hidden scope, and creates a structured basis for
  work-package planning and parallel progress.
references:
  - name: Lightweight Prestudy Template
    type: template
    id: lightweight-prestudy-template
    when: When recording the decomposition as part of a prestudy or design document.
  - name: Eisenhower Prioritisation
    type: tactic
    id: eisenhower-prioritisation
    when: When deciding which sub-problems must be solved now versus deferred.
  - name: Stakeholder Alignment
    type: tactic
    id: stakeholder-alignment
    when: >
      When enumeration of contributing factors reveals that stakeholder
      concerns or organisational dynamics are a significant source of
      the problem. Run stakeholder alignment before clustering so that
      social and political factors are visible in the decomposition.
  - name: Review Intent and Risk First
    type: tactic
    id: review-intent-and-risk-first
    when: >
      When validating the decomposition — confirm that the stated intent
      of the initiative is faithfully reflected in the sub-problem set,
      and that the highest-risk sub-problems are explicitly identified
      before prioritisation begins.
steps:
  - title: State the problem in one sentence
    description: >
      Write a single sentence that describes the core problem without
      proposing a solution. If you cannot write it in one sentence,
      the problem is either too large or still unclear. Resolve ambiguity
      before decomposing.
    examples:
      - "Good: 'Our deployment pipeline introduces a 45-minute delay that prevents same-day hotfixes.'"
      - "Too vague: 'Deployment is slow and we need to fix it.'"
      - "Solution-first: 'We need to migrate to GitHub Actions.' (skip this step.)"
  - title: Enumerate contributing factors
    description: >
      List all the factors that contribute to the problem. Do not cluster
      or categorise yet — exhaustive enumeration first. Include technical,
      organisational, process, and knowledge factors.
  - title: Cluster into independent sub-problems
    description: >
      Group the contributing factors into clusters that share a common root
      cause or resolution path. Each cluster becomes a candidate sub-problem.
      Test independence: could each sub-problem be solved without solving the
      others? If not, identify the dependency and mark it explicitly.
  - title: Assign priority and ownership
    description: >
      For each sub-problem, determine: is this a must-solve (blocking the goal),
      should-solve (significant but not blocking), or nice-to-have (improves
      quality but optional for the core goal)? Assign a tentative owner.
      Use Eisenhower prioritisation when capacity is constrained.
  - title: Validate completeness
    description: >
      Confirm that solving all must-solve sub-problems achieves the stated
      goal. If gaps remain, add the missing sub-problem rather than expanding
      an existing one. Overly large sub-problems are a sign of incomplete
      decomposition.
  - title: Record and link to work planning
    description: >
      Document the decomposition in the prestudy or design document.
      Each sub-problem should map to one or more work packages in the
      subsequent planning phase. The decomposition is the bridge between
      problem understanding and delivery structure.
