schema_version: "1.0"
id: reference-architectural-patterns
name: Reference Architectural Patterns Selection
purpose: >
  Identify and apply established reference architecture patterns to a given problem
  context. Use when designing a new system or major subsystem, when an existing
  architecture is struggling with scaling, coupling, or maintainability, or when
  evaluating strategic options before committing to an implementation approach.
steps:
  - title: Characterize the problem domain
    description: >
      Describe the system's primary quality attribute requirements (scalability,
      consistency, latency, availability, deployability, modifiability) and the
      primary domain type (data-intensive, event-driven, user-facing, integration
      hub, batch processing). Be concrete: "needs 10k concurrent users" rather
      than "must scale".
  - title: Enumerate candidate patterns
    description: >
      List reference patterns relevant to the characterized domain. Common patterns
      to consider: Layered/N-Tier (predictable, testable, well-understood),
      Hexagonal/Ports-and-Adapters (domain isolation, testability), Event-Driven
      (decoupling, async), CQRS (separate read/write paths for high-traffic reads),
      Microservices (independent deployability at team scale), Modular Monolith
      (monolith with enforced module boundaries — often the right starting point),
      Pipe-and-Filter (data transformation pipelines), Space-Based (extreme
      horizontal scale).
  - title: Score each candidate against constraints
    description: >
      For each candidate pattern, score along three dimensions: coupling (how much
      distributed coupling does this pattern introduce?), scalability (does it
      address the characterized scale requirements?), operational complexity (what
      does this pattern demand from deployment, monitoring, and failure recovery?).
      Use H/M/L for each dimension. Eliminate patterns that score H on a constraint
      the system cannot afford.
  - title: Select and document rationale
    description: >
      Choose the pattern (or combination) with the best fit. Write an ADR capturing:
      the selected pattern, the constraints that drove the selection, the alternatives
      considered, and the trade-offs accepted. The ADR is the exit artifact of
      this tactic.
failure_modes:
  - "Pattern cargo-culting — adopting microservices or event-driven because they are fashionable, not because the constraints demand them."
  - "Skipping the scoring step — 'we'll use hexagonal' without checking whether the team can actually build and operate it."
  - "Missing the operational dimension — patterns that look good on paper (microservices) often have severe operational complexity costs."
  - "Starting with a complex pattern when a Modular Monolith would suffice — YAGNI applies to architecture."
notes: >
  The Modular Monolith is frequently underrated: it provides enforced module
  boundaries without distributed-system operational complexity. Prefer it as
  the default for new systems of moderate scale, and evolve toward microservices
  only when team or scale constraints make autonomous deployability necessary.
references:
  - name: Architecture Diagram Review Checklist
    type: tactic
    id: architecture-diagram-review-checklist
    when: After selecting a pattern, use this tactic to validate the design diagram
  - name: ADR Drafting Workflow
    type: tactic
    id: adr-drafting-workflow
    when: Document the selected pattern and its rationale in an ADR
  - name: AMMERSE Impact Analysis
    type: tactic
    id: ammerse-impact-analysis
    when: Use for high-stakes decisions to quantify trade-offs across the seven AMMERSE dimensions
