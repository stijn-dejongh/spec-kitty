schema_version: "1.0"
id: domain-event-capture
name: Domain Event Capture
purpose: >
  Funnel significant state changes through immutable Domain Event objects that
  are persisted before processing. Separates input recording from business
  reaction, enabling auditability, replay, and decoupled system evolution.
  Based on Martin Fowler's Domain Event pattern and Eric Evans's DDD events.
steps:
  - title: Identify the significant occurrence
    description: >
      Determine which state changes in the domain are worth recording. A domain
      event represents something that happened that domain experts care about.
      Not every setter call is an event — focus on business-meaningful transitions.
    examples:
      - "OrderPlaced, PaymentReceived, ShipmentDispatched — not SetOrderStatus."
  - title: Model the event as an immutable value object
    description: >
      Create an event class with source data fields (what happened, when, who
      triggered it) and no mutable state. Include two timestamps if relevant:
      when the event occurred in the real world and when the system recorded it.
      Make all fields read-only.
    examples:
      - "OrderPlaced(order_id, customer_id, items, occurred_at, recorded_at)"
  - title: Persist before processing
    description: >
      Append the event to a durable log (event store, append-only table, JSONL
      file) before triggering any business reaction. This guarantees the event
      survives even if processing fails. The log is the source of truth.
  - title: Separate recording from reaction
    description: >
      Event handlers (subscribers, processors, projections) read from the log
      and execute business logic. They do not produce the events — they consume
      them. This separation allows adding new reactions without modifying the
      recording path.
    examples:
      - "OrderPlaced -> handler 1: send confirmation email. handler 2: update inventory projection."
  - title: Design for replay
    description: >
      Because events are immutable and persisted, the entire system state can
      be reconstructed by replaying the log. Ensure handlers are idempotent
      or use event IDs to deduplicate. This enables debugging, migration, and
      disaster recovery.
failure_modes:
  - "Event explosion: creating events for every field change instead of meaningful domain transitions."
  - "Mutable events: allowing event fields to be modified after creation, breaking the audit trail."
  - "Processing before persisting: executing side effects before the event is durably stored, risking data loss."
  - "Coupled handlers: handlers that call each other instead of independently consuming from the log."
  - "Missing timestamps: not distinguishing between occurrence time and recording time in delayed-input scenarios."
