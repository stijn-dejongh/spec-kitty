schema_version: "1.0"
id: traceable-decisions
name: Traceable Decisions
purpose: >
  Ensure that material architectural and governance decisions are captured with
  enough context that future contributors can understand why a path was chosen
  and what constraints must remain true. Apply when: establishing a new pattern,
  choosing between alternative implementations with meaningful trade-offs, making a
  trade-off that accepts known costs or risks, or beginning any task with architectural
  implications.
steps:
  - title: Load relevant existing decisions before proposing a new approach
    description: >
      Before proposing an approach, identify 2-3 ADRs or decision records most
      relevant to the task. Check for conflicts. If the task conflicts with an
      established decision, surface the conflict explicitly before proceeding.
    examples:
      - "Proposing file-based coordination → load the ADR that established file-based coordination to verify alignment."
      - "Adding auth middleware → load the ADR that defined the authentication boundary."

  - title: Record decisions with rationale at the point of making them
    description: >
      When a significant choice is made during implementation, record it immediately.
      The decision record must include: what was decided, alternatives considered and why
      they were rejected, consequences accepted, and the date. Future contributors must
      be able to read the record and understand why — not just what.
    examples:
      - |
        <!-- DECISION: ADR-001 — locality of change principle applied here -->
      - |
        <!-- DECISION-MARKER: ADR-XXX -->
        Decision: Retry up to 3 times before escalating to error state.
        Rationale: Transient filesystem issues should not fail coordination.
        Alternatives: No retry (too brittle), infinite retry (masks real failures).
        Consequences: 3-5 second delay in error detection. Accepted.
        Date: 2026-04-21
        <!-- END-DECISION-MARKER -->

  - title: Link implementation to decision records
    description: >
      Reference the relevant ADR or decision record in commit messages, code comments,
      and documentation headers. The link makes decisions discoverable from the artifact
      they govern, not only from the decision index.
    examples:
      - "Commit message: 'feat: add retry logic — per ADR-012 resilience pattern'"
      - "Code comment: '# See ADR-001 for why this uses file-based state'"

  - title: Create a formal ADR when decision markers converge
    description: >
      When 3 or more inline decision markers address the same theme, elevate them to a
      formal ADR entry. Inline markers are working notes; ADRs are authoritative records.
      This threshold prevents ADR sprawl while ensuring decisions do not remain informal.

  - title: Update superseded decisions explicitly
    description: >
      When a new decision supersedes an old one, update the old ADR's status to
      "Superseded by ADR-NNN" and reference the new decision from the old record.
      Silent obsolescence — leaving old decisions in "Accepted" status when they no
      longer apply — misleads future contributors.

failure_modes:
  - "Post-hoc rationalisation — documenting a decision after implementation produces a justification for what was built rather than an honest account of trade-offs; record decisions at the point of making them."
  - "ADR sprawl — creating a formal ADR for every minor implementation choice floods the decision log with noise; use inline markers for minor choices and elevate to ADR only when the decision sets a lasting pattern."
  - "Orphaned decision markers — inline markers referencing non-existent ADR numbers or that are never promoted create incomplete trails; review and promote markers periodically."

references:
  - name: Decision Documentation Requirement
    type: directive
    id: DIRECTIVE_003
    when: This tactic is the practical implementation protocol for Directive 003; use the directive for policy, this tactic for execution
  - name: Architectural Integrity Standard
    type: directive
    id: DIRECTIVE_001
    when: Decisions that affect architectural integrity must be traced before implementation begins
  - name: Living Documentation Sync
    type: directive
    id: DIRECTIVE_037
    when: Decision records are living documentation; apply the sync discipline when updating superseded decisions
