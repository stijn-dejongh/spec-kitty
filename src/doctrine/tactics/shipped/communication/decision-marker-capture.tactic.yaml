schema_version: "1.0"
id: decision-marker-capture
name: Decision Marker Capture
purpose: >-
  Ensure architectural decisions made during implementation are captured
  as traceable records with rationale, alternatives, and consequences,
  so future maintainers can understand why a choice was made.
steps:
  - title: Pre-task decision check
    description: >-
      Before proposing architectural changes, load the ADR index and
      identify 2–3 ADRs most relevant to the task scope. Flag conflicts
      with established decisions before proceeding.
    examples:
      - "Load architecture/adrs/README.md, identify ADR-007 (event store) as relevant, confirm no conflict with proposed change."

  - title: Add decision markers during implementation
    description: >-
      When making architectural choices, add a decision marker in the
      affected artifact. Include the decision statement, rationale,
      alternatives considered, and consequences accepted. Use full
      format for significant decisions, minimal format for references.
    examples:
      - "DECISION-MARKER: Decision to use SQLite for local event store. Rationale: offline-first operation. Rejected: PostgreSQL (requires daemon), flat files (no query capability)."

  - title: Include rationale in commit messages
    description: >-
      For commits with architectural changes, include a decision line,
      ADR reference, and one-line rationale in the commit body so the
      decision context is preserved in version history.
    examples:
      - "feat: add decision rationale to task schema\n\nDecision: Extend task YAML with decision_rationale block\nADR: ADR-018\nRationale: Enable agents to document decision context during execution"

  - title: Document decision rationale in work output
    description: >-
      Include a decision_rationale section in task results and work logs
      for tasks involving architectural decisions. Reference the governing
      ADR, justification, alternatives considered, and reason for choice.

  - title: Validate traceability before completion
    description: >-
      Before completing the task, verify that all new artifacts reference
      governing ADRs, decision markers follow standard format, ADR
      references are valid, and cross-references between decisions are
      linked.
    examples:
      - "Pre-completion check: 2 markers added, both reference valid ADRs, cross-references resolve, work log documents decision process."
