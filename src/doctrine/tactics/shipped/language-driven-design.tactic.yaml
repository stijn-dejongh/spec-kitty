schema_version: "1.0"
id: language-driven-design
name: Language-Driven Design
purpose: >
  Treat language drift as an architectural signal. When terminology becomes
  inconsistent or ambiguous across code, docs, and conversation, it predicts
  deeper structural problems. Reviewers use linguistic checks to catch
  architectural issues before they manifest as bugs or coupling.
steps:
  - title: Detect linguistic conflicts in the change
    description: >
      Scan the diff for terminology that conflicts with the project glossary
      or uses the same term with different meanings across modules.
    examples:
      - "The PR introduces 'task' in the merge module but the glossary uses 'work package' for the same concept."
  - title: Classify the conflict type
    description: >
      Same term, multiple meanings: hidden bounded context boundary.
      Different terms, same concept: fragmented understanding, duplicated logic.
      Vague or generic terminology: leaky abstractions (Manager, Handler, Processor).
      Missing domain vocabulary: business rules hidden behind technical jargon.
    examples:
      - "'Config' used for both runtime settings and mission templates — signals a context boundary."
  - title: Assess architectural impact
    description: >
      Ask whether the linguistic conflict signals accidental coupling, a missing
      abstraction, or a bounded context boundary that should be explicit. Not
      every naming inconsistency is architectural — focus on conflicts that cross
      module or ownership boundaries.
  - title: Recommend resolution
    description: >
      For same-term conflicts: rename to disambiguate, or introduce a translation
      layer at the boundary. For different-term conflicts: converge on the
      canonical glossary term. For vague terms: replace with domain-specific
      vocabulary that reveals intent.
    examples:
      - "Rename MissionConfig to MissionTemplate to match the glossary and distinguish from RuntimeConfig."
  - title: Update the glossary
    description: >
      If the review surfaces a new term, a renamed term, or a deprecated term,
      propose a glossary update alongside the code review feedback.
failure_modes:
  - "Linguistic policing: enforcing naming purity without considering context autonomy."
  - "False positives: flagging legitimate domain-specific usage as a conflict."
  - "Ignoring the signal: treating naming as 'just style' when it reveals a structural problem."
  - "Glossary as power tool: weaponizing terminology standards in code review."
