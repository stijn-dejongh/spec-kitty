schema_version: "1.0"
id: traceable-decisions
name: Traceable Decisions
purpose: >
  Ensure that material architectural and governance decisions are captured with
  enough context that future contributors can understand why a path was chosen
  and what constraints must remain true. Decisions without documented rationale
  become tribal knowledge that is lost when contributors move on.

apply_when:
  - Establishing a new pattern or convention in the codebase
  - Choosing between alternative implementations with meaningful trade-offs
  - Making a trade-off that accepts known costs or risks
  - Implementing any feature that will influence future development directions
  - Beginning any task with architectural implications

steps:
  - title: Load relevant existing decisions before proposing a new approach
    description: >
      Before proposing an approach, identify 2-3 ADRs or decision records most
      relevant to the task. Check for conflicts. If the task conflicts with an
      established decision, surface the conflict explicitly before proceeding.
    examples:
      - "Proposing a file-based coordination approach → load the ADR that established file-based coordination to verify alignment."
      - "Adding an auth middleware → load the ADR that defined the authentication boundary."

  - title: Record decisions with rationale at the point of making them
    description: >
      When a significant choice is made during implementation, record it immediately —
      not as a follow-up task. The decision record should include: what was decided,
      alternatives considered and why they were rejected, consequences accepted, and
      the date. Future contributors should be able to read the record and understand
      why — not just what.
    examples:
      - |
        <!-- DECISION: ADR-001 — locality of change principle applied here -->
        # Minimal-format inline marker for referencing an existing decision

      - |
        <!-- DECISION-MARKER: ADR-XXX -->
        Decision: Retry up to 3 times before escalating to error state.
        Rationale: Transient filesystem issues should not fail coordination.
        Alternatives: No retry (too brittle), infinite retry (masks real failures).
        Consequences: 3–5 second delay in error detection. Accepted.
        Date: 2026-04-21
        <!-- END-DECISION-MARKER -->

  - title: Link implementation to decision records
    description: >
      Reference the relevant ADR or decision record in commit messages, code comments,
      and documentation headers. The link makes decisions discoverable from the
      artifact they govern, not only from the decision index.
    examples:
      - "Commit message: 'feat: add retry logic — per ADR-012 resilience pattern'"
      - "Code comment: '# See ADR-001 for why this uses file-based state'"
      - "Doc header: 'Governed by: ADR-003 — Decision Documentation'"

  - title: Create a formal ADR when multiple decision markers converge
    description: >
      When 3 or more inline decision markers address the same theme, elevate them
      to a formal ADR entry. Inline markers are working notes; ADRs are authoritative
      records. The threshold prevents ADR sprawl while ensuring decisions do not
      remain informal indefinitely.

  - title: Update superseded decisions explicitly
    description: >
      When a new decision supersedes an old one, update the old ADR's status to
      "Superseded by ADR-NNN" and reference the new decision from the old record.
      Silent obsolescence — leaving old decisions in "Accepted" status when they
      no longer apply — misleads future contributors.

exit_criteria:
  - All new architectural choices have attributable written records
  - Commit messages for architectural changes reference relevant decisions
  - New artifacts reference governing decisions in headers or frontmatter
  - Superseded decisions are explicitly marked

failure_modes:
  - name: Post-hoc rationalisation
    description: >
      Documenting the decision after implementation is complete often produces a
      justification for what was built rather than an honest account of trade-offs.
      Record decisions at the point of making them.
  - name: ADR sprawl
    description: >
      Creating a formal ADR for every minor implementation choice floods the decision
      log with noise, making important decisions hard to find. Use inline markers for
      minor choices; elevate to ADR only when the decision sets a lasting pattern or
      trade-off.
  - name: Orphaned decision markers
    description: >
      Inline decision markers that reference non-existent ADR numbers, or that never
      get elevated to formal records, create incomplete trails. Review and promote
      markers periodically.

references:
  - name: Decision Documentation Requirement
    type: directive
    id: "003"
  - name: Architectural Integrity Standard
    type: directive
    id: "001"
  - name: Living Documentation Sync
    type: directive
    id: "037"
