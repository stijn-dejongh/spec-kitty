schema_version: "1.0"
id: stakeholder-alignment
name: Stakeholder Alignment
purpose: >
  Identify everyone with a meaningful stake in a decision or initiative,
  surface their primary concerns and success criteria, and expose tensions
  between groups early — before design choices embed assumptions that
  conflict with stakeholder reality. Unaddressed stakeholder conflict is
  the most common source of technically correct but organisationally rejected solutions.
references:
  - name: Stakeholder Persona Template
    type: template
    id: stakeholder-persona-template
    when: When producing detailed stakeholder profiles for complex or long-running initiatives.
  - name: System Context Canvas Template
    type: template
    id: system-context-canvas-template
    when: When recording stakeholder findings as part of a full situational assessment.
steps:
  - title: Enumerate potential stakeholders
    description: >
      List every group or individual who will be affected by, must approve,
      or must live with the outcome of this decision. Cast the net wide:
      include builders, operators, users, auditors, adjacent teams, and
      business sponsors. Missing a stakeholder group at this stage is
      significantly more expensive than including one that turns out to be peripheral.
    examples:
      - "For a new API contract: the consuming teams, the API owners, the security review board, the on-call team."
      - "For a schema migration: the application team, the DBA guild, the reporting team, the compliance officer."
  - title: Identify primary concern and success criteria per group
    description: >
      For each stakeholder group, identify: what they care about most
      (their primary concern), and what a successful outcome looks like
      from their perspective. Use their language, not yours. A generic
      "wants the system to be reliable" is not sufficient; surface the
      specific, measurable form that reliability takes for that group.
  - title: Surface tensions and conflicts
    description: >
      Look for groups whose success criteria are in direct conflict.
      Name each tension explicitly; do not paper over it. Unacknowledged
      tensions surface during implementation or post-launch as escalations.
      A named conflict can be negotiated; a hidden one cannot.
    examples:
      - "Security team requires full audit logging; performance team has strict latency SLAs — tension: logging overhead."
      - "Product wants rapid iteration; compliance requires change-freeze windows — tension: release cadence."
  - title: Validate with at least one representative per group
    description: >
      Before proceeding to design, confirm the captured concerns and success
      criteria with at least one representative from each critical stakeholder
      group. Corrections at this stage are free; corrections after
      implementation are not.
  - title: Record findings in the context canvas or prestudy
    description: >
      Document the stakeholder map, concerns, success criteria, and named
      tensions in the System Context Canvas or prestudy. Flag unresolved
      tensions for escalation before design decisions are finalised.
