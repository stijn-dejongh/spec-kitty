schema_version: "1.0"
id: behavior-driven-development
name: Behavior-Driven Development
purpose: >
  Define system behavior through concrete examples before implementation, ensuring
  shared understanding between stakeholders and implementers. BDD scenarios serve
  as behavioral contracts, acceptance criteria, and executable test definitions simultaneously.
  Apply when: a feature or business rule is being defined and stakeholders are available,
  the behavior can be expressed in observable outcomes, or behavioral ambiguity must be
  resolved before implementation begins.
  Not applicable: implementation-only tasks with no behavioral ambiguity, purely technical
  refactoring, or when behavior is already unambiguously specified.
steps:
  - title: Identify the behavior to define
    description: >
      Name the specific behavior being specified. Break a feature into individual
      observable outcomes — one scenario per behavior. If a behavior cannot be described
      in one sentence, it is likely more than one behavior.

  - title: Write scenarios in Given/When/Then form
    description: >
      For each behavior, write one or more scenarios using concrete examples.
      Given: preconditions and context before the action.
      When: the specific action or event that triggers the behavior.
      Then: the observable outcome that proves the behavior occurred.
      Use domain language throughout. Avoid technical implementation details.
    examples:
      - |
        # Poor — encodes implementation detail
        Given the database is initialized
        When a record is inserted
        Then the output is correct
      - |
        # Good — observable, domain-language, concrete
        Given a customer with an active subscription
        When the customer cancels their subscription
        Then the customer receives a confirmation email within 5 minutes
        And the subscription status changes to "cancelled"

  - title: Validate scenarios with domain experts
    description: >
      Share the written scenarios with the stakeholder or domain expert who owns
      the requirement. Scenarios that confuse or surprise domain experts are wrong.
      Revise until they read naturally to a non-technical audience.

  - title: Use scenarios as acceptance criteria
    description: >
      The validated scenarios become the acceptance criteria for implementation.
      Each scenario defines one "done" condition. Implementation is complete when
      all scenarios are demonstrably satisfied by the production code.

  - title: Wire scenarios to executable tests
    description: >
      Translate each scenario into an automated acceptance test. If BDD tooling
      (Cucumber, Behave, SpecFlow) is in use, Gherkin scenario steps directly map
      to test step definitions. Otherwise, express each scenario as a named test
      with Arrange/Assumption/Act/Assert structure.

notes: >
  Exit criteria: all scenarios are in Given/When/Then form; scenarios are understandable
  to a non-technical reader; expected outcomes are explicit and testable; scenarios cover
  both happy paths and edge cases; at least one domain expert or stakeholder has validated
  the scenarios.
  BDD scenarios serve three purposes: (1) Communication — shared understanding; (2) Specification —
  explicit behavioral contract; (3) Validation — executable acceptance tests.

failure_modes:
  - "Encoding implementation details in scenarios — scenarios that mention databases, API calls, or method names couple tests to implementation and break during refactoring."
  - "Abstract or generic scenarios — scenarios using 'a valid user' or 'appropriate data' cannot serve as acceptance criteria because 'valid' and 'appropriate' are undefined; use concrete, specific examples."
  - "Treating scenarios as documentation only — scenarios not wired to executable tests provide no regression protection."
  - "Skipping stakeholder validation — scenarios written by engineers without domain input often specify the wrong behavior."

references:
  - name: Acceptance Test Driven Development
    type: tactic
    id: acceptance-test-first
    when: BDD provides the scenario format; ATDD provides the workflow for writing those scenarios before implementation
  - name: Test-First Development
    type: directive
    id: DIRECTIVE_034
    when: BDD scenarios become the failing acceptance tests in the test-first cycle
  - name: Testing Principles Styleguide
    type: styleguide
    id: testing-principles
    when: BDD scenarios should satisfy the Inspiring and Exemplary test desiderata
