schema_version: "1.0"
id: analysis-extract-before-interpret
name: Extract Before Interpret
purpose: >
  Prevent premature interpretation by first extracting observable facts and patterns
  before assigning meaning or drawing conclusions. Separating extraction from
  interpretation creates a shared factual foundation that reduces bias and allows
  independent review of raw evidence before reasoning begins.
  Apply when: analysis or synthesis is required and the risk of premature judgment exists,
  reviewing code or logs where familiarity might cause assumptions, or any multi-step
  reasoning task where source material is ambiguous.
  Not applicable: time-critical decisions requiring immediate interpretation, or
  source material that is already fully structured and unambiguous.
steps:
  - title: Identify source material and scope
    description: >
      Define what will be extracted: which files, logs, requirements, or code regions
      are in scope. Record what questions the extraction is intended to answer.
      Extraction without a defined purpose produces noise, not signal.

  - title: Extract observable elements verbatim
    description: >
      List structures, tokens, statements, and patterns exactly as they appear in the
      source — without paraphrasing, summarising, or inferring meaning. Organise
      extracted elements into simple lists or tables. Label the output explicitly as
      "extraction only" to signal that no interpretation has occurred yet.
    examples:
      - "Classes found: OrderService, OrderRepository, OrderEvent, FulfillmentAdapter"
      - "Test names (verbatim): shouldRejectExpiredOrder, shouldApplyDiscount, shouldEmitCreatedEvent"
      - "Stop without asking 'what does this mean?' — that is the next step."

  - title: Explicitly stop before interpreting
    description: >
      When the extraction is complete, halt. Do not collapse extraction and interpretation
      into a single step. The boundary between the two phases is the value of this tactic.
      A brief review of the extraction artifact is appropriate here; drawing conclusions is not.

  - title: Proceed with interpretation as a separate step
    description: >
      Only after extraction is complete, begin interpretation using the extraction artifact
      as the primary input. Reference source material to validate interpretations, but do
      not revise the extraction to fit your interpretation. If the extraction is incomplete,
      return to step 2 rather than filling gaps with inference.
    examples:
      - "From the extracted class list: 'OrderService orchestrates; OrderRepository persists' — this is interpretation."
      - "From the extracted test names: 'discount and expiry are the two primary validation rules' — this is interpretation."

notes: >
  Exit criteria: extracted data contains no interpretation or judgment; source references
  are preserved for each extracted item; the extraction artifact can be reviewed
  independently without domain knowledge; extraction is complete enough to support
  the planned interpretation.
  Pairs well with: code review (extract patterns before interpreting intent or risk),
  log analysis (extract events before inferring causation), requirement gathering
  (extract stated needs before proposing solutions).

failure_modes:
  - "Collapsing extraction and interpretation — writing 'OrderService orchestrates requests' during extraction embeds an interpretation before the extraction is complete."
  - "Premature normalization — renaming, grouping, or paraphrasing extracted elements during extraction loses source fidelity; extract terms as they appear, rename during interpretation."
  - "Omitting details that seem irrelevant — relevance judgement is a form of interpretation; during extraction, prefer completeness over relevance filtering."

references:
  - name: Review Intent and Risk First
    type: tactic
    id: review-intent-and-risk-first
    when: The intent-first review tactic applies extraction-before-interpretation to the review context
  - name: Acceptance Test Driven Development
    type: tactic
    id: acceptance-test-first
    when: Extracting observable acceptance criteria before interpreting implementation requirements
