schema_version: "1.0"
id: premortem-risk-identification
name: Premortem Risk Identification
purpose: Proactively surface failure modes for a plan or decision by deliberately attempting to sabotage it before execution.
references:
  - name: Risk Identification Assessment Template
    type: template
    id: risk-identification-assessment-template
    when: When recording the premortem assessment as a durable artifact.
steps:
  - title: Shift to destructive mindset
    description: >-
      Mentally distance from emotional investment; ask "How can I ensure this
      fails spectacularly?" If you are recording the assessment, start from the
      referenced risk identification assessment template. Set a 15–20 minute
      timer for brainstorming.
  - title: Generate failure list
    description: Write every way the plan could fail, aiming for 10–30 items. Include technical, social, resource, and timing factors without self-censoring.
    examples:
      - "Capture failures such as: Database migration corrupts production data; team lacks expertise in chosen technology; timeline slips past next release window."
  - title: Rate impact and likelihood
    description: Assign each failure scenario High/Medium/Low for both impact and likelihood.
  - title: Prioritise top risks
    description: Identify the 5 highest-impact failures. From those, select the 3 most likely and 2 least likely (surprise/catastrophic risks).
  - title: Develop mitigation strategies
    description: |
      For each of the 5 prioritised scenarios define:
      Prevention – actions to reduce likelihood.
      Detection – early warning signals.
      Response – actions if the failure occurs despite prevention.
  - title: Document and schedule monitoring
    description: Write "When X happens, I will Y" trigger declarations; schedule review checkpoints with assigned owners.
    examples:
      - "When code coverage drops below 80%, immediately halt merges and schedule a test-debt sprint."
