schema_version: "1.0"
id: safe-to-fail-experiment
name: Safe-to-Fail Experiment
purpose: >
  Reframe a learning or exploration goal as a deliberately low-stakes experiment
  so that failure produces signal rather than shame. Running time-boxed, isolated
  experiments with pre-defined hypotheses accelerates skill development, surfaces
  assumptions early, and normalises sharing what was learned — including negative
  results.
steps:
  - title: Define the hypothesis and learning goal
    description: >
      Reframe the goal from "make it work" to "learn whether X is true under
      conditions Y." State the hypothesis explicitly. A clear hypothesis turns an
      experiment from "messing around" into traceable evidence.
    examples:
      - "Hypothesis: this new framework reduces boilerplate enough to justify the migration cost for our module size."
      - "Hypothesis: replacing the current polling loop with a webhook pattern will reduce server load under peak traffic."
  - title: Scope the experiment (timebox and isolate)
    description: >
      Define the maximum time budget and the scope boundary. The experiment must
      not touch production data or critical paths. Set a concrete stop condition —
      a date or a result threshold — before starting. Unconstrained experiments
      tend to grow until they become the thing they were meant to evaluate.
  - title: Set up guardrails and accountability
    description: >
      Define what "done" and "failed" look like before running the experiment.
      Communicate intent to any affected stakeholders. "Safe to fail" does not
      mean no accountability — define resource limits and review points upfront.
  - title: Run the experiment and collect evidence
    description: >
      Execute the minimum work that tests the hypothesis. Do not optimise or
      over-engineer the experiment itself. Collect observable evidence against
      the stated hypothesis.
  - title: Capture and share findings
    description: >
      Document both what was learned and whether the hypothesis held. Share the
      findings with the team regardless of outcome. Negative results — approaches
      that didn't work — are valuable; archive them so future teams don't
      repeat the same dead ends.
    examples:
      - "Experiment result: the framework reduces boilerplate by 35%, but type inference errors make it slower to debug. Recommendation: pilot on a non-critical service before committing to migration."
