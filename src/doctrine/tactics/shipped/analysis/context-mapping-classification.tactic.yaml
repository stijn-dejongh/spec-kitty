schema_version: "1.0"
id: context-mapping-classification
name: Context Mapping Classification
purpose: >
  Systematically classify every relationship between bounded contexts using
  the nine canonical DDD context mapping patterns and three relationship
  types. Produces an explicit map that reveals coupling, power asymmetries,
  and integration risk across the system. Based on Eric Evans's strategic
  design patterns and the DDD Crew context-mapping notation.
steps:
  - title: Enumerate all bounded context pairs
    description: >
      List every pair of bounded contexts that exchange data, commands, or
      events. Include indirect dependencies (context A depends on a shared
      library maintained by context B). Each pair is a candidate for
      classification.
    examples:
      - "Billing <-> Shipping, Auth <-> Billing, Catalog <-> Search, Inventory <-> Fulfillment."
  - title: Determine the relationship direction
    description: >
      For each pair, classify the structural relationship as Upstream /
      Downstream (one publishes, one consumes), Mutually Dependent (both
      depend on each other for core functionality), or Free (no runtime
      dependency, integration only through asynchronous events or shared
      artifacts).
    examples:
      - "Auth (upstream) -> Billing (downstream): Billing consumes user identity tokens."
      - "Order <-> Inventory: mutually dependent — Order reserves stock, Inventory confirms availability."
  - title: Assign one of the nine integration patterns
    description: >
      For each relationship, select the pattern that best describes the
      integration mechanism in use or desired. The nine patterns are:
      Open Host Service (OHS) — upstream provides a well-defined public API;
      Published Language — shared schema or interchange format;
      Conformist — downstream adopts upstream's model as-is;
      Anti-Corruption Layer (ACL) — downstream translates at the boundary;
      Customer / Supplier — downstream has negotiating power over the upstream API;
      Partnership — both teams co-evolve the integration contract;
      Shared Kernel — both contexts share a small, co-owned model subset;
      Separate Ways — no integration, each context solves the need independently;
      Big Ball of Mud — no clear boundary (legacy, requires remediation).
    examples:
      - "Catalog -> Search: OHS + Published Language (Catalog exposes a product event schema)."
      - "Billing -> Legacy ERP: ACL (Billing translates ERP field names at the gateway)."
      - "Notification -> Email Provider: Conformist (we adopt the provider's API model directly)."
  - title: Document the map visually
    description: >
      Render the context map as a diagram showing each bounded context as a
      labelled box and each relationship as a directed or bidirectional arrow
      annotated with the pattern abbreviation (OHS, ACL, SK, etc.) and the
      relationship type (U/D, MD, Free). Use the DDD Crew visual notation or
      an equivalent team convention.
    examples:
      - "[Auth] --OHS/U--> [Billing] --ACL/D--> [Legacy ERP]"
  - title: Identify risks and action items
    description: >
      Flag relationships that are Conformist to an unreliable or frequently-
      changing upstream (candidate for ACL), Big Ball of Mud boundaries
      (candidate for strangler fig), and Mutually Dependent pairs (candidate
      for decoupling via domain events). Each flag becomes a backlog item.
  - title: Schedule periodic re-evaluation
    description: >
      Context maps drift as systems evolve. Review the map at least once per
      quarter or after any significant integration change. Compare the
      documented map to actual runtime dependencies and update accordingly.
failure_modes:
  - "Pattern shopping: choosing a pattern because it sounds desirable rather than describing the actual relationship."
  - "Missing contexts: omitting internal shared libraries, infrastructure services, or third-party SaaS integrations from the map."
  - "Static map: creating the map once and never updating it as integrations change."
  - "Ignoring power dynamics: failing to recognise upstream/downstream asymmetries that affect change velocity."
  - "Over-classifying: splitting a single integration into multiple patterns when one pattern accurately describes it."
references:
  - name: Bounded Context Identification
    type: tactic
    id: bounded-context-identification
    when: Identify bounded contexts before classifying the relationships between them.
  - name: Anti-Corruption Layer
    type: tactic
    id: anti-corruption-layer
    when: Implementing the ACL pattern identified during context mapping classification.
  - name: "Refactoring: Strangler Fig"
    type: tactic
    id: refactoring-strangler-fig
    when: Remediating Big Ball of Mud boundaries discovered in the context map.
  - name: Language-Driven Design
    type: tactic
    id: language-driven-design
    when: Verifying that each context's ubiquitous language is internally consistent.
