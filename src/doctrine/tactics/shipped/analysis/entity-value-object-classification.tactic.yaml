schema_version: "1.0"
id: entity-value-object-classification
name: Entity vs Value Object Classification
purpose: >
  Classify every domain object as either an Entity (has identity, mutable
  lifecycle) or a Value Object (defined solely by its attributes, immutable,
  no identity). The default heuristic is to prefer Value Objects; promote to
  Entity only when the domain requires tracking identity across state
  changes. Correct classification reduces complexity, improves testability,
  and makes the domain model more expressive. Based on Eric Evans's DDD
  tactical patterns.
steps:
  - title: Apply the identity test
    description: >
      For each domain object, ask: "Does the business need to distinguish
      between two instances that have the same attribute values?" If yes,
      the object has identity and is an Entity candidate. If two instances
      with identical attributes are interchangeable, it is a Value Object
      candidate.
    examples:
      - "Entity: two Customer objects with the same name are different people — identity matters."
      - "Value Object: two Money(100, 'USD') instances are interchangeable — no identity needed."
  - title: Apply the lifecycle test
    description: >
      Ask: "Does this object change state over time in ways the domain
      tracks?" Entities have lifecycles (created, updated, archived).
      Value Objects are created and replaced, never mutated. If you find
      yourself writing setters on a value-like object, reconsider the
      classification.
    examples:
      - "Entity: Order transitions from placed -> paid -> shipped -> delivered."
      - "Value Object: Address does not mutate — a customer gets a new Address, the old one is discarded."
  - title: Default to Value Object
    description: >
      When in doubt, model as a Value Object. Value Objects are simpler
      (no identity management, no mutable state), easier to test (equality
      by attributes), and safer to share across aggregates. Promote to
      Entity only when both the identity test and lifecycle test demand it.
  - title: Make Value Objects immutable
    description: >
      Enforce immutability at the language level. Use frozen dataclasses,
      NamedTuple, or Pydantic models with frozen=True. All "changes" to a
      Value Object produce a new instance. This makes Value Objects safe
      to cache, share, and use as dictionary keys.
    examples:
      - "Python: @dataclass(frozen=True) class Money: amount: Decimal; currency: str"
      - "Kotlin: data class Money(val amount: BigDecimal, val currency: String)"
  - title: Define equality semantics
    description: >
      Entities are equal when their identities match, regardless of
      attribute differences. Value Objects are equal when all attributes
      match, regardless of instance identity. Implement __eq__ and
      __hash__ accordingly. Incorrect equality semantics cause subtle
      bugs in collections, caching, and event deduplication.
    examples:
      - "Entity: order_a == order_b iff order_a.id == order_b.id"
      - "Value Object: money_a == money_b iff money_a.amount == money_b.amount and money_a.currency == money_b.currency"
  - title: Document the classification rationale
    description: >
      For each domain object, record why it is an Entity or Value Object.
      Include the identity test result, lifecycle test result, and any
      domain expert input. This prevents future developers from
      accidentally reclassifying objects without understanding the
      consequences.
failure_modes:
  - "Entity by default: making everything an Entity, adding unnecessary identity management and mutable state."
  - "Mutable Value Objects: allowing attribute mutation on Value Objects, breaking equality and caching assumptions."
  - "Identity confusion: using database row IDs as domain identity without verifying the domain actually needs identity."
  - "Over-promotion: promoting to Entity because of technical concerns (ORM requires an ID) rather than domain needs."
  - "Missing equality: not implementing proper equality semantics, causing duplicates in sets and incorrect cache hits."
references:
  - name: Language-Driven Design
    type: tactic
    id: language-driven-design
    when: Domain expert language reveals whether identity matters for a concept.
