schema_version: "1.0"
id: connascence-analysis
name: Connascence Analysis
purpose: >
  Diagnose coupling between software components by classifying it using the
  connascence taxonomy — examining strength, degree, and locality — and recommend
  targeted reductions that improve maintainability without unnecessary abstraction.
steps:
  - title: Select the component pair or set to analyse
    description: >
      Identify which components (classes, modules, services, functions) are suspected
      of excessive coupling. Limit the initial analysis to the smallest meaningful
      unit — a pair or a tightly related cluster — to keep the assessment tractable.
  - title: Classify connascence type
    description: >
      For each identified dependency between the selected components, determine
      which connascence type applies. Distinguish between static connascence
      (established at compile time: name, type, meaning, position, algorithm) and
      dynamic connascence (established at runtime: execution order, timing,
      values, identity, convention). A single dependency may exhibit multiple types.
    examples:
      - "Two modules that must agree on a status string value — Connascence of Meaning."
      - "A function whose callers must pass arguments in a fixed order — Connascence of Position."
      - "A consumer that fails if a producer is delayed beyond a timeout — Connascence of Timing."
  - title: Assess strength, degree, and locality
    description: >
      Rate each identified connascence along three facets:
      Strength — how disruptive is a change in one component to the other (dynamic > static, algorithm > name)?
      Degree — how many components are entangled (higher degree = higher blast radius)?
      Locality — how far apart are the coupled components (cross-service > cross-module > within-module)?
      High-strength, high-degree, or low-locality connascence warrants immediate attention.
    examples:
      - "Connascence of Algorithm between two services (cross-service, high strength): high priority."
      - "Connascence of Name within a single module (low locality impact, low strength): low priority."
  - title: Decide whether to reduce, accept, or document
    description: >
      Based on the assessment, choose one of three responses for each connascence instance:
      Reduce — refactor to weaker connascence (e.g. replace positional arguments with a named
      parameter object to reduce Connascence of Position to Connascence of Name).
      Accept — document the coupling explicitly and ensure it is tested so changes surface immediately.
      Escalate — flag high-severity cross-boundary connascence for architectural review.
    examples:
      - "Replace shared status string constant with a published enum — reduces Connascence of Meaning."
      - "Add a contract test for the shared algorithm — accepts Connascence of Algorithm with visibility."
  - title: Record findings and rationale
    description: >
      Capture which connascence types were found, their assessed severity, and the
      chosen response. Record this in the code review, ADR, or design document so
      that future maintainers understand why the coupling exists and what was done
      about it.
