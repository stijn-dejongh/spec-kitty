schema_version: "1.0"
id: ammerse-impact-analysis
name: AMMERSE Impact Analysis
purpose: >
  Evaluate the first- and second-order impact of a decision, practice, or
  architectural choice against the seven AMMERSE values (Agile, Minimal,
  Maintainable, Environmental, Reachable, Solvable, Extensible) to surface
  hidden trade-offs and align choices with strategic goals. Reserve the full
  numeric interaction-matrix analysis for high-stakes decisions; first-order
  reasoning alone is sufficient for routine choices.
references:
  - name: AMMERSE Analysis Template
    type: template
    id: ammerse-analysis-template
    when: When recording the analysis as a standalone durable artifact.
steps:
  - title: Define the subject and context
    description: >
      Clearly state what is being evaluated (decision, practice, or technique)
      and identify the system context in which it will be applied (organisation,
      project, team). Misidentifying context is the most common source of
      misleading AMMERSE results.
  - title: Assign base impact scores per AMMERSE value
    description: >
      For each of the seven values below, evaluate positive and negative aspects
      separately, then combine them into a single score on the −1 to +1 scale.
      Provide a rationale for each score. Use the canonical definitions exactly as
      stated — do not substitute personal interpretations.

      Canonical AMMERSE value definitions (use these verbatim as the scoring lens):

      Agile (A): The ability to adapt quickly to changes, incorporate feedback,
      and maintain flexibility in processes and decision-making.

      Minimal (Mi): The focus on simplicity and avoiding unnecessary complexity
      in processes and systems.

      Maintainable (Ma): The ease of keeping processes and systems in working
      condition over time.

      Environmental (E): Considering the broader context, including cultural fit,
      impact on nature and society, standards, and ethical considerations.

      Reachable (R): Setting practical goals and ensuring they are achievable
      within the given constraints.

      Solvable (S): The ability to effectively solve problems and address
      challenges that arise.

      Extensible (Ex): The capacity to extend or scale processes and systems
      to meet future needs.

      Use the AMMERSE Analysis template to structure the record.
    examples:
      - "Agile: +0.4 — promotes fast iteration (positive) but may require future refactoring (negative)."
      - "Extensible: −0.75 — initial implementation lacks extension points; significant rework if needs change."
  - title: Apply first-order interactions (standard path)
    description: >
      For each value, compute how the base scores of the other six values
      influence it through direct interactions. Use the first-order impact
      matrix from the AMMERSE practice article. Formula applied per value:
      base + (0.5 × first_order_sum / 6). This step is the standard path
      for most decisions.
  - title: Apply second-order interactions (high-stakes path only)
    description: >
      For decisions with broad systemic reach, additionally compute indirect
      (second-order) interaction effects using the normalised second-order
      matrix. Formula: overall = base + (0.5 × first_order) + (0.25 × second_order).
      Skip this step for low- and medium-risk decisions.
  - title: Summarise findings and flag concerns
    description: >
      Identify the values with the most negative or unexpected overall impact.
      These are the decision's weak spots — where assumptions are most likely
      to be wrong or where mitigations are most needed. Summarise recommendations.
      Treat numeric outputs as conversation prompts, not deterministic verdicts:
      the inputs reflect the assessor's current mental model, not ground truth.
    examples:
      - "Extensible −0.77: initial implementation cannot be extended without significant rework. Mitigation: document extension points in ADR; schedule refactor after first major use."
      - "Agile +0.29: slight drag on adaptability due to added analysis overhead. Acceptable for a high-impact architectural change."
