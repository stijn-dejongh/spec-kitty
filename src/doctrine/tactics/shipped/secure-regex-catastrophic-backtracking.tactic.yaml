# Classification: secure coding practices
# Topic: regular-expression input handling — prevention of catastrophic
# backtracking (ReDoS). Generic guidance applicable to every language whose
# default regex engine performs backtracking (Python, JavaScript, Java, .NET,
# Ruby, Perl, PHP, C/C++ std::regex). Engines based on automata (RE2, Go's
# regexp, Rust's regex crate) are not vulnerable but the safe-design rules
# below still produce clearer and faster patterns.
schema_version: "1.0"
id: secure-regex-catastrophic-backtracking
name: Secure Regex — Avoid Catastrophic Backtracking
purpose: >
  Secure coding practice for designing and reviewing regular expressions so they
  cannot be driven into pathological matching times by adversarial input
  (Regular-expression Denial of Service / ReDoS). Backtracking engines may run
  in exponential or polynomial time when a vulnerable pattern is paired with
  an input that forces repeated re-matching. This tactic codifies the patterns
  to avoid, the rewrites that make them linear, and the escape hatches when a
  linear rewrite is not possible.

  Pattern is vulnerable only when the problematic sub-pattern is followed by
  something that can fail. End-of-input counts as "something that can fail" for
  any full-match (e.g. ``re.fullmatch``). Partial-match APIs (``re.search``,
  ``re.split``, ``re.findall``) widen the attack surface because the engine
  retries from the next index on every failure.

steps:
  - title: Identify dangerous repetition shapes during review
    description: >
      Flag any of these constructs whenever a regex receives input that is not
      fully controlled by the caller. The repetition becomes a hazard only when
      paired with a trailing pattern that can fail (including end-of-input on a
      full match):

        1. A non-possessive repetition ``r*`` or ``r*?`` where ``r`` itself can
           match the same input in more than one way (``r`` contains optional
           parts, alternations, or further repetitions). Worst case: exponential.
        2. Multiple consecutive non-possessive repetitions that can match the
           same content, with no separator or with a separator both can absorb.
           Worst case: polynomial (``O(n^c)`` where ``c`` is the number of
           problematic repetitions). Example: ``a*a*`` or ``.*_.*`` — quadratic.
        3. Partial-match APIs with a regex not anchored at the start. Even a
           possessive unbounded repetition followed by a failing pattern can
           cause quadratic runtime because the engine restarts at every index.
           Example: ``re.split(r"\s*,", s)`` is quadratic on inputs that are
           mostly whitespace without commas.

      Counter-examples that are safe:

        - ``a*b*`` — the two repetitions cannot overlap.
        - ``a*_a*`` — separated by ``_`` which neither side can consume.
        - ``(ba+)+`` — the inner group must consume exactly one leading ``b``
          per outer repetition; there is only one way to partition the input.
    examples:
      - "src/specify_cli/release/changelog.py was flagged by Sonar `python:S6353` for catastrophic-backtracking risk — characteristic of shape #1 above."
      - "`re.fullmatch(r'(a+)+$', some_input)` — exponential on adversarial input like 'aaaa…X'."
      - "`re.split(r'\\s*,\\s*', s)` — quadratic on strings of spaces with no comma."

  - title: Rewrite vulnerable patterns to linear shapes
    description: >
      In order of preference:

        1. **Bound the repetition.** Replace ``+`` or ``*`` with a bounded
           quantifier such as ``{1,5}`` or ``{0,200}`` whenever the legitimate
           input has a known maximum. This caps the search tree.
        2. **Refactor nested quantifiers** so the inner group has exactly one
           way to match a given fragment. Pattern shape ``(ba+)+`` is safe;
           ``(a+)+`` is not.
        3. **Use possessive quantifiers or atomic groups** (``a++``, ``a*+``,
           ``(?>a*)``) on engines that support them. Available in Python 3.11+
           and in PCRE-family engines. Possessive quantifiers do not give back
           matches, which eliminates the backtracking source.
        4. **Use negated character classes** instead of ``.`` to forbid the
           separator the outer pattern relies on. ``.*_.*`` is quadratic;
           ``[^_]*_.*`` is linear because the first repetition cannot consume
           the ``_`` that the engine needs as a pivot.
    examples:
      - "`(.*)_(.*)` → `([^_]*)_(.*)`"
      - "`(a+)+` → `(?>a+)+` or `(a+){1,N}` with a documented N"
      - "`re.split(r'\\s*,\\s*', s)` → `re.split(',', s)` then `.strip()` each piece"

  - title: When a linear rewrite is not possible, change the approach
    description: >
      Some matching problems are inherently non-linear with backtracking
      engines. Escape hatches in priority order:

        1. **Drop the regex.** Use string operations (``str.split``,
           ``str.partition``, manual scanning) or a real parser. Often clearer
           and faster anyway.
        2. **Switch to a non-backtracking engine.** Python: the ``re2``
           package (Google RE2 bindings) accepts most syntax and guarantees
           linear time. RE2 trades some features (e.g. backreferences) for
           the linear-time guarantee.
        3. **Multi-pass.** Apply a permissive regex first, then validate or
           trim the matched substrings with code. Replaces one expensive
           regex with two cheap ones.
        4. **Cap input length.** If the regex must stay and the caller can
           reject input above N bytes, document and enforce N. Combine with
           a timeout where feasible (e.g. signal-based timeout, sandboxed
           subprocess) but treat the cap as the primary defence.
    examples:
      - "Email validation: use the standard library `email.utils.parseaddr` instead of a hand-rolled regex."
      - "Markdown link extractor that needs backreferences: use `pyahocorasick` or `regex` package with timeout."
      - "Replace a complex tokenizer regex with a small explicit state machine when input is untrusted."

  - title: Add a regression test that proves linear runtime
    description: >
      Before closing a ReDoS finding, write a test that:

        1. Constructs an adversarial input characteristic of the vulnerable
           shape (typically a long run of the ambiguous character followed by
           a single mismatching character).
        2. Asserts the regex completes within a tight wall-clock budget
           (e.g. 100 ms for 100 000 chars). Use ``pytest`` timing or
           ``pytest-timeout``. The test acts as a watchdog against future
           rewrites that re-introduce a backtracking shape.
        3. Optionally asserts on the matched output to catch behavior drift.
    examples:
      - "tests/regressions/test_changelog_regex_redos.py: input = 'a' * 100_000 + '!'; expect completion < 100 ms."
      - "Use `pytest.mark.benchmark` only if the suite already runs benchmarks; otherwise a plain `time.perf_counter` assertion is enough."

failure_modes:
  - "Treating a Sonar `python:S5852` / `python:S6353` finding as cosmetic. A vulnerable pattern is a denial-of-service primitive on every endpoint that runs it on untrusted input — ship the fix or document the input-length cap, do not silence the rule."
  - "Adding a `timeout` as the primary defence. The Python `re` engine has no per-call timeout; you have to wrap with `signal` or a subprocess. Treat timeouts as a backstop, never as the fix."
  - "Switching to `re2` without checking syntax compatibility. RE2 rejects backreferences and look-around assertions. Run the existing test suite under the new engine before swapping."
  - "Bounded quantifier with a large N (e.g. `{0,10000}`). Bounds bigger than necessary defeat the purpose; pick the smallest plausible legitimate upper bound."

applies_to_languages:
  - python
  - javascript
  - typescript
  - java
  - csharp
  - ruby
  - go
  - rust

references:
  - name: Secure Design Checklist
    type: tactic
    id: secure-design-checklist
    when: Treat regex hardening as a design-phase property of any component that parses untrusted input, not as a post-hoc fix
  - name: Test and Typecheck Quality Gate
    type: directive
    id: DIRECTIVE_030
    when: Add the regression test alongside the rewrite so the quality gate enforces linear runtime on every CI pass
