schema_version: "1.0"
id: documentation-curation-audit
name: Documentation Curation Audit
purpose: Systematically audit a documentation directory for structural consistency, naming conventions, cross-reference integrity, and metadata completeness.
steps:
  - title: Structural analysis
    description: Verify the directory follows its documented structure. Check depth consistency and identify orphaned files with no parent README reference.
    examples:
      - "Flag any file more than 4 levels deep that lacks a justification comment in its nearest README."
  - title: Naming convention audit
    description: Apply the project naming convention consistently (kebab-case, snake_case, etc.). Flag files that violate the convention for rename.
    examples:
      - "Rename MY_DOC.md to my-doc.md to conform to kebab-case standard."
  - title: Cross-reference integrity check
    description: Scan for broken links by grepping for markdown link patterns and validating relative paths. Verify all ADR and directive references exist.
    examples:
      - "grep -r '](.*\\.md)' docs/ | xargs -I{} test -f {} to surface broken relative links."
  - title: Metadata completeness check
    description: Verify frontmatter in structured documents. Check for required fields such as version, status, and author/maintainer attribution.
  - title: Generate discrepancy report
    description: List findings with severity (critical / high / medium / low) and recommend corrective actions prioritised by impact.
  - title: Apply and validate corrections
    description: Execute approved changes, validate corrections, and document changes in the work log.
