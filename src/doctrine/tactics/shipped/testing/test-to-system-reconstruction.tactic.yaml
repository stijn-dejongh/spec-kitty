schema_version: "1.0"
id: test-to-system-reconstruction
name: Test-to-System Reconstruction
purpose: >
  Dual-agent validation that reconstructs system understanding purely from test code,
  measuring how effectively tests serve as executable specifications. Produces a scored
  gap analysis identifying where tests fail to communicate behavioral, architectural,
  or operational intent. Target overall accuracy: >=85% (behavioral 50% weight >=90%,
  architectural 30% weight >=80%, operational 20% weight >=75%).
  Score formula: (behavioral * 0.5) + (architectural * 0.3) + (operational * 0.2).
  Apply when: after major test suite refactoring, before significant releases,
  quarterly quality audits, or onboarding validation. Minimum scope: 20 tests.
  Recommended scope: 50-100 tests. Estimated time: 60-90 minutes.
steps:
  - title: "Phase 1 — Naive Reconstruction (Agent A, ~30 min)"
    description: >
      Read test code only — no implementation, no documentation, no ADRs. Reconstruct a
      behavioral narrative of the system from test observations alone. Document what
      components exist, what behaviors they exhibit, what edge cases are handled, and what
      workflows are supported. Flag uncertainties and areas where context is clearly absent.
    examples:
      - "Write a narrative: 'From the tests, the Order component appears to support...'"
      - "Flag gaps: 'The tests reference a retry mechanism but its trigger conditions are not clear.'"

  - title: "Phase 2 — Expert Review (Agent B, ~20 min)"
    description: >
      With full access to code, ADRs, and documentation, compare Agent A's reconstruction
      against ground truth. Score accuracy across three dimensions: behavioral (50% weight),
      architectural (30% weight), and operational (20% weight). For each discrepancy,
      categorize by type (behavioral/architectural/operational) and assign severity
      (critical/high/medium/low). Generate specific improvement recommendations.
    examples:
      - "Behavioral: 82/100 — core workflows clear, retry semantics not captured."
      - "Architectural: 70/100 — adapter layer rationale unclear; ADR reference would fix this."
      - "Operational: 65/100 — runtime context absent; no tests cover scaling or recovery paths."

  - title: "Phase 3 — Synthesis and Improvement Roadmap (~15 min)"
    description: >
      Calculate the weighted overall score. Categorize all gaps by severity. Prioritize
      improvements by impact: missing critical behavioral tests first, then ADR references
      for design rationale, then operational context scenarios.
    examples:
      - "Overall 75.5% — below threshold. Immediate: add retry-trigger test. Short-term: embed ADR link in adapter tests."

  - title: Common gap patterns and fixes
    description: >
      Design rationale gap (tests show what but not why) — fix: add ADR reference in test docstring.
      Operational context gap (runtime behavior unclear) — fix: add scenario test for deployment or recovery path.
      Security boundary gap (trust model invisible) — fix: add inline comment or dedicated boundary test.
      Behavioral gap (behavior undocumented) — fix: add missing test scenario.

failure_modes:
  - "Testing only the happy path — behavioral score appears high while gaps in error handling and edge cases remain hidden."
  - "Skipping the synthesis phase — without Phase 3, gaps remain identified but unprioritized and unaddressed."
  - "Scope too narrow — fewer than 20 tests cannot produce enough signal; reconstruction is dominated by noise."
  - "One-off exercise — reconstruction scores drift as the codebase evolves; quarterly cadence is required."

references:
  - name: Acceptance Test Driven Development
    type: tactic
    id: acceptance-test-first
    when: ATDD produces the behavioral test scenarios whose clarity is evaluated by this tactic
  - name: Test-First Development
    type: directive
    id: DIRECTIVE_034
    when: Test-first discipline is a prerequisite for the test suite to serve as a living specification
  - name: Testing Principles Styleguide
    type: styleguide
    id: testing-principles
    when: Inspiring and Exemplary test desiderata define what a reconstruction-worthy test suite looks like
  - name: Reverse Speccing
    type: tactic
    id: reverse-speccing
    when: Reverse speccing provides the evaluative philosophy; this tactic is the scored execution procedure
