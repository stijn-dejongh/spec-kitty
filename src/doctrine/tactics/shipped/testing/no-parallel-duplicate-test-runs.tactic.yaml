schema_version: "1.0"
id: no-parallel-duplicate-test-runs
name: No Parallel Duplicate Test Runs
purpose: >
  Prevent agents from launching multiple concurrent runs of the same test suite.
  Doing so wastes resources, makes output ambiguous, and degrades the developer
  experience. A single authoritative run must be started, and the agent must
  wait for its result before deciding on next steps.
steps:
- title: Verify no existing test run is active
  description: >
    Before launching a test command, check whether a previous run of the
    same suite is still running. If stale processes are alive from a
    previous session, kill them before starting a fresh run.
- title: Start exactly one test run
  description: >
    Start exactly one test run per layer of the testing pyramid. Do not
    retry by launching a second process while the first is still running.
- title: Wait for results
  description: >
    If the test command was sent to the background, poll its output file
    rather than launching a new test run. Do not launch the same command
    again while the background task is active.
- title: Read and act on output
  description: >
    Read the test output and determine whether to proceed, fix, or
    escalate. The agent must have a clear pass/fail result before taking
    the next action.
failure_modes:
- "Duplicate launch: launching a second test process while the first is still running, creating ambiguous output and wasted resources."
- "Stale process ignored: starting a new run without checking for or killing stale processes from a previous session."
- "Background fire-and-forget: sending a test run to the background and launching another instead of polling the existing process for results."
notes: >
  An agent that has more than one concurrent test process running for the
  same suite has violated this tactic. At any point in time, at most one
  test process should be running per suite per repository.
