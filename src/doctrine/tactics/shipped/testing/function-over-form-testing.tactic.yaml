schema_version: "1.0"
id: function-over-form-testing
name: Function Over Form Testing
purpose: >
  Prioritize behavioral validation over structural verification in test suites.
  Tests should prove that the system does what it is supposed to do, not that it was
  assembled from the right parts. Construction details (constructors, builders,
  accessors) get tested indirectly through functional tests that exercise the objects
  they create. Core principle: when behavior is tested thoroughly, construction coverage
  follows naturally.
steps:
  - title: Write tests for observable outcomes
    description: >
      Each test expresses a behavioral requirement in Given/When/Then form: given a
      precondition, when an action is taken, then an observable result matches the
      expectation. The observable result is what a user or downstream system would see.
    examples:
      - |
        @Test void shouldRejectOrderBelowMinimumValue() {
            Order order = OrderFixtures.belowMinimum().build();
            assertThatThrownBy(() -> service.submit(order))
                .isInstanceOf(ValidationException.class)
                .hasMessageContaining("minimum order value");
        }

  - title: Test validation logic explicitly
    description: >
      Validation rules encode business logic and must be tested as first-class behaviors.
      Cover required fields, format constraints, range boundaries, and cross-field
      consistency as behavioral scenarios, not as schema assertions.
    examples:
      - "@Test void shouldRejectMissingCustomerId() { ... }"
      - "@Test void shouldRejectNegativeQuantity() { ... }"

  - title: Let construction coverage come naturally
    description: >
      Do not write dedicated tests for constructors, builder patterns, factory methods,
      setters, getters, or record accessors. These are construction mechanisms. They will
      be exercised — and therefore covered — by every functional test that creates and
      uses the objects they produce.
    examples:
      - |
        // Anti-pattern: testing a getter
        @Test void getterReturnsSetValue() {
            Order order = new Order("C-123", 5);
            assertThat(order.getCustomerId()).isEqualTo("C-123");
        }
        // This test verifies constructor syntax, not behavior. Delete it.

  - title: Avoid asserting implementation details
    description: >
      Do not assert on internal field values, method call counts, or intermediate states.
      These assertions break during refactoring even when observable behavior is unchanged.
      Assert on what the system produces, emits, or returns — not how it achieved that result.

failure_modes:
  - "Over-mocking — mocking every collaborator turns integration tests into scripted interaction replays that pass even when the real integration is broken; mock only at true system boundaries."
  - "Testing private methods — private methods are implementation details; if one needs direct testing, it is a signal to extract it to a collaborator with its own public interface."
  - "Testing toString or equals in isolation — format and identity methods should be tested through the integrations that depend on them, not in standalone tests."

references:
  - name: Testing Principles Styleguide
    type: styleguide
    id: testing-principles
    when: Function-over-form aligns with the Truthful, Specific, and Minimal test desiderata
  - name: Acceptance Test Driven Development
    type: tactic
    id: acceptance-test-first
    when: Acceptance tests are the canonical behavioral tests that function-over-form produces
  - name: Behavior-Driven Development
    type: tactic
    id: behavior-driven-development
    when: BDD scenarios express the observable outcomes that function-over-form tests should validate
  - name: Test-First Development
    type: directive
    id: DIRECTIVE_034
    when: Function-over-form tests are written test-first, expressing the behavioral requirement before implementation
