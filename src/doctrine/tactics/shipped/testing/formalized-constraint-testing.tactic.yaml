schema_version: "1.0"
id: formalized-constraint-testing
name: Formalized Constraint Testing
purpose: >
  Verify mathematical invariants and structural contracts of components using property-based
  patterns rather than example-based spot-checks. Covers four pattern families: round-trip
  symmetry, equality contracts, hash-code alignment, and sparse serialization.
steps:
  - title: Identify constraint candidates
    description: >
      Look for components that have mathematical invariants: serializers/deserializers,
      value objects with equals/hashCode, domain objects with ordering, and types that
      round-trip through external formats (JSON, YAML, binary, database columns).
    examples:
      - "Any class implementing equals() and hashCode() is an equality-contract candidate."
      - "Any class with a toJson()/fromJson() pair is a round-trip candidate."

  - title: Write round-trip symmetry tests
    description: >
      Verify that encode(decode(x)) == x and decode(encode(x)) == x. Use a representative
      sample of values including boundary cases (null fields, empty collections, maximum sizes).
    examples:
      - |
        @Test void roundTripPreservesAllFields() {
            Item original = ItemFixtures.withAllFieldsSet().build();
            Item restored = deserialize(serialize(original));
            assertThat(restored).isEqualTo(original);
        }

  - title: Write equality contract tests
    description: >
      Verify all five properties of the equals contract: reflexivity, symmetry, transitivity,
      consistency, and null-inequality. Test both equal and not-equal cases.
    examples:
      - |
        @Test void equalsIsReflexive()    { assertThat(a).isEqualTo(a); }
        @Test void equalsIsSymmetric()    { assertThat(a.equals(b)).isEqualTo(b.equals(a)); }
        @Test void equalsIsTransitive()   { if (a.equals(b) && b.equals(c)) assertThat(a).isEqualTo(c); }
        @Test void equalsNullReturnsFalse() { assertThat(a.equals(null)).isFalse(); }

  - title: Write hash-code alignment tests
    description: >
      Verify that equal objects have equal hash codes. Also verify that objects with
      different identity fields produce different hash codes (distribution check — not
      a strict requirement but catches naive implementations).
    examples:
      - |
        @Test void equalObjectsHaveEqualHashCodes() {
            Item a = ItemFixtures.basic().build();
            Item b = ItemFixtures.basic().build(); // same logical state
            assertThat(a).isEqualTo(b);
            assertThat(a.hashCode()).isEqualTo(b.hashCode());
        }

  - title: Write sparse serialization tests
    description: >
      Verify that serialized output omits null or empty fields (where that is the contract)
      and that deserialization is tolerant of missing optional fields.
    examples:
      - |
        @Test void serializedFormOmitsNullFields() {
            Item item = ItemFixtures.withOptionalFieldsNull().build();
            String json = serialize(item);
            assertThat(json).doesNotContain("\"optionalField\"");
        }

  - title: Pair positive and negative cases
    description: >
      For each invariant, write both a passing case and a deliberate violation. The violation
      test confirms the constraint is actually enforced, not silently ignored.
    examples:
      - "After verifying round-trip fidelity, also verify that a corrupted payload throws or
         returns empty rather than silently returning wrong data."

  - title: Replace spot-checks with constraint coverage
    description: >
      Once contract tests cover a behavior class exhaustively, individual spot-checks for
      that class can be minimised. See the test-minimisation tactic for the safe removal process.

failure_modes:
  - "Incomplete equality contract — testing only equals() without hashCode() leaves the contract incomplete; objects placed in HashMaps or HashSets will behave incorrectly."
  - "Round-trip with only happy-path data — testing serialize/deserialize only with fully populated objects misses edge cases where null fields, empty collections, or boundary values are dropped or transformed."
  - "Missing violation tests — constraint tests without a corresponding violation case only demonstrate that the happy path works, not that the invariant is actually enforced."

references:
  - name: Test-First Development
    type: directive
    id: DIRECTIVE_034
    when: Contract tests are written test-first; write the failing constraint test before the implementation
  - name: Test and Typecheck Quality Gate
    type: directive
    id: DIRECTIVE_030
    when: Constraint tests must pass as part of the quality gate before merge
  - name: Black-Box Integration Testing
    type: tactic
    id: black-box-integration-testing
    when: Contract tests complement black-box integration tests at system boundaries
  - name: Acceptance Test Driven Development
    type: tactic
    id: acceptance-test-first
    when: Define acceptance criteria first, then formalise constraints as contract tests
  - name: Test Minimisation
    type: tactic
    id: test-minimisation
    when: Once contract tests cover a behavior class, use minimisation to identify which spot-checks are now redundant
