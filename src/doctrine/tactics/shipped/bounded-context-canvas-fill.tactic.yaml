schema_version: "1.0"
id: bounded-context-canvas-fill
name: Bounded Context Canvas Fill
purpose: >
  Guide the reasoning process for completing a Bounded Context Canvas -- a
  structured one-page summary that captures a context's name, purpose,
  strategic classification, domain roles, communication patterns, ubiquitous
  language, business decisions, assumptions, verification metrics, and open
  questions. This tactic focuses on the analytical thinking required to fill
  each section well; the fillable canvas itself is a separate template.
  Based on the DDD Crew Bounded Context Canvas v5.
steps:
  - title: Anchor the context in domain language
    description: >
      Choose a name drawn from the ubiquitous language, not from technical
      naming conventions. Write a purpose statement that a non-technical
      stakeholder can validate. If you cannot explain what the context does
      without referencing implementation technology, the boundary is
      probably wrong or poorly understood.
    examples:
      - "Good: 'Order Fulfilment -- orchestrates picking, packing, and shipping of confirmed orders.'"
      - "Bad: 'OrderService -- handles order-related API calls.'"
    references:
      - name: Language-Driven Design
        type: tactic
        id: language-driven-design
        when: Verifying that the chosen name and purpose use ubiquitous language consistently.
  - title: Classify strategic importance
    description: >
      Determine whether this context is Core Domain (competitive
      advantage, invest top talent), Supporting Subdomain (necessary but
      not differentiating, build pragmatically), or Generic Subdomain
      (commodity, buy or outsource). The classification drives investment
      decisions and determines how much design effort the context warrants.
    references:
      - name: Strategic Domain Classification
        type: tactic
        id: strategic-domain-classification
        when: Applying the classification framework to this context.
  - title: Map the communication boundaries
    description: >
      For each inbound and outbound message, identify the source or target
      context, the message name, and the integration pattern (sync API,
      event, shared database). This reveals the coupling profile of the
      context. High fan-in or fan-out signals potential boundary problems.
    references:
      - name: Context Mapping Classification
        type: tactic
        id: context-mapping-classification
        when: Classifying the integration pattern for each relationship.
  - title: Surface the ubiquitous language and create a glossary
    description: >
      List the key terms as used within this context, with definitions.
      Highlight terms that have different meanings in other contexts --
      these are the language boundaries that justify the context boundary.
      Capture terms in a structured glossary that can be enforced by
      tooling such as Contextive.
    examples:
      - "'Policy' in Pricing means actuarial rules; 'Policy' in Billing means payment terms. Both are valid in their context."
    references:
      - name: Glossary Curation Interview
        type: tactic
        id: glossary-curation-interview
        when: Systematically capturing and curating terms for the context's glossary.
      - name: Bounded Context Canvas Template
        type: template
        id: bounded-context-canvas-template
        when: Recording terms in the canvas's Ubiquitous Language section.
      - name: Contextive
        type: toolguide
        id: contextive
        when: Enforcing the glossary in code via IDE-integrated ubiquitous language management.
  - title: Extract business decisions and invariants
    description: >
      Identify the business rules that this context enforces -- the
      decisions and constraints that make it complex. These are not
      implementation details but domain rules that a domain expert would
      recognise. If you cannot find meaningful business decisions, the
      context may be a thin technical wrapper rather than a true domain
      boundary.
    examples:
      - "Premium must be recalculated when risk factors change. Discount cannot exceed 30% without underwriter approval."
  - title: Record assumptions and open questions
    description: >
      Make uncertainty visible. For each assumption, link it to a
      verification metric. For each open question, assign an owner and a
      deadline. These sections prevent premature commitment and give
      future readers visibility into what was known and unknown at design
      time.
    examples:
      - "Assumption: pricing calculations complete within 200ms. Metric: p99 latency of /quote endpoint."
      - "Open question: multi-currency pricing in v1? Owner: Product. Due: Sprint 3 planning."
failure_modes:
  - "Incomplete canvas: filling only the easy sections (Name, Purpose) and skipping the valuable ones (Business Decisions, Open Questions)."
  - "Solo exercise: filling the canvas alone instead of collaboratively with domain experts and engineers."
  - "Copy-paste architecture: treating the canvas as a form to fill rather than a thinking tool to drive discussion."
  - "Static artifact: completing the canvas once and never revisiting it as the context evolves."
  - "Technical framing: writing the purpose and business decisions in technical terms that domain experts cannot validate."
  - "Missing glossary: filling the Ubiquitous Language section as prose notes rather than structured, enforceable glossary entries."
references:
  - name: Bounded Context Identification
    type: tactic
    id: bounded-context-identification
    when: Contexts must be identified before their canvases can be filled.
  - name: Aggregate Boundary Design
    type: tactic
    id: aggregate-boundary-design
    when: Filling the Domain Roles section with aggregates, entities, and value objects.
  - name: Glossary Template
    type: template
    id: glossary-template
    when: Structuring glossary entries extracted during canvas fill.
