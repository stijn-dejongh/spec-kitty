schema_version: "1.0"
id: refactoring-encapsulate-variable
name: "Refactoring: Encapsulate Variable"
purpose: >
  Wrap a widely-accessed module-level or global variable behind getter and
  setter functions. This creates a single chokepoint for monitoring access,
  adding validation, and later changing the variable's type or structure
  without updating every consumer. Also known as Encapsulate Field,
  Self-Encapsulate Field.
steps:
  - title: Identify the variable to encapsulate
    description: >
      Find a module-level variable (or public class attribute) that is read
      or written from multiple locations. The more access points, the higher
      the payoff from encapsulation.
    examples:
      - "default_owner = {'first_name': 'Martin', 'last_name': 'Fowler'} imported in 8 modules."
  - title: Create accessor functions
    description: >
      Write a getter function that returns the current value and a setter
      function that replaces it. Export these functions instead of the
      variable itself. Rename the variable to signal it is now private
      (e.g., _default_owner_data).
    examples:
      - "def get_default_owner(): return _default_owner_data"
      - "def set_default_owner(value): global _default_owner_data; _default_owner_data = value"
  - title: Migrate all read sites
    description: >
      Replace every direct read of the variable with a call to the getter.
      Do one module at a time, running tests after each. Search for all
      import statements and attribute accesses on the module.
  - title: Migrate all write sites
    description: >
      Replace every direct assignment with a call to the setter. This is
      where bugs hide — look for augmented assignments (+=, .append()) that
      mutate the value in place rather than replacing it.
  - title: Restrict the variable's visibility
    description: >
      Once all access goes through the functions, make the variable
      unexportable (_ prefix in Python, non-exported in TypeScript).
      If the value is mutable (dict, list), consider returning a copy
      from the getter to prevent mutation bypassing the setter.
failure_modes:
  - "Mutation bypass: callers get the mutable value from the getter and modify it in place, skipping the setter."
  - "Incomplete migration: some imports still reference the raw variable."
  - "Over-encapsulation: wrapping a truly immutable constant that will never change or need monitoring."
