schema_version: "1.0"
id: refactoring-introduce-null-object
name: Refactoring Introduce Null Object
purpose: Replace repetitive null-check branches with a null-object implementation that preserves the same interface.
steps:
  - title: Identify repeated null checks
    description: Find one collaborator role where repeated null handling obscures flow or duplicates fallback behavior.
  - title: Define the shared contract
    description: Capture the collaborator interface that both the real implementation and the null object will satisfy.
  - title: Protect null and non-null behavior
    description: Add or verify tests for both the current null path and the normal collaborator path.
  - title: Implement the null object
    description: Create a dedicated implementation with explicit safe default behavior.
  - title: Replace provisioning and remove checks
    description: Inject the null object where absence was previously represented by null and remove redundant branches incrementally.
  - title: Revalidate behavior
    description: Run tests after each migrated caller to ensure the null object does not hide errors or change semantics.
