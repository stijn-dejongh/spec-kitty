schema_version: "1.0"
id: refactoring-guard-clauses-before-polymorphism
name: Refactoring Guard Clauses Before Polymorphism
purpose: Flatten nested branch pyramids into ordered guard clauses before extracting polymorphic behavior.
steps:
  - title: List branch order and fallback behavior
    description: Identify every conditional branch, its current precedence, and any side effects that must be preserved.
  - title: Lock branch behavior with tests
    description: Add or verify coverage for branch precedence, fallback behavior, and exceptional paths.
  - title: Convert terminal branches to guards
    description: Replace the outermost exceptional or terminal branches with explicit early returns.
  - title: Linearize the happy path
    description: Continue flattening nested conditionals until the main execution path is direct and readable.
  - title: Mark variation points
    description: Identify the remaining stable algorithm branches that are now suitable for polymorphic extraction.
    references:
      - name: Refactoring Conditional to Strategy
        type: tactic
        id: refactoring-conditional-to-strategy
        when: Follow when the flattened variation points represent stable algorithm variants.
  - title: Verify behavior remains unchanged
    description: Run tests after each structural change and stop before combining the cleanup with the next refactoring step.
