schema_version: "1.0"
id: refactoring-state-pattern-for-behavior
name: "Refactoring: State Pattern for Behavior"
purpose: >
  Replace sprawling conditional logic that switches on an object's state with
  dedicated state classes behind a common interface. The context object delegates
  behavior to the current state object, and state transitions swap that object
  rather than flipping flags or enum values.
steps:
  - title: Identify the state-bearing object
    description: >
      Find the class whose methods contain conditionals that branch on the same
      internal state variable (enum, string, boolean flags). This is the Context.
    examples:
      - "Order class with if/elif chains on self.status in process(), cancel(), ship()."
  - title: Extract a State interface
    description: >
      Define an interface (abstract base class or protocol) declaring every
      method that varies by state. Each method signature mirrors the context
      method it will replace.
    examples:
      - "class OrderState(Protocol): def process(self, ctx): ... def cancel(self, ctx): ..."
  - title: Create one ConcreteState per branch
    description: >
      For each value the state variable can take, create a class implementing
      the State interface. Move the branch body into the corresponding method.
      Each ConcreteState holds only the logic for its own state.
    examples:
      - "class PendingState(OrderState): class ShippedState(OrderState): class CanceledState(OrderState):"
  - title: Delegate from Context to current state
    description: >
      Replace the conditional methods in the Context with a single delegation
      call to self._state.<method>(self). Store the current state object as
      an instance attribute. Initialize it to the starting state.
  - title: Implement transitions as state swaps
    description: >
      State transitions become self._state = NewState() inside the ConcreteState
      methods (via a context backreference) or in the Context itself. There are
      no more flag mutations or enum assignments.
  - title: Verify with existing tests
    description: >
      Run the full test suite. The refactoring is behavior-preserving — all
      existing tests must pass without modification. If a test asserts on
      internal state flags, update it to assert on behavior instead.
failure_modes:
  - "Over-engineering: applying State pattern to a 2-3 value flag with no behavioral variation per state."
  - "God transitions: letting ConcreteStates reach into Context internals beyond the state swap."
  - "Incomplete extraction: leaving some conditional branches in the Context alongside delegation."
  - "Missing interface method: adding a new operation to Context but forgetting to add it to the State interface."
references:
  - name: "Refactoring: Conditional to Strategy"
    type: tactic
    id: refactoring-conditional-to-strategy
    when: Choosing between State and Strategy — State is for lifecycle-driven transitions, Strategy for interchangeable algorithms.
