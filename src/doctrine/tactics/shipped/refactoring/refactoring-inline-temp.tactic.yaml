schema_version: "1.0"
id: refactoring-inline-temp
name: Refactoring Inline Temp
purpose: Remove temporary variables that only alias simple expressions and do not add domain meaning.
steps:
  - title: Identify trivial temporary aliases
    description: Find temp variables that store pure expressions and are used only once or in a trivial local scope.
  - title: Verify purity and cost
    description: Confirm the expression has no side effects and will not introduce unacceptable recomputation.
  - title: Protect behavior
    description: Add or verify tests covering the code path before removing the alias.
  - title: Inline the expression
    description: Replace the temp usage with the underlying expression at the call site.
  - title: Remove the obsolete declaration
    description: Delete the temporary variable and rerun tests to confirm unchanged behavior.
