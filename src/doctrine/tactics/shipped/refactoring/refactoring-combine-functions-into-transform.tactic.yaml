schema_version: "1.0"
id: refactoring-combine-functions-into-transform
name: "Refactoring: Combine Functions into Transform"
purpose: >
  Consolidate multiple functions that independently calculate derived values from
  the same input record into a single transform function that returns an enriched
  copy. Eliminates scattered derivation logic and makes the full set of computed
  properties discoverable in one place.
steps:
  - title: Identify the shared input record
    description: >
      Find the data structure (dict, dataclass, DTO) that multiple functions
      accept as input to compute derived values. These functions are the
      candidates for consolidation.
    examples:
      - "base_charge(reading), taxable_charge(reading), total(reading) all accept the same Reading."
  - title: Create the transform function
    description: >
      Write a new function that accepts the input record, deep-copies it to
      avoid mutation, and returns the enriched copy. Name it after the
      enrichment intent (e.g., enrich_reading, augment_order).
  - title: Move each derivation into the transform
    description: >
      For each candidate function, call it inside the transform and assign its
      result as a new field on the copy. Do one function at a time, running
      tests after each move.
    examples:
      - "result.base_charge = base_charge(result); result.taxable_charge = taxable_charge(result)"
  - title: Replace call sites
    description: >
      At each call site that previously called a derivation function directly,
      call the transform once and read the enriched field. If multiple
      derivations were computed at the same site, they now come from one call.
  - title: Inline or remove original functions
    description: >
      Once all call sites use the transform, the standalone derivation functions
      are dead code. Inline them into the transform body or delete them.
      Run the full suite to confirm.
failure_modes:
  - "Mutating the input: forgetting to deep-copy, causing side effects on the caller's data."
  - "Partial migration: leaving some call sites using the old functions while others use the transform."
  - "Over-enrichment: adding unrelated derivations to the transform, turning it into a god function."
