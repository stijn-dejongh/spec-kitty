schema_version: "1.0"
id: refactoring-retry-pattern
name: Refactoring Retry Pattern
purpose: Centralize retry behavior for transient failures without hiding persistent faults or non-retry-safe operations.
steps:
  - title: Identify transient failure boundaries
    description: Select the operation and failure modes that are genuinely transient and safe to retry.
  - title: Define retry policy
    description: Set attempts, backoff, jitter, and termination conditions before changing the implementation.
  - title: Protect retry and exhaustion behavior
    description: Add or verify tests for success-after-retry, exhaustion, and no-retry paths.
  - title: Encapsulate the retry mechanism
    description: Move retry behavior into one reusable policy component or wrapper.
  - title: Replace duplicate ad-hoc retries
    description: Migrate call sites to the shared policy and remove inconsistent local retry blocks.
  - title: Add observability and verify
    description: Ensure attempts and terminal failures are visible in logs or metrics and rerun the resilience tests.
