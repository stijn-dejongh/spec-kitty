schema_version: "1.0"
id: refactoring-replace-temp-with-query
name: Refactoring Replace Temp With Query
purpose: Replace derived temporary variables with query methods so derivation logic becomes explicit and reusable.
steps:
  - title: Identify derived temps
    description: Find local temporary variables that store computed values rather than input or state.
  - title: Protect dependent behavior
    description: Add or verify tests for code paths that rely on the derived value.
  - title: Extract the query
    description: Move the derivation into a named query method with clear intent.
  - title: Replace temp usages
    description: Switch call sites from the temp variable to the query method incrementally.
  - title: Remove the obsolete temp
    description: Delete the temporary assignment and rerun tests to confirm unchanged behavior and acceptable performance.
