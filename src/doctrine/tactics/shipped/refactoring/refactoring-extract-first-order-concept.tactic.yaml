schema_version: "1.0"
id: refactoring-extract-first-order-concept
name: Refactoring Extract First-Order Concept
purpose: Turn implicit or duplicated logic into an explicit concept with a clear responsibility and name.
references:
  - name: Refactoring Strangler Fig
    type: tactic
    id: refactoring-strangler-fig
    when: Use when the extraction cannot be completed safely in a single change and needs coexistence before cutover.
steps:
  - title: Identify the hidden concept
    description: Find duplicated, complex, or implicitly shared logic that appears to represent a reusable concept.
  - title: Define the responsibility in one sentence
    description: State what the new concept owns so it does not become a generic dumping ground.
  - title: Protect current behavior
    description: Add or verify tests before introducing the new abstraction.
  - title: Create the new abstraction
    description: Introduce the class, module, function, or delegate that represents the extracted concept.
  - title: Move the target logic
    description: Relocate only the identified logic into the new abstraction without mixing in unrelated changes.
  - title: Update callers and verify
    description: Switch callers to the extracted concept and rerun tests to confirm behavior is preserved.
