schema_version: "1.0"
id: refactoring-change-function-declaration
name: "Refactoring: Change Function Declaration"
purpose: >
  Rename a function, adjust its parameters, or change its signature to better
  reflect its current responsibility. Good names reduce cognitive load; good
  parameter lists reduce coupling. Also known as Rename Function, Add Parameter,
  Remove Parameter, Change Signature.
steps:
  - title: Identify the declaration to change
    description: >
      Find the function whose name no longer reflects its purpose, or whose
      parameter list includes unused parameters, missing parameters, or
      parameters that encode implementation details the caller should not know.
    examples:
      - "circum(radius) should be circumference(radius)."
      - "process(data, debug=False) where debug is never used."
  - title: Choose simple or migration mechanics
    description: >
      Simple mechanics: rename in place and update all call sites in one pass.
      Use when the function is internal and call sites are few.
      Migration mechanics: create a new function with the desired signature,
      delegate the old function to the new one, migrate callers incrementally,
      then remove the old function. Use when the function is public API or
      has many callers.
  - title: Apply simple mechanics (if chosen)
    description: >
      Rename the function, update every call site, run tests. If adding a
      parameter, add it with a default value first so existing callers are
      unaffected, then migrate callers to pass the argument explicitly.
  - title: Apply migration mechanics (if chosen)
    description: >
      Create the new function with the target signature. Have the old function
      call the new one internally. Mark the old function as deprecated if the
      language supports it. Migrate callers one by one, running tests after
      each batch. Remove the old function when no callers remain.
  - title: Verify with tests
    description: >
      The refactoring is behavior-preserving. All existing tests must pass.
      If tests reference the old name directly (e.g., in mocks), update them
      to use the new name.
failure_modes:
  - "Incomplete migration: renaming the definition but missing call sites, causing runtime errors."
  - "Name churn: renaming repeatedly without settling on a stable vocabulary."
  - "Breaking public API: changing a published signature without migration mechanics or deprecation."
  - "Parameter bloat: adding parameters to fix immediate needs without considering whether the function should be split."
