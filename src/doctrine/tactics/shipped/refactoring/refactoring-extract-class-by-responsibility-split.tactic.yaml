schema_version: "1.0"
id: refactoring-extract-class-by-responsibility-split
name: Refactoring Extract Class by Responsibility Split
purpose: Split a class with mixed concerns into focused classes aligned to cohesive responsibilities.
steps:
  - title: Map responsibility clusters
    description: Identify the current class members and group methods and fields by the reasons they change together.
  - title: Choose one extraction target
    description: Select one cohesive responsibility cluster as the first safe extraction boundary.
  - title: Protect behavior with tests
    description: Add or verify coverage for externally observable behavior touched by the selected cluster.
  - title: Create the extracted class
    description: Introduce a new class containing only the fields and behavior required for the chosen responsibility.
  - title: Delegate incrementally from the source class
    description: Move members gradually and keep the original class delegating until callers can migrate safely.
  - title: Migrate callers and remove obsolete members
    description: Update callers one at a time, rerun tests after each step, and delete source members when the extraction is complete.
