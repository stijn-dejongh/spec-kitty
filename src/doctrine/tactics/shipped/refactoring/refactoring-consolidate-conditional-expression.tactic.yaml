schema_version: "1.0"
id: refactoring-consolidate-conditional-expression
name: "Refactoring: Consolidate Conditional Expression"
purpose: >
  Merge multiple sequential conditional checks that produce the same result into
  a single combined condition, then extract it into a named predicate function.
  Replaces mechanical guard sequences with a self-documenting intent declaration.
steps:
  - title: Identify same-result conditionals
    description: >
      Find sequences of if-statements or early returns where two or more
      conditions lead to the identical outcome (same return value, same
      exception, same side effect).
    examples:
      - "if seniority < 2: return 0; if months_disabled > 12: return 0; if is_part_time: return 0"
  - title: Combine with logical operators
    description: >
      Merge the conditions using or (for same-result) or and (for
      nested guards). Preserve short-circuit evaluation order if any
      condition has side effects or performance implications.
    examples:
      - "if seniority < 2 or months_disabled > 12 or is_part_time: return 0"
  - title: Extract into a named predicate
    description: >
      Move the combined condition into a function whose name expresses the
      business intent, not the mechanical check. The name should answer
      why this path is taken.
    examples:
      - "def is_not_eligible_for_disability(employee): ..."
  - title: Replace original conditionals
    description: >
      Substitute the sequence of guards with a single call to the named
      predicate. Run tests to verify identical behavior.
  - title: Consider further extraction
    description: >
      If the predicate is reused elsewhere, promote it to a method on the
      domain object. If the conditions are truly independent (coincidentally
      same result but unrelated reasons), do not consolidate — keep them
      separate for clarity.
failure_modes:
  - "Forced consolidation: merging unrelated conditions that coincidentally return the same value but have independent reasons."
  - "Lost readability: combining so many conditions that the predicate body is harder to read than the original sequence."
  - "Wrong operator: using and when or was needed, silently changing behavior."
