schema_version: "1.0"
id: refactoring-encapsulate-record
name: "Refactoring: Encapsulate Record"
purpose: >
  Replace a raw data record (dict, plain object, named tuple used mutably) with
  a class that controls access through getters and setters. Encapsulation lets
  you add validation, rename fields, and change internal representation without
  rippling through every consumer. Also known as Replace Record with Data Class.
steps:
  - title: Identify the record to encapsulate
    description: >
      Find a data structure accessed by field name from multiple call sites,
      where direct access prevents you from adding validation, renaming fields,
      or changing the internal layout.
    examples:
      - "organization = {'name': 'Acme', 'country': 'GB'} accessed as organization['name'] in 12 places."
  - title: Create a wrapper class
    description: >
      Define a class with a constructor that accepts the record data. Store
      each field as a private attribute. For Python, use a dataclass or
      Pydantic model; for TypeScript, use a class with private fields.
  - title: Add accessors for each field
    description: >
      Create a getter (and setter if mutable) for every field. Callers will
      use these instead of direct field access. For immutable records, omit
      setters and freeze the object.
    examples:
      - "@property def name(self) -> str: return self._name"
  - title: Migrate call sites
    description: >
      Replace each direct field access with the corresponding accessor.
      Do one field at a time, running tests after each. Search for all
      dict key accesses or attribute accesses on the old record type.
  - title: Add behavior to accessors
    description: >
      Now that access is controlled, add validation in setters, computed
      properties in getters, or change the internal representation. This
      is the payoff — previously impossible without encapsulation.
failure_modes:
  - "Leaking internals: returning mutable internal collections from getters without copying."
  - "Premature encapsulation: wrapping a record that truly has no behavior and never will."
  - "Half-encapsulated: some callers use accessors, others still access the raw dict."
references:
  - name: "Refactoring: Encapsulate Variable"
    type: tactic
    id: refactoring-encapsulate-variable
    when: The record is accessed via a module-level variable — encapsulate the variable first, then the record.
