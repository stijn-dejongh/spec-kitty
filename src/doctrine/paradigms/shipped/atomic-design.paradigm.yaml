schema_version: "1.0"
id: atomic-design
name: Atomic Design
summary: >
  Compose interfaces from a five-level hierarchy (atoms, molecules, organisms,
  templates, pages) where each level owns its appropriate concern. State
  ownership, reactive stream scope, and centralized store usage are bounded
  by the same compositional levels that govern visual structure.
