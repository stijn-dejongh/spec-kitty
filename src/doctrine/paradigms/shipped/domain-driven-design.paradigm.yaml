opposed_by:
  - type: paradigm
    id: anemic-domain-model
    reason: >
      Anemic Domain Models strip behaviour from domain objects, reducing them
      to data bags with external procedural services. This defeats the purpose
      of a rich, expressive domain model and scatters invariant enforcement
      across service layers.
  - type: paradigm
    id: big-ball-of-mud
    reason: >
      A Big Ball of Mud architecture has no explicit context boundaries or
      ubiquitous language. Concepts leak across modules, coupling grows
      unchecked, and model integrity becomes impossible to maintain.
  - type: tactic
    id: database-driven-design
    reason: >
      Starting from a database schema and generating code around it inverts
      the DDD priority: the domain model should drive persistence, not the
      other way around. Schema-first thinking produces models shaped by
      storage constraints rather than business rules.
