schema_version: "1.0"
id: domain-driven-design
name: Domain-Driven Design
summary: >
  Software design guided by a deep model of the business domain. Strategic
  design decomposes a system into Bounded Contexts connected through explicit
  Context Mapping patterns (ACL, OHS, Shared Kernel, Published Language, etc.).
  Within each context a Ubiquitous Language keeps code, model, and domain
  expert communication aligned. Tactical patterns (Aggregates, Entities, Value
  Objects, Domain Events, Repositories, Domain Services) enforce invariants at
  the model boundary. DDD treats the domain model as the primary artifact —
  code is a direct expression of that model, not a translation layer above a
  database schema or UI framework.

