schema_version: "1.0"
id: brownfield-onboarding
name: Brownfield Onboarding
summary: >
  DRAFT / PROVISIONAL (2026-05-08). Approach a mature, in-use codebase as a
  teacher rather than a problem. Legacy code is the durable record of
  constraints, edge cases, and prior decisions the team has already paid for;
  it deserves epistemic humility before it deserves restructuring. Brownfield
  onboarding treats investigation as a precondition to non-trivial change:
  forensic methods (git-history mining, hotspot and change-coupling analysis
  via tactic:forensic-repository-audit) surface "what" and "where";
  qualitative methods (SME interviews, decision archaeology) answer "why";
  structural overlays (DDD strategic classification, deep-module analysis)
  give the findings a vocabulary the team can act on. None of these methods
  alone is sufficient. The durable artifact of the engagement is not a
  refactor plan but a hierarchical reference bundle -- system overview,
  subsystem maps, click paths, terminology aliases, design paradigms inferred
  from the code -- that lowers bus-factor risk before code shape is touched.
  Knowledge transfer is load-bearing: the DM-D principle ("document and
  transfer first, then refactor") protects the implicit invariants that
  restructure would otherwise erase. Respect for prior decisions and
  willingness to change are held in tension on purpose: refusing to remove
  what you do not yet understand is Chesterton's-fence discipline; refusing
  to change because change is hard is preservation by inertia. The paradigm
  walks the line between them by gating structural moves on captured
  understanding, not on courage or on caution alone.

