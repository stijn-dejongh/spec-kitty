# ---------------------------------------------------------------------------
# Provisional notes -- iterate freely.
# ---------------------------------------------------------------------------
# - This paradigm is DRAFT as of 2026-05-08. It codifies the worldview that
#   emerged from the 2026-05 CaaCS engagement on spec-kitty itself
#   (docs/plans/engineering-notes/architecture-audits/2026-05-spec-kitty-caacs.md and the meta-assessment
#   companion). It is deliberately authored before issues #665 (hierarchical
#   reference bundles as a skill) and #666 (SME-interview tactic) ship, so
#   that the worldview anchors those artifacts rather than trailing them.
# - [provisional: candidate for refinement] The DM-D ordering ("document and
#   transfer first, then refactor") is stated as a principle here. Whether
#   it should escalate to a directive is left open for the next curation
#   pass; promotion would obligate every mission on a mature codebase to
#   gate refactor work on a captured knowledge artifact, which is a strong
#   claim and deserves explicit ratification.
# - [provisional: candidate for refinement] Bus factor is treated as a
#   first-class risk surface here. The empirical basis is the 2026-05
#   spec-kitty CaaCS run; a broader evidence base from other brownfield
#   engagements would strengthen or qualify the claim.
# - Cross-links into the doctrine graph are declared in src/doctrine/graph.yaml
#   alongside this file. The motivating tactic is forensic-repository-audit
#   and the motivating procedure is legacy-codebase-triage; the structural
#   overlays are domain-driven-design and deep-module-design.
