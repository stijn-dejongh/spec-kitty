[pytest]
# NOTE: Intentionally excluding `.` from pythonpath. With both `.` and `src/`
# on the path, Python can load the same source file under two module names
# (e.g. `doctrine.resolver` and `src.doctrine.resolver`), creating duplicate
# class objects that break `is` / `==` checks for enum members across the
# module boundary. The `.` entry is only needed for `from src.X import Y`
# style imports in test code — which are now all fixed to use the canonical
# `from X import Y` form.
pythonpath = src
testpaths = tests
addopts = -v --tb=short
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    e2e: End-to-end tests exercising the full CLI workflow (may be slow)
    orchestrator_availability: tests for agent availability detection
    orchestrator_fixtures: tests for fixture loading and management
    orchestrator_happy_path: happy path end-to-end tests
    orchestrator_review_cycles: review rejection/approval cycle tests
    orchestrator_parallel: parallel execution and dependency tests
    orchestrator_smoke: basic smoke tests for agent invocation
    core_agent: test requires core tier agent (fails if unavailable)
    extended_agent: test for extended tier agent (skips if unavailable)
    slow: test expected to take >30 seconds
    fast: pure-logic tests with no subprocess/git overhead (sub-second per test)
    timeout: test timeout in seconds (requires pytest-timeout plugin)
    adversarial: Adversarial/security tests for 0.13.0
    doctrine: Doctrine package smoke and integration checks
    distribution: Tests requiring wheel install (slow, no SPEC_KITTY_TEMPLATE_ROOT)
    platform_darwin: macOS-specific tests (case-insensitive FS)
    platform_linux: Linux-specific tests
    requires_symlinks: Tests that need symlink support
    asyncio: marks tests as async (requires pytest-asyncio plugin)
    integration: marks integration tests
    contract: Consumer-surface contract tests pinning external public APIs (e.g. spec-kitty-events / spec-kitty-tracker) the CLI depends on
    git_repo: tests that create real git repositories (subprocess git init)
    no_readiness_stub: opt out of any autouse readiness-stub fixture so the test exercises its own readiness wiring (mission 082 tracker CLI tests)
    windows_ci: tests that must pass on the native windows-latest CI job (runs only on windows-latest; covers hook execution, file-backed auth store, path helpers, worktree fallback, regression guards)
    live_adapter: tests that call the real Anthropic API (deselect with -m 'not live_adapter')
    non_sandbox: test is structurally incompatible with mutmut's forked sandbox (subprocess CLI calls, whole-codebase AST walks, wheel builds, or repo-state fixtures outside also_copy). See ADR 2026-04-20-1
    flaky: test passes in the main suite but is non-deterministic under mutmut or forking pipelines. Each entry is debt — root-cause and remove. See ADR 2026-04-20-1
    unit: pure-logic tests for a single module's behavior (no subprocess, no filesystem beyond tmp_path, no network). Distinct from `fast` (which is a performance characterisation); `unit` is the category default for module-scoped tests
    architectural: architectural invariant tests (layer-rule pytestarch checks, import-boundary scans, shared-package-boundary, naming conventions, schema enforcement). Run in the architectural gate
    exploratory: human-driven exploratory tests not intended for CI. Opt them out of CI workflows via `-m "not exploratory"`
    agent: tests that exercise the orchestrator-api / agent-facing contract surfaces (JSON envelope, typer compatibility)
