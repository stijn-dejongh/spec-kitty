  - path: "docs/adr/3.x/2026-07-01-1-no-legacy-compat-branches-in-resolvers.md"
    title: "ADR: No Legacy-Compat Branches in Resolvers — Require Canonical Identity, Migrate Legacy"
    divio_type: "none"
    abstract: "The mission-identity model (083+) mints a canonical ULID `mission_id` for **every** mission at `mission create`; `mission_id` is the sole runtime identity for lookup, locking, and routing. Pre-083 missions are the only artifacts that can lack one, and the sanctioned remedy for them is a one-time migration (`spec-kitty migrate backfill-identity`), audited by `spec-kitty doctor identity`."
