  - path: "docs/adr/3.x/2026-06-30-1-sync-daemon-identity-and-cleanup-classification.md"
    title: "ADR: Sync Daemon Identity Contract and Cleanup Classification"
    divio_type: "none"
    abstract: "On 2026-06-30 a Spec Kitty machine accumulated **18 orphan sync daemons** on ports `9401–9418`, spanning package versions `3.2.2`, `3.2.3`, and `3.2.4`. Each CLI upgrade left the prior-version daemon running because the old reaper skipped any candidate whose executable or interpreter identity differed from the current process — a third identity condition that silently gated cleanup. The result was unbounded orphan accumulation across upgrades."
