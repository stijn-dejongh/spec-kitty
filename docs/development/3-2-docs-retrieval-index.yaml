  - path: "docs/adr/3.x/2026-06-07-1-session-presence-multi-harness-architecture.md"
    title: "Session Presence: Multi-Harness Architecture for Orientation and Upgrade Checking"
    divio_type: "none"
    abstract: "`spec-kitty init` deploys command-skill files into 13 slash-command agent directories and 6 skills-based agent roots (19 harnesses total). After init, no harness has any persistent awareness that spec-kitty exists — there is no always-loaded orientation text, no upgrade check, and no routing rule that directs \"hey spec kitty, fix X\" to `spec-kitty dispatch`. Competing tools (e.g. gstack) solve this by injecting a section into their harness's persistent instruction file at install time and registering a session-start hook where the harness supports one."
