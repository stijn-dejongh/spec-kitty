  - path: "docs/adr/3.x/2026-05-19-1-retrospective-default-policy-architecture.md"
    title: "Retrospective Default-on Policy Architecture"
    divio_type: "none"
    abstract: "Through 3.1.x, retrospective learning in Spec Kitty was effectively gated by two environment variables (`SPEC_KITTY_RETROSPECTIVE`, `SPEC_KITTY_MODE`), and the runtime wired `facilitator_callback=None` so even an \"enabled\" strict path failed closed instead of producing useful learning. The user-facing `spec-kitty agent retrospect synthesize` command — a proposal preview/apply tool — became the *de facto* authoring surface because it had a silent fallback that fabricated empty completed records when artifacts looked sufficient. As a result, completed missions rarely produced useful retrospective records, and post-merge documentation (PR #1136) overstated what `summary` and `synthesize` actually capture."
