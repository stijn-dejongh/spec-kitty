  - path: "docs/adr/3.x/2026-07-08-1-mission-resolver-port.md"
    title: "ADR: MissionResolver Port — One Walk Trunk, Shell-Side DI, No Shared Container"
    divio_type: "none"
    abstract: "The Phase 1 gate ([2026-06-26-1](2026-06-26-1-single-authority-seam-and-call-site-gate.md)) closed the #2164 canonicalization-fold and #2160 coord-authority classes with a seam-plus-AST-gate, but deliberately deferred the deeper defect this mission (#2173 Phase 2) closes: `kitty-specs/` is walked from **many** independent call sites (`_build_index` in the canonicalizer, `status/identity_audit.py`, `merge/ordering.py`, `core/paths.py`, a dashboard scanner, a handful of `--all`-mode CLI validators, migration scripts, …), each re-implementing the same `iterdir()` + `meta.json` read, each re-walking on every call with no shared in-memory index, and each free to silently diverge from the others' notion of \"how to find a mission.\" Phase 1's gate fences the canonicalization *fold*; it does not fence *walking* itself, so a new raw `kitty-specs/` enumeration can still be added anywhere in `src/` without tripping anything."
