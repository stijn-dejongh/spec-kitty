  - path: "docs/adr/3.x/2026-06-11-1-op-as-first-class-execution-artifact.md"
    title: "ADR 2026-06-11-1: Op as a First-Class Execution Artifact (Mission ⟷ Op ⟷ ad-hoc)"
    divio_type: "none"
    abstract: "`spec-kitty dispatch` opens bounded, doctrine-governed agent actions that run immediately — no spec, no plan, no work packages, no lane worktree — yet they still load governance context, route to an agent profile, and produce a durable record. The implementation lives in `src/specify_cli/invocation/` and already emits `OpStartedEvent` / `OpCompletedEvent` (see `src/specify_cli/invocation/__init__.py`), but the **concept** these commands express has never been named or ratified at the architecture level. #1688 (the proposal, now closed/superseded into this ADR) diagnosed the gap precisely: the records were treated as scratch byproducts of \"governance machinery\" rather than as instances of a real unit of work."
