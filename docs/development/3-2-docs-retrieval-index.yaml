  - path: "docs/adr/3.x/2026-07-07-1-ignored-surface-backfill-migration-pattern.md"
    title: "ADR: IGNORED-Surface Backfill Migration Pattern"
    divio_type: "none"
    abstract: "When a new `IGNORED` `StateSurface` is added to `src/specify_cli/state/contract.py`, fresh `spec-kitty init` immediately covers new projects via `GitignoreManager.protect_all_agents()` — which derives its runtime entries from `get_runtime_gitignore_entries()` at module load.  But **existing projects never receive the entry** until they run `spec-kitty upgrade`; those projects continue to commit machine-local artefacts until the next upgrade."
