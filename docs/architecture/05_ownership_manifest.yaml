# docs/architecture/05_ownership_manifest.yaml
#
# Machine-readable companion to 05_ownership_map.md.
# Validated by tests/architecture/test_ownership_manifest_schema.py.
# Schema definition: kitty-specs/functional-ownership-map-01KPDY72/data-model.md
#
# DO NOT edit this file in isolation — changes must also be reflected in
# 05_ownership_map.md and must pass the schema test.

cli_shell:
  canonical_package: src/specify_cli/cli/
  current_state:
    - src/specify_cli/cli/
  adapter_responsibilities:
    - All user-facing CLI commands, argument parsing, and Rich console output
    - Entry points for every spec-kitty sub-command
    - Permanent home; extraction of other slices moves code out of src/specify_cli/, not out of the CLI shell
  shims: []
  seams:
    - CLI shell delegates mission execution to runtime_mission_execution via spec-kitty implement / next / review / accept
    - CLI shell reads charter context via charter.build_charter_context for spec-kitty charter commands
    - CLI shell reads lifecycle status via status.* for spec-kitty agent tasks status
  extraction_sequencing_notes: >
    Not extracted. The CLI shell is the permanent src/specify_cli/ surface for CLI-only code.
    All other slices are extracted out of src/specify_cli/, not out of the CLI shell.
    No downstream mission targets this slice.

charter_governance:
  canonical_package: charter
  current_state:
    - src/charter/
  adapter_responsibilities:
    - src/specify_cli/cli/commands/charter.py — spec-kitty charter CLI commands
    - src/specify_cli/cli/commands/charter_bundle.py — bundle management CLI surface
  shims: []
  seams:
    - Runtime reads charter context via charter.build_charter_context to load project principles at mission start
    - Doctrine loads charter bundle for principle synthesis via charter.ensure_charter_bundle_fresh
  extraction_sequencing_notes: >
    Already extracted by mission charter-ownership-consolidation-and-neutrality-hardening-01KPD880.
    The src/specify_cli/charter/ compatibility shim was deleted by WP02 of mission
    functional-ownership-map-01KPDY72 (removed in 3.2.0). No further extraction queued.

doctrine:
  canonical_package: doctrine
  current_state:
    - src/doctrine/
  adapter_responsibilities:
    - CLI rendering for doctrine entries stays in src/specify_cli/cli/
  shims: []
  seams:
    - Runtime loads doctrine.model_task_routing to select the appropriate model for each Work Package task type
    - Charter reads doctrine principles during charter synthesis for principle-doctrine alignment checks
  extraction_sequencing_notes: >
    Already extracted. The model_task_routing artefact specialises the tactic parent-kind:
    it adds a schema-validated task/model catalog, routing policy (weights, tier constraints,
    override policy), and freshness policy (R-006). No further extraction queued.

runtime_mission_execution:
  canonical_package: src/runtime/
  current_state:
    - src/runtime/next/
    - src/specify_cli/runtime/
    - src/specify_cli/missions/
    - src/specify_cli/mission.py
    - src/specify_cli/mission_metadata.py
  adapter_responsibilities:
    - src/specify_cli/cli/commands/implement.py — spec-kitty implement CLI entry point
    - src/specify_cli/cli/commands/accept.py — spec-kitty accept CLI entry point
    - src/specify_cli/cli/commands/init.py — spec-kitty init CLI entry point
    - All other spec-kitty agent action CLI entry points
  shims: []  # specify_cli.next re-export shim deleted by mission unshim-wave2-01KWMCAX (2026-07-03); canonical import is runtime.next
  seams:
    - CLI shell calls runtime to execute the next-step control loop (spec-kitty next)
    - Runtime reads charter context at mission start via charter.build_charter_context
    - Runtime reads doctrine.model_task_routing for model selection at Work Package dispatch time
    - Runtime reads lifecycle lane state via status.lane_reader.get_wp_lane() to decide which Work Package to claim next
    - Runtime reads glossary state via glossary for terminology validation during mission execution
  extraction_sequencing_notes: >
    Partially extracted by mission #612: the canonical next-step runtime/control-loop
    package now lives under src/runtime/next/. Bootstrap, mission registry, and broader
    invocation helpers remain in src/specify_cli/ pending narrower follow-ups.
  dependency_rules:
    may_call:
      - charter_governance
      - doctrine
      - lifecycle_status
      - glossary
    may_be_called_by:
      - cli_shell

glossary:
  canonical_package: src/glossary/
  current_state:
    - src/glossary/
  adapter_responsibilities:
    - src/specify_cli/cli/commands/glossary.py — CLI argument parsing and Rich rendering for spec-kitty glossary commands
  shims: []  # specify_cli.glossary re-export shim deleted by mission unshim-wave2-01KWMCAX (2026-07-03); canonical import is glossary
  seams:
    - Doctrine registers a glossary runner via kernel.glossary_runner.register(); runtime reads via get_runner() (ADR 2026-03-25-1)
    - Runtime reads canonical terminology via glossary.store to validate Work Package and Mission naming
  extraction_sequencing_notes: >
    Extracted by mission #613. The specify_cli.glossary re-export shim was removed by
    mission unshim-wave2-01KWMCAX (2026-07-03); the canonical import is glossary.
    Import-graph tooling (an AC in #612) remains nice-to-have, not blocking, for the
    glossary slice.

lifecycle_status:
  canonical_package: src/lifecycle/
  current_state:
    - src/specify_cli/status/
  adapter_responsibilities:
    - src/specify_cli/cli/commands/lifecycle.py — spec-kitty agent tasks status and related commands
  shims: []
  seams:
    - Runtime reads Work Package lane state via status.lane_reader.get_wp_lane() to decide what to claim next
    - Orchestrator reads WP status via status.reducer.materialize() for cross-repo drift detection
    - CLI shell renders lane state via status.models.StatusSnapshot for the kanban display
    - Sync writes lane events via status.emit.emit_status_transition() after SaaS-side state changes
  extraction_sequencing_notes: >
    Target for mission #614. Has the highest cross-slice caller count in the codebase
    (next loop, orchestrator, dashboard, sync, tracker). Requires the architectural-tests
    and import-graph-enforcement acceptance criteria in #614 and the deprecation scaffolding
    in #615 to be in place before extraction — import-graph tooling is material here due to
    the high fan-in.

orchestrator_sync_tracker_saas:
  canonical_package: src/orchestrator/
  current_state:
    - src/specify_cli/orchestrator_api/
    - src/specify_cli/lanes/
    - src/specify_cli/merge/
    - src/specify_cli/sync/
    - src/specify_cli/tracker/
    - src/specify_cli/saas/
    - src/specify_cli/shims/
  adapter_responsibilities:
    - CLI commands for orchestrator operations (spec-kitty merge, spec-kitty agent config, etc.) stay in src/specify_cli/cli/
  shims: []
  seams:
    - Lifecycle emits status events; sync reads them for SaaS propagation via status.emit
    - Runtime dispatches Work Packages via lanes.compute for worktree allocation
    - CLI shell reports merge state via merge.state.load_state() for spec-kitty merge --resume
    - Tracker connector is called by sync after body-queue flush
  extraction_sequencing_notes: >
    Fragmented across 7 subdirectories today. No near-term extraction mission. The canonical
    target src/orchestrator/ is recorded here so future consolidation work has a named
    destination. Not in scope for missions #612-#615. The shim registry YAML (mission #615)
    references this slice entry as its primary input.

migration_versioning:
  canonical_package: src/specify_cli/migration/
  current_state:
    - src/specify_cli/migration/
    - src/specify_cli/upgrade/
  adapter_responsibilities:
    - spec-kitty upgrade CLI surface stays in src/specify_cli/cli/
  shims: []
  seams:
    - Upgrade command reads the migration registry to apply incremental migrations on spec-kitty upgrade
    - Runtime bootstrap calls migration path discovery to confirm the project is on the current schema version
  extraction_sequencing_notes: >
    No near-term extraction. The slice's role as upgrade scaffolding for project-level
    migrations is distinct enough from runtime mission execution that no extraction mission
    is queued in the #612-#615 wave. Stays under src/specify_cli/ for the foreseeable future.
