# Occurrence map — docs-structural-sanity-01KY53KJ
#
# Bulk-edit shape: STRUCTURAL RELOCATION, not a product-term rename. Point-in-time
# artifacts move to their canonical concern-homes and a split-brain shadow tree is
# FOLDED into its existing canonical twins; every cross-file referrer (relative
# links AND non-docs/ prefix refs) is repointed and redirect stubs are derived.
#
# THREE distinct entry kinds live below — do NOT treat them uniformly:
#   1. moves:            genuine relocations (the `to` target does NOT yet exist) -> git mv.
#   2. FOLD-THEN-DELETE  the 3 shadow entries whose `to` ALREADY EXISTS (canonical
#                        twin). A mechanical `git mv` would CLOBBER the canonical.
#                        Each such entry's `reason` is prefixed "FOLD-THEN-DELETE";
#                        the executor reconciles unique content INTO the canonical,
#                        then `git rm` the shadow (quickstart Recipe B). The from->to
#                        pair is retained here for REFERRER REPOINTING (relative_link_fixer
#                        / bulk_ref_rewrite point old-shadow links at the canonical). It is
#                        NOT retained for redirect derivation: this mission does NOT
#                        regenerate redirect_map.yaml (the shadows were never published;
#                        regenerating would wipe the landed 01KW3SBK 149 redirects — PB2).
#   3. BORDERLINE:       the 2 FR-002 borderlines (assessment + closeout) DEFAULT to
#                        "stays" per the audit; they are held out of the firm moves:
#                        spine below and listed in the commented BORDERLINE note. Only
#                        a per-borderline point-in-time verification (at /tasks or
#                        implement) promotes one into moves:.
#
# Link-repointing tooling (relative_link_fixer + bulk_ref_rewrite) is driven against THIS
# map via --occurrence-map (its built-in default is pinned to a foreign mission,
# common-docs-structural-move-01KW3SBK; never consume that default — FR-010/C-007). The
# redirect map (redirect_stub_generator) is NOT run by this mission — see serialized_keys.
#
# Measured referrer counts (docs/, excl. the audit note itself):
#   architecture/audits/ -> 11 files · adr-connector -> 6 · feature-detection -> 5
#   teamspace-...-920-closeout -> 4 · 883-mission-type-authority-brief -> 2
#   code-as-a-crime-scene-overview -> 2 · gap-analysis-connector -> 1 · 883-research-synthesis -> 0
# NON-docs/ referrer (relative_link_fixer walks docs/** ONLY — needs bulk_ref_rewrite/manual):
#   src/doctrine/paradigms/built-in/brownfield-onboarding.paradigm.yaml -> the moved audit path
#
# Schema: src/doctrine/schemas/occurrence-map.schema.yaml

target:
  term: "docs/ point-in-time relocation + shadow-tree fold-then-delete"
  replacement: null
  operation: rename          # relocation dominates; the 3 shadow entries are folds (see reasons)

categories:
  # No code identifiers are renamed. The new lint module is NEW code, not a rename.
  code_symbols:        { action: do_not_change }          # no existing symbol renamed

  # No Python import statements are repointed (new lint module is additive).
  import_paths:        { action: do_not_change }          # additive scripts/docs module; no importer rewrite

  # PRIMARY category: relative-link path literals in ~25-30 docs/ referrer .md files
  # are rewritten to the new paths (relative_link_fixer, docs/** ONLY). Non-docs/
  # prefix referrers (src/, scripts/) are rewritten by bulk_ref_rewrite / manual review
  # (see exceptions) — they are NOT do_not_change. Redirect stubs cover external URLs.
  filesystem_paths:    { action: rename }                 # docs/ relative links + non-docs/ prefix refs repointed; moves: carries relocations

  # redirect_map.yaml is NOT regenerated by this mission (PB2): the moved/removed paths are
  # never-published (absent from redirect_baseline_urls.json), so regenerate-map would derive
  # ZERO entries and OVERWRITE the map, wiping the landed 01KW3SBK 149 published-URL redirects.
  # redirect_map.yaml + redirect_baseline_urls.json are LEFT UNTOUCHED. Only the page-inventory
  # lockfile is regenerated in place (via inventory_lockfile.py --write; path-pinned). NFR-002
  # reframed: no baseline-URL 404 regression + all in-repo relative links resolve.
  serialized_keys:     { action: manual_review }          # inventory regenerated in place; redirect_map + baseline UNTOUCHED (no regen — PB2)

  # No CLI subcommand/flag references the moved paths.
  cli_commands:        { action: do_not_change }          # no command surface touched

  # The moved docs ARE user-visible; link TEXT / prose cross-references that name the
  # old location are updated where user-visible (nav labels, "see also" links).
  user_facing_strings: { action: rename_if_user_visible } # docs prose/link text repointed where visible

  # test_inventory_path_stable.py PINS the page-inventory path (must stay); new lint
  # unit tests + the 4-finding regression fixture + the FR-011 config-SSOT assertion
  # are ADDED. Reviewed together.
  tests_fixtures:      { action: manual_review }           # keep pinned inventory path; add docs-lint tests + fixture + config-SSOT assert

  # No log/telemetry strings name the moved paths.
  logs_telemetry:      { action: do_not_change }          # none

# ---------------------------------------------------------------------------
# FIRM structural relocations (target does NOT yet exist -> git mv). Each `from`
# set folds into one `to`. The 3 shadow entries at the bottom are FOLD-THEN-DELETE
# (their `to` EXISTS) — see the kind-2 note in the header and each reason prefix.
# ---------------------------------------------------------------------------
moves:
  # --- IC-03: point-in-time architecture artifacts -> engineering-notes (RELOCATION) ---
  - from: ["docs/architecture/883-research-synthesis.md"]
    to: "docs/plans/engineering-notes/883-research-synthesis.md"
    reason: "RELOCATION. Self-declared point-in-time pre-spec research for #883; superseded by the ADR + brief."
  - from: ["docs/architecture/883-mission-type-authority-brief.md"]
    to: "docs/plans/engineering-notes/883-mission-type-authority-brief.md"
    reason: "RELOCATION. Dated mission dossier, not living design. 2 referrers."
  - from: ["docs/architecture/audits/"]
    to: "docs/plans/engineering-notes/architecture-audits/"
    reason: "RELOCATION. 7 dated 2026-05 CaaCS forensic audits / triage / issue-draft dumps — point-in-time, not living design. 11 referrers + 1 NON-docs referrer (brownfield-onboarding.paradigm.yaml, see exceptions)."
  # --- IC-04: shadow-tree FOLD-THEN-DELETE (canonical twin EXISTS — do NOT git mv) ---
  - from: ["docs/plans/notes/feature-detection.md"]
    to: "docs/architecture/feature-detection.md"
    reason: "FOLD-THEN-DELETE — canonical twin docs/architecture/feature-detection.md EXISTS. Do NOT git mv (clobbers canonical). Reconcile unique content (396 vs 388 lines) INTO the canonical, git rm the shadow, repoint 5 referrers; from->to retained here for REFERRER REPOINTING only — NOT for redirect derivation (this mission regenerates no redirect_map; the shadow was never published)."
  - from: ["docs/plans/notes/gap-analysis-connector-installation-model.md"]
    to: "docs/architecture/gap-analysis-connector-installation-model.md"
    reason: "FOLD-THEN-DELETE — canonical twin EXISTS. Do NOT git mv. Reconcile INTO canonical, git rm shadow, repoint 1 referrer; from->to retained for REFERRER REPOINTING only — NOT for redirect derivation (no redirect_map regen; shadow never published)."
  - from: ["docs/plans/notes/adr-connector-auth-binding-separation.md"]
    to: "docs/adr/3.x/adr-connector-auth-binding-separation.md"
    reason: "FOLD-THEN-DELETE — canonical ADR twin EXISTS. Do NOT git mv. Reconcile unique content (179 vs 177 lines) INTO the canonical ADR, git rm shadow, repoint 6 referrers; from->to retained for REFERRER REPOINTING only — NOT for redirect derivation (no redirect_map regen; shadow never published)."

# ---------------------------------------------------------------------------
# BORDERLINE (FR-002) — DEFAULT: STAYS. Held OUT of the firm moves: spine so the
# tooling does not derive a premature redirect. A per-borderline point-in-time
# verification (at /tasks or implement) decides; only a VERIFIED point-in-time file
# is promoted into moves: with the full move contract. Flagged for /tasks.
#   - docs/architecture/assessments/code-as-a-crime-scene-overview.md
#       provisional -> docs/plans/engineering-notes/code-as-a-crime-scene-overview.md
#       2 referrers. Default STAYS unless verified point-in-time.
#   - docs/migrations/teamspace-mission-state-920-closeout.md  (US5/FR-005, P3)
#       provisional -> docs/plans/engineering-notes/teamspace-mission-state-920-closeout.md
#       4 referrers; redirect_baseline_urls.json already carries the closeout URL.
#       Default STAYS unless verified point-in-time (dated one-mission closeout).
# ---------------------------------------------------------------------------

# Path-pinned / boundary / non-docs exceptions.
exceptions:
  - path: "docs/development/3-2-page-inventory.yaml"
    action: do_not_change
    reason: "Generated page-inventory lockfile; path pinned by test_inventory_path_stable.py (C-004). Regenerate contents in place."
  - path: "docs/**/toc.yml"
    action: do_not_change
    reason: "DocFX nav; NOT regenerated by this mission (no toc.yml references a moved path, no generator exists) — verify-only grep, leave untouched (C-004, PN1)."
  - path: "docs/guides/**"
    action: do_not_change
    reason: "End-user zone; FR-003 boundary — nothing moves here, referrers repointed via redirect (C-001)."
  - path: "src/doctrine/paradigms/built-in/brownfield-onboarding.paradigm.yaml"
    action: manual_review
    reason: "NON-docs/ referrer (line 50) of a MOVED audit path (docs/architecture/audits/2026-05-spec-kitty-caacs.md). relative_link_fixer walks docs/** ONLY and will NOT catch it; rewrite via bulk_ref_rewrite (prefix-anchored) or by hand (R6)."
  - path: "scripts/docs/redirect_baseline_urls.json"
    action: do_not_change
    reason: "Baseline-URL manifest (180 URLs); LEFT UNTOUCHED — this mission regenerates no redirect_map (PB2). The firm moves + shadow folds are never-published (absent here), so no baseline 404. The 920-closeout URL IS published here: a verified closeout MOVE would 404 it with no redirect — WP03 T016 escalates that to the operator rather than moving silently (default STAYS keeps it green)."
