# WHAT THIS MISSION DOES — three legacy import namespaces are DELETED and their
# callers re-pointed to the canonical surfaces (an IMPORT-PATH / MODULE migration,
# NOT a product-term rename; no runtime symbol names change):
#
#   1. specify_cli.next            -> runtime.next                          (#612, registered shim)
#   2. specify_cli.glossary        -> glossary                             (#613, registered husk)
#   3. specify_cli.charter_lint       -> specify_cli.charter_runtime.lint       (#2290, unregistered shim)
#      specify_cli.charter_freshness  -> specify_cli.charter_runtime.freshness  (#2290, unregistered shim)
#      specify_cli.charter_preflight  -> specify_cli.charter_runtime.preflight  (#2290, unregistered shim)
#
# The schema's single-`target` block names the DOMINANT rename (specify_cli.next).
# The other two namespaces are carried in `status.namespaces` (authoritative,
# machine-readable) and in the per-category detail below. All three are governed
# by the SAME per-category action posture (import-path renames; symbols preserved).
#
# ------------------------------------------------------------------------------
# PATCH-STRING COUNT — the binding enumerator settles the renata(80)/paula(~140)
# divergence. The AST census (patch()/patch.object first-arg string literals +
# patch.dict(sys.modules,{...}) keys + monkeypatch.setitem(sys.modules,...) args)
# finds 195 patch-family sites total:
#     next=163 (161 single_line_patch + 2 patch_dict_multiline injectors)
#     charter_lint=30, charter_freshness=1, charter_preflight=1, glossary=0
#     monkeypatch_setitem=0 (no setitem targets a legacy namespace)
# RECONCILIATION:
#   * renata's 80 = physical-single-line matches (patch keyword AND target string
#     on ONE physical line); verified: single-line grep for next = exactly 80.
#   * The remaining 83 next sites are patch() calls whose target string is WRAPPED
#     onto a continuation line (patch(\n    "specify_cli.next..."\n)) — invisible
#     to a single-line grep but real interception sites; + 2 patch.dict injectors.
#   * paula's ~140 was a partial co-occurrence sweep that under-counted wrapped
#     continuation lines. The AST count (195 total / 163 next) is BINDING (FR-002).
# Every patch-string row below carries interception_proof:"" — the empty ledger
# fields the implement WPs MUST fill (call-assertion file::test OR red-first flip).
# ------------------------------------------------------------------------------

target:
  term: specify_cli.next
  replacement: runtime.next
  operation: rename

