# Spec Kitty Canonical Terms
# This file defines the authoritative meanings of Spec Kitty domain concepts.

terms:
  - surface: workspace
    definition: Git worktree directory created for implementing a work package
    confidence: 1.0
    status: active

  - surface: work package
    definition: Execution slice inside a mission run, the unit of human/agent handoff
    confidence: 1.0
    status: active

  - surface: wp
    definition: Abbreviation for work package
    confidence: 1.0
    status: active

  - surface: mission
    definition: Purpose-specific workflow machine with defined inputs, process, outcomes, and states
    confidence: 1.0
    status: active

  - surface: primitive
    definition: Custom mission-defined executable operation or step unit
    confidence: 1.0
    status: active

  - surface: phase
    definition: Grouping container for mission primitives, not the enforcement unit
    confidence: 1.0
    status: active

  - surface: lane
    definition: Kanban status for work packages (planned, doing, for_review, done)
    confidence: 1.0
    status: active

  - surface: strictness
    definition: Glossary enforcement mode (off, medium, max)
    confidence: 1.0
    status: active

  - surface: semantic conflict
    definition: Mismatch or ambiguity in term usage with assigned severity score
    confidence: 1.0
    status: active

  - surface: scope
    definition: Bounded semantic scope (mission_local, team_domain, audience_domain, spec_kitty_core)
    confidence: 1.0
    status: active

  - surface: project root checkout
    definition: "DEPRECATED (mission 081): Use 'repository root checkout' instead. The root directory of the current git repository on the target branch."
    confidence: 1.0
    status: deprecated

  - surface: repository root checkout
    definition: The root directory of the current git repository on the target branch — not a worktree, not an external repository. Planning commands (specify, plan, tasks) run here.
    confidence: 1.0
    status: active

  - surface: planning repository
    definition: "DEPRECATED alias for 'repository root checkout'. Do not use — agents interpret this as a separate repository. Use 'repository root checkout' instead."
    confidence: 1.0
    status: deprecated

  - surface: project
    definition: SaaS collaboration surface grouping one or more repositories. Not the local Git resource.
    confidence: 1.0
    status: active

  - surface: repository
    definition: Local Git resource (one .git directory) holding mission artifacts. Formerly called "project" in pre-081 code.
    confidence: 1.0
    status: active

  - surface: build
    definition: One checkout or worktree of one repository with its own execution context.
    confidence: 1.0
    status: active

  - surface: repository_uuid
    definition: Stable local repository identity, minted once per repository. Required namespace key for body sync and dedup. Was mislabeled as project_uuid before mission 081.
    confidence: 1.0
    status: active

  - surface: repository_label
    definition: Human-readable repository display name derived from git remote or directory name. Mutable, not a stable identity. Was called project_slug before mission 081.
    confidence: 1.0
    status: active

  - surface: project_uuid
    definition: Optional SaaS-assigned collaboration identity. Absent until a repository is bound to a SaaS project. Never locally minted.
    confidence: 1.0
    status: active

  - surface: repo_slug
    definition: Optional owner/repo Git provider reference (e.g. Priivacy-ai/spec-kitty). Unchanged from pre-081 meaning.
    confidence: 1.0
    status: active

  - surface: build_id
    definition: Per-checkout/worktree identity, unique per working tree. Unchanged from pre-081.
    confidence: 1.0
    status: active

  - surface: node_id
    definition: Stable machine fingerprint (12-char hex). Unchanged from pre-081.
    confidence: 1.0
    status: active

  - surface: agent profile
    definition: Declarative specification of an AI agent's role, capabilities, directive bindings, and collaboration contract within the doctrine stack. Profiles are shipped as YAML artifacts and selected by routing priority when a task matches the agent's specialization context.
    confidence: 1.0
    status: active
