name: ci-windows
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  changes:
    name: Detect Windows-critical changes
    runs-on: ubuntu-latest
    outputs:
      windows_critical: ${{ steps.filter.outputs.windows_critical }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            windows_critical:
              - '.github/workflows/ci-windows.yml'
              - 'pyproject.toml'
              - 'pytest.ini'
              - 'tests/conftest.py'
              - 'tests/auth/secure_storage/test_file_fallback_windows_root.py'
              - 'tests/cli/test_agent_status_messaging.py'
              - 'tests/cli/test_migrate_cmd_messaging.py'
              - 'tests/core/test_worktree_symlink_fallback.py'
              - 'tests/kernel/test_paths_unified_windows_root.py'
              - 'tests/lanes/test_acceptance_matrix.py'
              - 'tests/mission/test_active_mission_handle_windows.py'
              - 'tests/paths/test_windows_migrate.py'
              - 'tests/policy/test_hook_installer_execution.py'
              - 'tests/regressions/test_issue_101_utf8_startup.py'
              - 'tests/regressions/test_issue_105_hook_python_lookup.py'
              - 'tests/regressions/test_issue_71_dashboard_empty.py'
              - 'tests/review/test_baseline.py'
              - 'tests/runtime/test_home_unit.py'
              - 'tests/specify_cli/cli/commands/test_charter_generate_autotrack.py'
              - 'tests/sync/test_daemon_windows_paths.py'
              - 'tests/sync/test_issue_586_windows_import.py'
              - 'tests/tracker/test_credentials_windows_paths.py'
              # Full src tree (mission ci-suite-map-bind FR-007 / WS5 AC):
              # Windows-sensitive packages outside specify_cli/kernel (e.g.
              # src/mission_runtime, src/runtime) must also trigger this job.
              # The Windows-marked CLI tests exercise the root app import
              # path, which can pull in modules across the full source tree,
              # so no per-package exclusions are carved out.
              - 'src/**'

  windows-critical:
    name: Windows critical (pipx, pytest -m windows_ci)
    needs: [changes]
    if: needs.changes.outputs.windows_critical == 'true'
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      PYTHONUTF8: "1"
      SPEC_KITTY_ENABLE_SAAS_SYNC: "0"
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install pipx
        shell: bash
        run: |
          python -m pip install --upgrade pip pipx
          python -m pipx ensurepath

      - name: Install spec-kitty-cli (editable) + test deps
        shell: bash
        run: |
          pipx install --editable . --force
          pipx inject spec-kitty-cli pytest pytest-cov pytest-asyncio pytest-timeout respx pytestarch

      - name: Resolve pipx venv Python
        id: pipx-venv
        shell: bash
        run: |
          # Locate the Python interpreter inside the pipx-managed venv for
          # spec-kitty-cli so the test suite runs against the actual install
          # topology users have, not the setup-python host interpreter.
          PIPX_VENVS=$(pipx environment --value PIPX_LOCAL_VENVS)
          VENV_PYTHON="$PIPX_VENVS/spec-kitty-cli/Scripts/python.exe"
          if [ ! -x "$VENV_PYTHON" ]; then
            # Fall back to POSIX layout in case pipx uses bin/ on this runner
            VENV_PYTHON="$PIPX_VENVS/spec-kitty-cli/bin/python"
          fi
          if [ ! -x "$VENV_PYTHON" ]; then
            echo "::error::Could not locate pipx venv Python under $PIPX_VENVS/spec-kitty-cli/{Scripts,bin}/"
            ls -R "$PIPX_VENVS/spec-kitty-cli" || true
            exit 1
          fi
          echo "Using pipx venv Python: $VENV_PYTHON"
          echo "venv_python=$VENV_PYTHON" >> "$GITHUB_OUTPUT"

      - name: Assert keyring is NOT installed on Windows
        shell: bash
        run: |
          if pipx runpip spec-kitty-cli show keyring >/dev/null 2>&1; then
            echo "::error::keyring IS installed on Windows; the Windows install must stay keyring-free (the conditional dependency marker in pyproject.toml is not effective)."
            exit 1
          fi
          echo "keyring absent (expected)"

      - name: Run Windows-critical suite (via pipx venv interpreter)
        shell: bash
        env:
          VENV_PYTHON: ${{ steps.pipx-venv.outputs.venv_python }}
        run: |
          WINDOWS_TESTS=()
          while IFS= read -r test_file; do
            WINDOWS_TESTS+=("$test_file")
          done < <(git grep -l "@pytest.mark.windows_ci" -- tests)
          if [ ${#WINDOWS_TESTS[@]} -eq 0 ]; then
            echo "::error::No windows_ci test files were discovered."
            exit 1
          fi
          # Invoke pytest from the pipx-installed venv so this step exercises
          # the real install topology users have (editable install via pipx +
          # injected pytest). Running `python -m pytest` from the host
          # setup-python interpreter would bypass the pipx venv entirely.
          "$VENV_PYTHON" -m pytest -m windows_ci --maxfail=1 -v "${WINDOWS_TESTS[@]}"
