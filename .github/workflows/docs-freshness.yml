name: docs-freshness

on:
  pull_request:
  push:
    branches: [main]

jobs:
  docs-freshness:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'pr:deferred') && !contains(github.event.pull_request.labels.*.name, 'pr:skip-ci') }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Set up Python
        run: uv python install 3.11
      - name: Install project
        run: uv sync
      # --- Blocking docs rulers (Mission B / WP14, FR-011) -------------------
      # Each runs --strict so a re-introduced violation reds CI. (The R1
      # anti-sprawl structure ratchet was retired per #2851 follow-up: the
      # single-root/13-section policy of DIRECTIVE_042 is now maintained by
      # periodic bulk curation rather than a per-PR blocking gate.)
      - name: Related-edge validator (R2, --strict)
        env:
          PYTHONPATH: .
        run: uv run python scripts/docs/related_validator.py --strict --repo-root .
      - name: Description-length gate (NFR-003, --strict)
        env:
          PYTHONPATH: .
        run: uv run python scripts/docs/description_length_check.py --strict --repo-root .
      - name: Relative body-link gate (WP18, --check)
        env:
          PYTHONPATH: .
        run: uv run python scripts/docs/relative_link_fixer.py --check --repo-root .
      # Structural docs lint (FR-008): index completeness, point-in-time
      # placement, shadow-tree basenames, frontmatter contract. Policy is loaded
      # from the common-docs styleguide's structural_lint_config: block (FR-011).
      # Exits non-zero on any violation. Deferred here by WP02 until the
      # docs-structural-sanity move/fold landed post-move-clean (WP03/WP04/WP05).
      - name: Structural docs lint (FR-008)
        env:
          PYTHONPATH: .
        run: uv run python scripts/docs/docs_structural_lint.py
      - name: Check CHANGELOG sync (canonical → root)
        run: uv run python scripts/docs/sync_changelog.py --check
      - name: Check CONTRIBUTING sync (canonical → root)
        run: uv run python scripts/docs/sync_contributing.py --check
      - name: Docs freshness (R3 lockfile drift default-on + sub-checks)
        env:
          SPEC_KITTY_ENABLE_SAAS_SYNC: "1"
          SPEC_KITTY_NO_UPGRADE_CHECK: "1"
          PYTHONPATH: .
        run: uv run python scripts/docs/check_docs_freshness.py --ci --report freshness.json --link-check none
      - name: Upload freshness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-freshness-report
          path: freshness.json
