name: Publish Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      REPO_OWNER: ${{ github.repository_owner }}
      CROSS_REPO_TOKEN: ${{ secrets.SPEC_KITTY_SAAS_READ_TOKEN != '' && secrets.SPEC_KITTY_SAAS_READ_TOKEN || github.token }}
      HAS_SAAS_READ_TOKEN: ${{ secrets.SPEC_KITTY_SAAS_READ_TOKEN != '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Setup SSH for private repository access
        # Purpose: spec-kitty depends on private spec-kitty-events library.
        # Uses SSH deploy key stored in GitHub Actions secrets.
        # See docs/development/ssh-deploy-keys.md for setup instructions.
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SPEC_KITTY_EVENTS_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
        shell: bash

      - name: Install tooling
        run: |
          uv sync --python "$(which python)" --extra test --extra lint
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          .venv/bin/pip install twine==6.* tomli==2.*

      - name: Verify test isolation
        run: |
          cat > verify_isolation.py << 'EOF'
          import sys
          import tomllib

          # Get source version from pyproject.toml
          with open("pyproject.toml", "rb") as f:
              source_version = tomllib.load(f)["project"]["version"]

          # Try to get installed version
          try:
              from importlib.metadata import version
              installed_version = version("spec-kitty-cli")
          except Exception:
              print(f"✅ No installed version detected (source: {source_version})")
              sys.exit(0)

          # Check if versions match
          if installed_version == source_version:
              print(f"✅ Version match: {source_version}")
              sys.exit(0)
          else:
              print(f"❌ Version mismatch! Source: {source_version}, Installed: {installed_version}")
              print("This will cause test failures. Aborting release.")
              sys.exit(1)
          EOF
          python verify_isolation.py

      - name: Run tests
        run: |
          # Main CI owns the broad module matrix. The tag-time release workflow
          # exercises release-specific behavior, then gates publication on
          # metadata validation, build integrity, exact wheel installability,
          # shared-package drift checks, and downstream verification.
          python -m pytest -v --import-mode=importlib tests/release 2>&1 | tee pytest-output.txt
          exit ${PIPESTATUS[0]}

      - name: Validate release metadata
        run: python scripts/release/validate_release.py --mode tag --tag "${GITHUB_REF_NAME}" --tag-pattern "v*.*.*"

      - name: Classify release channel
        id: release_channel
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(a|b|rc|alpha|beta)[0-9]*$ ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Build distributions
        run: python -m build

      - name: Fetch compatibility references
        id: fetch_refs
        run: |
          set -euo pipefail
          mkdir -p /tmp/spec-kitty-release-contracts

          if [ "${HAS_SAAS_READ_TOKEN}" != "true" ]; then
            echo "saas_fetched=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SPEC_KITTY_SAAS_READ_TOKEN is not configured; skipping private SaaS compatibility fetches for this release run."
            exit 0
          fi

          curl -fsSL \
            -H "Authorization: Bearer ${CROSS_REPO_TOKEN}" \
            -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/${REPO_OWNER}/spec-kitty-saas/contents/pyproject.toml?ref=main" \
            -o /tmp/spec-kitty-release-contracts/spec-kitty-saas-pyproject.toml

          curl -fsSL \
            -H "Authorization: Bearer ${CROSS_REPO_TOKEN}" \
            -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/${REPO_OWNER}/spec-kitty-saas/contents/contracts/consumer-compatibility.json?ref=main" \
            -o /tmp/spec-kitty-release-contracts/consumer-compatibility.json

          echo "saas_fetched=true" >> "$GITHUB_OUTPUT"
          echo "saas_pyproject=/tmp/spec-kitty-release-contracts/spec-kitty-saas-pyproject.toml" >> "$GITHUB_OUTPUT"
          echo "consumer_contract=/tmp/spec-kitty-release-contracts/consumer-compatibility.json" >> "$GITHUB_OUTPUT"

      - name: Validate shared package drift
        run: |
          ARGS=()

          if [ "${{ steps.fetch_refs.outputs.saas_fetched }}" = "true" ]; then
            ARGS+=(
              --saas-pyproject "${{ steps.fetch_refs.outputs.saas_pyproject }}"
            )
          fi

          python scripts/release/check_shared_package_drift.py "${ARGS[@]}"

      - name: Verify exact installability from built wheel
        run: python scripts/release/check_exact_install.py --package spec-kitty-cli

      - name: Validate candidate against SaaS consumer contract
        if: steps.fetch_refs.outputs.saas_fetched == 'true'
        run: |
          python scripts/release/check_candidate_consumer_compat.py \
            --package spec-kitty-cli \
            --consumer-contract "${{ steps.fetch_refs.outputs.consumer_contract }}"

      - name: Verify wheel contents
        run: |
          echo "::group::Verifying migration files in wheel"

          # Count tracked migration files in source. The test suite may generate
          # temporary files in the workspace, so verify against the repository
          # contents rather than the mutated working tree.
          SOURCE_COUNT=$(git ls-files src/specify_cli/upgrade/migrations | grep '/m_.*\.py$' | wc -l | tr -d ' ')
          echo "Source migrations count: $SOURCE_COUNT"

          # Extract wheel to temp directory
          WHEEL_FILE=$(ls dist/*.whl)
          rm -rf /tmp/wheel_check
          unzip -q "$WHEEL_FILE" -d /tmp/wheel_check

          # Count migration files in wheel
          WHEEL_COUNT=$(find /tmp/wheel_check/specify_cli/upgrade/migrations -name "m_*.py" -type f 2>/dev/null | wc -l | tr -d ' ')
          echo "Wheel migrations count: $WHEEL_COUNT"

          # List migrations in both
          echo "Source migrations:"
          find src/specify_cli/upgrade/migrations -name "m_*.py" -type f | sort | xargs -n1 basename

          echo "Wheel migrations:"
          find /tmp/wheel_check/specify_cli/upgrade/migrations -name "m_*.py" -type f 2>/dev/null | sort | xargs -n1 basename

          # Verify counts match
          if [ "$SOURCE_COUNT" -ne "$WHEEL_COUNT" ]; then
            echo "::error::Migration file count mismatch! Source: $SOURCE_COUNT, Wheel: $WHEEL_COUNT"
            echo "::error::This means some migration files are missing from the wheel package."
            echo "::error::Check pyproject.toml [tool.hatch.build.targets.wheel] configuration."
            exit 1
          fi

          echo "✅ Wheel contains all $SOURCE_COUNT migration files"
          echo "::endgroup::"

          echo "::group::Verifying doctrine payload in wheel"

          # Count tracked doctrine files in source. Release tests can mutate the
          # checkout, so use the tracked tree as the source of truth here too.
          SOURCE_DOCTRINE_COUNT=$(git ls-files src/doctrine | wc -l | tr -d ' ')
          echo "Source doctrine file count: $SOURCE_DOCTRINE_COUNT"

          WHEEL_DOCTRINE_COUNT=$(find /tmp/wheel_check/doctrine -type f 2>/dev/null | wc -l | tr -d ' ')
          echo "Wheel doctrine file count: $WHEEL_DOCTRINE_COUNT"

          SOURCE_SKILL_COUNT=$(git ls-files src/doctrine/skills | grep '/SKILL\.md$' | wc -l | tr -d ' ')
          echo "Source bundled skill count: $SOURCE_SKILL_COUNT"

          WHEEL_SKILL_COUNT=$(find /tmp/wheel_check/doctrine/skills -path '*/SKILL.md' -type f 2>/dev/null | wc -l | tr -d ' ')
          echo "Wheel bundled skill count: $WHEEL_SKILL_COUNT"

          if [ "$SOURCE_DOCTRINE_COUNT" -ne "$WHEEL_DOCTRINE_COUNT" ]; then
            echo "::error::Doctrine file count mismatch! Source: $SOURCE_DOCTRINE_COUNT, Wheel: $WHEEL_DOCTRINE_COUNT"
            echo "::error::This means doctrine resources are missing from the wheel package."
            echo "::error::Check pyproject.toml [tool.hatch.build.targets.wheel] configuration."
            exit 1
          fi

          if [ "$SOURCE_SKILL_COUNT" -ne "$WHEEL_SKILL_COUNT" ]; then
            echo "::error::Bundled skill count mismatch! Source: $SOURCE_SKILL_COUNT, Wheel: $WHEEL_SKILL_COUNT"
            echo "::error::The wheel must ship every canonical SKILL.md under doctrine/skills."
            exit 1
          fi

          echo "✅ Wheel contains all $SOURCE_DOCTRINE_COUNT doctrine files and $SOURCE_SKILL_COUNT bundled skills"
          echo "::endgroup::"

      - name: Generate CycloneDX SBOM
        # Snapshot the resolved environment at build time so every release ships
        # a machine-readable dependency inventory. Enterprise evaluators can ingest
        # this into Dependency-Track or similar tooling for continuous CVE monitoring
        # without rescanning the package themselves.
        run: |
          cyclonedx-py environment \
            --of JSON \
            -o sbom.cdx.json \
            --pyproject pyproject.toml
          echo "SBOM component count: $(python -c "import json; d=json.load(open('sbom.cdx.json')); print(len(d.get('components', [])))")"

      - name: Check distributions
        run: twine check dist/*

      - name: Record artifact checksums
        run: |
          sha256sum dist/* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Extract changelog for release
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python scripts/release/extract_changelog.py "${VERSION}" > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body_path: release-notes.md
          files: |
            dist/*.whl
            dist/*.tar.gz
            SHA256SUMS.txt
            sbom.cdx.json
          draft: false
          prerelease: ${{ steps.release_channel.outputs.is_prerelease }}

      - name: Upload test output
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pytest-output
          path: pytest-output.txt
          retention-days: 7

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: release-distributions
          path: |
            dist/
            SHA256SUMS.txt
          retention-days: 30

  downstream-consumer-verify:
    # FR-026 / WP05 of mission stability-and-hygiene-hardening-2026-04-01KQ4ARB:
    # No candidate release is promoted to stable until a downstream consumer
    # has verified compatibility. This job runs the end-to-end "contract drift
    # caught" scenario (from spec-kitty-end-to-end-testing) against the freshly
    # built distributions and uploads a verification artifact at
    # .kittify/release/downstream-verified.json. The publish-pypi job depends
    # on this job's success, so a red downstream verify blocks promotion.
    name: Downstream consumer verification
    needs: build-release
    runs-on: ubuntu-latest
    env:
      REPO_OWNER: ${{ github.repository_owner }}
      CROSS_REPO_TOKEN: ${{ secrets.SPEC_KITTY_SAAS_READ_TOKEN != '' && secrets.SPEC_KITTY_SAAS_READ_TOKEN || github.token }}
      HAS_SAAS_READ_TOKEN: ${{ secrets.SPEC_KITTY_SAAS_READ_TOKEN != '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Setup SSH for private repository access
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SPEC_KITTY_EVENTS_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
        shell: bash

      - name: Install tooling
        run: |
          uv sync --python "$(which python)" --extra test
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-distributions
          path: dist-candidate/

      - name: Run downstream consumer scenario suite
        # The fixture consumer suite lives in spec-kitty-end-to-end-testing.
        # If the path is missing, the verify job MUST fail loud rather than
        # silently letting promotion proceed -- a missing scenario directory
        # means the gate has no evidence to back it.
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(a|b|rc|alpha|beta)[0-9]*$ ]]; then
            mkdir -p .kittify/release
            cat > .kittify/release/downstream-verified.json <<EOF
          {
            "status": "passed",
            "candidate_version": "${VERSION}",
            "consumer": "spec-kitty-end-to-end-testing",
            "scenario": "contract_drift_caught",
            "verification_mode": "prerelease-waived",
            "verified_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "workflow_run_id": "${GITHUB_RUN_ID}",
            "commit_sha": "${GITHUB_SHA}"
          }
          EOF
            cat .kittify/release/downstream-verified.json
            exit 0
          fi

          if [ "${HAS_SAAS_READ_TOKEN}" != "true" ]; then
            echo "::error::SPEC_KITTY_SAAS_READ_TOKEN is required to fetch the private downstream consumer suite for stable releases."
            exit 1
          fi

          git clone \
            "https://x-access-token:${CROSS_REPO_TOKEN}@github.com/${REPO_OWNER}/spec-kitty-end-to-end-testing.git" \
            spec-kitty-end-to-end-testing

          SCENARIO=spec-kitty-end-to-end-testing/scenarios/contract_drift_caught.py
          if [ ! -f "$SCENARIO" ]; then
            echo "::error::Downstream scenario suite missing at $SCENARIO."
            echo "::error::FR-026 requires a downstream consumer suite to gate promotion."
            exit 1
          fi
          python -m pytest "$SCENARIO" -v 2>&1 | tee downstream-verify.log

      - name: Record verification artifact
        if: success()
        run: |
          set -euo pipefail
          mkdir -p .kittify/release
          if [ -f .kittify/release/downstream-verified.json ]; then
            cat .kittify/release/downstream-verified.json
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          cat > .kittify/release/downstream-verified.json <<EOF
          {
            "status": "passed",
            "candidate_version": "${VERSION}",
            "consumer": "spec-kitty-end-to-end-testing",
            "scenario": "contract_drift_caught",
            "verified_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "workflow_run_id": "${GITHUB_RUN_ID}",
            "commit_sha": "${GITHUB_SHA}"
          }
          EOF
          cat .kittify/release/downstream-verified.json

      - name: Upload verification artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: downstream-verified
          path: |
            .kittify/release/downstream-verified.json
            downstream-verify.log
          retention-days: 90

  publish-pypi:
    name: Publish to PyPI
    # FR-026: promotion to PyPI is gated on downstream-consumer-verify.
    needs:
      - build-release
      - downstream-consumer-verify
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/spec-kitty-cli/
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-distributions
          path: .

      - name: Download downstream verification artifact
        uses: actions/download-artifact@v8
        with:
          name: downstream-verified
          path: .

      - name: Verify downstream-consumer-verify produced a passing artifact
        # Defense in depth: even if `needs:` were ever loosened, refuse to
        # publish without a passing verification artifact (FR-026).
        run: |
          set -euo pipefail
          ARTIFACT=.kittify/release/downstream-verified.json
          if [ ! -f "$ARTIFACT" ]; then
            ARTIFACT=$(find . -path '*/downstream-verified.json' -type f | head -n 1 || true)
            if [ -z "$ARTIFACT" ]; then
              echo "::error::Missing downstream verification artifact at .kittify/release/downstream-verified.json."
              exit 1
            fi
          fi
          STATUS=$(python -c "import json,sys;print(json.load(open('$ARTIFACT')).get('status',''))")
          if [ "$STATUS" != "passed" ]; then
            echo "::error::Downstream verification status='$STATUS'; promotion blocked."
            exit 1
          fi

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
