name: Publish Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Setup SSH for private repository access
        # Purpose: spec-kitty depends on private spec-kitty-events library.
        # Uses SSH deploy key stored in GitHub Actions secrets.
        # See docs/development/ssh-deploy-keys.md for setup instructions.
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SPEC_KITTY_EVENTS_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
        shell: bash

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install build==1.* twine==6.* tomli==2.* packaging pytest
          pip install -e .[test]

      - name: Verify test isolation
        run: |
          cat > verify_isolation.py << 'EOF'
          import sys
          import tomllib

          # Get source version from pyproject.toml
          with open("pyproject.toml", "rb") as f:
              source_version = tomllib.load(f)["project"]["version"]

          # Try to get installed version
          try:
              from importlib.metadata import version
              installed_version = version("spec-kitty-cli")
          except Exception:
              print(f"✅ No installed version detected (source: {source_version})")
              sys.exit(0)

          # Check if versions match
          if installed_version == source_version:
              print(f"✅ Version match: {source_version}")
              sys.exit(0)
          else:
              print(f"❌ Version mismatch! Source: {source_version}, Installed: {installed_version}")
              print("This will cause test failures. Aborting release.")
              sys.exit(1)
          EOF
          python verify_isolation.py

      - name: Run tests
        run: |
          python -m pytest -v --tb=short 2>&1 | tee pytest-output.txt
          exit ${PIPESTATUS[0]}

      - name: Validate release metadata
        run: python scripts/release/validate_release.py --mode tag --tag "${GITHUB_REF_NAME}" --tag-pattern "v*.*.*"

      - name: Build distributions
        run: python -m build

      - name: Verify wheel contents
        run: |
          echo "::group::Verifying migration files in wheel"

          # Count tracked migration files in source. The test suite may generate
          # temporary files in the workspace, so verify against the repository
          # contents rather than the mutated working tree.
          SOURCE_COUNT=$(git ls-files src/specify_cli/upgrade/migrations | grep '/m_.*\.py$' | wc -l | tr -d ' ')
          echo "Source migrations count: $SOURCE_COUNT"

          # Extract wheel to temp directory
          WHEEL_FILE=$(ls dist/*.whl)
          rm -rf /tmp/wheel_check
          unzip -q "$WHEEL_FILE" -d /tmp/wheel_check

          # Count migration files in wheel
          WHEEL_COUNT=$(find /tmp/wheel_check/specify_cli/upgrade/migrations -name "m_*.py" -type f 2>/dev/null | wc -l | tr -d ' ')
          echo "Wheel migrations count: $WHEEL_COUNT"

          # List migrations in both
          echo "Source migrations:"
          find src/specify_cli/upgrade/migrations -name "m_*.py" -type f | sort | xargs -n1 basename

          echo "Wheel migrations:"
          find /tmp/wheel_check/specify_cli/upgrade/migrations -name "m_*.py" -type f 2>/dev/null | sort | xargs -n1 basename

          # Verify counts match
          if [ "$SOURCE_COUNT" -ne "$WHEEL_COUNT" ]; then
            echo "::error::Migration file count mismatch! Source: $SOURCE_COUNT, Wheel: $WHEEL_COUNT"
            echo "::error::This means some migration files are missing from the wheel package."
            echo "::error::Check pyproject.toml [tool.hatch.build.targets.wheel] configuration."
            exit 1
          fi

          echo "✅ Wheel contains all $SOURCE_COUNT migration files"
          echo "::endgroup::"

          echo "::group::Verifying doctrine payload in wheel"

          # Count tracked doctrine files in source. Release tests can mutate the
          # checkout, so use the tracked tree as the source of truth here too.
          SOURCE_DOCTRINE_COUNT=$(git ls-files src/doctrine | wc -l | tr -d ' ')
          echo "Source doctrine file count: $SOURCE_DOCTRINE_COUNT"

          WHEEL_DOCTRINE_COUNT=$(find /tmp/wheel_check/doctrine -type f 2>/dev/null | wc -l | tr -d ' ')
          echo "Wheel doctrine file count: $WHEEL_DOCTRINE_COUNT"

          SOURCE_SKILL_COUNT=$(git ls-files src/doctrine/skills | grep '/SKILL\.md$' | wc -l | tr -d ' ')
          echo "Source bundled skill count: $SOURCE_SKILL_COUNT"

          WHEEL_SKILL_COUNT=$(find /tmp/wheel_check/doctrine/skills -path '*/SKILL.md' -type f 2>/dev/null | wc -l | tr -d ' ')
          echo "Wheel bundled skill count: $WHEEL_SKILL_COUNT"

          if [ "$SOURCE_DOCTRINE_COUNT" -ne "$WHEEL_DOCTRINE_COUNT" ]; then
            echo "::error::Doctrine file count mismatch! Source: $SOURCE_DOCTRINE_COUNT, Wheel: $WHEEL_DOCTRINE_COUNT"
            echo "::error::This means doctrine resources are missing from the wheel package."
            echo "::error::Check pyproject.toml [tool.hatch.build.targets.wheel] configuration."
            exit 1
          fi

          if [ "$SOURCE_SKILL_COUNT" -ne "$WHEEL_SKILL_COUNT" ]; then
            echo "::error::Bundled skill count mismatch! Source: $SOURCE_SKILL_COUNT, Wheel: $WHEEL_SKILL_COUNT"
            echo "::error::The wheel must ship every canonical SKILL.md under doctrine/skills."
            exit 1
          fi

          echo "✅ Wheel contains all $SOURCE_DOCTRINE_COUNT doctrine files and $SOURCE_SKILL_COUNT bundled skills"
          echo "::endgroup::"

      - name: Check distributions
        run: twine check dist/*

      - name: Record artifact checksums
        run: |
          sha256sum dist/* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Extract changelog for release
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python scripts/release/extract_changelog.py "${VERSION}" > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body_path: release-notes.md
          files: |
            dist/*.whl
            dist/*.tar.gz
            SHA256SUMS.txt
          draft: false
          prerelease: false

      - name: Upload test output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-output
          path: pytest-output.txt
          retention-days: 7

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-distributions
          path: |
            dist/
            SHA256SUMS.txt
          retention-days: 30

  publish-pypi:
    name: Publish to PyPI
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/spec-kitty-cli/
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-distributions
          path: .

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
