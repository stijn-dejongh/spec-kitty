name: CI Quality

on:
  pull_request:
    # ready_for_review is REQUIRED (mission ci-suite-map-bind FR-013, HiC
    # ruling 7a): a draft->ready flip must re-run the draft-skipped suites,
    # otherwise a PR could merge with them unrun. The other three restore the
    # GitHub defaults that adding `types:` would otherwise drop.
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
      - develop
      - 2.x
    paths:
      - 'src/**'
      - 'docs/**'
      - 'scripts/docs/**'
      - 'scripts/ci/**'
      - '.kittify/doctrine/overlays/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.kittify/metadata.yaml'
      - 'uv.lock'
      - '.kittify/release/shared-package-compatibility.json'
      - 'CHANGELOG.md'
      - 'RELEASE_CHECKLIST.md'
      - 'scripts/release/**'
      - '.github/workflows/scripts/**'
      - 'ruff.toml'
      - '.github/workflows/ci-quality.yml'
      # The other suite-running workflows (mission ci-suite-map-bind FR-012):
      # an edit to any of them must re-run the architectural guard suite,
      # which asserts the parsed gate model over all four workflow files.
      - '.github/workflows/ci-windows.yml'
      - '.github/workflows/drift-detector.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/release-readiness.yml'
      - '.github/workflows/check-spec-kitty-events-alignment.yml'
  push:
    branches:
      - main
      - develop
      - 2.x
    paths:
      - 'src/**'
      - 'docs/**'
      - 'scripts/docs/**'
      - 'scripts/ci/**'
      - '.kittify/doctrine/overlays/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.kittify/metadata.yaml'
      - 'uv.lock'
      - '.kittify/release/shared-package-compatibility.json'
      - 'CHANGELOG.md'
      - 'RELEASE_CHECKLIST.md'
      - 'scripts/release/**'
      - '.github/workflows/scripts/**'
      - 'ruff.toml'
      - '.github/workflows/ci-quality.yml'
      # Suite-running workflows routed to the architectural guards (FR-012).
      - '.github/workflows/ci-windows.yml'
      - '.github/workflows/drift-detector.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/release-readiness.yml'
      - '.github/workflows/check-spec-kitty-events-alignment.yml'
  schedule:
    # Nightly Sonar run on the default branch. Offset from the top of the hour
    # to avoid GitHub Actions' busiest scheduling window.
    - cron: '17 2 * * *'
  workflow_dispatch:
    inputs:
      run_extended:
        description: 'Run slow/e2e suite'
        required: false
        default: false
        type: boolean
      run_all:
        description: 'Run full pipeline (skip applicability checks; forces every per-module job to run regardless of path filters)'
        required: false
        default: false
        type: boolean

concurrency:
  group: ci-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # changes: detect which modules were touched so per-module jobs can skip.
  # ---------------------------------------------------------------------------
  changes:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'pr:deferred') && !contains(github.event.pull_request.labels.*.name, 'pr:skip-ci') }}
    outputs:
      # ``run_all`` (workflow_dispatch input) and ``unmatched`` (the FR-010
      # fail-closed catch-all: a src/** change matched by NO named filter
      # group — see the ``unmatched`` step below) both force every per-module
      # job to run regardless of which paths changed (run_all semantics, HiC
      # ruling 7b). For ``push`` / ``schedule`` events with no unmatched src
      # change the expression collapses to the path-filter value because
      # ``inputs.run_all`` is null/false there. Every output uses this exact
      # shape — no variants (mission ci-suite-map-bind, Decision 7b).
      sync: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.sync }}
      merge: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.merge }}
      missions: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.missions }}
      post_merge: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.post_merge }}
      release: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.release }}
      status: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.status }}
      review: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.review }}
      next: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.next }}
      lanes: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.lanes }}
      dashboard: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.dashboard }}
      upgrade: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.upgrade }}
      cli: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.cli }}
      core_misc: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.core_misc }}
      charter: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.charter }}
      agent: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.agent }}
      kernel: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.kernel }}
      doctrine: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.doctrine }}
      execution_context: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.execution_context }}
      e2e: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.e2e }}
      docs: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.docs }}
      glossary: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.glossary }}
      acceptance: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.acceptance }}
      # Composite src-backed groups (mission ci-topology-shrink FR-002): same
      # run_all/unmatched shape as every other src group above.
      auth_audit_git: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.auth_audit_git }}
      lifecycle: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.lifecycle }}
      agent_surface: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.agent_surface }}
      closeout: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.closeout }}
      governance: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.governance }}
      platform: ${{ (inputs.run_all || steps.unmatched.outputs.unmatched == 'true') && 'true' || steps.filter.outputs.platform }}
      # Raw catch-all signal for the quality-gate decision script (FR-011):
      # true iff any_src matched but no named group did.
      unmatched: ${{ steps.unmatched.outputs.unmatched }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            sync:
              - 'src/specify_cli/sync/**'
              - 'src/specify_cli/core/loopback_http.py'
              - 'tests/sync/**'
            merge:
              - 'src/specify_cli/merge/**'
              - 'tests/merge/**'
            missions:
              - 'src/specify_cli/mission.py'
              - 'src/specify_cli/mission_metadata.py'
              - 'src/specify_cli/missions/**'
              - 'src/doctrine/missions/**'
              - 'tests/fixtures/missions/**'
              - 'tests/missions/**'
              - 'tests/specify_cli/missions/**'
            post_merge:
              - 'src/specify_cli/post_merge/**'
              - 'tests/post_merge/**'
            release:
              - 'src/specify_cli/release/**'
              - 'tests/release/**'
              - 'pyproject.toml'
              - '.kittify/metadata.yaml'
              - 'uv.lock'
              - '.kittify/release/shared-package-compatibility.json'
              - 'CHANGELOG.md'
              - 'RELEASE_CHECKLIST.md'
              - 'scripts/release/**'
              - '.github/workflows/scripts/**'
              - '.github/workflows/release-readiness.yml'
              - '.github/workflows/check-spec-kitty-events-alignment.yml'
            status:
              - 'src/specify_cli/status/**'
              - 'src/specify_cli/coordination/**'
              - 'tests/status/**'
              - 'tests/specify_cli/status/**'
              - 'tests/specify_cli/coordination/**'
            review:
              - 'src/specify_cli/review/**'
              - 'tests/review/**'
            next:
              - 'src/specify_cli/runtime/**'
              - 'src/runtime/next/**'
              - 'src/mission_runtime/**'
              - 'tests/next/**'
              - 'tests/specify_cli/next/**'
              - 'tests/runtime/**'
            lanes:
              - 'src/specify_cli/lanes/**'
              - 'tests/lanes/**'
              - 'tests/specify_cli/lanes/**'
            dashboard:
              - 'src/specify_cli/dashboard/**'
              - 'tests/test_dashboard/**'
            upgrade:
              - 'src/specify_cli/upgrade/**'
              - 'tests/upgrade/**'
            cli:
              - 'src/specify_cli/cli/**'
              - 'tests/cli/**'
              - 'tests/specify_cli/cli/**'
            core_misc:
              - '.github/workflows/ci-quality.yml'
              # The other suite-running workflows route to the architectural
              # guard shard via this group (FR-012 two-layer, second layer).
              - '.github/workflows/ci-windows.yml'
              - '.github/workflows/drift-detector.yml'
              - '.github/workflows/release.yml'
              - 'src/kernel/**'
              - 'src/doctrine/**'
              - 'src/specify_cli/core/**'
              - 'src/specify_cli/coordination/**'
              - 'src/specify_cli/delivery/**'
              - 'src/specify_cli/event_journal/**'
              - 'src/specify_cli/doctrine_synthesizer/**'
              - 'src/specify_cli/saas/**'
              - 'src/specify_cli/status/**'
              - 'src/specify_cli/tool_surface/**'
              # The SonarCloud CI review tool + version extractor and their
              # tests: a change to scripts/ci/** or tests/ci/** must re-run the
              # integration-tests-core-misc `misc` shard (which now owns
              # tests/ci) so the token-free read-only smoke test's guards run.
              - 'scripts/ci/**'
              - 'tests/ci/**'
              - 'tests/architectural/**'
              - 'tests/specify_cli/tool_surface/**'
              - 'tests/kernel/**'
              - 'tests/delivery/**'
              - 'tests/event_journal/**'
              - 'tests/doctrine/**'
              - 'tests/doctrine_synthesizer/**'
              - 'tests/policy/**'
              - 'tests/core/**'
              - 'tests/contract/**'
              - 'tests/init/**'
              - 'tests/integration/**'
              - 'tests/dossier/**'
              - 'tests/git_ops/**'
              - 'tests/tasks/**'
              # WP05 (coord-authority-trio-degod-01KX7094): tests/characterization/
              # (the trio's CLI-envelope characterization suite) was an unrouted
              # test directory -- no path filter or job path picked it up, so its
              # git_repo/integration-marked tests were selected by zero CI gates
              # (test_no_new_orphan_surfaces / test_split_preserves_zero_orphans).
              # Routed to the misc shard below, matching its cross-cutting
              # accept/implement/workflow scope.
              - 'tests/characterization/**'
              # lifecycle-gate-execution-context-01KY72GQ WP03: tests/acceptance/
              # (the Gate Execution Context behavioural contract) is a new test
              # directory routed to the misc shard (which now owns it in the pytest
              # `paths` list below), so its git_repo/integration-marked tests are
              # selected by a CI gate rather than tripping
              # test_no_new_orphan_surfaces (C-006 gate-coverage registration).
              - 'tests/acceptance/**'
            e2e:
              - '.github/workflows/ci-quality.yml'
              - 'tests/e2e/**'
              - 'tests/cross_cutting/**'
            # docs: docs-only changes run a dedicated CHEAP job (fast-tests-docs)
            # instead of the full core-misc code cone. Docs prose, the docs test
            # suite, and the docs tooling under scripts/docs all map here. This
            # class ONLY narrows the docs->code direction; every non-docs path
            # keeps triggering exactly what it triggered before (docs/** was
            # removed from core_misc, but tests/docs stays selected by the
            # core-misc jobs so a src change still over-covers docs). See #2359.
            docs:
              - 'docs/**'
              - 'tests/docs/**'
              - 'scripts/docs/**'
            charter:
              - 'src/charter/**'
              - 'src/specify_cli/charter_runtime/**'
              - 'tests/charter/**'
              - 'tests/specify_cli/charter_freshness/**'
              - 'tests/specify_cli/charter_lint/**'
              - 'tests/specify_cli/charter_preflight/**'
            agent:
              - 'src/specify_cli/agent_utils/**'
              - 'tests/agent/**'
            kernel:
              - 'src/kernel/**'
              - 'tests/kernel/**'
            doctrine:
              - 'src/doctrine/**'
              - '.kittify/doctrine/overlays/**'
              - 'tests/doctrine/**'
            execution_context:
              - 'src/mission_runtime/**'
              - 'src/specify_cli/status/**'
              - 'src/runtime/next/**'
              - 'src/specify_cli/cli/commands/agent/**'
              - 'tests/architectural/test_execution_context_parity.py'
            glossary:
              - 'src/glossary/**'
              - 'tests/glossary/**'
            # acceptance: canonical-acceptance + gitignore/derived-views state
            # surfaces (src/specify_cli/acceptance + src/specify_cli/state) plus
            # the tests that exercise them, so a change to those src cones
            # deterministically triggers the core-misc jobs that run them
            # instead of relying on the fail-closed catch-all (#2034 / #1933).
            acceptance:
              - 'src/specify_cli/acceptance/**'
              - 'src/specify_cli/state/**'
              - 'tests/specify_cli/test_canonical_acceptance.py'
              - 'tests/specify_cli/test_gitignore_contract.py'
              - 'tests/specify_cli/test_state_contract.py'
              - 'tests/specify_cli/upgrade/migrations/test_m_3_2_4_derived_views_gitignore.py'
            # ---------------------------------------------------------------
            # Composite src-backed groups (mission ci-topology-shrink
            # FR-001/FR-002/FR-010): each maps a family of hot-but-unmapped
            # src/specify_cli/<dir> worklist dirs (census
            # tests/architectural/ci_topology_census.json -> target_group) to a
            # NAMED src-backed dorny group so a change confined to one of them
            # routes to the core-misc suites instead of tripping
            # unmatched->run_all (SC-001). Composites (not per-dir groups) cap
            # quality-gate.needs growth under the NFR-005 ceiling. The member
            # globs are the authoritative worklist->group map; adding a member
            # here + its changes.outputs row + the unmatched loop entry + a
            # test-job if-gate + a JOB_GROUPS row is the 5-edit atomic
            # registration (research §4.4).
            # ---------------------------------------------------------------
            auth_audit_git:
              - 'src/specify_cli/auth/**'
              - 'src/specify_cli/audit/**'
              - 'src/specify_cli/git/**'
            lifecycle:
              - 'src/specify_cli/migration/**'
              - 'src/specify_cli/invocation/**'
              - 'src/specify_cli/compat/**'
              - 'src/specify_cli/distribution/**'
              - 'src/specify_cli/template/**'
            agent_surface:
              - 'src/specify_cli/orchestrator_api/**'
              - 'src/specify_cli/tracker/**'
              - 'src/specify_cli/dossier/**'
              - 'src/specify_cli/bulk_edit/**'
              - 'src/specify_cli/skills/**'
            closeout:
              - 'src/specify_cli/retrospective/**'
              - 'src/specify_cli/readiness/**'
              - 'src/specify_cli/decisions/**'
              - 'src/specify_cli/doc_analysis/**'
              - 'src/specify_cli/widen/**'
            governance:
              - 'src/specify_cli/doctrine/**'
              - 'src/specify_cli/policy/**'
              - 'src/specify_cli/ownership/**'
              - 'src/specify_cli/contracts/**'
              - 'src/specify_cli/validators/**'
              - 'src/specify_cli/calibration/**'
              - 'src/specify_cli/context/**'
            platform:
              - 'src/specify_cli/workspace/**'
              - 'src/specify_cli/session_presence/**'
              - 'src/specify_cli/mission_v1/**'
              - 'src/specify_cli/mission_loader/**'
              - 'src/specify_cli/events/**'
              - 'src/specify_cli/paths/**'
              - 'src/specify_cli/saas_client/**'
              - 'src/specify_cli/task_utils/**'
              - 'src/specify_cli/intake/**'
            # FR-010 probe group (Decision 7b): matches ANY src change. The
            # ``unmatched`` step below computes ``any_src AND NOT (any named
            # group)`` from the filter's own outputs; a true result forces the
            # full-run path. Never gate a job on any_src directly.
            any_src:
              - 'src/**'

      # Fail-closed catch-all (mission ci-suite-map-bind FR-010, HiC ruling
      # 7b): a src/** change that no named filter group matched must force the
      # full-run path (a LOUD ALARM, not steady state — add a named group for
      # any hot unmatched dir). The union below is computed from the filter's
      # OWN outputs and is the ONE enumeration of every SRC-BACKED named group
      # (the negated path mega-glob mirror is FORBIDDEN); the architectural
      # invariant asserts this list stays identical to the parsed set of
      # src-backed filter groups (Decision 8 two-authority rule). Non-src groups
      # (docs, e2e) are excluded so they can't mask an unmapped-src change.
      - name: Compute catch-all unmatched signal
        id: unmatched
        env:
          ANY_SRC: ${{ steps.filter.outputs.any_src }}
        run: |
          matched=false
          # The union below is the SRC-BACKED filter groups only (every group
          # with >=1 ``src/`` glob). The non-src groups ``docs`` and ``e2e``
          # are DELIBERATELY excluded so a docs- or e2e-only change bundled
          # with an UNMAPPED src/** change cannot set matched=true and mask the
          # src hole (aggregate-squad debbie). The architectural invariant pins
          # this union to the parsed src-backed filter groups.
          for group_hit in \
            "${{ steps.filter.outputs.sync }}" \
            "${{ steps.filter.outputs.merge }}" \
            "${{ steps.filter.outputs.missions }}" \
            "${{ steps.filter.outputs.post_merge }}" \
            "${{ steps.filter.outputs.release }}" \
            "${{ steps.filter.outputs.status }}" \
            "${{ steps.filter.outputs.review }}" \
            "${{ steps.filter.outputs.next }}" \
            "${{ steps.filter.outputs.lanes }}" \
            "${{ steps.filter.outputs.dashboard }}" \
            "${{ steps.filter.outputs.upgrade }}" \
            "${{ steps.filter.outputs.cli }}" \
            "${{ steps.filter.outputs.core_misc }}" \
            "${{ steps.filter.outputs.charter }}" \
            "${{ steps.filter.outputs.agent }}" \
            "${{ steps.filter.outputs.kernel }}" \
            "${{ steps.filter.outputs.doctrine }}" \
            "${{ steps.filter.outputs.execution_context }}" \
            "${{ steps.filter.outputs.glossary }}" \
            "${{ steps.filter.outputs.acceptance }}" \
            "${{ steps.filter.outputs.auth_audit_git }}" \
            "${{ steps.filter.outputs.lifecycle }}" \
            "${{ steps.filter.outputs.agent_surface }}" \
            "${{ steps.filter.outputs.closeout }}" \
            "${{ steps.filter.outputs.governance }}" \
            "${{ steps.filter.outputs.platform }}"; do
            if [ "$group_hit" = "true" ]; then
              matched=true
            fi
          done
          if [ "$ANY_SRC" = "true" ] && [ "$matched" = "false" ]; then
            echo "::warning::src/** change matched by NO named filter group — forcing the full-run path (FR-010 catch-all). Add a named group for this directory."
            echo "unmatched=true" >> "$GITHUB_OUTPUT"
          else
            echo "unmatched=false" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # deferral-consistency-check: FR-016 (mission
  # lifecycle-gate-execution-context-01KY72GQ, WP18 / ADR 2026-07-23-2). Fails
  # any PR still carrying a negative invariant recorded
  # `deferred_to_consolidation` — the mission loop's ONE acceptance-matrix
  # reader (`acceptance/gates_core.py`) runs pre-consolidation, so it cannot
  # enforce this itself (that would be circular: it is the gate that CREATES
  # the deferral). This is the external enforcer the ADR requires; it runs
  # unconditionally (no `changes` filter group — a dangling deferral in
  # kitty-specs/**/acceptance-matrix.json is not scoped to any one path
  # family) and is a `quality-gate.needs` member so a violation blocks merge.
  # ---------------------------------------------------------------------------
  deferral-consistency-check:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'pr:deferred') && !contains(github.event.pull_request.labels.*.name, 'pr:skip-ci') }}
    steps:
      - name: "[ENFORCED] Check out repository"
        uses: actions/checkout@v6

      - name: "[ENFORCED] FR-016 — fail on dangling deferred_to_consolidation invariants"
        run: |
          python3 scripts/ci/check_dangling_deferrals.py --root kitty-specs

  lint:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'pr:deferred') && !contains(github.event.pull_request.labels.*.name, 'pr:skip-ci') }}
    outputs:
      commitlint_has_failures: ${{ steps.commitlint.outputs.has_failures }}
      markdownlint_has_failures: ${{ steps.markdownlint.outputs.has_failures }}
      ruff_has_failures: ${{ steps.ruff.outputs.has_failures }}
      mypy_has_failures: ${{ steps.mypy.outputs.has_failures }}

    steps:
      - name: "[ENFORCED] Check out repository"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "[ENFORCED] Set up uv"
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12'

      - name: "[ENFORCED] Set up Node"
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: "[ENFORCED] Install Python dependencies"
        run: |
          uv sync --frozen --all-extras

      - name: "[ENFORCED] Prepare report directories"
        run: |
          mkdir -p out/reports/static-analysis
          mkdir -p out/reports/security

      - name: "[ENFORCED] Determine commit range and cutoff date"
        id: commit_range
        run: |
          # Set cutoff date for linting (when linting was introduced)
          CUTOFF_DATE="2026-02-25T00:00:00Z"
          echo "cutoff_date=$CUTOFF_DATE" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "from=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "to=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "from=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "to=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: "[ENFORCED] Run commit message linting"
        id: commitlint
        if: always()
        continue-on-error: true
        run: |
          FROM_SHA="${{ steps.commit_range.outputs.from }}"
          TO_SHA="${{ steps.commit_range.outputs.to }}"
          CUTOFF_DATE="${{ steps.commit_range.outputs.cutoff_date }}"

          if [ -z "$FROM_SHA" ] || [ -z "$TO_SHA" ]; then
            echo "No commit range available for this trigger. Skipping commitlint."
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Convert cutoff date to Unix timestamp for comparison
          CUTOFF_TIMESTAMP=$(date -d "$CUTOFF_DATE" +%s)

          # Get all commits in range
          mapfile -t ALL_COMMITS < <(git rev-list "$FROM_SHA..$TO_SHA")

          # Filter commits by cutoff date
          COMMITS_AFTER_CUTOFF=()
          for commit in "${ALL_COMMITS[@]}"; do
            commit_timestamp=$(git show -s --format=%ct "$commit")
            if [ "$commit_timestamp" -gt "$CUTOFF_TIMESTAMP" ]; then
              COMMITS_AFTER_CUTOFF+=("$commit")
            fi
          done

          if [ "${#COMMITS_AFTER_CUTOFF[@]}" -eq 0 ]; then
            echo "No commits after cutoff date ($CUTOFF_DATE). Skipping commitlint."
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Run commitlint on filtered commits
          echo "Checking ${#COMMITS_AFTER_CUTOFF[@]} commits after cutoff date..."
          FAILED_COMMITS=""
          for commit in "${COMMITS_AFTER_CUTOFF[@]}"; do
            if ! echo "$commit" | npx --yes @commitlint/cli@19.8.1 \
              --config commitlint.config.cjs \
              --from "$commit~1" \
              --to "$commit" \
              --verbose; then
              commit_msg=$(git log --format=%s -n 1 "$commit")
              FAILED_COMMITS="${FAILED_COMMITS}${commit} - ${commit_msg}\n"
            fi
          done

          # Save failed commits for PR comment
          if [ -n "$FAILED_COMMITS" ]; then
            echo -e "$FAILED_COMMITS" > /tmp/commitlint-failures.txt
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "[ENFORCED] Run markdown style linting on changed files"
        id: markdownlint
        if: always()
        continue-on-error: true
        run: |
          FROM_SHA="${{ steps.commit_range.outputs.from }}"
          TO_SHA="${{ steps.commit_range.outputs.to }}"
          CUTOFF_DATE="${{ steps.commit_range.outputs.cutoff_date }}"

          if [ -z "$FROM_SHA" ] || [ -z "$TO_SHA" ]; then
            echo "No commit range available for this trigger. Skipping markdownlint."
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Convert cutoff date to Unix timestamp for comparison
          CUTOFF_TIMESTAMP=$(date -d "$CUTOFF_DATE" +%s)

          mapfile -d '' CHANGED_MD_FILES < <(git diff --name-only -z --diff-filter=ACM "$FROM_SHA" "$TO_SHA" -- '*.md' '*.mdx')
          if [ "${#CHANGED_MD_FILES[@]}" -eq 0 ]; then
            echo "No changed markdown files in commit range."
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Filter files by last modification date after cutoff
          FILES_TO_CHECK=()
          for file in "${CHANGED_MD_FILES[@]}"; do
            if [ -f "$file" ]; then
              # Get the last commit timestamp for this file in the range
              last_commit_timestamp=$(git log -1 --format=%ct "$FROM_SHA..$TO_SHA" -- "$file" 2>/dev/null || echo "0")
              if [ "$last_commit_timestamp" -gt "$CUTOFF_TIMESTAMP" ]; then
                FILES_TO_CHECK+=("$file")
              fi
            fi
          done

          if [ "${#FILES_TO_CHECK[@]}" -eq 0 ]; then
            echo "No markdown files modified after cutoff date ($CUTOFF_DATE)."
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Checking ${#FILES_TO_CHECK[@]} markdown files modified after cutoff date..."

          # Run markdownlint and capture failures
          FAILED_FILES=""
          if ! npx --yes markdownlint-cli2@0.18.1 \
            --config .markdownlint-cli2.jsonc \
            "${FILES_TO_CHECK[@]}"; then
            for file in "${FILES_TO_CHECK[@]}"; do
              if ! npx --yes markdownlint-cli2@0.18.1 \
                --config .markdownlint-cli2.jsonc \
                "$file" 2>&1 >/dev/null; then
                FAILED_FILES="${FAILED_FILES}${file}\n"
              fi
            done
            echo -e "$FAILED_FILES" > /tmp/markdownlint-failures.txt
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "[ENFORCED] Run architecture/docs consistency tests on changed markdown"
        if: always()
        run: |
          FROM_SHA="${{ steps.commit_range.outputs.from }}"
          TO_SHA="${{ steps.commit_range.outputs.to }}"

          if [ -z "$FROM_SHA" ] || [ -z "$TO_SHA" ]; then
            echo "No commit range available for this trigger. Skipping docs consistency tests."
            exit 0
          fi

          mapfile -d '' CHANGED_ARCH_DOC_MD < <(git diff --name-only -z --diff-filter=ACM "$FROM_SHA" "$TO_SHA" -- 'docs/*.md' 'docs/**/*.md')

          if [ "${#CHANGED_ARCH_DOC_MD[@]}" -eq 0 ]; then
            echo "No changed markdown files under docs/. Skipping docs consistency tests."
            exit 0
          fi

          echo "Detected markdown changes in docs/architecture. Running consistency checks..."
          uv run python -m pytest -m "not windows_ci" -q tests/docs/test_architecture_docs_consistency.py tests/docs/test_versioned_docs_integrity.py

      - name: "[ENFORCED] Run template/compat regression tests on matching changes"
        if: always()
        run: |
          FROM_SHA="${{ steps.commit_range.outputs.from }}"
          TO_SHA="${{ steps.commit_range.outputs.to }}"

          if [ -z "$FROM_SHA" ] || [ -z "$TO_SHA" ]; then
            echo "No commit range available for this trigger. Skipping template/compat regression tests."
            exit 0
          fi

          mapfile -d '' CHANGED_TEMPLATE_COMPAT < <(git diff --name-only -z --diff-filter=ACM "$FROM_SHA" "$TO_SHA" -- \
            'src/specify_cli/template/**' \
            'tests/test_template/**' \
            'src/specify_cli/compat/**' \
            'tests/specify_cli/compat/**' \
            'src/specify_cli/migration/**' \
            'tests/specify_cli/migration/**' \
            'tests/specify_cli/regression/**')

          if [ "${#CHANGED_TEMPLATE_COMPAT[@]}" -eq 0 ]; then
            echo "No template/compat/migration changes detected. Skipping regression tests."
            exit 0
          fi

          echo "Detected template/compat/migration changes. Running focused regression tests..."
          uv run python -m pytest -q --tb=short \
            tests/test_template/test_asset_generator.py \
            tests/specify_cli/migration/test_schema_version.py \
            tests/specify_cli/compat/test_messages.py \
            tests/specify_cli/regression/test_twelve_agent_parity.py::test_toml_command_output_is_parseable

      - name: "[ENFORCED] Check Contextive glossary files are up-to-date"
        if: always()
        run: |
          FROM_SHA="${{ steps.commit_range.outputs.from }}"
          TO_SHA="${{ steps.commit_range.outputs.to }}"

          if [ -z "$FROM_SHA" ] || [ -z "$TO_SHA" ]; then
            echo "No commit range available. Running Contextive check unconditionally."
            uv run python scripts/generate_contextive_glossaries.py check
            exit $?
          fi

          mapfile -d '' CHANGED < <(git diff --name-only -z --diff-filter=ACM "$FROM_SHA" "$TO_SHA" \
            -- 'glossary/**' 'src/specify_cli/**' 'src/charter/**' 'src/charter/**' '.kittify/traceability/**')

          if [ "${#CHANGED[@]}" -eq 0 ]; then
            echo "No changes in glossary/, src/specify_cli/, or .kittify/traceability/. Skipping Contextive check."
            exit 0
          fi

          echo "Detected relevant changes. Verifying Contextive glossary files are up-to-date..."
          uv run python scripts/generate_contextive_glossaries.py check

      - name: "[INFO] Run ruff report (advisory)"
        id: ruff
        if: always()
        continue-on-error: true
        run: |
          set -o pipefail
          if uv run python -m ruff check src tests 2>&1 | tee out/reports/static-analysis/ruff-report.txt; then
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "[ENFORCED] banned-API lint gate (TID251)"
        id: tid251
        if: always()
        run: |
          # ADR docs/adr/3.x/2026-05-28-1-... (Gap 3 / Gap 5): tests must not
          # reimplement the charter hash algorithm (hashlib.sha256) or catch
          # click.exceptions.* directly. Unlike the advisory full-ruff report above, this
          # banned-API check is ENFORCED — an unannotated banned call FAILS the build (no
          # continue-on-error). Legitimate non-charter uses carry an inline
          # '# noqa: TID251 — <justification>'. This realises the ADR Decision Outcome:
          # "automated enforcement rather than convention".
          uv run python -m ruff check src tests --select TID251

      - name: "[ENFORCED] Typer 0.26 JSON error surface"
        id: typer026
        if: always()
        run: |
          uv run --with 'typer>=0.26' python -m pytest tests/agent/test_json_group_typer_surface.py -q

      - name: "[INFO] Run mypy report (advisory)"
        id: mypy
        if: always()
        continue-on-error: true
        run: |
          set -o pipefail
          if uv run python -m mypy --strict src/specify_cli src/charter src/doctrine 2>&1 | tee out/reports/static-analysis/mypy-report.txt; then
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "[ENFORCED] Run Bandit security scan"
        id: bandit
        if: always()
        continue-on-error: true
        run: |
          # pipefail so the step's exit reflects bandit's real exit, not tee's
          # 0 — otherwise the downstream security gate is vacuous (aggregate-
          # squad alphonso; same swallowed-exit class the mission fixed for its
          # own decision step). tee still writes the report regardless.
          set -o pipefail
          uv run python -m bandit -r src/ \
            --severity-level medium \
            --confidence-level medium \
            | tee out/reports/security/bandit-report.txt

      - name: "[ENFORCED] Run pip-audit CVE scan"
        id: pip_audit
        if: always()
        continue-on-error: true
        run: |
          # pipefail so the step's exit reflects pip-audit's real exit, not
          # tee's 0 — otherwise the downstream security gate is vacuous
          # (aggregate-squad alphonso). tee still writes the report regardless.
          set -o pipefail
          uv run python -m pip_audit | tee out/reports/security/pip-audit-report.txt

      - name: "[ENFORCED] Validate patch() target strings (closes #394)"
        run: uv run python scripts/check_patch_targets.py

      - name: "[ENFORCED] Upload lint artifacts"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-reports
          path: out/reports/

      - name: "[ENFORCED] Persist linting failure details"
        if: always() && github.event_name == 'pull_request'
        run: |
          mkdir -p out/reports/lint-failures
          if [ -f /tmp/commitlint-failures.txt ]; then
            cp /tmp/commitlint-failures.txt out/reports/lint-failures/commitlint-failures.txt
          fi
          if [ -f /tmp/markdownlint-failures.txt ]; then
            cp /tmp/markdownlint-failures.txt out/reports/lint-failures/markdownlint-failures.txt
          fi
          # Persist ruff/mypy reports for the lint-feedback job
          if [ -s out/reports/static-analysis/ruff-report.txt ] && [ "${{ steps.ruff.outputs.has_failures }}" = "true" ]; then
            cp out/reports/static-analysis/ruff-report.txt out/reports/lint-failures/ruff-failures.txt
          fi
          if [ -s out/reports/static-analysis/mypy-report.txt ] && [ "${{ steps.mypy.outputs.has_failures }}" = "true" ]; then
            cp out/reports/static-analysis/mypy-report.txt out/reports/lint-failures/mypy-failures.txt
          fi

      - name: "[ENFORCED] Upload linting failure details"
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: lint-failure-details
          path: out/reports/lint-failures/
          if-no-files-found: ignore

      - name: "[ENFORCED] Fail job if security checks failed"
        if: always()
        run: |
          echo "bandit outcome: ${{ steps.bandit.outcome }}"
          echo "pip_audit outcome: ${{ steps.pip_audit.outcome }}"
          if [ "${{ steps.bandit.outcome }}" != "success" ] || \
             [ "${{ steps.pip_audit.outcome }}" != "success" ]; then
            echo "One or more security checks failed."
            exit 1
          fi

  lint-feedback:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: lint
    if: ${{ (always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && (needs.lint.outputs.commitlint_has_failures == 'true' || needs.lint.outputs.markdownlint_has_failures == 'true' || needs.lint.outputs.ruff_has_failures == 'true' || needs.lint.outputs.mypy_has_failures == 'true')) && !contains(github.event.pull_request.labels.*.name, 'pr:deferred') && !contains(github.event.pull_request.labels.*.name, 'pr:skip-ci') }}
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: "[ENFORCED] Download linting failure details"
        uses: actions/download-artifact@v8
        with:
          name: lint-failure-details
          path: /tmp/lint-failures
        continue-on-error: true

      - name: "[ENFORCED] Post PR comment on linting failures"
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let comment = '## Linting Issues Detected\n\n';

            const commitlintFailed = '${{ needs.lint.outputs.commitlint_has_failures }}' === 'true';
            if (commitlintFailed) {
              let failedCommits = '';
              try {
                failedCommits = fs.readFileSync('/tmp/lint-failures/commitlint-failures.txt', 'utf8');
              } catch (e) {
                failedCommits = 'Unable to read commit failures';
              }
              comment += '### Commit Message Issues\n\n';
              comment += 'The following commits do not follow the conventional commit format:\n\n';
              comment += '```\n' + failedCommits + '```\n\n';
            }

            const markdownlintFailed = '${{ needs.lint.outputs.markdownlint_has_failures }}' === 'true';
            if (markdownlintFailed) {
              let failedFiles = '';
              try {
                failedFiles = fs.readFileSync('/tmp/lint-failures/markdownlint-failures.txt', 'utf8');
              } catch (e) {
                failedFiles = 'Unable to read markdown failures';
              }
              comment += '### Markdown Style Issues\n\n';
              comment += 'The following markdown files have style issues:\n\n';
              comment += '```\n' + failedFiles + '```\n\n';
            }

            const ruffFailed = '${{ needs.lint.outputs.ruff_has_failures }}' === 'true';
            if (ruffFailed) {
              let ruffOutput = '';
              try {
                ruffOutput = fs.readFileSync('/tmp/lint-failures/ruff-failures.txt', 'utf8');
              } catch (e) {
                ruffOutput = 'Unable to read ruff report — see lint-reports artifact for details.';
              }
              comment += '### Ruff Issues\n\n';
              comment += '<details>\n<summary>ruff check output</summary>\n\n';
              comment += '```\n' + ruffOutput.slice(0, 10000) + '```\n</details>\n\n';
            }

            const mypyFailed = '${{ needs.lint.outputs.mypy_has_failures }}' === 'true';
            if (mypyFailed) {
              let mypyOutput = '';
              try {
                mypyOutput = fs.readFileSync('/tmp/lint-failures/mypy-failures.txt', 'utf8');
              } catch (e) {
                mypyOutput = 'Unable to read mypy report — see lint-reports artifact for details.';
              }
              comment += '### Mypy Issues\n\n';
              comment += '<details>\n<summary>mypy --strict output</summary>\n\n';
              comment += '```\n' + mypyOutput.slice(0, 10000) + '```\n</details>\n\n';
            }

            comment += '**Note:** These are advisory and do not block the workflow. ';
            comment += 'Full reports are available in the `lint-reports` artifact.\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ---------------------------------------------------------------------------
  # kernel-tests: validates the zero-dependency shared utilities in src/kernel.
  # Runs before fast-tests so breakage in foundational code is surfaced first.
  # Coverage floor: 90% (kernel is small, stable, and must be well-tested).
  # ---------------------------------------------------------------------------
  kernel-tests:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes]
    if: always() && needs.changes.outputs.kernel == 'true'

    steps:
      - name: "[ENFORCED] Check out repository"
        uses: actions/checkout@v6

      - name: "[ENFORCED] Set up uv"
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12'

      - name: "[ENFORCED] Install dependencies"
        run: uv sync --frozen --all-extras

      - name: "[ENFORCED] Prepare report directories"
        run: |
          mkdir -p out/reports/xunit-reports
          mkdir -p out/reports/coverage

      - name: "[ENFORCED] Run kernel test suite with coverage"
        run: |
          uv run python -m pytest \
            -v \
            tests/kernel/ \
            -m "fast and not windows_ci" \
            --cov=src/kernel \
            --cov-report=term-missing \
            --cov-report=xml:out/reports/coverage/coverage-kernel.xml \
            --junitxml=out/reports/xunit-reports/xunit-result-kernel-${{ github.run_id }}.xml

      - name: "[ENFORCED] Enforce kernel coverage floor (90%)"
        run: |
          uv run python - <<'PY'
          import xml.etree.ElementTree as ET

          report = ET.parse("out/reports/coverage/coverage-kernel.xml").getroot()
          pct = float(report.attrib["line-rate"]) * 100.0
          floor = 90.0
          print(f"Kernel coverage: {pct:.2f}% (floor: {floor:.2f}%)")
          if pct < floor:
              raise SystemExit(
                  f"Kernel coverage floor not met: {pct:.2f}% < {floor:.2f}%"
              )
          PY

      - name: "[ENFORCED] Upload kernel-test artifacts"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kernel-test-reports
          path: out/reports/

