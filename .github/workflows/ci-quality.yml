  # ---------------------------------------------------------------------------
  # Tier 0 fast-tests: no inter-module dependencies
  # ---------------------------------------------------------------------------
  fast-tests-sync:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes]
    if: always() && needs.changes.outputs.sync == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12'
      - run: uv sync --frozen --all-extras
      - run: mkdir -p out/reports/coverage
      # C-SERIAL: the whole real-port ``find_free_port_in_range`` daemon
      # family (tests/_real_port_suites.FIXED_RANGE_SUITES) is excluded from
      # this parallel pool — HOME isolation does not protect OS-global port
      # binds (9400-9449). test_orphan_sweep.py's own serial pass now runs as
      # its own concurrent job (``fast-tests-sync-orphan-sweep``, mission
      # ci-test-topology-performance-01KXBJRT WP06 T016/FR-004) instead of a
      # second step here, so it stops sitting on this job's critical path.
      # Closes #2590 (mission ci-test-topology-performance-01KXBJRT WP03/WP06):
      # the other 3 family members were previously excluded from this
      # selection ONLY by their module-level `pytest.mark.integration` marker
      # not matching `-m "fast and not windows_ci"` — a marker-only guarantee,
      # not a structural one. These explicit --ignore= entries make the
      # exclusion structural (defense-in-depth; no selection change today,
      # since the marker mismatch already excluded them).
      - name: "Run fast tests — sync (parallel, real-port suites excluded)"
        run: |
          uv run python -m pytest tests/sync/ -m "fast and not windows_ci" -q --tb=short \
            --ignore=tests/sync/test_orphan_sweep.py \
            --ignore=tests/sync/test_daemon_orphan_classification.py \
            --ignore=tests/sync/test_daemon_cleanup_boundary.py \
            --ignore=tests/sync/test_issue_1071_singleton_reconfirmation.py \
            -n auto --dist loadfile \
            --durations=50 \
            --cov=src/specify_cli/sync \
            --cov-report=xml:out/reports/coverage/coverage-fast-sync.xml
      - name: "Upload fast-sync coverage"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fast-test-sync-reports
          path: out/reports/

  # ---------------------------------------------------------------------------
  # fast-tests-sync-orphan-sweep: the daemon/real-port orphan-sweep suite,
  # extracted into its own concurrent job (mission
  # ci-test-topology-performance-01KXBJRT WP06 T016/FR-004). It used to be
  # step 2 of ``fast-tests-sync`` (serial, running AFTER that job's parallel
  # step completed), sitting on that job's critical path even though it never
  # touches the parallel worker pool. Same trigger condition as
  # ``fast-tests-sync`` (``needs: [changes]``, gated on the ``sync`` filter
  # group) so it runs CONCURRENTLY with it instead of after it.
  # test_orphan_sweep.py binds the reserved daemon port range (9400-9449);
  # OS-global port binds are not protected by per-worker HOME isolation, so
  # this MUST stay serial (-n0) — still serial, just not blocking a sibling
  # job's own completion.
  # ---------------------------------------------------------------------------
  fast-tests-sync-orphan-sweep:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes]
    if: always() && needs.changes.outputs.sync == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12'
      - run: uv sync --frozen --all-extras
      - run: mkdir -p out/reports/coverage
      - name: "Run fast tests — sync orphan-sweep (serial, real ports)"
        run: |
          uv run python -m pytest tests/sync/test_orphan_sweep.py -q --tb=short \
            -m "not windows_ci" \
            -n0 \
            --cov=src/specify_cli/sync \
            --cov-report=xml:out/reports/coverage/coverage-fast-sync-orphan-sweep.xml \
            || test $? -eq 5
      - name: "Upload fast-sync-orphan-sweep coverage"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fast-test-sync-orphan-sweep-reports
          path: out/reports/

  fast-tests-merge:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes]
    if: always() && needs.changes.outputs.merge == 'true'
    steps:
      - uses: actions/checkout@v6
