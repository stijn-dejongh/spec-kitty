  # ---------------------------------------------------------------------------
  # integration-tests-next: the mission's headline offender (69.2 min fully
  # serial, run 29196440986). Mission ci-test-topology-performance-01KXBJRT
  # WP06 (T014/FR-001/FR-002) converts it to a 3-leg ``next_shard_N`` matrix
  # driven by the shared shard-group registry (tests/_next_shard_map.py, WP01)
  # — the same registry+conftest-hook mechanism ``arch-adversarial`` already
  # uses for ``arch_shard_1/2/3`` (D-044/C-003: one mechanism, not a cloned
  # second one). ``paths`` stays identical across all three legs — the
  # ``next_shard_N`` marker (applied at collection time by the shared
  # ``pytest_collection_modifyitems`` hook), not ``paths``, does the
  # partitioning. A GitHub Actions matrix shares one job id across all legs,
  # so this does NOT add new ``quality-gate.needs`` entries (T020) — the
  # existing single ``integration-tests-next`` entry continues to gate on all
  # three legs succeeding.
  # ---------------------------------------------------------------------------
  integration-tests-next:
    name: integration-tests-next (${{ matrix.shard }})
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes, fast-tests-next]
    if: >-
      always() &&
      needs.changes.outputs.next == 'true' &&
      needs.fast-tests-next.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: next_shard_1
            paths: >-
              tests/next
              tests/specify_cli/next
              tests/runtime
          - shard: next_shard_2
            paths: >-
              tests/next
              tests/specify_cli/next
              tests/runtime
          - shard: next_shard_3
            paths: >-
              tests/next
              tests/specify_cli/next
              tests/runtime
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12'
      - run: |
          uv sync --frozen --all-extras
      - run: mkdir -p out/reports/coverage
      - name: "Run integration tests — next"
        run: |
          uv run python -m pytest ${{ matrix.paths }} \
            -m '${{ matrix.shard }} and not windows_ci and (git_repo or integration)' \
            -q --tb=short \
            -n auto --dist loadfile -p no:cacheprovider \
            --durations=25 \
            --cov=src/runtime/next \
            --cov-report=xml:out/reports/coverage/coverage-integration-next-${{ matrix.shard }}.xml
      - name: "Upload integration-next coverage"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-next-${{ matrix.shard }}-reports
          path: out/reports/

