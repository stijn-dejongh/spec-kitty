  # ---------------------------------------------------------------------------
  # integration-tests-core-misc: catch-all architectural/git_repo/integration
  # tests split by directory family so one slow bucket cannot dominate PR CI.
  # Triggered by core_misc or execution_context path filters. Execution-context
  # only changes run the parity gate instead of the full catch-all integration
  # suite so status/runtime edits do not inherit unrelated core-misc debt.
  # The `if:` below SKIPS this job on a WIP-titled PR; by design (operator
  # ruling) a for-review (non-draft) WIP-titled PR then FAILS quality-gate,
  # because the gate's draft-exemption is draft-FLAG-only, not title-based. See
  # the DRAFT_GATED_JOBS note in the quality-gate decision step.
  # ---------------------------------------------------------------------------
  integration-tests-core-misc:
    name: integration-tests-core-misc (${{ matrix.shard }})
    runs-on: blacksmith-4vcpu-ubuntu-2404
    # De-serialized (mission ci-topology-shrink FR-013): the ``fast-tests-core-misc``
    # need is dropped so this matrix runs in parallel with the fast lane. The
    # architectural/adversarial shard that used to live here (and was the pole
    # serialized behind the fast job) now runs as the standalone always-on
    # ``arch-adversarial`` job below.
    needs: [changes]
    if: >-
      always() &&
      (needs.changes.outputs.core_misc == 'true' || needs.changes.outputs.execution_context == 'true' || needs.changes.outputs.acceptance == 'true' || needs.changes.outputs.auth_audit_git == 'true' || needs.changes.outputs.lifecycle == 'true' || needs.changes.outputs.agent_surface == 'true' || needs.changes.outputs.closeout == 'true' || needs.changes.outputs.governance == 'true' || needs.changes.outputs.platform == 'true') &&
      (
        github.event_name != 'pull_request' ||
        (
          github.event.pull_request.draft == false &&
          !startsWith(github.event.pull_request.title, 'WIP') &&
          !startsWith(github.event.pull_request.title, '[WIP]')
        ) ||
        contains(github.event.pull_request.labels.*.name, 'ci:full') ||
        contains(github.event.pull_request.labels.*.name, 'ready-for-ci')
      )
    strategy:
      fail-fast: false
      matrix:
        include:
          # NOTE: the ``architectural`` shard was extracted to the standalone
          # always-on ``arch-adversarial`` job (mission ci-topology-shrink
          # FR-005/FR-013) — do NOT re-add it here or it re-enters the fast-lane
          # serialization + Mode-B blindness this mission removed.
          - shard: integration
            paths: tests/integration
            ignore_args: ''
            marker_extra: ''
          # PENDING-CI: T017 slow-test de-dup — `and not slow` drops the single
          # migration perf @slow test (test_migration_completes_in_under_10s...)
          # from THIS heavy shard so it runs only in the dedicated `slow-tests`
          # job (no double-run, ~28s/push saved). Scoped to specify-cli-heavy
          # ONLY — NEVER --ignore=tests/specify_cli (that orphans 3 NFR guards).
          # Collection-count gate verified locally. Requires CI green x3.
          # See mission test-suite-acceleration.
          - shard: specify-cli-heavy
            paths: >-
              tests/specify_cli/migration
              tests/specify_cli/invocation
              tests/specify_cli/test_charter_activate_cli.py
            ignore_args: ''
            marker_extra: ' and not slow'
          # specify-cli-rest ignores every nested tests/specify_cli/<D> root a
          # DEDICATED integration job already owns, so those never same-tier
          # double-run (NFR-003; mission ci-topology-shrink FR-004 — nested
          # roots are NOT covered by the whole-tree FR-012 mirror, so they are
          # updated here by hand): migration/invocation -> specify-cli-heavy,
          # cli -> integration-tests-cli, missions -> integration-tests-missions,
          # lanes -> integration-tests-lanes, status -> integration-tests-status,
          # next -> integration-tests-next, charter_* ->
          # integration-tests-charter. coordination is NOT ignored: this shard
          # is its sole integration owner (its ``architectural`` marker arm
          # covers the arch-marked coordination boundary tests that
          # integration-tests-status' git_repo/integration marker would drop),
          # so tests/specify_cli/coordination was removed from that job instead.
          - shard: specify-cli-rest
            paths: tests/specify_cli
            ignore_args: >-
              --ignore=tests/specify_cli/migration
              --ignore=tests/specify_cli/invocation
              --ignore=tests/specify_cli/test_charter_activate_cli.py
              --ignore=tests/specify_cli/status
              --ignore=tests/specify_cli/next
              --ignore=tests/specify_cli/cli
              --ignore=tests/specify_cli/missions
              --ignore=tests/specify_cli/lanes
              --ignore=tests/specify_cli/charter_freshness
              --ignore=tests/specify_cli/charter_lint
              --ignore=tests/specify_cli/charter_preflight
            marker_extra: ''
          - shard: auth-audit-git
            paths: >-
              tests/auth
              tests/audit
              tests/git_ops
              tests/git
              tests/cli_gate
            ignore_args: ''
            marker_extra: ''
          - shard: misc
            paths: >-
              tests/_factories
              tests/_support
              tests/acceptance
              tests/calibration
              tests/characterization
              tests/ci
              tests/concurrency
              tests/contract
              tests/coordination
              tests/core
              tests/cross_branch
              tests/docs
              tests/doctor
              tests/dossier
              tests/init
              tests/migration
              tests/mission_runtime
              tests/packaging
              tests/policy
              tests/readiness
              tests/regression
              tests/regressions
              tests/research
              tests/retrospective
              tests/saas
              tests/stress
              tests/tasks
              tests/unit
            ignore_args: ''
            marker_extra: ''
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12'
      - run: uv sync --frozen --all-extras
      - run: mkdir -p out/reports/coverage
      # The architectural shard's exec-context-only fast-path (which ran ONLY
      # tests/architectural/test_execution_context_parity.py) was removed with
      # the architectural shard: that parity gate now runs unconditionally in
      # the always-on ``arch-adversarial`` job, so an execution-context change
      # is covered there (mission ci-topology-shrink FR-005/FR-013).
      - name: "Run integration tests — core misc"
        run: |
          uv run python -m pytest \
            ${{ matrix.paths }} \
            ${{ matrix.ignore_args }} \
            -m 'not windows_ci and (git_repo or integration or architectural) and not timing${{ matrix.marker_extra }}' \
            -q --tb=short \
            -n auto --dist loadfile \
            --durations=50 \
            --cov=src/specify_cli \
            --cov=src/mission_runtime \
            --cov-report=xml:out/reports/coverage/coverage-integration-core-misc-${{ matrix.shard }}.xml
      - name: "Upload integration-core-misc coverage"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-core-misc-${{ matrix.shard }}-reports
          path: out/reports/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # arch-adversarial: the always-on architectural + adversarial pole (mission
  # ci-topology-shrink FR-005/FR-006/FR-013). Extracted from the
  # integration-tests-core-misc ``architectural`` matrix shard so it:
  #   * runs on EVERY push/PR (``if: always()``, like ``lint``) — un-blinding
  #     the dead-module / stale-symbol / terminology / status-boundary guards on
  #     100% of PRs (Mode-B closed for all 13 arch-blind groups at once,
  #     NFR-002 differential matrix).
  #   * carries NO dorny filter-group ``if:`` gate, so it does NOT enter
  #     JOB_GROUPS / src_backed_groups / the unmatched loop (C-001 additive; a
  #     regression re-adding a filter gate here reds the differential matrix).
  #   * has NO ``needs: fast-tests-core-misc`` edge, so it is DE-SERIALIZED and
  #     runs in parallel with the fast lane (FR-013 — ``always()`` alone does not
  #     de-serialize; dropping the needs edge does).
  # Emits coverage-arch-adversarial.xml under the aggregator's glob-consumed name
  # (FR-006). Uses ``-n auto --dist loadfile`` (never bare ``load``); it touches
  # no daemon/real-port suite so no dedicated ``-n0`` serial pass is needed
  # (FR-011). The fail-closed catch-all (the ``changes`` unmatched signal) is
  # untouched, so an unmapped/new src path still forces coverage (FR-009).
  # ---------------------------------------------------------------------------
  arch-adversarial:
    name: arch-adversarial (${{ matrix.shard }})
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: ${{ (always()) && !contains(github.event.pull_request.labels.*.name, 'pr:deferred') && !contains(github.event.pull_request.labels.*.name, 'pr:skip-ci') }}
    # 3-shard matrix (mission ci-health-charter-path-and-arch-shard-01KWRTB2,
    # #2397): the arch-pole selection is now routed by dedicated pytest
    # markers (``arch_shard_1/2/3``, assignment table in
    # ``tests/_arch_shard_map.py``) rather than a single named shard. ``paths``
    # stays identical across all three legs — the marker (combined via ``and``
    # in the run step below), not ``paths``, does the partitioning. The
    # ``coverage-arch-adversarial-${{ matrix.shard }}.xml`` /
    # ``arch-adversarial-${{ matrix.shard }}-reports`` naming is unchanged and
    # already shard-label-agnostic (R4/FR-006) — only the values ``matrix.shard``
    # takes have changed.
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: arch_shard_1
            paths: >-
              tests/adversarial
              tests/architectural
              tests/architecture
              tests/lint
          - shard: arch_shard_2
            paths: >-
              tests/adversarial
              tests/architectural
              tests/architecture
              tests/lint
          - shard: arch_shard_3
            paths: >-
              tests/adversarial
              tests/architectural
              tests/architecture
              tests/lint
    steps:
      # fetch-depth: 0 so the docs-only detection step below can ``git diff``
      # the PR base against HEAD. This changes no job relation (no ``needs``, no
      # filter-group ``if:``) — the arch pole stays group-less/always-on, so the
      # NFR-002 differential matrix and FR-013 de-serialization are untouched.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12'
      - run: uv sync --frozen --all-extras
      - run: mkdir -p out/reports/coverage
      # Docs-only detection is a RUNTIME, STEP-LEVEL decision (never a job-level
      # ``if:`` and never a dorny filter-group reference) — see the block comment
      # above this job. Self-contained ``git diff`` (no ``needs: changes`` edge),
      # so the pole stays standalone (FR-013 / the ``needs`` guard in
      # test_ci_architectural_gate_coverage). STRICT rule: docs-only iff the PR's
      # changeset is non-empty AND every changed path is under ``docs/``. Anything
      # else (a ``src/``/``tests/``/``.github/``/root touch, a push, a
      # workflow_dispatch, or any diff error) is NOT docs-only -> full suite.
      - name: "Detect docs-only PR (runtime narrowing signal)"
        id: docsonly
        run: |
          set -uo pipefail
          docs_only=false
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            # Ensure the base commit object is present (fork PRs / shallow edges).
            git fetch --no-tags --depth=1 origin "$base_sha" 2>/dev/null \
              || git fetch --no-tags origin "${{ github.base_ref }}" 2>/dev/null \
              || true
            changed="$(git diff --name-only "$base_sha" HEAD 2>/dev/null || true)"
            # docs_only iff the changeset is non-empty and NO line falls outside
            # ``docs/`` (grep -qvE '^docs/' succeeds when a non-docs path exists).
            if [ -n "$changed" ] && ! printf '%s\n' "$changed" | grep -qvE '^docs/'; then
              docs_only=true
            fi
          fi
          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
          echo "arch-pole docs_only=$docs_only (event=${{ github.event_name }})"
      # Docs-only trims to the docs-relevant guards (`-m docs_scoped`) for speed;
      # otherwise the full always-on selection runs UNCHANGED. Both branches keep
      # the same step name, the full-selection marker substring
      # (`git_repo or integration or architectural`), and the same
      # ``coverage-arch-adversarial-<shard>.xml`` emitter (FR-006), so the static
      # workflow model sees the pole exactly as before plus a second, group-less
      # ``docs_scoped``-selecting gate (routed-by-marker; negated in the residual).
      - name: "Run architectural + adversarial suite (always-on pole)"
        run: |
          if [ "${{ steps.docsonly.outputs.docs_only }}" = "true" ]; then
            # A shard is not guaranteed to own at least one docs_scoped test (the
            # marker is assigned by content, not evenly distributed across the
            # 3 shards) — a docs-only PR whose diff happens to land entirely in
            # a shard with zero docs_scoped tests legitimately collects nothing.
            # Tolerate pytest's exit code 5 (no tests collected) the same way
            # the quarantine-visibility job does below, instead of reding an
            # unrelated docs-only PR on an empty selection.
            set +e
            uv run python -m pytest \
              ${{ matrix.paths }} \
              -m '${{ matrix.shard }} and docs_scoped and not windows_ci' \
              -q --tb=short \
              -n auto --dist loadfile \
              --durations=50 \
              --cov=src/specify_cli \
              --cov=src/mission_runtime \
              --cov-report=xml:out/reports/coverage/coverage-arch-adversarial-${{ matrix.shard }}.xml
            ec=$?
            set -e
            if [ "$ec" -eq 5 ]; then
              echo "::notice::${{ matrix.shard }} owns no docs_scoped tests (collected nothing) on this docs-only PR."
              exit 0
            fi
            exit "$ec"
          else
            uv run python -m pytest \
              ${{ matrix.paths }} \
              -m '${{ matrix.shard }} and not windows_ci and (git_repo or integration or architectural) and not timing' \
              -q --tb=short \
              -n auto --dist loadfile \
              --durations=50 \
              --cov=src/specify_cli \
              --cov=src/mission_runtime \
              --cov-report=xml:out/reports/coverage/coverage-arch-adversarial-${{ matrix.shard }}.xml
          fi
      - name: "Upload arch-adversarial coverage"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: arch-adversarial-${{ matrix.shard }}-reports
          path: out/reports/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # timing-nfr-serial: issue #2032 (mission
  # wp-prompt-latency-flake-isolation-01KWWWAC). The two
  # test_wp_prompt_build_latency.py tests were moved off the parallel
  # arch-adversarial pole (``and not timing`` added to both its selectors
  # above) because co-scheduled CPU contention there corrupted their
  # single-sample wall-clock measurement (#2032: a CHANGELOG-only diff
  # flipped PASSED->FAILED). This job is their new home: a dedicated serial
  # (``-n0``) ``-m timing`` run where no concurrent load can corrupt the
  # sample.
  #
  # Scoped to the WHOLE tree by marker (not just the WP-prompt file): the
  # ``and not timing`` addition above is a shared expression across every
  # shard of ``integration-tests-core-misc`` / ``arch-adversarial``, so it
  # also newly excludes ``tests/git/test_protection_config_honoring.py``'s
  # pre-existing ``@pytest.mark.timing`` class (whose own docstring already
  # said "do not wall-clock in the parallel shard" — that intent was never
  # wired into CI until now). Selecting ``-m timing`` over ``tests/`` picks up
  # every such carrier by construction, so this fix cannot silently orphan an
  # existing timing-marked test the same way it rescues the WP-prompt ones
  # (Issue #2034 anti-pattern). ``--ignore`` excludes
  # ``test_doctor_restart_daemon_timing.py``: that file's tests stay the sole
  # responsibility of ``restart-daemon-nfr-timing`` below (OS-matrixed,
  # cli-gated by design) — ignoring it here is what prevents a double-run.
  #
  # ALWAYS-ON by construction: ``if: always()``, no dorny filter-group ``if:``
  # gate, no ``needs`` edge — mirrors the arch-adversarial pole above, NOT the
  # ``restart-daemon-nfr-timing`` job below. That job gates on
  # ``needs.changes.outputs.cli`` (the ``cli`` filter covers only
  # ``src/specify_cli/cli/**``), but the code under test here
  # (``src/runtime/next/prompt_builder.py``) is NOT under that path — gating
  # this job the same way would silently skip the NFR on the very
  # prompt-builder PRs it exists to guard (defeats SC-003). Emits no
  # coverage XML (a pure timing gate), so it is absent from any
  # ``--cov``-consumer's ``needs:`` by construction — it IS added to
  # ``quality-gate.needs`` below so a red timing gate still blocks merge.
  # ---------------------------------------------------------------------------
  timing-nfr-serial:
    name: Timing NFR gate (serial, -m timing)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: ${{ (always()) && !contains(github.event.pull_request.labels.*.name, 'pr:deferred') && !contains(github.event.pull_request.labels.*.name, 'pr:skip-ci') }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12'
      - run: uv sync --frozen --all-extras
      - name: "Run timing-marked NFR gates (serial, -m timing)"
        run: |
          uv run python -m pytest \
            tests/ \
            --ignore=tests/specify_cli/cli/commands/test_doctor_restart_daemon_timing.py \
            -m timing \
            -n0 \
            -q --tb=short

  # ---------------------------------------------------------------------------
  # fast-tests-charter: charter package, depends on doctrine.
  # ---------------------------------------------------------------------------
  fast-tests-charter:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes, kernel-tests, fast-tests-doctrine]
    if: >-
      always() &&
      needs.changes.outputs.charter == 'true' &&
      needs.kernel-tests.result != 'failure' &&
      needs.fast-tests-doctrine.result != 'failure'
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12'
      - run: uv sync --frozen --all-extras
      - run: mkdir -p out/reports/coverage
      # PENDING-CI: T018 flip — collection-equivalence verified locally
      # (serial == parallel nodeids); requires CI green x3 (run-twice/thrice
      # ratchet) before trusting this flip. Safe because WP01 converted the
      # charter timing floors. See mission test-suite-acceleration.
      - name: "Run fast tests — charter"
        run: |
          uv run python -m pytest \
            tests/charter \
            tests/specify_cli/charter_freshness \
            tests/specify_cli/charter_lint \
            tests/specify_cli/charter_preflight \
            -m "fast and not windows_ci" -q --tb=short \
            -n auto --dist loadfile \
            --durations=50 \
            --cov=src/charter \
            --cov=src/specify_cli/charter_runtime \
            --cov-fail-under=55 \
            --cov-report=xml:out/reports/coverage/coverage-fast-charter.xml
      - name: "Upload fast-charter coverage"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fast-test-charter-reports
          path: out/reports/

  # ---------------------------------------------------------------------------
  # fast-tests-agent: agent surface (agent_utils + workflow tests).
  # De-serialized from fast-tests-charter (mission
  # ci-test-topology-performance-01KXBJRT WP06 T018/FR-011, 12.0 min ->
  # concurrent legs): the `needs: fast-tests-charter` edge was a historical
  # serialization artifact, not a true cross-job data dependency — the two
  # jobs run on separate GitHub Actions runners with separate checkouts, and
  # `tests/agent`'s import of charter fixtures/modules is in-process test
  # coupling, not shared runtime state across jobs. Its `needs:` now mirrors
  # `fast-tests-charter`'s own upstream needs so both run concurrently off the
  # same predecessors (see docs/development/testing-parallel.md — no documented
  # rationale ties agent's suite to charter's completion).
  # ---------------------------------------------------------------------------
  fast-tests-agent:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes, kernel-tests, fast-tests-doctrine]
    if: >-
      always() &&
      needs.changes.outputs.agent == 'true' &&
      needs.kernel-tests.result != 'failure' &&
      needs.fast-tests-doctrine.result != 'failure'
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12'
      - run: uv sync --frozen --all-extras
      - run: mkdir -p out/reports/coverage
      # PENDING-CI: T020 flip — collection-equivalence verified locally
      # (serial == parallel nodeids); requires CI green x3 (run-twice/thrice
      # ratchet) before trusting this flip. Safe because WP04 isolates the
      # real-home queue per xdist worker. See mission test-suite-acceleration.
      - name: "Run fast tests — agent"
        run: |
          uv run python -m pytest tests/agent \
            -m "fast and not windows_ci" -q --tb=short \
            -n auto --dist loadfile \
            --durations=50 \
            --cov=src/specify_cli/agent_utils \
            --cov-fail-under=10 \
            --cov-report=xml:out/reports/coverage/coverage-fast-agent.xml
      - name: "Upload fast-agent coverage"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fast-test-agent-reports
          path: out/reports/

  # ---------------------------------------------------------------------------
  # Integration tests: per-module, gated on their fast-tests counterpart.
  # ---------------------------------------------------------------------------
  integration-tests-agent:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes, fast-tests-agent]
    if: >-
      always() &&
      needs.changes.outputs.agent == 'true' &&
      needs.fast-tests-agent.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12'
      - run: uv sync --frozen --all-extras
      - run: mkdir -p out/reports/coverage
      - name: "Run integration tests — agent"
        run: |
          uv run python -m pytest tests/agent \
            -m 'not windows_ci and (git_repo or integration)' \
            -q --tb=short \
            -n auto --dist loadfile -p no:cacheprovider \
            --cov=src/specify_cli/agent_utils \
            --cov-report=xml:out/reports/coverage/coverage-integration-agent.xml
      - name: "Upload integration-agent coverage"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-agent-reports
          path: out/reports/

  integration-tests-doctrine:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes, fast-tests-doctrine]
    if: >-
      always() &&
      needs.changes.outputs.doctrine == 'true' &&
      needs.fast-tests-doctrine.result == 'success'

    steps:
