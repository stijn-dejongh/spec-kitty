          mkdir -p out/reports/xunit-reports
          mkdir -p out/reports/coverage

      - name: "[ENFORCED] Run doctrine integration tests with coverage"
        run: |
          uv run python -m pytest \
            -v \
            tests/doctrine/ \
            -m "integration and not windows_ci" \
            -n auto --dist loadfile -p no:cacheprovider \
            --cov=src/doctrine \
            --cov-report=xml:out/reports/coverage/coverage-integration-doctrine.xml \
            --junitxml=out/reports/xunit-reports/xunit-result-integration-doctrine-${{ github.run_id }}.xml

      - name: "[ENFORCED] Upload integration-doctrine artifacts"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-doctrine-reports
          path: out/reports/

  integration-tests-charter:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes, fast-tests-charter]
    if: >-
      always() &&
      needs.changes.outputs.charter == 'true' &&
      needs.fast-tests-charter.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12'
      - run: uv sync --frozen --all-extras
      - run: mkdir -p out/reports/coverage
      - name: "Run integration tests — charter"
        run: |
          uv run python -m pytest \
            tests/charter \
            tests/specify_cli/charter_freshness \
            tests/specify_cli/charter_lint \
            tests/specify_cli/charter_preflight \
            -m 'not windows_ci and (git_repo or integration)' \
            -q --tb=short \
            -n auto --dist loadfile -p no:cacheprovider \
            --cov=src/charter \
            --cov=src/specify_cli/charter_runtime \
            --cov-report=xml:out/reports/coverage/coverage-integration-charter.xml
      - name: "Upload integration-charter coverage"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-charter-reports
          path: out/reports/

  # ---------------------------------------------------------------------------
  # integration-tests-sync: split real-port-first (mission
  # ci-test-topology-performance-01KXBJRT WP06 T019/FR-006). This is the one
  # job in the sweep that touches tests/sync/, so it must exclude the whole
  # FIXED_RANGE_SUITES family (tests/_real_port_suites.py, WP03) BEFORE adding
  # -n auto — naively parallelizing the whole tree would reintroduce the exact
  # OS-global port-bind hazard GC-3/WP03 exists to prevent. The 3
  # integration-tier family members run in the dedicated
  # integration-tests-sync-real-port job below instead (test_orphan_sweep.py
  # is unit-tier, not integration-tier, and has zero tests under this job's
  # marker expression — its serial pass lives in fast-tests-sync-orphan-sweep
  # and is listed here only for symmetry/defense-in-depth with the registry).
  # ---------------------------------------------------------------------------
  integration-tests-sync:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes, fast-tests-sync]
    if: >-
      always() &&
      needs.changes.outputs.sync == 'true' &&
      needs.fast-tests-sync.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12'
      - run: uv sync --frozen --all-extras
      - run: mkdir -p out/reports/coverage
      - name: "Run integration tests — sync (parallel, real-port suites excluded)"
        run: |
          uv run python -m pytest tests/sync/ \
            --ignore=tests/sync/test_orphan_sweep.py \
            --ignore=tests/sync/test_daemon_orphan_classification.py \
            --ignore=tests/sync/test_daemon_cleanup_boundary.py \
            --ignore=tests/sync/test_issue_1071_singleton_reconfirmation.py \
            -m 'not windows_ci and (git_repo or integration)' \
            -q --tb=short \
            -n auto --dist loadfile -p no:cacheprovider \
            --cov=src/specify_cli/sync \
            --cov-report=xml:out/reports/coverage/coverage-integration-sync.xml
      - name: "Upload integration-sync coverage"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-sync-reports
          path: out/reports/

  # ---------------------------------------------------------------------------
  # integration-tests-sync-real-port: dedicated serial (-n0) home for the
  # integration-tier FIXED_RANGE_SUITES members (mission
