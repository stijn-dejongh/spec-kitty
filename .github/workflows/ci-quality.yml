  # ---------------------------------------------------------------------------
  # Tier 1 fast-tests: depends on sync
  # ---------------------------------------------------------------------------
  fast-tests-status:
    runs-on: ubuntu-latest
    needs: [changes, fast-tests-sync]
    if: >-
      always() &&
      (needs.changes.outputs.status == 'true' || needs.changes.outputs.sync == 'true') &&
      needs.fast-tests-sync.result != 'failure'

    steps:
      - name: "[ENFORCED] Check out repository"
        uses: actions/checkout@v6

      - name: "[ENFORCED] Set up uv"
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12'

      - name: "[ENFORCED] Install dependencies"
        run: uv sync --frozen --all-extras

      - name: "[ENFORCED] Prepare report directories"
        run: |
          mkdir -p out/reports/xunit-reports
          mkdir -p out/reports/coverage

      # PENDING-CI (T022): status re-route via INVERSION. The naive `-m fast`
      # selector pulled in 85 tests that are ALSO git_repo/integration (real
      # handlers/adapter-registry/reset_handlers paths) which made the status
      # shard *slower*, not faster. Inverting to `fast and not (git_repo or
      # integration)` drops exactly those 85 (2536 -> 2451 locally) so the fast
      # shard is genuinely fast; the dropped 85 are still covered by the
      # integration-tests-status job (trigger widened to status OR sync below).
      # NOT flipped to -n auto here on purpose — the reset_handlers adapter
      # registry tests need a loadfile audit first (see T022 guidance).
      # NEEDS CI CONFIRMATION: collection-count gate verified locally only.
      # See mission test-suite-acceleration.
      - name: "[ENFORCED] Run fast status tests with coverage"
        run: |
          uv run python -m pytest \
            -v \
            tests/status/ tests/specify_cli/status/ \
            -m "fast and not windows_ci and not (git_repo or integration)" \
            --cov=src/specify_cli/status \
            --cov-report=term-missing \
            --cov-report=xml:out/reports/coverage/coverage-fast-status.xml \
