  # ---------------------------------------------------------------------------
  # slow-tests: Push-only (or manual dispatch). Runs slow-marked tests
  # outside tests/e2e/ and tests/cross_cutting/ (those run in e2e-cross-cutting).
  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # unit-contract-residual: the authoring-taxonomy residual (mission
  # ci-suite-map-bind FR-002; closes #2034). Tests marked `unit`/`contract`
  # (the documented authoring defaults) that carry NO routed runnable marker
  # were previously selected by ZERO marker gates — CI-invisible unless a
  # path-only gate happened to cover them. This small always-on job is their
  # standing marker-selected home (~252 pure-logic tests, ~1 min).
  #
  # NOT draft-gated and NOT path-gated by design: a draft PR must not be able
  # to merge-queue with the residual unrun, and the job is cheap enough to
  # always run. The negated marker set below is the live ROUTED-BY-MARKER set
  # (re-derive: `routed_marker_names(load_gates())` in
  # tests/architectural/_gate_coverage.py) plus the path-routed
  # `e2e`/`distribution` families (excluded so a dual-marked test cannot
  # double-run its heavy variant here). The marker-completeness architectural
  # invariant keeps this expression consistent with the routed set.
  # ---------------------------------------------------------------------------
  unit-contract-residual:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'pr:deferred') && !contains(github.event.pull_request.labels.*.name, 'pr:skip-ci') }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12'
      - run: uv sync --frozen --all-extras
      - name: "Run unit/contract residual (full-tree marker selection)"
        run: |
          # This is a WHOLE-TREE `-n auto` run, so it must structurally --ignore
          # the fixed-range real-port family (ports 9400-9449). test_orphan_sweep
          # is `unit`-marked (the other 3 members are `integration`, already
          # excluded by `not integration`), so without this it would be scattered
          # onto the -n auto pool AND double-run vs its own serial job. The
          # marker negation alone does not cover it; the ignore is the structural
          # guard (mirrors slow-tests). See tests/_real_port_suites.py.
          uv run python -m pytest tests/ \
            -m "(unit or contract) and not (fast or integration or git_repo or slow or e2e or architectural or distribution or windows_ci or quarantine or regression or timing or docs_scoped or arch_shard_1 or arch_shard_2 or arch_shard_3 or next_shard_1 or next_shard_2 or next_shard_3)" \
            -q --tb=short \
            --ignore=tests/sync/test_orphan_sweep.py \
            --ignore=tests/sync/test_daemon_orphan_classification.py \
            --ignore=tests/sync/test_daemon_cleanup_boundary.py \
            --ignore=tests/sync/test_issue_1071_singleton_reconfirmation.py \
            -n auto --dist loadfile \
            --durations=25

  slow-tests:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs:
      - fast-tests-doctrine
      - fast-tests-sync
      - fast-tests-sync-orphan-sweep
      - fast-tests-merge
      - fast-tests-missions
      - fast-tests-post-merge
      - fast-tests-release
      - fast-tests-status
      - fast-tests-review
      - fast-tests-next
      - fast-tests-lanes
      - fast-tests-dashboard
      - fast-tests-upgrade
      - fast-tests-cli
      - fast-tests-core-misc
      - fast-tests-charter
      - fast-tests-agent
    if: always() && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.run_extended || inputs.run_all)))
    timeout-minutes: 30

    steps:
      - name: "[ENFORCED] Check out repository"
        uses: actions/checkout@v6

      - name: "[ENFORCED] Set up uv"
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12'

      - name: "[ENFORCED] Install Python dependencies"
        run: uv sync --frozen --all-extras

      - name: "[ENFORCED] Prepare report directories"
        run: |
          mkdir -p out/reports/xunit-reports
          mkdir -p out/reports/coverage

      # Path-narrowed to the directories that actually hold @slow-marked tests
      # (mission ci-test-topology-performance-01KXBJRT WP06 T015/FR-003),
      # derived via `git grep -rl "pytest.mark.slow" tests/` at implementation
      # time (re-derive the same way if this drifts — do not guess). The
      # --ignore=tests/e2e --ignore=tests/cross_cutting pair is PRESERVED
      # verbatim as defensive no-ops (those two dirs are already excluded from
      # the narrowed path list below; keeping the ignores guards against a
      # future re-widening of the path list silently reintroducing an
      # unguarded selection). Collection-equivalence verified locally against
      # the pre-narrowing `tests/` selection (identical 44-test set).
      # The narrowed path list includes `tests/sync` (it hosts 2 real @slow
      # tests) — adding `-n auto` here would structurally sweep the whole
      # FIXED_RANGE_SUITES real-port family (tests/_real_port_suites.py, WP03)
      # into the parallel pool even though none of them carry the `slow`
      # marker (a marker-only exclusion GC-3/GC-4 treat as insufficient, per
      # #2590's own lesson) — these --ignore= entries make the exclusion
      # structural, mirroring fast-tests-sync/integration-tests-sync.
      - name: "[ENFORCED] Run slow tests with coverage"
        run: |
          uv run python -m pytest \
            tests/adversarial \
            tests/architectural \
            tests/auth/concurrency \
            tests/concurrency \
            tests/contract \
            tests/core \
            tests/doctrine \
            tests/integration \
            tests/perf \
            tests/specify_cli/cli/commands \
            tests/specify_cli/dossier \
            tests/specify_cli/invocation \
            tests/specify_cli/migration \
            tests/specify_cli/next \
            tests/stress \
            tests/sync \
            tests/upgrade \
            -v \
            -m "slow and not windows_ci" \
            --ignore=tests/e2e \
            --ignore=tests/cross_cutting \
            --ignore=tests/sync/test_orphan_sweep.py \
            --ignore=tests/sync/test_daemon_orphan_classification.py \
            --ignore=tests/sync/test_daemon_cleanup_boundary.py \
            --ignore=tests/sync/test_issue_1071_singleton_reconfirmation.py \
            -n auto --dist loadfile \
            --durations=50 \
            --cov=src/specify_cli --cov=src/charter --cov=src/doctrine \
            --cov-report=xml:out/reports/coverage/coverage-slow.xml \
            --junitxml=out/reports/xunit-reports/xunit-result-slow-${{ github.run_id }}.xml \
            || test $? -eq 5

      - name: "[ENFORCED] Upload slow-tests artifacts"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: slow-test-reports
          path: out/reports/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # restart-daemon-nfr-timing: issue #1153 / NFR-002. Runs the real daemon
  # restart path on Linux and macOS, but stays out of the fast suite because it
  # starts subprocesses and asserts wall-clock time.
  # ---------------------------------------------------------------------------
  restart-daemon-nfr-timing:
    name: doctor restart-daemon NFR-002 timing (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [changes]
    if: ${{ (always() && ( github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.cli == 'true' )) && !contains(github.event.pull_request.labels.*.name, 'pr:deferred') && !contains(github.event.pull_request.labels.*.name, 'pr:skip-ci') }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [blacksmith-4vcpu-ubuntu-2404, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]
      - name: Run NFR-002 timing gate
        env:
          SPEC_KITTY_ENABLE_SAAS_SYNC: "1"
        run: |
          python -m pytest \
            tests/specify_cli/cli/commands/test_doctor_restart_daemon_timing.py \
            -m timing \
            -q \
            --tb=short

  # ---------------------------------------------------------------------------
  # quarantine-visibility: runs `-m quarantine` for real (SPEC_KITTY_RUN_QUARANTINE=1)
  # so irreducible environmental flakes stay VISIBLE — never silently retried to
  # green. Per docs/development/testing-flakiness.md this job is intentionally
  # NON-BLOCKING: it MUST NOT be added to the `quality-gate` aggregation below
  # or to branch-protection required checks, so a quarantined flake can never turn
  # main red or block an unrelated PR. Tolerates pytest exit code 5 (no tests
  # currently quarantined) so an empty quarantine set is green, not red.
  # ---------------------------------------------------------------------------
  quarantine-visibility:
    name: quarantine visibility (non-blocking)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes]
    if: ${{ (always() && ( github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' )) && !contains(github.event.pull_request.labels.*.name, 'pr:deferred') && !contains(github.event.pull_request.labels.*.name, 'pr:skip-ci') }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]
      - name: Run quarantined tests (visible, never blocks merge)
        env:
          SPEC_KITTY_RUN_QUARANTINE: "1"
          PWHEADLESS: "1"
        run: |
          set +e
          python -m pytest tests/ -m quarantine -p no:cacheprovider -q --tb=short
          ec=$?
          set -e
          if [ "$ec" -eq 5 ]; then
            echo "::notice::No tests are currently quarantined (-m quarantine collected nothing)."
            exit 0
          fi
          exit "$ec"

  # ---------------------------------------------------------------------------
  # regression-tests: runs `-m regression` for real so every red-first P0
  # reproduction test (@pytest.mark.regression) has an explicit, routed CI home,
  # and it is BLOCKING — it IS a member of the `quality-gate` aggregation below.
  # An open P0 red-first reproduction is expected to red mainline and, because
  # CI is the release authority, that red must gate releases: a non-blocking
  # regression lane would FAKE GREEN on P0s and lose the very signal the marker
  # exists to give (ADR 2026-07-17-1; issue #2772-family course-correction of
  # the #2774 visibility-only design). The marker-completeness gate
  # (tests/architectural/test_marker_job_completeness.py) still requires that no
  # registered marker be silently CI-invisible; this job is that routed home.
  # It is EXPECTED to be red while open P0s exist — that red is the honest,
  # tracked, release-gating signal, never retried to green; maintainers clear it
  # by fixing the product defect. Tolerates pytest exit code 5 (no regression
  # tests currently registered) as green.
  # ---------------------------------------------------------------------------
  regression-tests:
    name: regression tests (blocking)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes]
    if: ${{ (always() && ( github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' )) && !contains(github.event.pull_request.labels.*.name, 'pr:deferred') && !contains(github.event.pull_request.labels.*.name, 'pr:skip-ci') }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]
      - name: Run regression red-first reproductions (blocking — gates releases)
        env:
          PWHEADLESS: "1"
        run: |
          set +e
          python -m pytest tests/ -m regression -p no:cacheprovider -q --tb=short
          ec=$?
          set -e
          if [ "$ec" -eq 5 ]; then
            echo "::notice::No regression red-first reproductions are currently registered (-m regression collected nothing)."
            exit 0
          fi
          exit "$ec"

  # ---------------------------------------------------------------------------
  # e2e-cross-cutting: push/manual, plus PRs that change e2e/cross-cutting
  # fixtures. Runs tests/e2e/ and tests/cross_cutting/ in parallel with slow-tests.
  # ---------------------------------------------------------------------------
  e2e-cross-cutting:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes]
    if: ${{ (always() && ( github.event_name == 'push' || ( github.event_name == 'pull_request' && ( needs.changes.outputs.e2e == 'true' || needs.changes.outputs.core_misc == 'true' || needs.changes.outputs.execution_context == 'true' ) && ( ( github.event.pull_request.draft == false && !startsWith(github.event.pull_request.title, 'WIP') && !startsWith(github.event.pull_request.title, '[WIP]') ) || contains(github.event.pull_request.labels.*.name, 'ci:full') || contains(github.event.pull_request.labels.*.name, 'ready-for-ci') ) ) || (github.event_name == 'workflow_dispatch' && (inputs.run_extended || inputs.run_all)) )) && !contains(github.event.pull_request.labels.*.name, 'pr:deferred') && !contains(github.event.pull_request.labels.*.name, 'pr:skip-ci') }}
    timeout-minutes: 40

    steps:
      - name: "[ENFORCED] Check out repository"
        uses: actions/checkout@v6

      - name: "[ENFORCED] Set up uv"
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12'

      - name: "[ENFORCED] Install Python dependencies"
        run: uv sync --frozen --all-extras

      - name: "[ENFORCED] Prepare report directories"
        run: |
          mkdir -p out/reports/xunit-reports
          mkdir -p out/reports/coverage

      - name: "[ENFORCED] Run e2e and cross_cutting tests with coverage"
        run: |
          uv run python -m pytest \
            -v \
            tests/e2e/ tests/cross_cutting/ \
            -m "not distribution and not windows_ci" \
            --durations=50 \
            --cov=src/specify_cli --cov=src/charter --cov=src/doctrine \
            --cov-report=xml:out/reports/coverage/coverage-e2e.xml \
            --junitxml=out/reports/xunit-reports/xunit-result-e2e-${{ github.run_id }}.xml

      - name: "[ENFORCED] Upload e2e-cross-cutting artifacts"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-cross-cutting-reports
          path: out/reports/

  # ---------------------------------------------------------------------------
  # diff-coverage: PR-only diff coverage gate (90% on critical-path changed lines).
  # Consumes kernel, fast-test, and integration-test coverage reports.
  # ---------------------------------------------------------------------------
  diff-coverage:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs:
      - kernel-tests
      - fast-tests-charter
      - integration-tests-doctrine
      - integration-tests-sync
      - integration-tests-merge
      - integration-tests-missions
      - integration-tests-post-merge
      - integration-tests-release
      - integration-tests-status
      - integration-tests-review
      - integration-tests-next
      - integration-tests-lanes
      - integration-tests-dashboard
      - integration-tests-upgrade
      - integration-tests-cli
      - integration-tests-core-misc
      - fast-tests-core-misc
      # arch-adversarial emits coverage-arch-adversarial.xml consumed here via
      # the coverage-*.xml glob (mission ci-topology-shrink FR-006/FR-007).
      - arch-adversarial
    if: ${{ (always() && github.event_name == 'pull_request') && !contains(github.event.pull_request.labels.*.name, 'pr:deferred') && !contains(github.event.pull_request.labels.*.name, 'pr:skip-ci') }}
    steps:
      - name: "[ENFORCED] Check out repository"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "[ENFORCED] Set up uv"
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12'

      - name: "[ENFORCED] Install dependencies"
        run: uv sync --frozen --all-extras

      - name: "[ENFORCED] Download all coverage artifacts"
        uses: actions/download-artifact@v8
        with:
          pattern: '*-reports'
          path: out/reports/artifacts
          merge-multiple: false
        continue-on-error: true

      # Critical-path modules: kernel, doctrine, charter, status, mission detection,
      # dashboard, merge, next.
      # Coverage effort is proportional to risk — keep critical-path changes
      # on the established 90% floor and use the full-diff step as advisory.
      - name: "diff-coverage (critical-path, enforced)"
        run: |
          # actions/checkout@v6 already performs a full fetch here. Only
          # hydrate the remote-tracking base ref when it is missing, and do
          # that fetch with the workflow token so PR jobs do not fail on an
          # unauthenticated HTTPS remote.
          if ! git show-ref --verify --quiet "refs/remotes/origin/${{ github.base_ref }}"; then
            git -c http.extraheader="AUTHORIZATION: bearer ${{ github.token }}" \
              fetch origin \
              "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
          fi

          critical_paths=(
            'src/kernel/*'
            'src/doctrine/*'
            'src/charter/*'
            'src/specify_cli/status/*'
            # branch-based mission-slug detection #2443: the stale entry
            # src/specify_cli/core/mission_detection.py rotted when that module
            # was removed/superseded. Its branch-slug logic now lives at
            # src/specify_cli/lanes/branch_naming.py::parse_mission_slug_from_branch
            # -- core/vcs/detection.py only imports/consumes it. No already-listed
            # critical path above or below is an ancestor of it, so the entry is
            # repointed to its real defining home rather than dropped. Cov-backed
            # by --cov=src/specify_cli/lanes in fast-tests-lanes + integration-tests-lanes.
            # NOTE: keep this comment free of quotes AND parens -- the canonical
            # parser tests/architectural/_gate_coverage.py::_diff_cover_critical_paths
            # stops the array block at the first closing paren and extracts every
            # quoted string inside it.
            'src/specify_cli/lanes/branch_naming.py'
            'src/specify_cli/dashboard/handlers/*'
            'src/specify_cli/dashboard/scanner.py'
            'src/specify_cli/merge/*'
            'src/runtime/next/*'
            'src/mission_runtime/*'
          )

          coverage_reports=()
          while IFS= read -r -d '' f; do
            coverage_reports+=("$f")
          done < <(find out/reports/artifacts -name 'coverage-*.xml' -print0 2>/dev/null)

          echo "Found ${#coverage_reports[@]} coverage report(s):"
          printf '  %s\n' "${coverage_reports[@]}"

          if [ ${#coverage_reports[@]} -eq 0 ]; then
            critical_diff=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- "${critical_paths[@]}")
            if [ -z "$critical_diff" ]; then
              echo "No coverage reports found, but this PR does not touch critical-path files. Skipping diff coverage."
              exit 0
            fi

            echo "::error::No coverage reports found for diff coverage."
            echo "::error::Critical-path changes detected:"
            printf '  %s\n' "$critical_diff"
            exit 1
          fi

          uv run diff-cover "${coverage_reports[@]}" \
            --compare-branch=origin/${{ github.base_ref }} \
            --fail-under=90 \
            --include "${critical_paths[@]}"

      - name: "diff-coverage (full-diff, advisory)"
        if: always()
        run: |
          coverage_reports=()
          while IFS= read -r -d '' f; do
            coverage_reports+=("$f")
          done < <(find out/reports/artifacts -name 'coverage-*.xml' -print0 2>/dev/null)

          if [ ${#coverage_reports[@]} -gt 0 ]; then
            uv run diff-cover "${coverage_reports[@]}" \
              --compare-branch=origin/${{ github.base_ref }} || true
          fi

  # ---------------------------------------------------------------------------
  # mutation-testing: disabled — too slow to run reliably in CI.
  # ---------------------------------------------------------------------------
  mutation-testing:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs:
      - fast-tests-doctrine
      - fast-tests-sync
      - fast-tests-merge
      - fast-tests-missions
      - fast-tests-post-merge
      - fast-tests-release
      - fast-tests-status
      - fast-tests-review
      - fast-tests-next
      - fast-tests-lanes
      - fast-tests-dashboard
      - fast-tests-upgrade
      - fast-tests-cli
      - fast-tests-core-misc
      - fast-tests-charter
      - fast-tests-agent
      - arch-adversarial
      - slow-tests
      - e2e-cross-cutting
    if: false
    steps:
      - run: echo "Mutation testing is disabled."

  # ---------------------------------------------------------------------------
  # sonarcloud: collects coverage XMLs from all upstream test jobs and feeds
  # them to SonarCloud. No tests are re-run — coverage is merged from artifacts.
  # Temporarily limited to schedule/manual runs while #825 tracks the existing
  # project-wide Sonar quality gate backlog. PRs skip Sonar entirely to keep
  # review latency low, and pushes skip it so main can report test/build health.
  # ---------------------------------------------------------------------------
  sonarcloud:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs:
      - kernel-tests
      - fast-tests-doctrine
      - fast-tests-sync
      # fast-tests-sync-orphan-sweep emits --cov=src/specify_cli/sync (extracted
      # from fast-tests-sync's own serial step, WP06 T016) — a sonarcloud
      # coverage-consumer sibling of fast-tests-sync (C-005).
      - fast-tests-sync-orphan-sweep
      - fast-tests-merge
      - fast-tests-missions
      - fast-tests-post-merge
      - fast-tests-release
      - fast-tests-status
      - fast-tests-review
      - fast-tests-next
      - fast-tests-lanes
      - fast-tests-dashboard
      - fast-tests-upgrade
      - fast-tests-cli
      - fast-tests-core-misc
      - fast-tests-charter
      - fast-tests-agent
      - integration-tests-doctrine
      - integration-tests-charter
      - integration-tests-sync
      # integration-tests-sync-real-port emits --cov=src/specify_cli/sync
      # (extracted real-port residual of integration-tests-sync, WP06 T019) —
      # a sonarcloud coverage-consumer sibling of integration-tests-sync (C-005).
      - integration-tests-sync-real-port
      - integration-tests-merge
      - integration-tests-missions
      - integration-tests-post-merge
      - integration-tests-release
      - integration-tests-status
      - integration-tests-review
      - integration-tests-next
      - integration-tests-lanes
      - integration-tests-dashboard
      - integration-tests-upgrade
      - integration-tests-cli
      - integration-tests-agent
      - integration-tests-core-misc
      # mission-loader-coverage emits --cov=src/specify_cli/mission_loader; it was
      # ABSENT here, silently dropping its coverage XML from the aggregator — the
      # C-005 defect this mission closes (mission ci-topology-shrink FR-006/C-005).
      - mission-loader-coverage
      # arch-adversarial emits coverage-arch-adversarial.xml (src coverage) — every
      # src-coverage emitter must be a sonarcloud consumer (C-005 invariant).
      - arch-adversarial
      - slow-tests
      - e2e-cross-cutting
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')

    steps:
      - name: "[INFO] Check Sonar token availability"
        id: sonar_token
        run: |
          if [ -n "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo ""
            echo "============================================================"
            echo "  SonarCloud is not configured — skipping analysis."
            echo "============================================================"
            echo ""
            echo "To set up SonarCloud for this open-source project:"
            echo ""
            echo "  1. Sign in at https://sonarcloud.io with your GitHub account"
            echo "  2. Import the repository (free for public repos)"
            echo "  3. Copy the project token from Administration > Analysis Method"
            echo "  4. Add it as a repository secret named SONAR_TOKEN:"
            echo "     Settings > Secrets and variables > Actions > New repository secret"
            echo ""
            echo "Docs: https://docs.sonarsource.com/sonarqube-cloud/getting-started/github/"
            echo ""
          fi

      - name: "[ENFORCED] Check out repository"
        if: steps.sonar_token.outputs.enabled == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "[INFO] Resolve SonarCloud project settings"
        id: sonar_settings
        if: steps.sonar_token.outputs.enabled == 'true'
        run: |
          organization="${{ vars.SONAR_ORGANIZATION }}"
          host_url="${{ vars.SONAR_HOST_URL }}"
          repo_name="${{ github.event.repository.name }}"
          repo_owner="${{ github.repository_owner }}"
          project_key="${{ vars.SONAR_PROJECT_KEY }}"

          if [ -z "$organization" ] && [ -f sonar-project.properties ]; then
            organization="$(sed -n 's/^sonar\.organization=//p' sonar-project.properties | head -n 1)"
          fi
          if [ -z "$organization" ]; then
            organization="priivacy-ai"
          fi

          if [ -z "$host_url" ] && [ -f sonar-project.properties ]; then
            host_url="$(sed -n 's/^sonar\.host\.url=//p' sonar-project.properties | head -n 1)"
          fi
          if [ -z "$host_url" ]; then
            host_url="https://sonarcloud.io"
          fi

          if [ -z "$project_key" ] && [ -f sonar-project.properties ]; then
            project_key="$(sed -n 's/^sonar\.projectKey=//p' sonar-project.properties | head -n 1)"
          fi
          if [ -z "$project_key" ]; then
            project_key="${repo_owner}_${repo_name}"
          fi

          echo "organization=$organization" >> "$GITHUB_OUTPUT"
          echo "host_url=$host_url" >> "$GITHUB_OUTPUT"
          echo "project_key=$project_key" >> "$GITHUB_OUTPUT"

          echo "Using SonarCloud settings:"
          echo "  host_url=$host_url"
          echo "  organization=$organization"
          echo "  project_key=$project_key"

      - name: "[ENFORCED] Download all coverage artifacts (current run)"
        if: steps.sonar_token.outputs.enabled == 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: '*-reports'
          path: out/reports/artifacts/current
          merge-multiple: false
        continue-on-error: true

      - name: "[ENFORCED] Find most recent previous successful run for coverage fallback"
        if: steps.sonar_token.outputs.enabled == 'true'
        id: prev_run
        uses: actions/github-script@v9
        with:
          script: |
            // Find most recent successfully-completed run of this workflow
            // (excluding the current run) to use as fallback for jobs that
            // did not re-run in a partial re-trigger.
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci-quality.yml',
              status: 'completed',
              per_page: 10,
            });
            const prev = data.workflow_runs.find(
              r => r.id !== context.runId && r.conclusion === 'success'
            );
            const runId = prev ? String(prev.id) : '';
            core.setOutput('run_id', runId);
            if (prev) {
              console.log(`Coverage fallback run: ${prev.id} created at ${prev.created_at}`);
            } else {
              console.log('No previous successful run found — only current-run artifacts used.');
            }

      - name: "[ENFORCED] Download coverage artifacts from previous run (fallback)"
        if: steps.sonar_token.outputs.enabled == 'true' && steps.prev_run.outputs.run_id != ''
        uses: actions/download-artifact@v8
        with:
          pattern: '*-reports'
          path: out/reports/artifacts/fallback
          run-id: ${{ steps.prev_run.outputs.run_id }}
          merge-multiple: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # ---------------------------------------------------------------------
      # FR-013 / IC-12 (#2623): coverage-ui-e2e.xml (--cov=src/specify_cli/
      # dashboard) is produced by the SEPARATE ui-e2e.yml workflow, not this
      # one — the download-artifact steps above only ever look at THIS
      # workflow's own runs (ci-quality.yml), so the ui-e2e coverage silently
      # never reached Sonar's denominator (ui-e2e.yml's own header comment
      # documents this exact gap as a fast-follow through this file's owner).
      # These two steps resolve and fetch it cross-workflow, keyed to the
      # HEAD SHA this sonarcloud run is analyzing (not merely "most recent
      # overall" like the prev_run fallback above — a stale/unrelated
      # commit's coverage must never be silently substituted).
      # ---------------------------------------------------------------------
      - name: "[ENFORCED] Find head-SHA ui-e2e.yml run for cross-workflow coverage"
        if: steps.sonar_token.outputs.enabled == 'true'
        id: ui_e2e_run
        uses: actions/github-script@v9
        with:
          script: |
            // Find the most recent SUCCESSFUL ui-e2e.yml run for the SAME
            // head commit this sonarcloud run is analyzing (head_sha-keyed).
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ui-e2e.yml',
              head_sha: context.sha,
              status: 'completed',
              per_page: 10,
            });
            const run = data.workflow_runs.find(r => r.conclusion === 'success');
            const runId = run ? String(run.id) : '';
            core.setOutput('run_id', runId);
            if (run) {
              console.log(`ui-e2e coverage run: ${run.id} (head_sha=${context.sha})`);
            } else {
              console.log(`No successful ui-e2e.yml run found for head_sha=${context.sha}.`);
            }

      - name: "[ENFORCED] Download ui-e2e coverage artifact (cross-workflow, head-SHA-keyed)"
        if: steps.sonar_token.outputs.enabled == 'true' && steps.ui_e2e_run.outputs.run_id != ''
        uses: actions/download-artifact@v8
        with:
          name: ui-e2e-coverage-reports
          path: out/reports/artifacts/ui-e2e
          run-id: ${{ steps.ui_e2e_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: "[ENFORCED] Discover coverage XMLs and build Sonar config"
        id: coverage_paths
        if: steps.sonar_token.outputs.enabled == 'true'
        run: |
          mkdir -p out/reports/coverage

          # Build coverage path list: current-run artifacts take priority;
          # fallback (previous run) fills in for jobs that did not re-run;
          # the ui-e2e cross-workflow artifact (FR-013/#2623) fills in last —
          # its basename (coverage-ui-e2e.xml) never collides with a
          # current/fallback key, but the same-key-guard is kept for symmetry.
          declare -A seen_reports

          # 1. Current-run artifacts (highest priority)
          while IFS= read -r -d '' f; do
            key=$(basename "$f")
            seen_reports["$key"]="$f"
          done < <(find out/reports/artifacts/current -name 'coverage-*.xml' -print0 2>/dev/null)

          # 2. Previous-run artifacts for any report not already found
          while IFS= read -r -d '' f; do
            key=$(basename "$f")
            if [[ -z "${seen_reports[$key]+_}" ]]; then
              seen_reports["$key"]="$f"
              echo "::notice::Using fallback coverage for $(dirname "$f" | xargs basename)"
            fi
          done < <(find out/reports/artifacts/fallback -name 'coverage-*.xml' -print0 2>/dev/null)

          # 3. ui-e2e.yml cross-workflow artifact (coverage-ui-e2e.xml,
          # FR-013/IC-12/#2623) — head-SHA-keyed (step: ui_e2e_run above).
          while IFS= read -r -d '' f; do
            key=$(basename "$f")
            if [[ -z "${seen_reports[$key]+_}" ]]; then
              seen_reports["$key"]="$f"
              echo "::notice::Using cross-workflow ui-e2e coverage for $(basename "$f")"
            fi
          done < <(find out/reports/artifacts/ui-e2e -name 'coverage-*.xml' -print0 2>/dev/null)

          echo "Discovered coverage reports:"
          for f in "${seen_reports[@]}"; do echo "  $f"; done

          report_paths=""
          for f in "${seen_reports[@]}"; do
            if [ -n "$report_paths" ]; then
              report_paths="$report_paths,$f"
            else
              report_paths="$f"
            fi
          done

          if [ -z "$report_paths" ]; then
            echo "::warning::No coverage reports found from current or previous run."
            report_paths="out/reports/coverage/empty.xml"
          fi

          echo "report_paths=$report_paths" >> "$GITHUB_OUTPUT"

      - name: "[ENFORCED] Normalize coverage XML paths for Sonar multi-package src layout"
        if: steps.sonar_token.outputs.enabled == 'true'
        run: |
          # Problem: each CI test job runs with --cov=src/<package> which produces a
          # coverage XML whose <sources> block lists the per-package absolute path, e.g.:
          #   <source>/github/workspace/src/specify_cli</source>
          #   <source>/github/workspace/src/mission_runtime</source>
          # …and bare filenames like filename="__init__.py".
          # SonarCloud tries to resolve every bare filename against ALL <source> entries
          # simultaneously, finds __init__.py under multiple sources, and logs:
          #   ERROR Cannot resolve the file path '__init__.py' of the coverage report,
          #         ambiguity, the file exists in several 'source'.
          # Fix: rewrite each XML so there is exactly ONE <source> (the common src/
          # ancestor) and every filename is prefixed with its package sub-path, e.g.:
          #   src/specify_cli/__init__.py, src/mission_runtime/__init__.py
          # SonarCloud can then match each path to exactly one file in sonar.sources=src.
          python3 - << 'PYEOF'
          import os, sys, glob, xml.etree.ElementTree as ET

          ET.register_namespace('', '')  # keep xmlns clean if present

          artifact_dirs = ['out/reports/artifacts/current', 'out/reports/artifacts/fallback']
          xml_files = []
          for d in artifact_dirs:
              xml_files.extend(glob.glob(os.path.join(d, '**', 'coverage-*.xml'), recursive=True))

          if not xml_files:
              print('No coverage XML files found to normalize.')
              sys.exit(0)

          normalized = 0
          for xml_path in xml_files:
              try:
                  tree = ET.parse(xml_path)
                  root = tree.getroot()
              except ET.ParseError as e:
                  print(f'  SKIP (parse error): {xml_path}: {e}')
                  continue

              sources_el = root.find('sources')
              if sources_el is None:
                  continue

              raw_sources = [s.text.strip() for s in sources_el.findall('source') if s.text and s.text.strip()]
              if len(raw_sources) <= 1:
                  # Single source — check if it already has unambiguous paths or is an
                  # absolute path that needs making relative.
                  if not raw_sources:
                      continue
                  src = raw_sources[0]
                  # If it's already a relative path ending in 'src' or similar, skip.
                  if not os.path.isabs(src):
                      continue
                  # Single absolute source: just make it relative (strip CWD prefix).
                  cwd = os.getcwd()
                  rel = os.path.relpath(src, cwd)
                  sources_el.clear()
                  new_src = ET.SubElement(sources_el, 'source')
                  new_src.text = rel
                  # Filenames already include the package sub-path when there's one source,
                  # so no filename prefixing is needed.
                  tree.write(xml_path, encoding='unicode', xml_declaration=True)
                  normalized += 1
                  print(f'  Relativized single source: {xml_path}  ({src} -> {rel})')
                  continue

              # Multiple sources: find common ancestor (the src/ parent directory).
              common = os.path.commonpath(raw_sources)
              cwd = os.getcwd()
              common_rel = os.path.relpath(common, cwd)  # e.g. 'src'

              # Build prefix map: source_path -> relative_prefix (e.g. 'specify_cli')
              prefix_map = {}
              for src in raw_sources:
                  rel_prefix = os.path.relpath(src, common)
                  prefix_map[src] = rel_prefix

              # Rewrite <source> block to single canonical entry.
              sources_el.clear()
              new_src = ET.SubElement(sources_el, 'source')
              new_src.text = common_rel  # e.g. 'src'

              # Prefix every <class filename=...> with the correct sub-path.
              # We must determine which source each file belongs to by checking existence.
              changed = 0
              for cls in root.findall('packages/package/classes/class'):
                  fname = cls.get('filename', '')
                  if not fname or os.path.isabs(fname):
                      continue
                  for src_path, prefix in prefix_map.items():
                      candidate = os.path.join(src_path, fname)
                      if os.path.exists(candidate):
                          new_fname = fname if prefix == '.' else os.path.join(prefix, fname)
                          cls.set('filename', new_fname)
                          changed += 1
                          break

              tree.write(xml_path, encoding='unicode', xml_declaration=True)
              normalized += 1
              print(f'  Normalized: {xml_path}  ({len(raw_sources)} sources -> {common_rel!r}, {changed} filenames prefixed)')

          print(f'Normalization complete: {normalized}/{len(xml_files)} files updated.')
          PYEOF

      - name: "[ENFORCED] Derive sonar.projectVersion from pyproject.toml"
        id: sonar_version
        if: steps.sonar_token.outputs.enabled == 'true'
        run: |
          # Single-source the version from pyproject.toml (FR-001/FR-002). The
          # extraction module raises loudly + emits NOTHING on stdout on any
          # failure, so this capture is empty and `set -e` fails the step rather
          # than silently stamping an empty sonar.projectVersion (re-freezing the
          # #2421 baseline). Unit-tested: tests/ci/test_sonar_project_version.py.
          version="$(python3 scripts/ci/sonar_project_version.py)"
          if [ -z "$version" ]; then
            echo "::error::sonar.projectVersion could not be derived from pyproject.toml" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved sonar.projectVersion=$version (from pyproject.toml)"

      - name: "[ENFORCED] Materialize effective Sonar config"
        if: steps.sonar_token.outputs.enabled == 'true'
        run: |
          tmp_file="$(mktemp)"

          if [ -f sonar-project.properties ]; then
            grep -v '^sonar\.organization=' sonar-project.properties \
              | grep -v '^sonar\.projectKey=' \
              | grep -v '^sonar\.projectVersion=' \
              | grep -v '^sonar\.python\.coverage\.reportPaths=' \
              | grep -v '^sonar\.python\.xunit\.reportPath=' \
              > "$tmp_file"
          fi

          {
            echo "sonar.organization=${{ steps.sonar_settings.outputs.organization }}"
            echo "sonar.projectKey=${{ steps.sonar_settings.outputs.project_key }}"
            echo "sonar.projectVersion=${{ steps.sonar_version.outputs.version }}"
            echo "sonar.branch.name=${{ github.head_ref || github.ref_name }}"
            echo "sonar.python.coverage.reportPaths=${{ steps.coverage_paths.outputs.report_paths }}"
          } >> "$tmp_file"

          mv "$tmp_file" sonar-project.properties
          echo "Effective sonar-project.properties:"
          cat sonar-project.properties

      - name: "[ENFORCED] SonarCloud Scan"
        if: steps.sonar_token.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          args: >
            -Dsonar.host.url=${{ steps.sonar_settings.outputs.host_url }}
            -Dsonar.organization=${{ steps.sonar_settings.outputs.organization }}
            -Dsonar.projectKey=${{ steps.sonar_settings.outputs.project_key }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "[ENFORCED] SonarCloud Quality Gate"
        if: steps.sonar_token.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ steps.sonar_settings.outputs.host_url }}

  # ---------------------------------------------------------------------------
  # uv-lock-check: assert `uv.lock` is in sync with `pyproject.toml`. NFR-005 of
  # mission shared-package-boundary-cutover-01KQ22DS pins exact versions in
  # `uv.lock` (not pyproject); this job blocks PRs that would silently
  # regenerate the lockfile (DRIFT-1 follow-up of mission-review).
  # ---------------------------------------------------------------------------
  uv-lock-check:
    name: uv lock --check (NFR-005)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'pr:deferred') && !contains(github.event.pull_request.labels.*.name, 'pr:skip-ci') }}
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        # v8+ runs on Node 24 natively, so the FORCE_JAVASCRIPT_ACTIONS_TO_NODE24
        # workaround that v6 needed is no longer required.
        uses: astral-sh/setup-uv@v8.1.0

      - name: "[ENFORCED] Assert uv.lock is up-to-date with pyproject.toml"
        run: |
          # `uv lock --check` exits non-zero if the lockfile would change. This
          # gates against drift between pyproject.toml constraints and uv.lock
          # exact pins (NFR-005, C-006).
          uv lock --check

  # ---------------------------------------------------------------------------
  # build-wheel: build the spec-kitty-cli wheel once and share it with the
  # clean-install-verification job (FR-010 / FR-019 of mission
  # shared-package-boundary-cutover-01KQ22DS).
  # ---------------------------------------------------------------------------
  build-wheel:
    name: Build wheel
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'pr:deferred') && !contains(github.event.pull_request.labels.*.name, 'pr:skip-ci') }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build wheel
        run: |
          python -m build --wheel
          ls -la dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: spec-kitty-cli-wheel
          path: dist/spec_kitty_cli-*.whl
          retention-days: 7

      - name: Upload release compatibility manifest
        uses: actions/upload-artifact@v7
        with:
          name: release-compatibility-manifest
          path: .kittify/release/shared-package-compatibility.json
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # clean-install-verification: structurally proves `spec-kitty next` runs in
  # a fresh venv without `spec-kitty-runtime` installed (FR-010, FR-017,
  # NFR-003, NFR-004 of mission shared-package-boundary-cutover-01KQ22DS).
  # ---------------------------------------------------------------------------
  clean-install-verification:
    name: Clean install verification (FR-010)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'pr:deferred') && !contains(github.event.pull_request.labels.*.name, 'pr:skip-ci') }}
    timeout-minutes: 5     # NFR-004
    needs: [build-wheel]
    steps:
      - uses: actions/checkout@v6

      - name: Download CLI wheel
        uses: actions/download-artifact@v8
        with:
          name: spec-kitty-cli-wheel
          path: dist/

      - name: Set up clean Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Create clean venv
        run: |
          python -m venv /tmp/clean-venv
          /tmp/clean-venv/bin/pip install --upgrade pip

      - name: Install CLI from wheel
        run: |
          /tmp/clean-venv/bin/pip install dist/spec_kitty_cli-*.whl
          /tmp/clean-venv/bin/pip list

      - name: Assert spec-kitty-runtime is NOT installed
        run: |
          if /tmp/clean-venv/bin/pip show spec-kitty-runtime >/dev/null 2>&1; then
            echo "::error::FAIL: spec-kitty-runtime is installed; cutover regressed (FR-006/FR-010)"
            exit 1
          fi
          echo "OK: spec-kitty-runtime is not installed"

      - name: Assert no runtime import side-effect
        run: |
          /tmp/clean-venv/bin/python -c "
          import sys
          import specify_cli  # triggers the CLI's import graph
          leaked = [k for k in sys.modules if 'spec_kitty_runtime' in k]
          assert not leaked, f'spec_kitty_runtime imported: {leaked}'
          print('OK: spec_kitty_runtime not imported')
          "

      - name: Run spec-kitty next against fixture mission
        run: |
          cp -r tests/fixtures/clean_install_fixture_mission /tmp/fixture
          cd /tmp/fixture
          git init -q
          git -c user.email=ci@test -c user.name=ci add -A
          git -c user.email=ci@test -c user.name=ci commit -q -m "fixture mission"
          /tmp/clean-venv/bin/spec-kitty next \
            --agent claude \
            --mission clean-install-fixture-01KQ22XX \
            --json | tee /tmp/next.json
          /tmp/clean-venv/bin/python -c "
          import json, pathlib
          data = json.loads(pathlib.Path('/tmp/next.json').read_text())
          assert isinstance(data, dict), data
          print('OK: spec-kitty next returned a structured JSON payload')
          "

      - name: NFR-003 latency regression gate
        # Compares the median wall-clock of `spec-kitty next` across 5 runs
        # against the pinned pre-cutover baseline in
        # kitty-specs/shared-package-boundary-cutover-01KQ22DS/nfr-003-baseline.json
        # and fails the build if regression > 20%.
        run: |
          /tmp/clean-venv/bin/python ${{ github.workspace }}/scripts/check_nfr_003_latency.py \
            --python /tmp/clean-venv/bin/python \
            --fixture /tmp/fixture \
            --baseline ${{ github.workspace }}/kitty-specs/shared-package-boundary-cutover-01KQ22DS/nfr-003-baseline.json \
            --runs 5

  # ---------------------------------------------------------------------------
  # consumer-compatibility: validates the CI-built wheel against the private
  # SaaS consumer contract using trusted validation scripts from the base commit.
  # The private contract is never exposed to PR-controlled checkout code.
  # ---------------------------------------------------------------------------
  consumer-compatibility:
    name: SaaS consumer compatibility
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes, build-wheel]
    if: always() && needs.changes.outputs.release == 'true' && needs.build-wheel.result == 'success'
    env:
      REPO_OWNER: ${{ github.repository_owner }}
      HAS_SAAS_READ_TOKEN: ${{ secrets.SPEC_KITTY_SAAS_READ_TOKEN != '' }}
      IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
      # Private SaaS evidence is only reachable from the canonical repo. Token
      # presence alone is not enough of a signal: the canonical repo must fail
      # loud when the secret is misconfigured, while fork PRs and fork-owned
      # runs (which can never have the secret) degrade to a skip-with-warning.
      # The repo name is hardcoded (not vars.*) for in-file auditability and
      # must track any rename/transfer. See issue #1849.
      IS_CANONICAL_REPO: ${{ github.repository == 'Priivacy-ai/spec-kitty' }}
    steps:
      - name: Check out trusted validation scripts
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.sha }}

      - name: Download CLI wheel
        uses: actions/download-artifact@v8
        with:
          name: spec-kitty-cli-wheel
          path: dist/

      - name: Download candidate release compatibility manifest
        uses: actions/download-artifact@v8
        with:
          name: release-compatibility-manifest
          path: candidate/.kittify/release/

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install packaging

      - name: Fetch SaaS consumer contract
        id: fetch_contract
        env:
          CROSS_REPO_TOKEN: ${{ secrets.SPEC_KITTY_SAAS_READ_TOKEN != '' && secrets.SPEC_KITTY_SAAS_READ_TOKEN || github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/spec-kitty-release-contracts

          if [ "${HAS_SAAS_READ_TOKEN}" != "true" ]; then
            if [ "${IS_FORK_PR}" = "true" ] || [ "${IS_CANONICAL_REPO}" != "true" ]; then
              echo "saas_fetched=false" >> "$GITHUB_OUTPUT"
              echo "::warning::SPEC_KITTY_SAAS_READ_TOKEN is unavailable for fork PRs or non-canonical repository runs; skipping private SaaS consumer compatibility evidence."
              exit 0
            fi

            echo "::error::SPEC_KITTY_SAAS_READ_TOKEN is required for SaaS consumer compatibility evidence."
            exit 1
          fi

          CONSUMER_CONTRACT_URL="https://api.github.com/repos/${REPO_OWNER}/spec-kitty-saas/contents/contracts/consumer-compatibility.json?ref=main"

          if curl -fsSL \
            -H "Authorization: Bearer ${CROSS_REPO_TOKEN}" \
            -H "Accept: application/vnd.github.raw" \
            "$CONSUMER_CONTRACT_URL" \
            -o /tmp/spec-kitty-release-contracts/consumer-compatibility.json; then
            echo "Fetched spec-kitty-saas/contracts/consumer-compatibility.json."
          else
            echo "Unable to fetch spec-kitty-saas/contracts/consumer-compatibility.json from main."
            echo "Configure SPEC_KITTY_SAAS_READ_TOKEN secret with read access to private repo ${REPO_OWNER}/spec-kitty-saas."
            exit 1
          fi

          echo "saas_fetched=true" >> "$GITHUB_OUTPUT"
          echo "consumer_contract=/tmp/spec-kitty-release-contracts/consumer-compatibility.json" >> "$GITHUB_OUTPUT"

      - name: Validate candidate against SaaS consumer contract
        if: steps.fetch_contract.outputs.saas_fetched == 'true'
        run: |
          MANIFEST_ARGS=()
          if python scripts/release/check_candidate_consumer_compat.py --help | grep -q -- '--compatibility-manifest'; then
            MANIFEST_ARGS=(
              --compatibility-manifest candidate/.kittify/release/shared-package-compatibility.json
            )
          fi

          python scripts/release/check_candidate_consumer_compat.py \
            --package spec-kitty-cli \
            "${MANIFEST_ARGS[@]}" \
            --consumer-contract "${{ steps.fetch_contract.outputs.consumer_contract }}"

  # ---------------------------------------------------------------------------
  # quality-gate: single check that aggregates all required job results.
  # Skipped jobs are OK; only failures block.
  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # quality-gate: the single blocking aggregator. The pass/fail verdict is
  # computed by scripts/ci/quality_gate_decision.py (mission ci-suite-map-bind
  # FR-011): it consumes the FULL `needs` context via toJSON (a phantom
  # `needs.<job>.result` read is impossible by construction), emits the
  # run/skipped table to $GITHUB_STEP_SUMMARY, and fails on any failed job,
  # any improperly-skipped mapped suite (filter matched, job skipped, no
  # full-run supersede, no draft exemption), and any unmet release-required
  # job. `quarantine-visibility` stays OUT of the blocking set (C-005 — the
  # script trips exit 2 if it ever appears in the payload).
  #
  # `slow-tests` (mission test-suite-friction-remediation-01KXDKBX WP17,
  # FR-012/#2622): added below to close the "un-gated by convention" gap —
  # it carries no dorny filter-group `if:` gate (group-less/always-on, like
  # `lint`/`kernel-tests`/`unit-contract-residual` above), so
  # scripts/ci/quality_gate_decision.py's `filter_true` is vacuously False for
  # it and its `skipped` result on every pull_request event (it only runs on
  # push/workflow_dispatch) is legitimately OK — but a real `failure` on a
  # push run now blocks the gate, closing the gap. `mutation-testing` stays
  # OUT of `needs:` — see tests/architectural/test_suite_jobs_gate_blocking.py's
  # `NON_BLOCKING_ALLOWLIST` for its explicit non-blocking rationale (it is
  # `if: false`-disabled and invokes no pytest today).
  # ---------------------------------------------------------------------------
  quality-gate:
    needs:
      - changes
      - deferral-consistency-check
      - lint
      - diff-coverage
      - kernel-tests
      - fast-tests-doctrine
      - fast-tests-sync
      - fast-tests-sync-orphan-sweep
      - fast-tests-merge
      - fast-tests-missions
      - fast-tests-post-merge
      - fast-tests-release
      - fast-tests-status
      - fast-tests-review
      - fast-tests-next
      - fast-tests-lanes
      - fast-tests-dashboard
      - fast-tests-upgrade
      - fast-tests-cli
      - fast-tests-core-misc
      - fast-tests-docs
      - fast-tests-charter
      - fast-tests-agent
      - mission-loader-coverage
      - unit-contract-residual
      - slow-tests
      - integration-tests-doctrine
      - integration-tests-charter
      - integration-tests-sync
      - integration-tests-sync-real-port
      - integration-tests-merge
      - integration-tests-missions
      - integration-tests-post-merge
      - integration-tests-release
      - integration-tests-status
      - integration-tests-review
      - integration-tests-next
      - integration-tests-lanes
      - integration-tests-dashboard
      - integration-tests-upgrade
      - integration-tests-cli
      - integration-tests-agent
      - integration-tests-core-misc
      - arch-adversarial
      - timing-nfr-serial
      - e2e-cross-cutting
      - restart-daemon-nfr-timing
      - regression-tests
      - build-wheel
      - clean-install-verification
      - consumer-compatibility
      - uv-lock-check
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: ${{ (always()) && !contains(github.event.pull_request.labels.*.name, 'pr:deferred') && !contains(github.event.pull_request.labels.*.name, 'pr:skip-ci') }}
    steps:
      - name: "Check out repository (decision script)"
        uses: actions/checkout@v6

      - name: "Evaluate quality-gate decision"
        # ``shell: bash`` runs the step under
        # ``bash --noprofile --norc -eo pipefail {0}``. Pipefail is REQUIRED:
        # the final command pipes into ``tee -a "$GITHUB_STEP_SUMMARY"`` and,
        # under GitHub's default ``bash -e {0}`` (no pipefail), the pipe would
        # return tee's always-zero exit and SWALLOW the script's exit 1
        # (blocking verdict) / exit 2 (contract violation / C-005 tripwire),
        # making the gate vacuous. Pinned by the decision-step assertions in
        # tests/architectural/test_ci_quality_path_filters.py and
        # tests/release/test_release_ci_ownership.py.
        shell: bash
        env:
          # The complete needs context — every declared blocking job with its
          # result. Consumed wholesale (never a re-enumerated literal list) so
          # the needs: list above is the ONLY blocking-set authority.
          NEEDS_JSON: ${{ toJSON(needs) }}
          CHANGES_JSON: ${{ toJSON(needs.changes.outputs) }}
          # Full-run semantics: the operator's run_all dispatch input, plus
          # schedule/dispatch events, where per-module jobs skip by EVENT
          # design (e.g. e2e-cross-cutting runs only on push/PR), not because
          # a mapped suite was improperly skipped.
          RUN_ALL: ${{ (inputs.run_all || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && 'true' || 'false' }}
          CATCHALL_UNMATCHED: ${{ needs.changes.outputs.unmatched || 'false' }}
          PR_IS_DRAFT: ${{ github.event_name == 'pull_request' && github.event.pull_request.draft == true && 'true' || 'false' }}
        run: |
          python3 - > payload.json <<'PY'
          import json
          import os

          # Job -> dorny filter group(s) referenced by that job's `if:` gate.
          # Adjudicated Decision 8 (two-authority rule): the job `if:` gates
          # are the source authority for this mapping; this table is the ONE
          # in-workflow derivation of it, kept adjacent to the decision seam
          # and ASSERTED equal to the parsed `if:` gating by the
          # architectural invariant suite (tests/architectural/). Jobs absent
          # here are always-run or event-gated (no filter group in their
          # `if:`), so a skip of theirs is never an "improper" skip.
          JOB_GROUPS = {
              "kernel-tests": ["kernel"],
              "fast-tests-doctrine": ["doctrine"],
              "fast-tests-sync": ["sync"],
              "fast-tests-sync-orphan-sweep": ["sync"],
              "fast-tests-merge": ["merge"],
              "fast-tests-missions": ["missions"],
              "fast-tests-post-merge": ["post_merge"],
              "fast-tests-release": ["release"],
              "fast-tests-status": ["status", "sync"],
              "fast-tests-review": ["review", "status"],
              "fast-tests-next": ["next", "status"],
              "mission-loader-coverage": ["next", "core_misc", "platform"],
              "fast-tests-lanes": ["lanes", "status", "merge"],
              "fast-tests-dashboard": ["dashboard", "status"],
              "fast-tests-upgrade": ["upgrade", "status"],
              "fast-tests-cli": ["cli"],
              "fast-tests-core-misc": ["core_misc", "execution_context", "glossary", "acceptance", "auth_audit_git", "lifecycle", "agent_surface", "closeout", "governance", "platform"],
              "fast-tests-docs": ["docs"],
              "fast-tests-charter": ["charter"],
              "fast-tests-agent": ["agent"],
              "integration-tests-doctrine": ["doctrine"],
              "integration-tests-charter": ["charter"],
              "integration-tests-sync": ["sync"],
              "integration-tests-sync-real-port": ["sync"],
              "integration-tests-merge": ["merge"],
              "integration-tests-missions": ["missions"],
              "integration-tests-post-merge": ["post_merge"],
              "integration-tests-release": ["release"],
              "integration-tests-status": ["status", "sync"],
              "integration-tests-review": ["review"],
              "integration-tests-next": ["next"],
              "integration-tests-lanes": ["lanes"],
              "integration-tests-dashboard": ["dashboard"],
              "integration-tests-upgrade": ["upgrade"],
              "integration-tests-cli": ["cli"],
              "integration-tests-agent": ["agent"],
              "integration-tests-core-misc": ["core_misc", "execution_context", "acceptance", "auth_audit_git", "lifecycle", "agent_surface", "closeout", "governance", "platform"],
              "e2e-cross-cutting": ["e2e", "core_misc", "execution_context"],
              "restart-daemon-nfr-timing": ["cli"],
              "consumer-compatibility": ["release"],
          }

          # Jobs whose `if:` carries the draft/WIP exemption; safe to skip on
          # a draft PR because the ready_for_review trigger (FR-013) re-runs
          # them on the draft->ready flip and GitHub blocks draft merges.
          #
          # By design (operator ruling): a WIP-titled PR marked for-review
          # (non-draft) FAILS quality-gate. These jobs' `if:` clauses SKIP on a
          # WIP title, but the draft-exemption below is draft-FLAG-only — NOT
          # title-based — so a for-review PR still declaring WIP in its title is
          # a contradiction the gate correctly rejects. WIP = the author
          # declares not-ready; to land, drop the WIP prefix or keep the PR in
          # draft.
          DRAFT_GATED_JOBS = [
              "integration-tests-core-misc",
              "e2e-cross-cutting",
          ]

          # Release-touching PRs must have these SUCCEED (skipped is not
          # enough). Passed as data: the script will not invent the set
          # (Decision 8) and exits 2 if any entry is absent from `needs`.
          RELEASE_REQUIRED_JOBS = [
              "build-wheel",
              "clean-install-verification",
              "consumer-compatibility",
              "fast-tests-release",
              "integration-tests-release",
              "uv-lock-check",
          ]

          changes = json.loads(os.environ["CHANGES_JSON"])
          # `unmatched` is the catch-all signal, not a filter group; it feeds
          # the dedicated catchall_unmatched field instead.
          changes.pop("unmatched", None)
          print(json.dumps({
              "needs": json.loads(os.environ["NEEDS_JSON"]),
              "changes": changes,
              "job_groups": JOB_GROUPS,
              "run_all": os.environ["RUN_ALL"],
              "catchall_unmatched": os.environ["CATCHALL_UNMATCHED"],
              "pr_is_draft": os.environ["PR_IS_DRAFT"],
              "draft_gated_jobs": DRAFT_GATED_JOBS,
              "release_required_jobs": RELEASE_REQUIRED_JOBS,
          }))
          PY
          # The step fails on ANY non-zero exit: 1 = blocking verdict,
          # 2 = input-contract violation / C-005 tripwire (never soft).
          python3 scripts/ci/quality_gate_decision.py --input payload.json \
            | tee -a "$GITHUB_STEP_SUMMARY"
