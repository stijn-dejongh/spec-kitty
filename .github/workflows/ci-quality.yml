  # ---------------------------------------------------------------------------
  # fast-tests-core-misc: catch-all fast suite, SPLIT into a shard matrix
  # (mission ci-topology-shrink FR-003 / SC-003a) mirroring the
  # integration-tests-core-misc partitioning so no single shard collects the
  # whole ~11k-test fast catch-all universe:
  #   - specify-cli-rest: the tests/specify_cli cone MINUS the nested roots a
  #     dedicated fast job already owns (cli / missions / lanes / next / status
  #     / charter_*) so those never same-tier double-run (NFR-003).
  #   - core-misc: the whole-tree residual catch-all. Its --ignore list mirrors
  #     the roots owned by dedicated shards (FR-012 invariant
  #     test_catch_all_ignore_lists_mirror_owned_roots_live) — every carved root
  #     is ignored here AND owned as a positional by a dedicated shard, together.
  #     tests/specify_cli (specify-cli-rest above / integration specify-cli-rest)
  #     and tests/docs (fast-tests-docs) are the two roots this split newly
  #     carves out of the residual.
  # The two shards are disjoint (the residual ignores tests/specify_cli), the
  # union re-covers exactly the pre-split fast universe (removed roots stay
  # covered by their dedicated jobs, so orphan_count stays 0, SC-004), and both
  # shards are non-empty (SC-003a).
  # ---------------------------------------------------------------------------
  fast-tests-core-misc:
    name: fast-tests-core-misc (${{ matrix.shard }})
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes, kernel-tests, fast-tests-doctrine]
    if: >-
      always() &&
      (needs.changes.outputs.core_misc == 'true' || needs.changes.outputs.execution_context == 'true' || needs.changes.outputs.glossary == 'true' || needs.changes.outputs.acceptance == 'true' || needs.changes.outputs.auth_audit_git == 'true' || needs.changes.outputs.lifecycle == 'true' || needs.changes.outputs.agent_surface == 'true' || needs.changes.outputs.closeout == 'true' || needs.changes.outputs.governance == 'true' || needs.changes.outputs.platform == 'true') &&
      needs.kernel-tests.result != 'failure' &&
      needs.fast-tests-doctrine.result != 'failure'
    strategy:
      fail-fast: false
      matrix:
        include:
          # specify-cli-rest was badly imbalanced against core-misc (12.2 min
          # vs 4.7 min, run 29196440986). Rebalanced (mission
          # ci-test-topology-performance-01KXBJRT WP06 T017/FR-010) by carving
          # its heaviest real subdirectories/files (measured via a real
          # `-m "fast and not windows_ci"` collect-only pass: 3241 of the
          # combined 6320 tests) into a sibling `specify-cli-rest-2` shard.
          # `specify-cli-rest` keeps its required-shard name (WP02's
          # `_REQUIRED_CORE_MISC_SHARDS` canary) but is now scoped down via the
          # SAME `--ignore=` residual pattern `core-misc` already uses, rather
          # than a second sharding mechanism — the two new shards are a plain
          # bin-split (no WP01 marker-registry row), consistent with how this
          # job (and `integration-tests-core-misc`'s own specify-cli-heavy /
          # specify-cli-rest / misc split) already partitions by
          # paths/ignore_args, not by pytest marker. Verified disjoint +
          # union-complete locally: 3241 + 3079 == 6320 (today's real
          # `specify-cli-rest` selection, unchanged).
          - shard: specify-cli-rest
            paths: tests/specify_cli
            ignore_args: >-
              --ignore=tests/specify_cli/cli
              --ignore=tests/specify_cli/missions
              --ignore=tests/specify_cli/lanes
              --ignore=tests/specify_cli/next
              --ignore=tests/specify_cli/status
              --ignore=tests/specify_cli/charter_freshness
              --ignore=tests/specify_cli/charter_lint
              --ignore=tests/specify_cli/charter_preflight
              --ignore=tests/specify_cli/test_lane_regression_guard.py
              --ignore=tests/specify_cli/test_template_lane_guard.py
              --ignore=tests/specify_cli/compat
              --ignore=tests/specify_cli/tool_surface
              --ignore=tests/specify_cli/invocation
              --ignore=tests/specify_cli/core
              --ignore=tests/specify_cli/regression
          - shard: specify-cli-rest-2
            paths: >-
              tests/specify_cli/test_lane_regression_guard.py
              tests/specify_cli/test_template_lane_guard.py
              tests/specify_cli/compat
              tests/specify_cli/tool_surface
              tests/specify_cli/invocation
              tests/specify_cli/core
              tests/specify_cli/regression
            ignore_args: ''
          - shard: core-misc
            paths: ''
            ignore_args: >-
              --ignore=tests/doctrine
              --ignore=tests/kernel
              --ignore=tests/status
              --ignore=tests/specify_cli/status
              --ignore=tests/specify_cli
              --ignore=tests/docs
              --ignore=tests/sync
              --ignore=tests/merge
              --ignore=tests/missions
              --ignore=tests/post_merge
              --ignore=tests/release
              --ignore=tests/review
              --ignore=tests/next
              --ignore=tests/specify_cli/next
              --ignore=tests/lanes
              --ignore=tests/test_dashboard
              --ignore=tests/upgrade
              --ignore=tests/cli
              --ignore=tests/runtime
              --ignore=tests/charter
              --ignore=tests/agent
              --ignore=tests/e2e
              --ignore=tests/cross_cutting
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12'
      - run: uv sync --frozen --all-extras
      - run: mkdir -p out/reports/coverage
      # The core-misc shard's --ignore list is this catch-all's mirror of the
      # test roots owned by dedicated shards. It is BOUND to the filter topology
      # by the ignore-mirror architectural invariant (FR-012 /
      # test_catch_all_ignore_lists_mirror_owned_roots_live): drift between this
      # list and the shard-owned roots fails tests/architectural/.
      - name: "Run fast tests — core misc"
        run: |
          uv run python -m pytest \
            ${{ matrix.paths }} \
            ${{ matrix.ignore_args }} \
            -m "fast and not windows_ci" -q --tb=short \
            -n auto --dist loadfile \
            --durations=50 \
            --cov=src/specify_cli \
            --cov=src/glossary \
            --cov-report=xml:out/reports/coverage/coverage-fast-core-misc-${{ matrix.shard }}.xml
      - name: "Upload fast-core-misc coverage"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fast-test-core-misc-${{ matrix.shard }}-reports
          path: out/reports/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # fast-tests-docs: dedicated CHEAP job for docs-only changes (#2359). A
  # docs/**, tests/docs/**, or scripts/docs/** change sets docs=true and runs
  # ONLY this job instead of the ~17-minute core-misc code cone. It runs the
  # full docs test surface (tests/docs) plus the two docs-scanning architectural
  # guards that must still trigger on docs prose changes (terminology canon and
  # CLI-reference parity). Marker is `not windows_ci` (NOT `fast`): tests/docs
  # and both arch guards carry architectural/git_repo/unit markers, so a `fast`
  # selector would silently deselect them. tests/docs stays ALSO selected by
  # fast-tests-core-misc + integration-tests-core-misc, so orphan coverage is
  # unchanged and a src change still over-covers docs (fail-safe).
  # ---------------------------------------------------------------------------
  fast-tests-docs:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes]
    if: always() && needs.changes.outputs.docs == 'true'
    steps:
