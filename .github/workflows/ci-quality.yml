name: CI Quality

on:
  pull_request:
    branches:
      - main
      - develop
      - 2.x
  push:
    branches:
      - main
      - develop
      - 2.x
  workflow_dispatch:
    inputs:
      run_extended:
        description: 'Run slow/e2e suite'
        required: false
        default: false
        type: boolean

concurrency:
  group: ci-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    outputs:
      commitlint_has_failures: ${{ steps.commitlint.outputs.has_failures }}
      markdownlint_has_failures: ${{ steps.markdownlint.outputs.has_failures }}
      ruff_has_failures: ${{ steps.ruff.outputs.has_failures }}
      mypy_has_failures: ${{ steps.mypy.outputs.has_failures }}

    steps:
      - name: "[ENFORCED] Check out repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "[ENFORCED] Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: "[ENFORCED] Set up Node"
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: "[ENFORCED] Install Python dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,lint]"

      - name: "[ENFORCED] Install Node dependencies"
        run: npm ci

      - name: "[ENFORCED] Prepare report directories"
        run: |
          mkdir -p out/reports/static-analysis
          mkdir -p out/reports/security

      - name: "[ENFORCED] Determine commit range and cutoff date"
        id: commit_range
        run: |
          # Set cutoff date for linting (when linting was introduced)
          CUTOFF_DATE="2026-02-25T00:00:00Z"
          echo "cutoff_date=$CUTOFF_DATE" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "from=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "to=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "from=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "to=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: "[ENFORCED] Run commit message linting"
        id: commitlint
        if: always()
        continue-on-error: true
        run: |
          FROM_SHA="${{ steps.commit_range.outputs.from }}"
          TO_SHA="${{ steps.commit_range.outputs.to }}"
          CUTOFF_DATE="${{ steps.commit_range.outputs.cutoff_date }}"

          if [ -z "$FROM_SHA" ] || [ -z "$TO_SHA" ]; then
            echo "No commit range available for this trigger. Skipping commitlint."
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Convert cutoff date to Unix timestamp for comparison
          CUTOFF_TIMESTAMP=$(date -d "$CUTOFF_DATE" +%s)

          # Get all commits in range
          mapfile -t ALL_COMMITS < <(git rev-list "$FROM_SHA..$TO_SHA")

          # Filter commits by cutoff date
          COMMITS_AFTER_CUTOFF=()
          for commit in "${ALL_COMMITS[@]}"; do
            commit_timestamp=$(git show -s --format=%ct "$commit")
            if [ "$commit_timestamp" -gt "$CUTOFF_TIMESTAMP" ]; then
              COMMITS_AFTER_CUTOFF+=("$commit")
            fi
          done

          if [ "${#COMMITS_AFTER_CUTOFF[@]}" -eq 0 ]; then
            echo "No commits after cutoff date ($CUTOFF_DATE). Skipping commitlint."
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Run commitlint on filtered commits
          echo "Checking ${#COMMITS_AFTER_CUTOFF[@]} commits after cutoff date..."
          FAILED_COMMITS=""
          for commit in "${COMMITS_AFTER_CUTOFF[@]}"; do
            if ! echo "$commit" | npx --yes @commitlint/cli@19.8.1 \
              --config commitlint.config.cjs \
              --from "$commit~1" \
              --to "$commit" \
              --verbose; then
              commit_msg=$(git log --format=%s -n 1 "$commit")
              FAILED_COMMITS="${FAILED_COMMITS}${commit} - ${commit_msg}\n"
            fi
          done

          # Save failed commits for PR comment
          if [ -n "$FAILED_COMMITS" ]; then
            echo -e "$FAILED_COMMITS" > /tmp/commitlint-failures.txt
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "[ENFORCED] Run markdown style linting on changed files"
        id: markdownlint
        if: always()
        continue-on-error: true
        run: |
          FROM_SHA="${{ steps.commit_range.outputs.from }}"
          TO_SHA="${{ steps.commit_range.outputs.to }}"
          CUTOFF_DATE="${{ steps.commit_range.outputs.cutoff_date }}"

          if [ -z "$FROM_SHA" ] || [ -z "$TO_SHA" ]; then
            echo "No commit range available for this trigger. Skipping markdownlint."
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Convert cutoff date to Unix timestamp for comparison
          CUTOFF_TIMESTAMP=$(date -d "$CUTOFF_DATE" +%s)

          mapfile -d '' CHANGED_MD_FILES < <(git diff --name-only -z --diff-filter=ACM "$FROM_SHA" "$TO_SHA" -- '*.md' '*.mdx')
          if [ "${#CHANGED_MD_FILES[@]}" -eq 0 ]; then
            echo "No changed markdown files in commit range."
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Filter files by last modification date after cutoff
          FILES_TO_CHECK=()
          for file in "${CHANGED_MD_FILES[@]}"; do
            if [ -f "$file" ]; then
              # Get the last commit timestamp for this file in the range
              last_commit_timestamp=$(git log -1 --format=%ct "$FROM_SHA..$TO_SHA" -- "$file" 2>/dev/null || echo "0")
              if [ "$last_commit_timestamp" -gt "$CUTOFF_TIMESTAMP" ]; then
                FILES_TO_CHECK+=("$file")
              fi
            fi
          done

          if [ "${#FILES_TO_CHECK[@]}" -eq 0 ]; then
            echo "No markdown files modified after cutoff date ($CUTOFF_DATE)."
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Checking ${#FILES_TO_CHECK[@]} markdown files modified after cutoff date..."

          # Run markdownlint and capture failures
          FAILED_FILES=""
          if ! npx --yes markdownlint-cli2@0.18.1 \
            --config .markdownlint-cli2.jsonc \
            "${FILES_TO_CHECK[@]}"; then
            for file in "${FILES_TO_CHECK[@]}"; do
              if ! npx --yes markdownlint-cli2@0.18.1 \
                --config .markdownlint-cli2.jsonc \
                "$file" 2>&1 >/dev/null; then
                FAILED_FILES="${FAILED_FILES}${file}\n"
              fi
            done
            echo -e "$FAILED_FILES" > /tmp/markdownlint-failures.txt
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "[ENFORCED] Run architecture/docs consistency tests on changed markdown"
        if: always()
        run: |
          FROM_SHA="${{ steps.commit_range.outputs.from }}"
          TO_SHA="${{ steps.commit_range.outputs.to }}"

          if [ -z "$FROM_SHA" ] || [ -z "$TO_SHA" ]; then
            echo "No commit range available for this trigger. Skipping docs consistency tests."
            exit 0
          fi

          mapfile -d '' CHANGED_ARCH_DOC_MD < <(git diff --name-only -z --diff-filter=ACM "$FROM_SHA" "$TO_SHA" -- 'docs/*.md' 'docs/**/*.md' 'architecture/*.md' 'architecture/**/*.md')

          if [ "${#CHANGED_ARCH_DOC_MD[@]}" -eq 0 ]; then
            echo "No changed markdown files under docs/ or architecture/. Skipping docs consistency tests."
            exit 0
          fi

          echo "Detected markdown changes in docs/architecture. Running consistency checks..."
          python -m pytest -q tests/docs/test_architecture_docs_consistency.py tests/docs/test_versioned_docs_integrity.py

      - name: "[ENFORCED] Check Contextive glossary files are up-to-date"
        if: always()
        run: |
          FROM_SHA="${{ steps.commit_range.outputs.from }}"
          TO_SHA="${{ steps.commit_range.outputs.to }}"

          if [ -z "$FROM_SHA" ] || [ -z "$TO_SHA" ]; then
            echo "No commit range available. Running Contextive check unconditionally."
            python scripts/generate_contextive_glossaries.py check
            exit $?
          fi

          mapfile -d '' CHANGED < <(git diff --name-only -z --diff-filter=ACM "$FROM_SHA" "$TO_SHA" \
            -- 'glossary/**' 'src/specify_cli/**' 'src/constitution/**' 'src/constitution/**' '.kittify/traceability/**')

          if [ "${#CHANGED[@]}" -eq 0 ]; then
            echo "No changes in glossary/, src/specify_cli/, or .kittify/traceability/. Skipping Contextive check."
            exit 0
          fi

          echo "Detected relevant changes. Verifying Contextive glossary files are up-to-date..."
          python scripts/generate_contextive_glossaries.py check

      - name: "[INFO] Run ruff report (advisory)"
        id: ruff
        if: always()
        continue-on-error: true
        run: |
          set -o pipefail
          if python -m ruff check src tests 2>&1 | tee out/reports/static-analysis/ruff-report.txt; then
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "[INFO] Run mypy report (advisory)"
        id: mypy
        if: always()
        continue-on-error: true
        run: |
          set -o pipefail
          if python -m mypy --strict src/specify_cli src/constitution src/doctrine 2>&1 | tee out/reports/static-analysis/mypy-report.txt; then
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "[ENFORCED] Run Bandit security scan"
        id: bandit
        if: always()
        continue-on-error: true
        run: |
          python -m bandit -r src/ \
            --severity-level medium \
            --confidence-level medium \
            | tee out/reports/security/bandit-report.txt

      - name: "[ENFORCED] Run pip-audit CVE scan"
        id: pip_audit
        if: always()
        continue-on-error: true
        run: |
          python -m pip_audit | tee out/reports/security/pip-audit-report.txt

      - name: "[ENFORCED] Upload lint artifacts"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: out/reports/

      - name: "[ENFORCED] Persist linting failure details"
        if: always() && github.event_name == 'pull_request'
        run: |
          mkdir -p out/reports/lint-failures
          if [ -f /tmp/commitlint-failures.txt ]; then
            cp /tmp/commitlint-failures.txt out/reports/lint-failures/commitlint-failures.txt
          fi
          if [ -f /tmp/markdownlint-failures.txt ]; then
            cp /tmp/markdownlint-failures.txt out/reports/lint-failures/markdownlint-failures.txt
          fi
          # Persist ruff/mypy reports for the lint-feedback job
          if [ -s out/reports/static-analysis/ruff-report.txt ] && [ "${{ steps.ruff.outputs.has_failures }}" = "true" ]; then
            cp out/reports/static-analysis/ruff-report.txt out/reports/lint-failures/ruff-failures.txt
          fi
          if [ -s out/reports/static-analysis/mypy-report.txt ] && [ "${{ steps.mypy.outputs.has_failures }}" = "true" ]; then
            cp out/reports/static-analysis/mypy-report.txt out/reports/lint-failures/mypy-failures.txt
          fi

      - name: "[ENFORCED] Upload linting failure details"
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: lint-failure-details
          path: out/reports/lint-failures/
          if-no-files-found: ignore

      - name: "[ENFORCED] Fail job if security checks failed"
        if: always()
        run: |
          echo "bandit outcome: ${{ steps.bandit.outcome }}"
          echo "pip_audit outcome: ${{ steps.pip_audit.outcome }}"
          if [ "${{ steps.bandit.outcome }}" != "success" ] || \
             [ "${{ steps.pip_audit.outcome }}" != "success" ]; then
            echo "One or more security checks failed."
            exit 1
          fi

  lint-feedback:
    runs-on: ubuntu-latest
    needs: lint
    if: >-
      always() && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.full_name == github.repository
      && (needs.lint.outputs.commitlint_has_failures == 'true'
       || needs.lint.outputs.markdownlint_has_failures == 'true'
       || needs.lint.outputs.ruff_has_failures == 'true'
       || needs.lint.outputs.mypy_has_failures == 'true')
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: "[ENFORCED] Download linting failure details"
        uses: actions/download-artifact@v4
        with:
          name: lint-failure-details
          path: /tmp/lint-failures
        continue-on-error: true

      - name: "[ENFORCED] Post PR comment on linting failures"
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## Linting Issues Detected\n\n';

            const commitlintFailed = '${{ needs.lint.outputs.commitlint_has_failures }}' === 'true';
            if (commitlintFailed) {
              let failedCommits = '';
              try {
                failedCommits = fs.readFileSync('/tmp/lint-failures/commitlint-failures.txt', 'utf8');
              } catch (e) {
                failedCommits = 'Unable to read commit failures';
              }
              comment += '### Commit Message Issues\n\n';
              comment += 'The following commits do not follow the conventional commit format:\n\n';
              comment += '```\n' + failedCommits + '```\n\n';
            }

            const markdownlintFailed = '${{ needs.lint.outputs.markdownlint_has_failures }}' === 'true';
            if (markdownlintFailed) {
              let failedFiles = '';
              try {
                failedFiles = fs.readFileSync('/tmp/lint-failures/markdownlint-failures.txt', 'utf8');
              } catch (e) {
                failedFiles = 'Unable to read markdown failures';
              }
              comment += '### Markdown Style Issues\n\n';
              comment += 'The following markdown files have style issues:\n\n';
              comment += '```\n' + failedFiles + '```\n\n';
            }

            const ruffFailed = '${{ needs.lint.outputs.ruff_has_failures }}' === 'true';
            if (ruffFailed) {
              let ruffOutput = '';
              try {
                ruffOutput = fs.readFileSync('/tmp/lint-failures/ruff-failures.txt', 'utf8');
              } catch (e) {
                ruffOutput = 'Unable to read ruff report — see lint-reports artifact for details.';
              }
              comment += '### Ruff Issues\n\n';
              comment += '<details>\n<summary>ruff check output</summary>\n\n';
              comment += '```\n' + ruffOutput.slice(0, 10000) + '```\n</details>\n\n';
            }

            const mypyFailed = '${{ needs.lint.outputs.mypy_has_failures }}' === 'true';
            if (mypyFailed) {
              let mypyOutput = '';
              try {
                mypyOutput = fs.readFileSync('/tmp/lint-failures/mypy-failures.txt', 'utf8');
              } catch (e) {
                mypyOutput = 'Unable to read mypy report — see lint-reports artifact for details.';
              }
              comment += '### Mypy Issues\n\n';
              comment += '<details>\n<summary>mypy --strict output</summary>\n\n';
              comment += '```\n' + mypyOutput.slice(0, 10000) + '```\n</details>\n\n';
            }

            comment += '**Note:** These are advisory and do not block the workflow. ';
            comment += 'Full reports are available in the `lint-reports` artifact.\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ---------------------------------------------------------------------------
  # kernel-tests: validates the zero-dependency shared utilities in src/kernel.
  # Runs before fast-tests so breakage in foundational code is surfaced first.
  # Coverage floor: 90% (kernel is small, stable, and must be well-tested).
  # ---------------------------------------------------------------------------
  kernel-tests:
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: "[ENFORCED] Check out repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "[ENFORCED] Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: "[ENFORCED] Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: "[ENFORCED] Prepare report directories"
        run: |
          mkdir -p out/reports/xunit-reports
          mkdir -p out/reports/coverage

      - name: "[ENFORCED] Run kernel test suite with coverage"
        run: |
          python -m pytest \
            -v \
            tests/kernel/ \
            -m fast \
            --cov=src/kernel \
            --cov-report=term-missing \
            --cov-report=xml:out/reports/coverage/coverage-kernel.xml \
            --junitxml=out/reports/xunit-reports/xunit-result-kernel-${{ github.run_id }}.xml

      - name: "[ENFORCED] Enforce kernel coverage floor (90%)"
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET

          report = ET.parse("out/reports/coverage/coverage-kernel.xml").getroot()
          pct = float(report.attrib["line-rate"]) * 100.0
          floor = 90.0
          print(f"Kernel coverage: {pct:.2f}% (floor: {floor:.2f}%)")
          if pct < floor:
              raise SystemExit(
                  f"Kernel coverage floor not met: {pct:.2f}% < {floor:.2f}%"
              )
          PY

      - name: "[ENFORCED] Upload kernel-test artifacts"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-test-reports
          path: out/reports/

  # ---------------------------------------------------------------------------
  # fast-tests: replaces unit-tests + cli-tests + sync-tests
  # Runs the full -m fast suite across the vertical-slice layout.
  # Coverage floor: 40%.
  # ---------------------------------------------------------------------------
  fast-tests:
    runs-on: ubuntu-latest
    needs: kernel-tests
    if: always()

    steps:
      - name: "[ENFORCED] Check out repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "[ENFORCED] Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: "[ENFORCED] Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: "[ENFORCED] Prepare report directories"
        run: |
          mkdir -p out/reports/xunit-reports
          mkdir -p out/reports/coverage

      - name: "[ENFORCED] Run fast test suite with coverage"
        run: |
          python -m pytest \
            -v \
            --ignore=tests/legacy \
            -m fast \
            --cov=src/specify_cli --cov=src/constitution --cov=src/doctrine --cov=src/kernel \
            --cov-report=term-missing \
            --cov-report=xml:out/reports/coverage/coverage.xml \
            --junitxml=out/reports/xunit-reports/xunit-result-fast-${{ github.run_id }}.xml

      - name: "[ENFORCED] Enforce coverage floor (40%)"
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET

          report = ET.parse("out/reports/coverage/coverage.xml").getroot()
          pct = float(report.attrib["line-rate"]) * 100.0
          floor = 40.0
          print(f"Total coverage: {pct:.2f}% (floor: {floor:.2f}%)")
          if pct < floor:
              raise SystemExit(
                  f"Coverage floor not met: {pct:.2f}% < {floor:.2f}%"
              )
          PY

      - name: "[ENFORCED] Upload fast-test artifacts"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fast-test-reports
          path: out/reports/

  # ---------------------------------------------------------------------------
  # integration-tests: replaces the individual git_repo / integration suites.
  # Runs all tests marked git_repo (real filesystem/git operations).
  # ---------------------------------------------------------------------------
  integration-tests:
    runs-on: ubuntu-latest
    needs: fast-tests
    # Run even if fast-tests failed (full picture needed)
    if: always()

    steps:
      - name: "[ENFORCED] Check out repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "[ENFORCED] Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: "[ENFORCED] Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: "[ENFORCED] Prepare report directories"
        run: |
          mkdir -p out/reports/xunit-reports
          mkdir -p out/reports/coverage

      - name: "[ENFORCED] Run git_repo integration tests with coverage"
        run: |
          python -m pytest \
            -v \
            --ignore=tests/legacy \
            -m git_repo \
            --cov=src/specify_cli --cov=src/constitution --cov=src/doctrine \
            --cov-report=xml:out/reports/coverage/coverage-integration.xml \
            --junitxml=out/reports/xunit-reports/xunit-result-integration-${{ github.run_id }}.xml

      - name: "[ENFORCED] Upload integration-test artifacts"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: out/reports/

  # ---------------------------------------------------------------------------
  # slow-and-e2e: replaces integration-smoke + dashboard-tests.
  # Push-only (or manual dispatch). Runs slow tests, e2e, cross_cutting.
  # ---------------------------------------------------------------------------
  slow-and-e2e:
    runs-on: ubuntu-latest
    needs: fast-tests
    if: always() && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.run_extended))
    timeout-minutes: 45

    steps:
      - name: "[ENFORCED] Check out repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "[ENFORCED] Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: "[ENFORCED] Set up Node (Playwright)"
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: "[ENFORCED] Install Python dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: "[ENFORCED] Install Playwright browsers"
        run: npx playwright install --with-deps chromium

      - name: "[ENFORCED] Prepare report directories"
        run: |
          mkdir -p out/reports/xunit-reports
          mkdir -p out/reports/coverage
          mkdir -p out/reports/slow-e2e

      - name: "[ENFORCED] Run slow tests with coverage"
        run: |
          python -m pytest \
            -v \
            --ignore=tests/legacy \
            -m slow \
            --cov=src/specify_cli --cov=src/constitution --cov=src/doctrine \
            --cov-report=xml:out/reports/coverage/coverage-slow.xml \
            --junitxml=out/reports/xunit-reports/xunit-result-slow-${{ github.run_id }}.xml \
            | tee out/reports/slow-e2e/slow.log

      - name: "[ENFORCED] Run e2e and cross_cutting tests with coverage"
        env:
          PWHEADLESS: '1'
        run: |
          python -m pytest \
            -v \
            tests/e2e/ tests/cross_cutting/ \
            -m "not distribution" \
            --cov=src/specify_cli --cov=src/constitution --cov=src/doctrine \
            --cov-append \
            --cov-report=xml:out/reports/coverage/coverage-e2e.xml \
            --junitxml=out/reports/xunit-reports/xunit-result-e2e-${{ github.run_id }}.xml \
            | tee out/reports/slow-e2e/e2e.log

      - name: "[ENFORCED] Upload slow-and-e2e artifacts"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slow-e2e-reports
          path: out/reports/

  # ---------------------------------------------------------------------------
  # diff-coverage: PR-only diff coverage gate (80% on changed lines).
  # Consumes fast-test-reports and integration-test-reports.
  # ---------------------------------------------------------------------------
  diff-coverage:
    runs-on: ubuntu-latest
    needs: [fast-tests, integration-tests]
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: "[ENFORCED] Check out repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "[ENFORCED] Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: "[ENFORCED] Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: "[ENFORCED] Download fast-tests coverage"
        if: needs.fast-tests.result == 'success' || needs.fast-tests.result == 'failure'
        uses: actions/download-artifact@v4
        with:
          name: fast-test-reports
          path: out/reports/fast
        continue-on-error: true

      - name: "[ENFORCED] Download integration-tests coverage"
        if: needs.integration-tests.result == 'success' || needs.integration-tests.result == 'failure'
        uses: actions/download-artifact@v4
        with:
          name: integration-test-reports
          path: out/reports/integration
        continue-on-error: true

      - name: "[ENFORCED] Enforce diff coverage policy (80% on changed lines)"
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1

          coverage_reports=()
          [ -f out/reports/fast/coverage/coverage.xml ] && coverage_reports+=(out/reports/fast/coverage/coverage.xml)
          [ -f out/reports/integration/coverage/coverage-integration.xml ] && coverage_reports+=(out/reports/integration/coverage/coverage-integration.xml)

          if [ ${#coverage_reports[@]} -eq 0 ]; then
            echo "::error::No coverage reports found for diff coverage."
            exit 1
          fi

          diff-cover "${coverage_reports[@]}" \
            --compare-branch=origin/${{ github.base_ref }} \
            --fail-under=80

  # ---------------------------------------------------------------------------
  # mutation-testing: advisory, push-only, scoped to changed files.
  # ---------------------------------------------------------------------------
  mutation-testing:
    runs-on: ubuntu-latest
    needs: fast-tests
    # Advisory job: only runs on push or manual dispatch, never on pull_request (NFR-001).
    if: always() && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.run_extended))
    timeout-minutes: 75
    env:
      MUTATION_FLOOR: 70  # Advisory baseline: 70.5% (2026-03-01 full run)

    steps:
      - name: "[ENFORCED] Check out repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "[INFO] Determine changed Python files in mutation scope"
        id: changed-files
        run: |
          # Find Python files changed vs the merge base (or HEAD~1 on main)
          BASE_REF="${{ github.event.before }}"
          if [ -z "$BASE_REF" ] || [ "$BASE_REF" = "0000000000000000000000000000000000000000" ]; then
            BASE_REF="HEAD~1"
          fi

          # Only keep files under the mutmut scope directories
          CHANGED=$(git diff --name-only --diff-filter=d "$BASE_REF" HEAD -- \
            'src/specify_cli/status/' \
            'src/specify_cli/glossary/' \
            'src/specify_cli/merge/' \
            'src/specify_cli/core/' \
          | grep '\.py$' || true)

          if [ -z "$CHANGED" ]; then
            echo "No Python files changed in mutation scope — skipping mutation testing."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Files in mutation scope:"
            echo "$CHANGED"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            # Write paths one-per-line for mutmut --paths-to-mutate
            echo "$CHANGED" > /tmp/changed-paths.txt
          fi

      - name: "[ENFORCED] Set up Python"
        if: steps.changed-files.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: "[ENFORCED] Install dependencies"
        if: steps.changed-files.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: "[ENFORCED] Prepare report directories"
        if: steps.changed-files.outputs.skip != 'true'
        run: mkdir -p out/reports/mutation

      - name: "[INFO] Run mutation testing (scoped to changed files) (advisory)"
        if: steps.changed-files.outputs.skip != 'true'
        run: |
          PATHS=$(paste -sd ',' /tmp/changed-paths.txt)
          echo "Running mutmut on: $PATHS"
          mutmut run --paths-to-mutate "$PATHS" || true

      - name: "[INFO] Export mutation stats (JSON) (advisory)"
        if: always() && steps.changed-files.outputs.skip != 'true'
        run: |
          # mutmut 3.5.0 writes stats to mutants/mutmut-cicd-stats.json (no --output flag)
          if mutmut export-cicd-stats; then
            if [ -f mutants/mutmut-cicd-stats.json ]; then
              cp mutants/mutmut-cicd-stats.json out/reports/mutation/mutation-stats.json
            fi
          fi

          # If stats file still missing, write a failure sentinel
          if [ ! -f out/reports/mutation/mutation-stats.json ]; then
            echo '{"killed": 0, "survived": 0, "total": 0, "execution_failed": true}' \
              > out/reports/mutation/mutation-stats.json
          fi

      - name: "[INFO] Check mutation score (advisory)"
        if: always() && steps.changed-files.outputs.skip != 'true'
        run: python scripts/check_mutation_floor.py

      - name: "[ENFORCED] Upload mutation artifacts"
        if: always() && steps.changed-files.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mutation-reports
          path: out/reports/mutation/

  # ---------------------------------------------------------------------------
  # sonarcloud: aggregates coverage from fast + integration + slow-e2e.
  # ---------------------------------------------------------------------------
  sonarcloud:
    runs-on: ubuntu-latest
    needs: [fast-tests, integration-tests, slow-and-e2e]
    if: always()

    steps:
      - name: "[INFO] Check Sonar token availability"
        id: sonar_token
        run: |
          if [ -n "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo ""
            echo "============================================================"
            echo "  SonarCloud is not configured — skipping analysis."
            echo "============================================================"
            echo ""
            echo "To set up SonarCloud for this open-source project:"
            echo ""
            echo "  1. Sign in at https://sonarcloud.io with your GitHub account"
            echo "  2. Import the repository (free for public repos)"
            echo "  3. Copy the project token from Administration > Analysis Method"
            echo "  4. Add it as a repository secret named SONAR_TOKEN:"
            echo "     Settings > Secrets and variables > Actions > New repository secret"
            echo ""
            echo "Docs: https://docs.sonarsource.com/sonarqube-cloud/getting-started/github/"
            echo ""
          fi

      - name: "[INFO] Resolve SonarCloud project settings"
        id: sonar_settings
        if: steps.sonar_token.outputs.enabled == 'true'
        run: |
          organization="${{ vars.SONAR_ORGANIZATION || 'priivacy-ai' }}"
          host_url="${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}"
          repo_name="${{ github.event.repository.name }}"
          project_key="${{ vars.SONAR_PROJECT_KEY }}"

          if [ -z "$project_key" ]; then
            project_key="${organization}_${repo_name}"
          fi

          echo "organization=$organization" >> "$GITHUB_OUTPUT"
          echo "host_url=$host_url" >> "$GITHUB_OUTPUT"
          echo "project_key=$project_key" >> "$GITHUB_OUTPUT"

          echo "Using SonarCloud settings:"
          echo "  host_url=$host_url"
          echo "  organization=$organization"
          echo "  project_key=$project_key"

      - name: "[ENFORCED] Check out repository"
        if: steps.sonar_token.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "[ENFORCED] Download fast-tests coverage"
        if: steps.sonar_token.outputs.enabled == 'true' && (needs.fast-tests.result == 'success' || needs.fast-tests.result == 'failure')
        uses: actions/download-artifact@v4
        with:
          name: fast-test-reports
          path: out/reports/fast
        continue-on-error: true

      - name: "[ENFORCED] Download integration-tests coverage"
        if: steps.sonar_token.outputs.enabled == 'true' && (needs.integration-tests.result == 'success' || needs.integration-tests.result == 'failure')
        uses: actions/download-artifact@v4
        with:
          name: integration-test-reports
          path: out/reports/integration
        continue-on-error: true

      - name: "[ENFORCED] Download slow-and-e2e coverage"
        if: steps.sonar_token.outputs.enabled == 'true' && (needs.slow-and-e2e.result == 'success' || needs.slow-and-e2e.result == 'failure')
        uses: actions/download-artifact@v4
        with:
          name: slow-e2e-reports
          path: out/reports/slow-e2e
        continue-on-error: true

      - name: "[ENFORCED] Merge coverage reports"
        if: steps.sonar_token.outputs.enabled == 'true'
        run: |
          mkdir -p out/reports/coverage
          mkdir -p out/reports/xunit-reports

          # Merge all coverage files
          find out/reports -name "coverage*.xml" -type f -exec cp {} out/reports/coverage/ \;

          # Create combined coverage: prefer fast → integration → slow-e2e
          if [ -f "out/reports/fast/coverage/coverage.xml" ]; then
            cp out/reports/fast/coverage/coverage.xml out/reports/coverage/coverage.xml
          elif [ -f "out/reports/integration/coverage/coverage-integration.xml" ]; then
            cp out/reports/integration/coverage/coverage-integration.xml out/reports/coverage/coverage.xml
          elif [ -f "out/reports/slow-e2e/coverage/coverage-slow.xml" ]; then
            cp out/reports/slow-e2e/coverage/coverage-slow.xml out/reports/coverage/coverage.xml
          fi

          # Merge all xUnit files
          find out/reports -name "xunit-result-*.xml" -type f -exec cp {} out/reports/xunit-reports/ \;

          # Create normalized xUnit file (use first available)
          latest_file="$(ls -1 out/reports/xunit-reports/xunit-result-*.xml 2>/dev/null | head -n 1)"
          if [ -n "$latest_file" ]; then
            cp "$latest_file" out/reports/xunit-reports/xunit-result.xml
          fi

          echo "Coverage files found:"
          find out/reports/coverage -name "*.xml" -type f
          echo "xUnit files found:"
          find out/reports/xunit-reports -name "*.xml" -type f

      - name: "[ENFORCED] SonarCloud Scan"
        if: steps.sonar_token.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.host.url=${{ steps.sonar_settings.outputs.host_url }}
            -Dsonar.organization=${{ steps.sonar_settings.outputs.organization }}
            -Dsonar.projectKey=${{ steps.sonar_settings.outputs.project_key }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "[ENFORCED] SonarCloud Quality Gate"
        if: steps.sonar_token.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ steps.sonar_settings.outputs.host_url }}
