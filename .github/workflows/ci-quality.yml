      - name: "[ENFORCED] Set up uv"
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12'

      - name: "[ENFORCED] Install dependencies"
        run: uv sync --frozen --all-extras

      - name: "[ENFORCED] Prepare report directories"
        run: |
          mkdir -p out/reports/xunit-reports
          mkdir -p out/reports/coverage

      # PENDING-CI: T019 flip — collection-equivalence verified locally
      # (serial == parallel nodeids); requires CI green x3 (run-twice/thrice
      # ratchet) before trusting this flip. Safe after WP04 HOME isolation.
      # See mission test-suite-acceleration.
      - name: "[ENFORCED] Run fast doctrine tests with coverage"
        run: |
          uv run python -m pytest \
            -v \
            tests/doctrine/ \
            -m "fast and not windows_ci" \
            -n auto --dist loadfile \
            --durations=50 \
            --cov=src/doctrine \
            --cov-report=term-missing \
            --cov-report=xml:out/reports/coverage/coverage-fast-doctrine.xml \
            --junitxml=out/reports/xunit-reports/xunit-result-fast-doctrine-${{ github.run_id }}.xml

      - name: "[ENFORCED] Upload fast-doctrine artifacts"
