          path: out/reports/

  # ---------------------------------------------------------------------------
  # Tier 0 fast-tests: no inter-module dependencies
  # ---------------------------------------------------------------------------
  fast-tests-sync:
    runs-on: ubuntu-latest
    needs: [changes]
    if: always() && needs.changes.outputs.sync == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12'
      - run: uv sync --frozen --all-extras
      - run: mkdir -p out/reports/coverage
      # PENDING-CI: T019 flip — collection-equivalence verified locally
      # (serial == parallel nodeids); requires CI green x3 (run-twice/thrice
      # ratchet) before trusting this flip. Safe after WP04 HOME isolation.
      # C-SERIAL (T021): the daemon/real-port orphan-sweep suite is excluded
      # from this parallel pool and runs serially (-n0) in the step below —
      # HOME isolation does not protect OS-global port binds (9400-9449).
      # See mission test-suite-acceleration.
      - name: "Run fast tests — sync (parallel, orphan-sweep excluded)"
        run: |
          uv run python -m pytest tests/sync/ -m "fast and not windows_ci" -q --tb=short \
            --ignore=tests/sync/test_orphan_sweep.py \
            -n auto --dist loadfile \
            --durations=50 \
            --cov=src/specify_cli/sync \
            --cov-report=xml:out/reports/coverage/coverage-fast-sync.xml
      # PENDING-CI (T021): daemon/real-port serial pass. orphan-sweep binds the
      # reserved daemon port range (9400-9449); OS-global binds are not
      # protected by per-worker HOME isolation, so this MUST run serial (-n0)
      # and outside the parallel sync selector (C-SERIAL, FR-005). Requires CI
      # green x3 before trusting. See mission test-suite-acceleration.
      - name: "Run fast tests — sync orphan-sweep (serial, real ports)"
        run: |
          uv run python -m pytest tests/sync/test_orphan_sweep.py -q --tb=short \
            -m "not windows_ci" \
            -n0 \
            --cov=src/specify_cli/sync \
            --cov-append \
            --cov-report=xml:out/reports/coverage/coverage-fast-sync-orphan-sweep.xml \
            || test $? -eq 5
      - name: "Upload fast-sync coverage"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fast-test-sync-reports
          path: out/reports/

