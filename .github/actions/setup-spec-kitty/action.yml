name: 'Setup Spec Kitty'
description: 'Install spec-kitty-cli with caching and optional testing dependencies'
author: 'Stijn Dejongh'

branding:
  icon: 'package'
  color: 'purple'

inputs:
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.12'
  
  install-test-deps:
    description: 'Install test dependencies (pytest, pytest-timeout)'
    required: false
    default: 'false'
  
  install-mutmut:
    description: 'Install mutmut for mutation testing'
    required: false
    default: 'false'
  
  spec-kitty-version:
    description: 'Specific version of spec-kitty-cli to install (e.g., "0.16.2" or "latest")'
    required: false
    default: 'latest'
  
  cache-dependency-path:
    description: 'Path to dependency file for cache key (defaults to pyproject.toml if exists)'
    required: false
    default: ''

outputs:
  cache-hit:
    description: 'Whether pip cache was hit'
    value: ${{ steps.cache-pip.outputs.cache-hit }}
  
  spec-kitty-version:
    description: 'Installed version of spec-kitty-cli'
    value: ${{ steps.get-version.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    
    - name: Determine cache key
      id: cache-key
      shell: bash
      run: |
        if [ -n "${{ inputs.cache-dependency-path }}" ] && [ -f "${{ inputs.cache-dependency-path }}" ]; then
          HASH=$(sha256sum "${{ inputs.cache-dependency-path }}" | cut -d' ' -f1)
        elif [ -f "pyproject.toml" ]; then
          HASH=$(sha256sum pyproject.toml | cut -d' ' -f1)
        else
          HASH="no-deps-file"
        fi
        
        KEY="spec-kitty-${{ runner.os }}-py${{ inputs.python-version }}-${HASH}"
        echo "key=$KEY" >> "$GITHUB_OUTPUT"
        echo "Cache key: $KEY"
    
    - name: Cache pip packages
      id: cache-pip
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          ~/.local/lib/python${{ inputs.python-version }}/site-packages
        key: ${{ steps.cache-key.outputs.key }}
        restore-keys: |
          spec-kitty-${{ runner.os }}-py${{ inputs.python-version }}-
          spec-kitty-${{ runner.os }}-
    
    - name: Upgrade pip
      shell: bash
      run: python -m pip install --upgrade pip
    
    - name: Install spec-kitty-cli
      shell: bash
      run: |
        if [ "${{ inputs.spec-kitty-version }}" = "latest" ]; then
          echo "Installing latest spec-kitty-cli..."
          pip install spec-kitty-cli
        else
          echo "Installing spec-kitty-cli==${{ inputs.spec-kitty-version }}..."
          pip install spec-kitty-cli==${{ inputs.spec-kitty-version }}
        fi
    
    - name: Install test dependencies
      if: inputs.install-test-deps == 'true'
      shell: bash
      run: |
        echo "Installing test dependencies..."
        pip install pytest pytest-timeout pytest-xdist
    
    - name: Install mutmut
      if: inputs.install-mutmut == 'true'
      shell: bash
      run: |
        echo "Installing mutmut..."
        pip install mutmut
    
    - name: Get installed version
      id: get-version
      shell: bash
      run: |
        VERSION=$(spec-kitty --version 2>&1 | grep -oP '\d+\.\d+\.\d+' || echo "unknown")
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Installed spec-kitty-cli version: $VERSION"
    
    - name: Verify installation
      shell: bash
      run: |
        echo "Verifying spec-kitty-cli installation..."
        spec-kitty --version
        python -c "import specify_cli; print(f'spec-kitty module loaded successfully from {specify_cli.__file__}')"
