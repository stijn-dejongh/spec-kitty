# tests/architectural/test_no_dead_symbols.py
# Symbol-level dead-code ratchet introduced by WP02. Two per-category
# entries mirror the per-category frozensets in the test module so the
# Cat-A (Slice F deferred, charter+kernel) ratchet can be tracked
# separately from the Cat-B (grandfathered legacy, doctrine + specify_cli)
# ratchet. Per C-004 / C-006, Cat-A MUST shrink by >= 2 entries per
# major release; target = 0 by Slice G. Cat-B is informational until
# a follow-up mission widens C-007 beyond charter+kernel.
test_no_dead_symbols:
  # justification: 12 pre-existing charter+kernel public symbols whose
  # ``__all__`` membership was inherited from before WP02 and whose
  # lack of runtime callers reflects a "library written but never
  # wired" carry-over. WP02 left their public-API contracts intact;
  # a future mission must wire / prune / delete each. 13->12: shrank when
  # WP03 (org-doctrine close-out) wired one Cat-A symbol; locked in here.
  category_a_slice_f_deferred: 12
  # justification: 271 pre-existing public symbols across doctrine +
  # specify_cli whose ``__all__`` predates the WP02 gate. C-007 /
  # FR-121 scopes WP02 to charter+kernel; this category is the
  # carry-over surface for the next mission that widens the convention.
  # 275->271 (org-doctrine close-out WP04): removed 5 now-wired/dropped
  # stale entries (charter.pack_context::CharterPackConfigError,
  # status.lifecycle_events::{mission_event_log_path,read_lifecycle_events},
  # and the two events.py re-exports SignificanceEvaluatedPayload /
  # TimeoutExpiredPayload dropped from __all__ while keeping imports).
  # 286->237 (retire-standalone-tasks-cli WP04, FR-007 + Boy Scout): the
  # standalone tasks surface was deleted, dropping the 13
  # ``scripts.tasks.acceptance_support::*`` and 21 ``scripts.tasks.task_helpers::*``
  # grandfathered entries. The same touch also sheds two now-LIVE entries that
  # WP03's reconciliation left stale — ``specify_cli.acceptance::ArtifactEncodingError``
  # and ``::normalize_feature_encoding`` gained callers via the canonical-home
  # move, so the dead-symbol gate correctly demanded their removal. Recomputed to
  # the live ``len(_CATEGORY_B_GRANDFATHERED_LEGACY)``; a shrink (burn-down policy:
  # a shrink needs no extra workflow).
  # 237->216 (unshim-wave1-01KWKVHB #2292, WP03 T009): recomputed to the live
  # ``len(_CATEGORY_B_GRANDFATHERED_LEGACY)`` after removing sync.replay::* x8 and
  # sync.tracker_client_glue::* x4 (the deleted modules' symbol rows). NOTE on
  # arithmetic: spec FR-005 stated 237->224 (-13) on the assumption the recorded
  # baseline matched live. The true post-WP01/WP02 live count was 227 (the 237
  # baseline had drifted +10 above live via prior warn-on-shrink cleanups that
  # never lowered it). WP03 removes 12 here -> live 215. Per the mission's own
  # "accurate baselines for Wave 2 planning" intent (#2293) and the anti-vacuous-
  # ratchet policy, this pins the honest live value rather than the stale-
  # baseline arithmetic (224), which would have left a silent regrowth gap.
  # Net arithmetic: 227 (pre-edit live) -12 (sync.replay/glue rows removed with
  # the module deletions) +1 (frontmatter::update_field: a cascade-orphan whose
  # sole src/ caller WAS the deleted task_profile; adopted-as-follow-up per C-002
  # rather than editing the live frontmatter.py) = 216. (Aggregate view of the
  # same result: base live 228 -13 rows incl. WP01's identity_aliases +1 = 216;
  # the 227/-12 frame above is the post-WP01 slice.) Research D8's "strands no
  # sibling" claim was falsified by the live dead-symbol gate -- recorded honestly.
  # 216->215 (unshim-wave2-01KWMCAX #2326 WP07 T020): the singular
  # frontmatter::update_field triad adopted-as-follow-up in wave1 is now DELETED
  # (verified caller-less first; its twin update_fields stays live). Its row is
  # drained from _CATEGORY_B_GRANDFATHERED_LEGACY, so the frozenset shrinks by
  # exactly 1 (update_field was the sole newly-dead row this lane touched -- no
  # other category_b entries went stale). Recomputed to the live
  # ``len(_CATEGORY_B_GRANDFATHERED_LEGACY)`` = 215 (NFR-004, honest live count).
  # Shrink-only direction overall (237->215); the growth-above-baseline gate stays enforced.
  category_b_grandfathered_legacy: 215
  # 6->4 (org-doctrine close-out WP04): removed the now-wired
  # charter.invocation_context::{OperationalContext,build_operational_context}
  # (WP14 added live src/ callers). Remaining 4: the two require_active_*
  # method entries, ContextPreconditionError, ConsistencyReport.
  category_c_wp_in_flight_charter_scope: 4
  # WP11 removal trigger reached: all 4 workflow registry symbols now have
  # live src/ callers (planner.py imports get_workflow, UnknownWorkflowError,
  # list_available_workflows from workflow_registry, and ActionStep from
  # workflow_schema). Category shrunk to 0.
  category_c_wp_in_flight_workflow_registry: 0
  # justification: 8 type/error symbols introduced by WP05/WP06 of mission
  # charter-pack-activation-layer-01KSYE4V whose production callers (CLI
  # activation command, DRG pipeline) are in-flight in later WPs of the same
  # mission. All symbols ship ahead of wiring per the activation-layer design.
  category_c_wp_in_flight_charter_activation: 8  # justification: activate_cmd removed from __all__ (typer callback, consistent with deactivate/list); remaining 8 are type/error symbols with no direct src/ caller yet
  # justification: 15 mission-authored charter/doctrine public symbols
  # re-allowlisted by org-doctrine-profile-integrity-closeout WP04 (the
  # parent's WP15 allowlist was dropped in the specify_cli.next->runtime.next
  # upstream rebase). Re-derived against the live import graph after WP03's
  # charter.template_catalog facade landed (the 4 doctrine.template_catalog
  # accessors remain genuinely unimported). Tracker: WP06/T021 (DIRECTIVE_013).
  category_c_org_doctrine_closeout: 15
  # category_c_upstream_status_service removed by execution-context-unification
  # WP09 (#1622/#391): the 2 truly-dead functions (append_event_log_batch,
  # read_wp_lane_actor) were deleted and the 3 internally-used types
  # (EventLogWriteTarget, StatusContractError, StatusReadSource) were
  # de-exported from status_service.__all__, so the baseline is now 0.
