# Ratchet baselines for tests/architectural/* gated allowlists.
#
# This file is binding per the Slice F charter pack (C-004). The
# meta-test tests/architectural/test_ratchet_baselines.py compares each
# entry below against the live size of the corresponding gated
# allowlist; growth above baseline FAILS the test, shrinkage WARNS.
#
# Schema and per-test invariants:
#   kitty-specs/slice-f-multi-context-extensibility-01KRX5C8/contracts/
#   ratchet-baseline-format.md
#
# Per-PR edit policy:
# - Growing a baseline requires the YAML diff in the same PR PLUS a
#   `# justification:` comment on the changed line naming why growth
#   is acceptable. A PR that grows category_7_grandfathered must link
#   a follow-up tracker ticket per FR-303.
# - Shrinkage requires no extra workflow steps (just edit the number).

# tests/architectural/test_no_dead_modules.py
# Per-category breakdown (FR-112 refactor).
test_no_dead_modules:
  # justification: 76 auto-discovered migration modules under
  # src/specify_cli/upgrade/migrations/m_*.py. +3 for
  # m_3_2_0rc28_github_diff_attributes, m_3_2_0rc35_activate_builtin_mission_types
  # (WP01 gap filled here), and m_3_2_0rc35_default_charter_pack (WP05,
  # charter-pack-activation-layer-01KSYE4V). +1 for
  # m_3_2_0rc35_charter_manifest_defaults_repair (upstream #1480). +1 (76->77,
  # org-doctrine-profile-integrity-closeout WP04): the upstream rebase added
  # m_3_2_0rc35_sync_state_gitignore, allowlisted in _CATEGORY_1 here. +1 for
  # m_3_2_0rc35_spk_skill_pack, another auto-discovered migration. +2 (79->81,
  # wp-lane-state-machine-fsm): upstream #1756 added m_3_3_0_session_presence_all_harnesses
  # and m_3_3_0_session_presence_claude_code; both auto-discovered via
  # pkgutil.iter_modules, never statically imported. Growth here is expected/routine.
  category_1_auto_discovered_migrations: 87  # justification: +1 (86->87): m_3_2_0rc45_retire_standalone_skill_surface is an auto-discovered migration loaded via pkgutil.iter_modules, never statically imported.
  # justification: 3 schema generator modules consumed by
  # scripts/generate_schemas.py via importlib.import_module.
  # Shrunk from 4 → 3 when doctrine.missions.models gained a live
  # src/ caller via MissionTypeRepository (WP14 mission-type commands).
  # 3 -> 4 (common-docs-consolidation post-merge remediation): added
  # doctrine.directives.common_docs, a constant module (COMMON_DOCS_DIRECTIVE_ID,
  # the Common Docs directive-id SSOT) consumed by
  # scripts/docs/anti_sprawl_ratchet.py -- wired from scripts/, not src/, the
  # same "build-script-consumed" pattern as the schema generators.
  category_2_build_schema_generators: 4  # justification: doctrine.directives.common_docs consumed from scripts/docs, not src/
  # justification: 1 external/CLI entry point invoked outside the
  # spec-kitty import graph (commit_guard_hook). Shrunk from 4 by
  # retire-standalone-tasks-cli WP04 (FR-007): the 3 standalone-tasks-surface
  # module entries dropped with the deleted surface (shrink — burn-down ok).
  category_3_external_cli_entrypoints: 1
  # justification: 0 documented backward-compat shim modules. (unshim-wave1 WP01
  # #2289 deleted the 7 other category_4 shims — acceptance_matrix,
  # core.identity_aliases, doc_generators, doc_state, gap_analysis,
  # state_contract, workspace_context — 8->1 SHRINK. WP02 then re-anchored
  # tasks_support's ~35 test sites onto specify_cli.task_utils and deleted the
  # module, draining the last row: 1->0 SHRINK. Category fully drained.)
  category_4_backcompat_shims: 0
  # justification: 3 compat-shim WP-in-flight adapters.
  category_5_wp_in_flight_adapters: 0  # emptied: the 3 dead compat._adapters shim modules deleted (salvaged from closed #2159/#2049)
  # justification: 3 frozen-contract internal re-exports under
  # next/_internal_runtime/ frozen by shared-package-boundary-cutover.
  category_6_frozen_runtime_reexports: 3
  # Slice F WP01 T002 inherits 10 grandfathered orphans; T005-T007
  # delete 3 (doctrine.templates.repository,
  # glossary.prompts, glossary.rendering)
  # bringing the live size to 7. Per C-006 this category MUST shrink
  # by >= 2 entries per major release; target = 0 by 4.0.
  # Lowered 7 -> 6 to lock in observed shrinkage (one further orphan removed).
  # #2082 FR-011 burn-down LANDED: WP08 wired override_policy's three governance
  # predicates into the `spec-kitty doctor doctrine` runtime caller
  # (specify_cli.cli.commands._doctrine_collect), so the module now has a real
  # src/ caller and is no longer an orphan; WP09 narrowed its __all__ to those
  # three live functions and retired the doctrine.drg.override_policy allowlist
  # entry. Re-lowered 7 -> 6, reversing the prior deliberate bump.
  # 6 -> 2 (unshim-wave1-01KWKVHB #2292, WP01 T005 + WP03 T008): deleted
  # task_profile, sync.replay, sync.tracker_client_glue and
  # retrospective.lifecycle outright. The two survivors (auth.transport,
  # policy.audit) carry documented deferral verdicts (ADR 2026-05-18-2 / Robert;
  # adopt-as-follow-up respectively). Shrink of 4 satisfies the C-006 ">= 2 per
  # major release" burn-down floor for this wave.
  category_7_grandfathered_orphans: 2

